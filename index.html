    // --- QR Scanner Modal (ส่วนที่หายไป) ---
    const QRScannerModal = ({ isOpen, onClose, onScan }) => {
      useScrollLock(isOpen);
      useEffect(() => {
        if (!isOpen) return;
        let html5QrcodeScanner;
        
        const timeout = setTimeout(() => { 
            try { 
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader", 
                    { 
                        fps: 10, 
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0,
                        showTorchButtonIfSupported: true 
                    }, 
                    false
                ); 
                
                html5QrcodeScanner.render((decodedText) => { 
                    onScan(decodedText); 
                    html5QrcodeScanner.clear().catch(err => console.error(err)); 
                    onClose(); 
                }, (errorMessage) => {
                    // scanning...
                }); 
            } catch (e) {
                console.error("Scanner Error", e);
            } 
        }, 100);

        return () => { 
            clearTimeout(timeout); 
            if (html5QrcodeScanner) { 
                try { html5QrcodeScanner.clear(); } catch(e){} 
            } 
        };
      }, [isOpen]);

      if (!isOpen) return null;

      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm animate-fade-in">
            <style>{`
                #reader { border: none !important; }
                #reader button { 
                    background-color: #2563EB !important; 
                    color: white !important; 
                    padding: 8px 16px !important; 
                    border-radius: 8px !important; 
                    border: none !important; 
                    margin-top: 10px !important;
                    font-weight: bold !important;
                    cursor: pointer !important;
                }
                #reader button:hover { background-color: #1D4ED8 !important; }
                #reader select {
                    padding: 5px !important;
                    border: 1px solid #ccc !important;
                    border-radius: 5px !important;
                    margin-bottom: 10px !important;
                    color: black !important;
                    background: white !important;
                }
                #reader span, #reader a { color: #4b5563 !important; }
            `}</style>
            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
                <button onClick={onClose} className="absolute -top-4 -right-4 w-10 h-10 flex items-center justify-center rounded-full bg-red-500 text-white shadow-lg hover:bg-red-600 z-10 transition-transform hover:scale-110">

      // ภายในฟังก์ชัน App เพิ่มสิ่งเหล่านี้:
    const [deletingStudent, setDeletingStudent] = useState(null);

      const handleSaveProduct = (form) => { setProcessingAction('SAVE_PRODUCT'); setOrderData(prev => { let newProducts = [...prev.products]; const existingIdx = newProducts.findIndex(p => p.id === form.id); if (existingIdx >= 0) { newProducts[existingIdx] = { ...newProducts[existingIdx], ...form }; } else { newProducts.push({ ...form, id: form.id || `temp-${Date.now()}` }); } return { ...prev, products: newProducts }; }); setTimeout(() => { apiCall('saveProduct', form).then(() => finishAction()).catch((err) => alert('Error: ' + err.message)); }, 500); };

      const handleSendOverdueNotification = (billId) => { setProcessingAction('NOTIFY'); apiCall('sendOverdueNotification', billId).then(() => { finishAction(); }).catch(err => { setErrorMessage(err.message || "ส่งข้อความไม่สำเร็จ"); setIsErrorModalOpen(true); setProcessingAction(null); }); };

     const handleSendOverdueBatchNotification = (targets) => { setProcessingAction('NOTIFY'); apiCall('sendBatchLineNotify', { targets }).then(() => { finishAction(); }).catch((err) => { setErrorMessage(err.message || "ส่งข้อความไม่สำเร็จ"); setIsErrorModalOpen(true); setProcessingAction(null); }); };

      const handleUpdateBill = (status) => { if(!selectedBill) return; let actionType = 'LOADING'; if (status === 'ชำระแล้ว') actionType = 'APPROVE'; if (status === '') actionType = 'REJECT'; if (status === 'รอตรวจสอบ') actionType = 'WAIT_CHECK'; setProcessingAction(actionType); apiCall('updateBillStatus', selectedBill.billId, status, selectedBill.studentId, notifyEnabled).then((newData) => { setSelectedBill(null); setData(newData); finishAction(); }).catch((err) => { alert('Error: ' + err.message); setProcessingAction(null); }); };

              )}
          </div>
                      
            <nav className="flex flex-col gap-2 overflow-y-auto no-scrollbar flex-1">
              {navMenus.map(tab => {
                const isActive = activeTab === tab.id;
                return (
                  <button 
                    key={tab.id} 
                    onClick={() => { setActiveTab(tab.id); if(tab.id === 'notifications') setNotificationSubTab('followup'); if(tab.id === 'bills') setBillFilter('all'); }} 
                    className={`flex items-center gap-4 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 w-full relative ${isActive ? 'bg-blue-50 text-blue-700' : 'text-gray-500 hover:bg-gray-50'} ${isSidebarCollapsed ? 'justify-center' : ''}`}
                    title={tab.label}
                  >
                    <Icon name={tab.icon} size={22} weight={isActive ? 'fill' : 'bold'} className={isActive ? 'text-blue-600' : 'text-gray-400'} />
                    {!isSidebarCollapsed && <span className="text-sm">{tab.label}</span>}
                  </button>
                );
              })}
            </nav>

            {/* ✅ ปุ่มกด ย่อ/ขยาย */}
            <button 
                onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                className="mt-4 w-full py-3 rounded-xl border border-gray-100 text-gray-400 hover:text-primary hover:bg-blue-50 transition-all flex items-center justify-center gap-2 font-bold"
            >
                <Icon name={isSidebarCollapsed ? "caret-double-right" : "caret-double-left"} weight="bold" size={18}/>
                {!isSidebarCollapsed && <span className="text-xs">ย่อเมนู</span>}
            </button>
          </aside>

          {/* === 📱 พื้นที่แสดงเนื้อหาหลัก === */}
          <div className="flex-1 flex flex-col min-w-0">
            <header className="bg-white p-4 sticky top-0 z-30 shadow-sm flex justify-between items-center md:hidden">
              <div className="flex items-center gap-2">
                <div className="bg-primary p-2 rounded-lg text-white"><Icon name="graduation-cap" weight="fill" /></div>
                <h1 className="text-xl font-bold text-gray-800">Admin <span className="text-primary">MEDTECH67</span></h1>
              </div>
              <button onClick={() => fetchData(true)} className="p-2 text-gray-400 hover:text-primary transition rounded-full hover:bg-gray-100">
                <Icon name="arrow-clockwise" size={24} className={loading ? "animate-spin" : ""} weight="bold" />
              </button>
            </header>

            <main className="p-4 md:p-8 max-w-5xl mx-auto w-full pb-24 md:pb-12 flex-1">
              {loading && !data.students?.length ? <Spinner /> : (
                <>
                  {activeTab === 'dashboard' && <DashboardView data={data} orderData={orderData} setActiveTab={setActiveTab} setNotificationSubTab={setNotificationSubTab} onGoToPendingBills={handleGoToPendingBills} onGoToOverdueBills={handleGoToOverdueBills} onGoToUnpaidBills={handleGoToUnpaidBills} onEditHistory={setEditingHistory} onSelectBill={setSelectedBill} />}
                  {activeTab === 'bills' && <BillView data={data} setSelectedBill={setSelectedBill} setIsCreateModalOpen={setIsCreateModalOpen} searchTerm={billSearch} setSearchTerm={setBillSearch} filter={billFilter} onFilterChange={setBillFilter} />}
                  {activeTab === 'students' && (
                    <StudentView 
                        data={data} 
                        setIsStudentModalOpen={setIsStudentModalOpen} 
                        setSelectedStudent={setSelectedStudent} 
                        onViewBills={handleViewStudentBills}
                        onDeleteStudent={(stu) => setDeletingStudent(stu)} 
                    />
                )}
                  {activeTab === 'history' && <HistoryView data={data} setSelectedBill={setEditingHistory} onDeleteHistory={handleDeleteHistoryClick} onViewSlip={setViewingSlipUrl} />}
                  {activeTab === 'students' && <StudentView data={data} setIsStudentModalOpen={setIsStudentModalOpen} setSelectedStudent={setSelectedStudent} handleDeleteStudent={handleDeleteStudentClick} onViewBills={handleViewStudentBills} />}
                  {activeTab === 'finance' && <FinanceView data={data} onSave={handleSaveFinance} onDelete={handleDeleteFinance} onViewImage={setViewingSlipUrl} loading={processingAction === 'SAVE_FINANCE'} />}
                  {activeTab === 'notifications' && <NotificationView students={data.students} data={data} onSendCustom={handleSendCustomNotification} onSendOverdue={handleSendOverdueNotification} onSendAccount={handleSendAccountNotification} onSendOverdueBatch={handleSendOverdueBatchNotification} loading={loading || !!processingAction} defaultSubTab={notificationSubTab} />}
                  {activeTab === 'orders' && <OrderView orderData={orderData} students={data.students} onToggleSystem={handleToggleOrderSystem} onSaveProduct={handleSaveProduct} onDeleteProduct={handleDeleteProductClick} onDeleteOrder={handleDeleteOrderClick} onUpdateStatus={handleUpdateOrderStatus} onViewSlip={setViewingSlipUrl} loading={loading} processingAction={processingAction} onEditOrder={handleEditOrder} setOrderData={setOrderData} />}
                  {activeTab === 'settings' && <SettingsView data={data} setData={setData} orderData={orderData} setAnnounceForm={setAnnounceForm} setIsAnnounceModalOpen={setIsAnnounceModalOpen} onOpenQrManager={openQrManager} onEditQr={openQrEditor} processingAction={processingAction} setProcessingAction={setProcessingAction} onViewImage={setViewingSlipUrl} onToggleOrderSystem={handleToggleOrderSystem} />}
                </>
              )}
            </main>
          </div>

          {/* Bottom Nav มือถือ */}
          <nav className="md:hidden fixed bottom-5 left-4 right-4 max-w-lg mx-auto bg-white/90 backdrop-blur-xl border border-white/40 rounded-3xl shadow-2xl shadow-blue-900/10 px-2 py-3 flex justify-between items-center z-40 animate-slide-up-fade">
            {navMenus.map(tab => {
              const isActive = activeTab === tab.id;
              return (
                <button 
                  key={tab.id} 
                  onClick={() => { setActiveTab(tab.id); if(tab.id==='notifications') setNotificationSubTab('followup'); if(tab.id==='bills') setBillFilter('all'); }} 
                  className={`relative group flex flex-col items-center justify-center transition-all duration-300 ${isActive ? '-translate-y-3' : 'hover:-translate-y-1'}`}
                >
                  <div className={`w-10 h-10 rounded-2xl flex items-center justify-center transition-all duration-300 shadow-sm ${isActive ? 'bg-gradient-to-tr from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-300 scale-110' : 'bg-transparent text-gray-400 hover:bg-blue-50 hover:text-blue-500'}`}>
                    <Icon name={tab.icon} size={20} weight={isActive ? 'fill' : 'bold'} />
                  </div>
                  <span className={`absolute -bottom-5 text-[9px] font-bold whitespace-nowrap transition-all duration-300 ${isActive ? 'text-blue-600 opacity-100 translate-y-0' : 'text-gray-400 opacity-0 -translate-y-2 pointer-events-none'}`}>
                    {tab.label}
                  </span>
                  {isActive && <div className="absolute -bottom-2 w-1 h-1 bg-blue-600 rounded-full"></div>}
                </button>
              );
            })}
          </nav>

          <Modal isOpen={!!selectedBill} onClose={() => setSelectedBill(null)} title={isEditing ? "แก้ไขข้อมูลบิล" : "รายละเอียดบิล"} hideClose={!!processingAction} zIndex="z-[60]">
            {selectedBill && (() => {
              const formatDateTime = (dateInput) => {
                  if (!dateInput) return '-';
                  let dateObj;
                  if (typeof dateInput === 'string' && dateInput.includes('/')) {
                      try {
                          const [dPart, tPart] = dateInput.split(', ');
                          const [day, month, year] = dPart.split('/');
                          const [hour, minute] = tPart ? tPart.split(':') : [0, 0];
                          dateObj = new Date(year, month - 1, day, hour, minute);
                      } catch (e) { dateObj = new Date(dateInput); }
                  } else {
                      dateObj = new Date(dateInput);
                  }
                  if (isNaN(dateObj.getTime())) return dateInput;
                  return dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
              };

              const fine = calculateFine(selectedBill);
              const discount = Number(selectedBill.discount) || 0;
              const amount = Number(selectedBill.amount) || 0;
              const total = amount + fine - discount;

              const today = new Date();
              today.setHours(0,0,0,0);
              const due = selectedBill.dueDate ? new Date(selectedBill.dueDate) : null;
              if(due) due.setHours(0,0,0,0);
              const isOverdue = due && due < today && selectedBill.status !== 'ชำระแล้ว' && selectedBill.status !== 'ยกเลิก';

              return (
                <div className="space-y-4 relative">
                  {!isEditing && (
                    <div className="flex justify-end gap-2 mb-[-10px] relative z-20">
                      {isOverdue && (
                        <button onClick={() => setIsOverdueConfirmOpen(true)} disabled={!!processingAction} className="h-9 px-3 flex items-center justify-center gap-1 rounded-lg bg-red-50 text-red-600 border border-red-100 shadow-sm hover:bg-red-100 hover:text-red-700 transition text-xs font-bold" title="ทวงผ่าน LINE">
                            {processingAction === 'NOTIFY' ? <Icon name="spinner" className="animate-spin" weight="bold" size={16}/> : <Icon name="bell-ringing" weight="bold" size={16}/>}
                            <span className="hidden sm:inline">ทวงถาม</span>
                        </button>
                      )}
                      <button onClick={() => setIsEditing(true)} disabled={!!processingAction} className="h-9 px-3 flex items-center justify-center gap-1 rounded-lg bg-white text-blue-600 border border-blue-100 shadow-sm hover:bg-blue-50 transition text-xs font-bold" title="แก้ไข">
                          <Icon name="pencil-simple" weight="bold" size={16}/> <span className="hidden sm:inline">แก้ไข</span>
                      </button>
                      <button onClick={() => setIsResetConfirmOpen(true)} disabled={!!processingAction} className="h-9 px-3 flex items-center justify-center gap-1 rounded-lg bg-white text-orange-500 border border-orange-100 shadow-sm hover:bg-orange-50 transition text-xs font-bold" title="รีเซ็ตสถานะ">
                          <Icon name="arrow-counter-clockwise" weight="bold" size={16}/> <span className="hidden sm:inline">รีเซ็ต</span>
                      </button>
                      <button onClick={handleDeleteClick} disabled={!!processingAction} className="h-9 px-3 flex items-center justify-center gap-1 rounded-lg bg-white text-red-500 border border-red-100 shadow-sm hover:bg-red-50 transition text-xs font-bold" title="ลบบิล">
                          <Icon name="trash" weight="bold" size={16}/> <span className="hidden sm:inline">ลบ</span>
                      </button>
                    </div>
                  )}
                  {isEditing ? (
                    <div className="pt-0 animate-fade-in">
                      <button onClick={() => setIsEditing(false)} disabled={!!processingAction} className="flex items-center gap-1 text-xs font-bold text-gray-500 hover:text-blue-600 transition mb-4">
                          <Icon name="arrow-left" weight="bold"/> กลับไปหน้ารายละเอียด
                      </button>
                      <BillForm students={data.students} onSubmit={handleEditBill} loading={processingAction === 'EDITING'} initialData={selectedBill} buttonText="บันทึกการแก้ไข" />
                      <button onClick={() => setIsEditing(false)} disabled={!!processingAction} className="w-full mt-3 py-3 rounded-xl bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition">ยกเลิกการแก้ไข</button>
                    </div>
                  ) : (
                    <div className="animate-fade-in pt-2">
                      <div className="bg-gradient-to-br from-gray-50 to-white p-6 rounded-2xl text-center border border-gray-100 shadow-sm relative overflow-hidden mt-2">
                          <div className={`absolute top-0 right-0 px-4 py-1.5 rounded-bl-xl text-[10px] font-bold shadow-sm ${getStatusColor(selectedBill.status)}`}>{selectedBill.status || 'ค้างชำระ'}</div>
                          <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1 mt-2">ยอดชำระสุทธิ</p>
                          <h2 className="text-4xl font-extrabold text-gray-800 tracking-tight">฿{total.toLocaleString()}</h2>
                          <p className="text-sm text-primary font-medium mt-2">{selectedBill.item}</p>
                      </div>
                      <div className="space-y-0 mt-4 border border-gray-100 rounded-2xl overflow-hidden">
                          <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center">
                              <span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="user" weight="bold"/> นักศึกษา</span>
                              <span className="font-medium text-sm text-right">
                                  {selectedBill.studentId} 
                                  <br/>
                                  <span className="text-primary text-xs">
                                      {data.students?.find(s => String(s.id) === String(selectedBill.studentId))?.name || 'ไม่พบชื่อนักศึกษา'}
                                  </span>
                              </span>
                          </div>
                          <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="hash" weight="bold"/> รหัสบิล</span><span className="font-mono text-sm font-bold text-gray-700">#{selectedBill.billId}</span></div>
                          <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="calendar-check" weight="bold"/> ครบกำหนด</span><span className="font-medium text-sm text-red-500 font-bold">{formatDate(selectedBill.dueDate)}</span></div>
                          <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="currency-btc" weight="bold"/> เงินต้น</span><span className="font-medium text-sm">{amount.toLocaleString()}</span></div>
                          {fine > 0 && <div className="flex justify-between py-3 px-4 bg-orange-50/50 border-b border-orange-50 items-center"><span className="text-xs text-orange-600 font-bold flex items-center gap-2"><Icon name="warning-circle" weight="bold"/> ค่าปรับล่าช้า</span><span className="font-bold text-sm text-orange-600">+{fine.toLocaleString()}</span></div>}
                          {discount > 0 && <div className="flex justify-between py-3 px-4 bg-green-50/50 border-b border-green-50 items-center"><span className="text-xs text-green-600 font-bold flex items-center gap-2"><Icon name="percent" weight="bold"/> ส่วนลด</span><span className="font-bold text-sm text-green-600">-{discount.toLocaleString()}</span></div>}
                          
                          {selectedBill.payDate && (
                              <div className="flex justify-between py-3 px-4 bg-emerald-50/50 border-b border-emerald-50 items-center">
                                  <span className="text-xs text-emerald-600 font-bold flex items-center gap-2"><Icon name="check-circle" weight="bold"/> วันที่ชำระ</span>
                                  <span className="font-bold text-sm text-emerald-700">{formatDateTime(selectedBill.payDate)}</span>
                              </div>
                          )}

                          <div className="flex justify-between py-3 px-4 bg-white items-center">
                              <span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="image" weight="bold"/> หลักฐาน</span>
                              {selectedBill.slipUrl ? (
                                  <button onClick={() => setViewingSlipUrl(selectedBill.slipUrl)} className="px-3 py-1.5 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg hover:bg-blue-100 transition flex items-center gap-1 border border-blue-100">
                                      <Icon name="eye" weight="bold"/> ดูสลิป
                                  </button>
                              ) : (
                                  <span className="text-gray-300 text-xs italic">ไม่มีสลิป</span>
                              )}
                          </div>
                      </div>
                      <div className="mt-6">{renderBillButtons()}</div>
                    </div>
                  )}
                </div>
              );
            })()}
          </Modal>

          <ConfirmModal isOpen={isDeleteConfirmOpen} onClose={() => !processingAction && setIsDeleteConfirmOpen(false)} onConfirm={confirmDelete} title={deleteTarget?.type === 'HISTORY' ? "ยืนยันลบประวัติ" : (deleteTarget?.type === 'STUDENT' ? "ยืนยันลบนักศึกษา" : (deleteTarget?.type === 'QR' ? "ยืนยันลบ QR Code" : (deleteTarget?.type === 'PRODUCT' ? "ยืนยันลบสินค้า" : (deleteTarget?.type === 'ORDER' ? "ยืนยันลบออเดอร์" : (deleteTarget?.type === 'ANNOUNCEMENT' ? "ยืนยันลบประกาศ" : "ยืนยันการลบบิล")))))} message={getConfirmMessage()} loading={processingAction === 'DELETE'} />
          <ConfirmModal isOpen={isResetConfirmOpen} onClose={() => setIsResetConfirmOpen(false)} onConfirm={handleResetBill} title="ยืนยันการรีเซ็ตบิล" message={`ระบบจะทำการลบ:\n- วันที่ชำระ\n- รูปสลิป\n- รหัสอ้างอิง\n\nคุณยืนยันที่จะรีเซ็ตสถานะใช่หรือไม่?`} loading={processingAction === 'RESET'} confirmText="ยืนยันรีเซ็ต" isDestructive={true} />
          
          <ConfirmModal 
              isOpen={isOverdueConfirmOpen} 
              onClose={() => setIsOverdueConfirmOpen(false)} 
              onConfirm={() => {
                  setIsOverdueConfirmOpen(false);
                  if(selectedBill) handleSendOverdueNotification(selectedBill.billId);
              }} 
              title="ยืนยันการทวงถาม" 
              message={`คุณต้องการส่งข้อความแจ้งเตือนทวงถามบิล #${selectedBill?.billId} ไปยัง LINE ของนักศึกษาใช่หรือไม่?`} 
              loading={processingAction === 'NOTIFY'} 
              confirmText="ยืนยันส่ง" 
              isDestructive={false} 
          />

          <Modal isOpen={isCreateModalOpen} onClose={() => setIsCreateModalOpen(false)} title="สร้างบิลใหม่"><BillForm students={data.students} onSubmit={handleCreateBill} loading={processingAction === 'CREATE_BILL'} /></Modal>
          <Modal isOpen={isStudentModalOpen} onClose={() => setIsStudentModalOpen(false)} title={selectedStudent ? "แก้ไขนักศึกษา" : "เพิ่มนักศึกษา"}><StudentForm onSubmit={handleSaveStudent} loading={processingAction === 'SAVE_STUDENT'} initialData={selectedStudent} /></Modal>
         <StudentBillsModal 
              isOpen={!!viewingStudentId} 
              onClose={() => setViewingStudentId(null)} 
              student={data.students?.find(s => String(s.id) === String(viewingStudentId))} 
              bills={data.bills?.filter(b => String(b.studentId) === String(viewingStudentId))} 
              onSelectBill={(bill) => setSelectedBill(bill)} 
          />
          <QrCodeModal isOpen={isQrModalOpen} onClose={() => setIsQrModalOpen(false)} qrUrls={data.amount?.qrCodes || []} onUploadSuccess={handleQrUploadSuccess} onDelete={handleDeleteQrClick} loading={loading} initialEditQr={editingQrData} />
          <ErrorModal isOpen={isErrorModalOpen} onClose={() => setIsErrorModalOpen(false)} message={errorMessage} />
          <ImageModal isOpen={!!viewingSlipUrl} onClose={() => setViewingSlipUrl(null)} imageUrl={getDirectImageUrl(viewingSlipUrl)} />
          <HistoryEditModal isOpen={!!editingHistory} onClose={() => setEditingHistory(null)} historyItem={editingHistory} onSave={handleEditHistoryData} loading={processingAction === 'EDIT_HISTORY'} />
          <DeleteUserConfirmModal 
              isOpen={!!deletingStudent} 
              onClose={() => setDeletingStudent(null)} 
              student={deletingStudent}
              onConfirm={handleConfirmFullDelete}
              loading={processingAction === 'DELETING_USER'}
          />
          <Modal isOpen={isAnnounceModalOpen} onClose={() => setIsAnnounceModalOpen(false)} title="จัดการประกาศจากระบบ" zIndex="z-[110]">
              <div className="space-y-4 pt-2">
                  <div className="flex bg-gray-100 p-1 rounded-xl">
                      <button type="button" onClick={() => setAnnounceForm({ ...announceForm, type: 'text', fileBase64: '', preview: '' })} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${announceForm.type === 'text' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>ข้อความ (Text)</button>
                      <button type="button" onClick={() => setAnnounceForm({ ...announceForm, type: 'image', text: '' })} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${announceForm.type === 'image' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>รูปภาพ (Image)</button>
                  </div>

                  {announceForm.type === 'text' ? (
                      <div>
                          <label className="text-xs font-bold text-gray-500 mb-2 block">ข้อความประกาศ</label>
                          <textarea value={announceForm.text} onChange={(e) => setAnnounceForm({ ...announceForm, text: e.target.value })} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-blue-500 min-h-[120px] text-sm" placeholder="พิมพ์ข้อความประกาศที่นี่..."></textarea>
                      </div>
                  ) : (
                      <div className="space-y-2">
                          <label className="text-xs font-bold text-gray-500 mb-2 block">รูปภาพประกาศ (แบนเนอร์)</label>
                          {announceForm.preview ? (
                              <div className="relative group">
                                  <div className="h-40 w-full bg-gray-100 rounded-xl overflow-hidden border border-gray-200 flex items-center justify-center">
                                      <img src={announceForm.preview} className="max-h-full max-w-full object-contain" referrerPolicy="no-referrer" />
                                  </div>
                                  <div className="absolute top-2 right-2 flex gap-2">
                                      <label className="cursor-pointer w-8 h-8 flex items-center justify-center rounded-full bg-white text-blue-600 shadow-md hover:bg-blue-50 transition">
                                          <Icon name="arrows-clockwise" weight="bold" size={16}/>
                                          <input type="file" accept="image/*" onChange={(e) => {
                                              const file = e.target.files[0];
                                              if (file) {
                                                  const reader = new FileReader();
                                                  reader.onloadend = () => setAnnounceForm({ ...announceForm, fileBase64: reader.result.split(',')[1], preview: reader.result });
                                                  reader.readAsDataURL(file);
                                              }
                                          }} className="hidden" />
                                      </label>
                                  </div>
                              </div>
                          ) : (
                              <label className="flex flex-col items-center justify-center h-32 w-full border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-white hover:bg-gray-50 hover:border-blue-300 transition group">
                                  <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                      <Icon name="cloud-arrow-up" className="text-gray-400 group-hover:text-blue-500 mb-1" size={24}/>
                                      <p className="text-[10px] text-gray-500 font-medium">กดเพื่ออัปโหลดรูปภาพแบนเนอร์</p>
                                  </div>
                                  <input type="file" accept="image/*" onChange={(e) => {
                                      const file = e.target.files[0];
                                      if (file) {
                                          const reader = new FileReader();
                                          reader.onloadend = () => setAnnounceForm({ ...announceForm, fileBase64: reader.result.split(',')[1], preview: reader.result });
                                          reader.readAsDataURL(file);
                                      }
                                  }} className="hidden" />
                              </label>
                          )}
                      </div>
                  )}

                  <div className="flex gap-3 pt-2">
                      {data.announcement && (
                          <button onClick={handleDeleteAnnouncementClick} disabled={!!processingAction} className="py-3 px-4 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-100 transition flex items-center justify-center shadow-sm border border-red-100" title="ลบประกาศ">
                              <Icon name="trash" weight="bold" size={20}/>
                          </button>
                      )}
                      <button onClick={handleSaveAnnouncement} disabled={!!processingAction || (announceForm.type === 'text' && !announceForm.text) || (announceForm.type === 'image' && !announceForm.preview)} className="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                          {processingAction === 'ANNOUNCE' ? <><Icon name="spinner" className="animate-spin" weight="bold"/> กำลังบันทึก...</> : 'บันทึกประกาศ'}
                      </button>
                  </div>
              </div>
          </Modal>
        </div>
      );
    };
      
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

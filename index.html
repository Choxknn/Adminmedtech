<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin System - Firestore Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            secondary: '#64748B', 
            background: '#F8FAFC', 
            surface: '#FFFFFF',
          },
          fontFamily: { sans: ['Inter', 'Sarabun', 'sans-serif'] },
          animation: {
            'scale-in': 'scaleIn 0.2s ease-out forwards',
            'check-bounce': 'checkBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
          },
          keyframes: {
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            checkBounce: { '0%': { transform: 'scale(0)' }, '50%': { transform: 'scale(1.2)' }, '100%': { transform: 'scale(1)' } },
            shake: {
              '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@300;400;500;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ✅ Firebase Configuration
    const firebaseConfig = {
  apiKey: "AIzaSyCI12dWCOkpRbdr-TFtZjNQhRKvdmj4g6k",
  authDomain: "medtechptu67-payment.firebaseapp.com",
  databaseURL: "https://medtechptu67-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "medtechptu67-payment",
  storageBucket: "medtechptu67-payment.firebasestorage.app",
  messagingSenderId: "452330902364",
  appId: "1:452330902364:web:f92236a62500144531a799",
  measurementId: "G-7WQWLGFSC0"
};

    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // ✅ API_URL สำหรับ GAS (ใช้เฉพาะส่ง LINE Notification เท่านั้น)
    const API_URL = "https://script.google.com/macros/s/AKfycbwbNYCsHz7sxUx4TmjU2qiATY0oLmRC-XCOaPaLoPkiRlBZ2KHH95LDTx36JODNaeEkxw/exec";

    // ✅ ตัวกลางเรียกใช้ LINE API ผ่าน GAS
    const lineNotify = async (action, data) => {
        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ action: action, data: [data] })
            });
        } catch (e) { console.error("Line Notify Error:", e); }
    };

    // --- REUSABLE COMPONENTS (เหมือนเดิมแต่ปรับปรุง logic เล็กน้อย) ---
    const Icon = ({ name, size = 24, className = "", weight="regular" }) => {
        const weightClass = weight === 'regular' ? 'ph' : `ph-${weight}`;
        return <i className={`${weightClass} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    };

    const Spinner = () => (
        <div className="flex justify-center items-center py-10">
            <Icon name="circle-notch" className="animate-spin text-primary" size={32} weight="bold" />
        </div>
    );

    // --- UTILS ---
    const formatDate = (dateInput) => {
        if (!dateInput) return '-';
        const date = (dateInput?.seconds) ? new Date(dateInput.seconds * 1000) : new Date(dateInput);
        return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    };

    // --- APP COMPONENT ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [loading, setLoading] = useState(true);
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [processingAction, setProcessingAction] = useState(null);
      
      // ✅ Real-time States
      const [students, setStudents] = useState([]);
      const [bills, setBills] = useState([]);
      const [orders, setOrders] = useState([]);
      const [systemStatus, setSystemStatus] = useState('OFF');
      const [qrCodes, setQrCodes] = useState([]);
      const [announcement, setAnnouncement] = useState('');

      // ✅ 1. Real-time Synchronization
      useEffect(() => {
        if (!isLoggedIn) return;

        // ดึงรายชื่อนักศึกษา
        const unsubUsers = db.collection('users').onSnapshot(snap => {
            setStudents(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        // ดึงบิลทั้งหมด (ใช้ Collection Group)
        const unsubBills = db.collectionGroup('bills').onSnapshot(snap => {
            setBills(snap.docs.map(doc => ({ 
                billId: doc.id, 
                studentId: doc.ref.parent.parent.id, 
                ...doc.data() 
            })));
        });

        // ดึงออเดอร์ทั้งหมด (ใช้ Collection Group)
        const unsubOrders = db.collectionGroup('orders').onSnapshot(snap => {
            setOrders(snap.docs.map(doc => ({ 
                orderId: doc.id, 
                studentId: doc.ref.parent.parent.id, 
                ...doc.data() 
            })));
        });

        // ดึงการตั้งค่าระบบ
        const unsubConfig = db.collection('config').doc('system').onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                setSystemStatus(data.maintenanceMode || 'OFF');
                setAnnouncement(data.announcement || '');
            }
        });

        // ดึง QR Code
        const unsubQr = db.collection('config').doc('qrMap').onSnapshot(doc => {
            if (doc.exists) setQrCodes(doc.data().list || []);
        });

        setLoading(false);
        return () => { unsubUsers(); unsubBills(); unsubOrders(); unsubConfig(); unsubQr(); };
      }, [isLoggedIn]);

      // ✅ 2. Database Actions
      const toggleMaintenance = async () => {
        const newStatus = systemStatus === 'ON' ? 'OFF' : 'ON';
        await db.collection('config').doc('system').set({ maintenanceMode: newStatus }, { merge: true });
      };

      const handleUpdateBillStatus = async (studentId, billId, status) => {
        setProcessingAction('UPDATING');
        try {
            await db.collection('users').doc(studentId).collection('bills').doc(billId).update({ status });
            // เรียกใช้ GAS เพื่อส่ง LINE
            lineNotify('updateBillStatus', { billId, status, studentId });
        } catch (e) { alert(e.message); }
        setProcessingAction(null);
      };

      // ✅ Login Mockup (รอปรับปรุงเป็น PIN ทีหลัง)
      if (!isLoggedIn) {
          return (
              <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                  <button onClick={()=>setIsLoggedIn(true)} className="px-8 py-3 bg-primary rounded-xl font-bold">เข้าสู่ระบบ (Firestore Mode)</button>
                  <p className="mt-4 text-xs text-slate-500">Firebase Compat SDK v10.8.0 Enabled</p>
              </div>
          );
      }

      return (
        <div className="min-h-screen bg-background md:flex">
          {/* Sidebar สำหรับหน้าจอใหญ่ */}
          <aside className="hidden md:flex flex-col w-64 bg-white border-r h-screen sticky top-0 p-4">
              <h1 className="text-xl font-black mb-8 px-2">ADMIN <span className="text-primary">FIRESTORE</span></h1>
              <nav className="space-y-1">
                  <button onClick={()=>setActiveTab('dashboard')} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold ${activeTab==='dashboard'?'bg-blue-50 text-primary':'text-gray-400'}`}>
                      <Icon name="squares-four" weight="fill"/> แดชบอร์ด
                  </button>
                  <button onClick={()=>setActiveTab('bills')} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold ${activeTab==='bills'?'bg-blue-50 text-primary':'text-gray-400'}`}>
                      <Icon name="receipt" weight="fill"/> จัดการบิล
                  </button>
                  <button onClick={()=>setActiveTab('students')} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold ${activeTab==='students'?'bg-blue-50 text-primary':'text-gray-400'}`}>
                      <Icon name="users" weight="fill"/> นักศึกษา
                  </button>
              </nav>
          </aside>

          {/* Main Content */}
          <main className="flex-1 p-4 md:p-8 max-w-5xl mx-auto pb-24">
            <header className="flex justify-between items-center mb-6">
                <h2 className="text-2xl font-bold text-gray-800 capitalize">{activeTab}</h2>
                <div className={`px-3 py-1 rounded-full text-[10px] font-bold ${systemStatus === 'ON' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                    {systemStatus === 'ON' ? '🔴 MAINTENANCE' : '🟢 ONLINE'}
                </div>
            </header>

            {activeTab === 'dashboard' && (
                <div className="space-y-6">
                    {/* Maintenance Switch */}
                    <div className="bg-white p-6 rounded-3xl card-shadow border border-gray-100 flex justify-between items-center">
                        <div>
                            <h3 className="font-bold">โหมดปิดปรับปรุงระบบ</h3>
                            <p className="text-xs text-gray-400">เมื่อเปิด นักศึกษาจะเข้าใช้งานไม่ได้</p>
                        </div>
                        <button onClick={toggleMaintenance} className={`w-14 h-8 rounded-full p-1 transition-colors ${systemStatus==='ON'?'bg-red-500':'bg-gray-200'}`}>
                            <div className={`w-6 h-6 bg-white rounded-full transition-transform ${systemStatus==='ON'?'translate-x-6':''}`} />
                        </button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="bg-blue-600 p-5 rounded-[2rem] text-white">
                            <p className="text-[10px] opacity-70 font-bold uppercase">นักศึกษา</p>
                            <h4 className="text-2xl font-black">{students.length}</h4>
                        </div>
                        <div className="bg-emerald-500 p-5 rounded-[2rem] text-white">
                            <p className="text-[10px] opacity-70 font-bold uppercase">บิลทั้งหมด</p>
                            <h4 className="text-2xl font-black">{bills.length}</h4>
                        </div>
                        <div className="bg-amber-500 p-5 rounded-[2rem] text-white">
                            <p className="text-[10px] opacity-70 font-bold uppercase">รอยืนยัน</p>
                            <h4 className="text-2xl font-black">{bills.filter(b=>b.status==='รอตรวจสอบ').length}</h4>
                        </div>
                        <div className="bg-red-500 p-5 rounded-[2rem] text-white">
                            <p className="text-[10px] opacity-70 font-bold uppercase">ออเดอร์</p>
                            <h4 className="text-2xl font-black">{orders.length}</h4>
                        </div>
                    </div>
                </div>
            )}

            {activeTab === 'bills' && (
                <div className="space-y-3">
                    {bills.map(bill => (
                        <div key={bill.billId} className="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center">
                            <div>
                                <p className="text-sm font-bold text-gray-800">{bill.item}</p>
                                <p className="text-[10px] text-gray-400">ID: {bill.studentId} | {formatDate(bill.dueDate)}</p>
                            </div>
                            <div className="text-right">
                                <p className="font-bold text-primary">฿{Number(bill.amount).toLocaleString()}</p>
                                <select 
                                    value={bill.status} 
                                    onChange={(e)=>handleUpdateBillStatus(bill.studentId, bill.billId, e.target.value)}
                                    className="text-[10px] border-none bg-gray-50 rounded-lg p-1 font-bold outline-none"
                                >
                                    <option value="ค้างชำระ">ค้างชำระ</option>
                                    <option value="รอตรวจสอบ">รอตรวจสอบ</option>
                                    <option value="ชำระแล้ว">ชำระแล้ว</option>
                                </select>
                            </div>
                        </div>
                    ))}
                </div>
            )}
          </main>

          {/* Bottom Nav สำหรับมือถือ */}
          <nav className="md:hidden fixed bottom-6 left-4 right-4 bg-white/90 backdrop-blur-xl border rounded-3xl p-3 flex justify-around shadow-2xl z-50">
              <button onClick={()=>setActiveTab('dashboard')} className={activeTab==='dashboard'?'text-primary':'text-gray-300'}>
                  <Icon name="squares-four" weight="fill" size={28}/>
              </button>
              <button onClick={()=>setActiveTab('bills')} className={activeTab==='bills'?'text-primary':'text-gray-300'}>
                  <Icon name="receipt" weight="fill" size={28}/>
              </button>
              <button onClick={()=>setActiveTab('students')} className={activeTab==='students'?'text-primary':'text-gray-300'}>
                  <Icon name="users" weight="fill" size={28}/>
              </button>
          </nav>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

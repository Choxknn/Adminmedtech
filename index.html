// --- QR Scanner Modal (Fixed: Visible Buttons & Z-Index) ---
    const QRScannerModal = ({ isOpen, onClose, onScan }) => {
      useScrollLock(isOpen);
      useEffect(() => {
        if (!isOpen) return;
        let html5QrcodeScanner;
        
        const timeout = setTimeout(() => { 
            try { 
                // สร้าง Scanner
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader", 
                    { 
                        fps: 10, 
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0,
                        showTorchButtonIfSupported: true 
                    }, 
                    false
                ); 
                
                html5QrcodeScanner.render((decodedText) => { 
                    onScan(decodedText); 
                    // ปิดและเคลียร์ทันทีเมื่อเจอ
                    html5QrcodeScanner.clear().catch(err => console.error(err)); 
                    onClose(); 
                }, (errorMessage) => {
                    // scanning...
                }); 
            } catch (e) {
                console.error("Scanner Error", e);
            } 
        }, 100);

        return () => { 
            clearTimeout(timeout); 
            if (html5QrcodeScanner) { 
                try { html5QrcodeScanner.clear(); } catch(e){} 
            } 
        };
      }, [isOpen]);

      if (!isOpen) return null;

      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm animate-fade-in">

            <style>{`
                #reader { border: none !important; }

                    background-color: #2563EB !important; 
                    color: white !important; 
                    padding: 8px 16px !important; 
                    border-radius: 8px !important; 
                    border: none !important; 
                    margin-top: 10px !important;
                    font-weight: bold !important;
                    cursor: pointer !important;
                }
                #reader button:hover { background-color: #1D4ED8 !important; }

                    padding: 5px !important;
                    border: 1px solid #ccc !important;
                    border-radius: 5px !important;
                    margin-bottom: 10px !important;
                    color: black !important;
                    background: white !important;

                #reader span, #reader a {
                    color: #4b5563 !important; /* สีเทาเข้ม */
                }
            `}</style>

            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
                <button onClick={onClose} className="absolute -top-4 -right-4 w-10 h-10 flex items-center justify-center rounded-full bg-red-500 text-white shadow-lg hover:bg-red-600 z-10 transition-transform hover:scale-110">
                    <Icon name="x" weight="bold" size={20}/>
                </button>
                
                <h3 className="text-center font-bold text-gray-800 mb-4 text-lg">สแกน QR Code</h3>
                
                {/* พื้นที่แสดงกล้อง (เอา bg-black ออก เพื่อให้เห็นปุ่ม Request Permission) */}
                <div id="reader" className="rounded-xl overflow-hidden bg-gray-100 min-h-[300px]"></div>
                
                <p className="text-center text-xs text-gray-400 mt-4">
                    หากไม่เห็นกล้อง กรุณากดปุ่ม "Request Camera Permissions" สีฟ้าด้านบน
                </p>
            </div>
        </div>,
        document.body
      );
    };

   // --- Order Summary Modal (Updated: Accordion Product Filter) ---
    const OrderSummaryModal = ({ isOpen, onClose, orders, zIndex = "z-[110]", products = [] }) => {
      const [dateFilter, setDateFilter] = useState({ start: '', end: '' });
      const [selectedProducts, setSelectedProducts] = useState([]);
      const [isProductDrawerOpen, setIsProductDrawerOpen] = useState(false); // ✅ สถานะเปิด/ปิดลิ้นชัก

      useEffect(() => {
          if (isOpen) {
              setDateFilter({ start: '', end: '' });
              setSelectedProducts([]);
              setIsProductDrawerOpen(false); // เริ่มต้นปิดลิ้นชักไว้
          }
      }, [isOpen]);

      const getThaiDateDisplay = (isoDate) => {
          if (!isoDate) return '';
          const date = new Date(isoDate);
          return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
      };

      const availableProductNames = useMemo(() => {
          if (!orders) return [];
          const names = new Set();
          orders.forEach(o => {
              if (o.items) {
                  o.items.split(',').forEach(itemStr => {
                      const match = itemStr.trim().match(/(.+?)\s+x\s*(\d+)/);
                      if (match) names.add(match[1].trim());
                  });
              }
          });
          return Array.from(names).sort();
      }, [orders]);

      const toggleProduct = (name) => {
          if (selectedProducts.includes(name)) {
              setSelectedProducts(prev => prev.filter(n => n !== name));
          } else {
              setSelectedProducts(prev => [...prev, name]);
          }
      };

      const selectAll = () => setSelectedProducts([...availableProductNames]);
      const clearSelection = () => setSelectedProducts([]);

      const filteredOrders = useMemo(() => {
          if (!isOpen || !orders) return [];
          return orders.filter(o => {
              if (o.status === 'ยกเลิก') return false;
              if (dateFilter.start || dateFilter.end) {
                  const orderDate = new Date(o.date); orderDate.setHours(0,0,0,0);
                  let checkYear = orderDate.getFullYear();
                  if (checkYear > 2400) orderDate.setFullYear(checkYear - 543);
                  if (dateFilter.start) { const start = new Date(dateFilter.start); start.setHours(0,0,0,0); if (orderDate < start) return false; }
                  if (dateFilter.end) { const end = new Date(dateFilter.end); end.setHours(0,0,0,0); if (orderDate > end) return false; }
              }
              return true;
          });
      }, [isOpen, orders, dateFilter]);

      const summary = useMemo(() => {
          const itemMap = {};
          let totalOrderRevenue = 0; 

          filteredOrders.forEach(o => {
              const orderPrice = Number(o.price) || 0;
              totalOrderRevenue += orderPrice;

              if (o.items) {
                  const itemsInThisOrder = [];
                  let totalQtyInOrder = 0;

                  o.items.split(',').forEach(itemStr => {
                      const match = itemStr.trim().match(/(.+?)\s+x\s*(\d+)/);
                      if (match) {
                          const name = match[1].trim();
                          const qty = parseInt(match[2]) || 0;
                          itemsInThisOrder.push({ name, qty });
                          totalQtyInOrder += qty;
                      }
                  });

                  itemsInThisOrder.forEach(item => {
                      const ratio = totalQtyInOrder > 0 ? (item.qty / totalQtyInOrder) : 0;
                      const moneyShare = ratio * orderPrice; 

                      if (!itemMap[item.name]) {
                          itemMap[item.name] = { name: item.name, qty: 0, totalRealMoney: 0 };
                      }
                      itemMap[item.name].qty += item.qty;
                      itemMap[item.name].totalRealMoney += moneyShare;
                  });
              }
          });

          let itemsArray = Object.values(itemMap).map(item => ({
              ...item,
              avgPrice: item.qty > 0 ? (item.totalRealMoney / item.qty) : 0
          }));

          if (selectedProducts.length > 0) {
              itemsArray = itemsArray.filter(i => selectedProducts.includes(i.name));
          }

          const displayedRevenue = (selectedProducts.length === 0) 
              ? totalOrderRevenue 
              : itemsArray.reduce((sum, item) => sum + item.totalRealMoney, 0);

          return {
              totalRevenue: displayedRevenue,
              items: itemsArray.sort((a, b) => b.totalRealMoney - a.totalRealMoney)
          };
      }, [filteredOrders, selectedProducts]);

      const tableTotal = summary.items.reduce((acc, curr) => ({ 
          qty: acc.qty + curr.qty, 
          money: acc.money + curr.totalRealMoney 
      }), { qty: 0, money: 0 });

      if (!isOpen) return null;

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="สรุปยอดขายสินค้า" zIndex={zIndex}>
           <div className="space-y-4">
              {/* Filter Section */}
              <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3">
                  <div className="flex items-center gap-2 text-gray-500 font-bold text-xs"><Icon name="funnel" weight="fill"/> ตัวกรองข้อมูล</div>
                  
                  {/* Date Range */}
                  <div className="flex gap-2 items-start">
                      <div className="flex-1">
                          <input type="date" value={dateFilter.start} onChange={e => setDateFilter({...dateFilter, start: e.target.value})} className="w-full text-xs p-2 rounded-lg border border-gray-200 outline-none bg-white focus:border-blue-500 transition"/>
                          {dateFilter.start && <p className="text-[10px] text-blue-600 font-bold mt-1 text-center bg-blue-50 rounded px-1">{getThaiDateDisplay(dateFilter.start)}</p>}
                      </div>
                      <span className="text-gray-400 self-center mt-2">-</span>
                      <div className="flex-1">
                          <input type="date" value={dateFilter.end} onChange={e => setDateFilter({...dateFilter, end: e.target.value})} className="w-full text-xs p-2 rounded-lg border border-gray-200 outline-none bg-white focus:border-blue-500 transition"/>
                          {dateFilter.end && <p className="text-[10px] text-blue-600 font-bold mt-1 text-center bg-blue-50 rounded px-1">{getThaiDateDisplay(dateFilter.end)}</p>}
                      </div>
                  </div>

                  {/* ✅ Accordion / Drawer for Products */}
                  <div className="border border-gray-200 rounded-xl bg-white overflow-hidden transition-all duration-300">
                      {/* Header (Click to Toggle) */}
                      <div 
                          onClick={() => setIsProductDrawerOpen(!isProductDrawerOpen)}
                          className={`p-3 flex justify-between items-center cursor-pointer transition-colors ${isProductDrawerOpen ? 'bg-gray-100' : 'hover:bg-gray-50'}`}
                      >
                          <div className="flex items-center gap-2">
                              <div className={`p-1.5 rounded-lg ${selectedProducts.length > 0 ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}`}>
                                  <Icon name="t-shirt" weight="bold" size={16}/>
                              </div>
                              <span className={`text-xs font-bold ${selectedProducts.length > 0 ? 'text-blue-600' : 'text-gray-600'}`}>
                                  {selectedProducts.length > 0 ? `เลือกไว้ ${selectedProducts.length} รายการ` : 'แสดงสินค้าทั้งหมด'}
                              </span>
                          </div>
                          <Icon name={isProductDrawerOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/>
                      </div>

                      {/* Body (The Drawer) */}
                      {isProductDrawerOpen && (
                          <div className="p-3 border-t border-gray-100 bg-gray-50/50 animate-fade-in">
                              <div className="flex justify-end gap-2 mb-2">
                                  <button onClick={selectAll} className="text-[10px] bg-white border border-gray-200 text-blue-600 px-2 py-1 rounded hover:bg-blue-50 font-bold shadow-sm">เลือกทั้งหมด</button>
                                  <button onClick={clearSelection} className="text-[10px] bg-white border border-gray-200 text-gray-500 px-2 py-1 rounded hover:bg-gray-50 shadow-sm">ล้างค่า</button>
                              </div>
                              <div className="max-h-40 overflow-y-auto space-y-1 custom-scrollbar pr-1">
                                  {availableProductNames.map((name, idx) => {
                                      const isSelected = selectedProducts.includes(name);
                                      return (
                                          <div 
                                              key={idx} 
                                              onClick={() => toggleProduct(name)}
                                              className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer text-xs transition-colors ${isSelected ? 'bg-blue-50 text-blue-700 font-bold border border-blue-100' : 'bg-white hover:bg-gray-100 border border-transparent'}`}
                                          >
                                              <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300 bg-white'}`}>
                                                  {isSelected && <Icon name="check" size={10} className="text-white" weight="bold"/>}
                                              </div>
                                              <span className="line-clamp-1">{name}</span>
                                          </div>
                                      );
                                  })}
                                  {availableProductNames.length === 0 && <p className="text-center text-gray-300 text-[10px] py-2">ไม่มีรายการสินค้า</p>}
                              </div>
                          </div>
                      )}
                  </div>
              </div>

              {/* Total Revenue Card */}
              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-4 text-white shadow-lg shadow-blue-200 flex justify-between items-center relative overflow-hidden">
                  <div className="absolute -right-4 -top-4 w-20 h-20 bg-white opacity-10 rounded-full blur-2xl"></div>
                  <div>
                      <p className="text-blue-100 text-xs font-bold mb-1">
                          {selectedProducts.length === 0 ? 'ยอดขายรวม (ทั้งหมด)' : `ยอดขายรวม (${selectedProducts.length} รายการ)`}
                      </p>
                      <h2 className="text-3xl font-extrabold">฿{summary.totalRevenue.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</h2>
                  </div>
                  <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm"><Icon name="chart-line-up" weight="fill" size={24}/></div>
              </div>

              {/* Product Table */}
              <div>
                  <h4 className="text-xs font-bold text-gray-500 mb-2 flex items-center gap-1"><Icon name="list-dashes" weight="bold"/> รายละเอียดสินค้า</h4>

   // --- Edit Order Modal (Updated: Fix Z-Index) ---
    const EditOrderModal = ({ isOpen, onClose, order, onSave, loading, zIndex = "z-[110]" }) => {
      const [form, setForm] = useState({ orderId: '', items: '', price: '', status: '' });

              <div><label className="block text-sm font-bold text-gray-700 mb-1">รายการสินค้า</label><textarea value={form.items} onChange={e => setForm({...form, items: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary min-h-[100px] text-sm" placeholder="แก้ไขรายการสินค้า..."></textarea></div>
              <div><label className="block text-sm font-bold text-gray-700 mb-1">ราคารวม (บาท)</label><input type="number" value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800"/></div>
              <div><label className="block text-sm font-bold text-gray-700 mb-1">สถานะ</label><select value={form.status} onChange={e => setForm({...form, status: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary bg-white"><option value="รอตรวจสอบ">รอตรวจสอบ</option><option value="ชำระแล้ว">ชำระแล้ว</option><option value="อยู่ระหว่างสั่งซื้อ">อยู่ระหว่างสั่งซื้อ</option><option value="อยู่ระหว่างผลิต">อยู่ระหว่างผลิต</option><option value="รับแล้ว">รับแล้ว</option><option value="ยกเลิก">ยกเลิก</option></select></div>
              <button onClick={() => onSave(form)} disabled={loading} className="w-full py-3 mt-2 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2">{loading ? <><Icon name="spinner" className="animate-spin"/> กำลังบันทึก...</> : 'บันทึกการแก้ไข'}</button>
           </div>
        </Modal>
      );
    };

    // --- Order View (Updated: ดีไซน์ใหม่ กรุ๊ปออเดอร์ตามนักศึกษา + แยกรายละเอียด) ---
    const OrderView = ({ orderData, students, onToggleSystem, onSaveProduct, onDeleteProduct, onDeleteOrder, onUpdateStatus, onViewSlip, loading, processingAction, onEditOrder, setOrderData }) => {
        const [subTab, setSubTab] = useState('orders');
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [isScannerOpen, setIsScannerOpen] = useState(false);
        const [editingProduct, setEditingProduct] = useState(null);
        const [searchTerm, setSearchTerm] = useState('');
        const [isSummaryOpen, setIsSummaryOpen] = useState(false);
        const [editingOrder, setEditingOrder] = useState(null);
        const [isEditOrderModalOpen, setIsEditOrderModalOpen] = useState(false);

        // --- Bulk Actions State ---
        const [isBulkStatusOpen, setIsBulkStatusOpen] = useState(false);
        const [bulkTargetStatus, setBulkTargetStatus] = useState('ชำระแล้ว');
        const [isProcessingBulk, setIsProcessingBulk] = useState(false);
        const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0 });

        const [alertState, setAlertState] = useState({ isOpen: false, title: '', message: '', onConfirm: null, type: 'info' });

        // ✅ 1. ฟังก์ชันแยกรายละเอียดออเดอร์ (Parser)
        const parseOrderItems = (itemsStr) => {
            if (!itemsStr) return [];
            const rawItems = itemsStr.includes('\n') ? itemsStr.split('\n') : itemsStr.split(/,(?![^(]*\))/);
            
            return rawItems.map(raw => {
                let text = raw.trim();
                if (!text) return null;
                
                const qtyMatch = text.match(/\s*x\s*(\d+)$/i);
                let qty = 1;
                let nameWithOptions = text;
                
                if (qtyMatch) {
                    qty = parseInt(qtyMatch[1], 10);
                    nameWithOptions = text.slice(0, qtyMatch.index).trim();
                }

                let name = nameWithOptions;
                let options = [];
                const optMatch = nameWithOptions.match(/\(([^)]+)\)$/);
                
                if (optMatch) {
                    const insideParens = optMatch[1];
                    if (insideParens.includes(':') || insideParens.includes(',')) {
                        name = nameWithOptions.slice(0, optMatch.index).trim();
                        options = insideParens.split(',').map(opt => opt.trim());
                    }
                }
                return { name, options, qty, original: text };
            }).filter(Boolean);
        };

        const formatDateSafe = (isoDate) => {
            if (!isoDate) return '-';
            try { return new Date(isoDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute:'2-digit' }); } catch (e) { return '-'; }
        };

        const safeProducts = Array.isArray(orderData?.products) ? orderData.products : [];
        const safeOrders = Array.isArray(orderData?.orders) ? orderData.orders : [];
        const filteredProducts = safeProducts.filter(p => String(p.name||'').toLowerCase().includes(searchTerm.toLowerCase()));
        
        // ✅ 2. กรองออเดอร์ก่อน
        const filteredOrders = safeOrders.filter(o => { 
            const sName = students?.find(s => String(s.id) === String(o.studentId))?.name || ''; 
            const term = searchTerm.toLowerCase(); 
            const safeVal = (v) => String(v || '').toLowerCase(); 
            return safeVal(o.orderId).includes(term) || safeVal(o.studentId).includes(term) || safeVal(sName).includes(term); 
        });

        // ✅ 3. จัดกลุ่มออเดอร์ตามนักศึกษา (Group by Student)
        const [sortOrder, setSortOrder] = useState('newest');
        const groupedOrders = useMemo(() => {
            const groups = {};
            filteredOrders.forEach(o => {
                const sId = String(o.studentId);
                if (!groups[sId]) {
                    const sName = students?.find(s => String(s.id) === sId)?.name || 'ไม่พบชื่อ';
                    groups[sId] = {
                        studentId: sId,
                        studentName: sName,
                        totalPrice: 0,
                        orders: [],
                        latestDate: 0
                    };
                }
                groups[sId].orders.push(o);
                groups[sId].totalPrice += Number(o.price) || 0;
                
                const orderTime = new Date(o.date).getTime() || 0;
                if (orderTime > groups[sId].latestDate) groups[sId].latestDate = orderTime;
            });
            
            // เรียงลำดับกลุ่มตามวันที่สั่งล่าสุด
            return Object.values(groups).sort((a, b) => {
                return sortOrder === 'newest' ? b.latestDate - a.latestDate : a.latestDate - b.latestDate;
            });
        }, [filteredOrders, students, sortOrder]);
        
        const handleScanSuccess = (text) => setSearchTerm(text);
        const handleAddProduct = () => { setEditingProduct(null); setIsModalOpen(true); };
        const openEditOrderModal = (order) => { setEditingOrder(order); setIsEditOrderModalOpen(true); };
        
        const handleSaveEditedOrder = (formData) => {
            if(setOrderData) setOrderData(prev => ({ ...prev, orders: prev.orders.map(o => o.orderId === formData.orderId ? { ...o, ...formData } : o) }));
            setIsEditOrderModalOpen(false);
            onEditOrder(formData);
        };

        // --- Bulk Actions Logic ---
        const confirmBulkStatusUpdate = () => {
            if (filteredOrders.length === 0) return;
            setIsBulkStatusOpen(false);
            setAlertState({ isOpen: true, type: 'info', title: 'ยืนยันการเปลี่ยนสถานะ', message: `คุณต้องการเปลี่ยนสถานะ ${filteredOrders.length} รายการ เป็น "${bulkTargetStatus}" ใช่หรือไม่?`, onConfirm: executeBulkStatusUpdate });
        };

        const executeBulkStatusUpdate = async () => {
            setAlertState(prev => ({ ...prev, isOpen: false }));
            setTimeout(async () => {
                setIsProcessingBulk(true); setBulkProgress({ current: 0, total: filteredOrders.length });
                let completed = 0;
                for (const order of filteredOrders) {
                    if (order.status !== bulkTargetStatus) {
                        await new Promise(resolve => { onUpdateStatus(order.orderId, bulkTargetStatus); setTimeout(resolve, 800); });
                    }
                    completed++; setBulkProgress(prev => ({ ...prev, current: completed }));
                }
                setIsProcessingBulk(false);
                setTimeout(() => { setAlertState({ isOpen: true, type: 'success', title: 'เรียบร้อย', message: `ดำเนินการเปลี่ยนสถานะ ${completed} รายการเสร็จสมบูรณ์`, onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false })) }); }, 500);
            }, 100);
        };

        const confirmBulkDelete = () => {
             if (filteredOrders.length === 0) return;
             setAlertState({ isOpen: true, type: 'danger', title: '⚠️ ยืนยันการลบข้อมูล', message: `คุณกำลังจะลบออเดอร์ ${filteredOrders.length} รายการ\nการกระทำนี้ไม่สามารถกู้คืนได้ ยืนยันหรือไม่?`, onConfirm: executeBulkDelete });
        };

        const executeBulkDelete = async () => {
             setAlertState(prev => ({ ...prev, isOpen: false }));
             setTimeout(async () => {
                setIsProcessingBulk(true); setBulkProgress({ current: 0, total: filteredOrders.length });
                let completed = 0;
                for (const order of filteredOrders) {
                    await new Promise(resolve => { onDeleteOrder(order.orderId); setTimeout(resolve, 800); });
                    completed++; setBulkProgress(prev => ({ ...prev, current: completed }));
                }
                setIsProcessingBulk(false);
                setTimeout(() => { setAlertState({ isOpen: true, type: 'success', title: 'เรียบร้อย', message: `ลบข้อมูล ${completed} รายการเสร็จสมบูรณ์`, onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false })) }); }, 500);
             }, 100);
        };

        const getOrderStatusStyle = (status) => {
            switch(status) {
                case 'ชำระแล้ว': return 'bg-emerald-50 text-emerald-700 border-emerald-200';
                case 'รอตรวจสอบ': return 'bg-amber-50 text-amber-700 border-amber-200';
                case 'ยกเลิก': return 'bg-gray-100 text-gray-500 border-gray-200';
                case 'อยู่ระหว่างผลิต': return 'bg-purple-50 text-purple-700 border-purple-200';
                case 'อยู่ระหว่างสั่งซื้อ': return 'bg-blue-50 text-blue-700 border-blue-200';
                case 'รอรับของ': return 'bg-pink-50 text-pink-700 border-pink-200';
                case 'รับแล้ว': return 'bg-teal-50 text-teal-700 border-teal-200';
                default: return 'bg-gray-50 text-gray-600 border-gray-200';
            }
        };

        const getProductStatusStyle = (status) => {
            if (status === 'ON') return 'bg-green-500 text-white';
            if (status === 'OUT') return 'bg-amber-500 text-white';
            return 'bg-gray-400 text-white';
        };

        return (
          <div className="space-y-5 pb-24 relative animate-fade-in">
             <ScrollToTopBottom />

             {/* 1. Header & Control Panel */}
             <div className="bg-white p-5 rounded-3xl card-shadow border border-gray-100 relative overflow-hidden">
                 <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full blur-3xl -translate-y-10 translate-x-10"></div>
                 <div className="relative z-10 flex justify-between items-center">
                     <div>
                         <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                             <div className="bg-blue-100 p-1.5 rounded-lg text-primary"><Icon name="storefront" weight="fill" size={20}/></div>
                             จัดการร้านค้า
                         </h2>
                         <p className="text-xs text-gray-400 mt-1 pl-1">ควบคุมการขายและออเดอร์</p>
                     </div>
                     
                     <button 
                         onClick={()=> !loading && onToggleSystem(orderData?.systemStatus === 'ON' ? false : true)} 
                         disabled={loading || processingAction === 'TOGGLE_SYSTEM'}
                         className={`relative pl-3 pr-1 py-1 h-9 rounded-full flex items-center gap-2 transition-all duration-300 shadow-sm border ${orderData?.systemStatus === 'ON' ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-200'}`}
                     >
                         <span className={`text-[10px] font-bold ${orderData?.systemStatus === 'ON' ? 'text-green-600' : 'text-gray-400'}`}>
                             {orderData?.systemStatus === 'ON' ? 'เปิดรับออเดอร์' : 'ปิดปรับปรุง'}
                         </span>
                         <div className={`w-7 h-7 rounded-full shadow-md flex items-center justify-center transition-transform duration-300 ${orderData?.systemStatus === 'ON' ? 'bg-green-500 translate-x-0' : 'bg-gray-400 -translate-x-0'}`}>
                             {processingAction === 'TOGGLE_SYSTEM' ? <Icon name="spinner" className="animate-spin text-white" size={14} weight="bold"/> : <Icon name="power" className="text-white" size={14} weight="bold"/>}
                         </div>
                     </button>
                 </div>
             </div>
             
             {/* 2. Navigation Tabs */}
             <div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex relative z-10">
                 <button onClick={()=>setSubTab('orders')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'orders' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                     <Icon name="receipt" weight={subTab === 'orders' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">ออเดอร์ ({safeOrders.length})</span>
                 </button>
                 <button onClick={()=>setSubTab('products')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'products' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                     <Icon name="t-shirt" weight={subTab === 'products' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">สินค้า ({safeProducts.length})</span>
                 </button>
             </div>
             
             {/* 3. Search & Toolbar */}
             <div className="flex gap-2 sticky top-0 z-20 bg-background py-2">
                 <div className="flex-1 bg-white rounded-xl card-shadow border border-gray-100 flex items-center px-4 py-2.5 transition focus-within:ring-2 focus-within:ring-primary/20">
                     <Icon name="magnifying-glass" className="text-gray-400 mr-3" size={18} />
                     <input type="text" placeholder={subTab==='products'?"ค้นหาสินค้า...":"ค้นหาออเดอร์/ชื่อ..."} className="w-full bg-transparent text-sm font-medium text-gray-700 outline-none placeholder-gray-400" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                     {searchTerm && <button onClick={() => setSearchTerm('')} className="text-gray-400 hover:text-gray-600 ml-2"><Icon name="x-circle" weight="fill" /></button>}
                 </div>
                 
                 {subTab === 'orders' && (
                     <>
                         <button onClick={() => setIsSummaryOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="สรุปยอด"><Icon name="chart-pie-slice" weight="fill" size={20}/></button>
                         <button onClick={() => setIsScannerOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white text-gray-600 card-shadow border border-gray-100 hover:bg-gray-50 transition active:scale-95" title="สแกน QR"><Icon name="qr-code" weight="bold" size={20}/></button>
                         <button onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white text-gray-600 card-shadow border border-gray-100 hover:bg-gray-50 transition active:scale-95" title="เรียงลำดับ">
                             <Icon name={sortOrder === 'newest' ? "sort-descending" : "sort-ascending"} weight="bold" size={20}/>
                         </button>
                     </>
                 )}
                 {subTab === 'products' && (
                     <button onClick={handleAddProduct} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="เพิ่มสินค้า"><Icon name="plus" weight="bold" size={20}/></button>
                 )}
             </div>

             {/* 4. Content Area */}
             <div className="min-h-[300px]">
                 
                 {/* --- PRODUCTS TAB --- */}
                  {subTab === 'products' && (
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 animate-fade-in">
                        {filteredProducts.map((p) => (
                            <div key={p.id} className="group bg-white p-3 rounded-2xl card-shadow border border-gray-100 hover:border-blue-200 transition relative overflow-hidden">
                                <div className="aspect-square bg-gray-50 rounded-xl mb-3 overflow-hidden flex items-center justify-center relative">
                                    <ProductImageGallery imageString={p.image} />
                                    <span className={`absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm z-20 ${getProductStatusStyle(p.status)}`}>{p.status}</span>
                                </div>
                                <h4 className="font-bold text-sm text-gray-800 line-clamp-1 mb-1">{p.name}</h4>
                                <div className="flex justify-between items-end">
                                    <p className="text-blue-600 font-extrabold">฿{Number(p.price).toLocaleString()}</p>
                                    <p className="text-[10px] text-gray-400 font-medium">Stock: {p.stock}</p>
                                </div>
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 z-30">
                                    <button onClick={()=>{setEditingProduct(p); setIsModalOpen(true);}} className="w-10 h-10 rounded-full bg-white text-blue-600 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="pencil-simple" weight="bold" size={20}/></button>
                                    <button onClick={()=>onDeleteProduct(p.id)} className="w-10 h-10 rounded-full bg-white text-red-500 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="trash" weight="bold" size={20}/></button>
                                </div>
                            </div>
                        ))}
                        {filteredProducts.length === 0 && (<div className="col-span-full flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="t-shirt" size={40} className="opacity-30 mb-2"/><p>ไม่พบสินค้า</p></div>)}
                    </div>
                  )}

                 {/* --- ORDERS TAB (GROUPED BY STUDENT) --- */}
                 {subTab === 'orders' && (
                   <div className="space-y-4 animate-fade-in">
                       
                       {/* Bulk Actions Bar */}
                       {filteredOrders.length > 0 && (
                            <div className="bg-gray-50 p-2 rounded-xl flex gap-2 border border-gray-100">
                                 <button onClick={() => setIsBulkStatusOpen(true)} className="flex-1 py-2 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-200 transition flex items-center justify-center gap-1 border border-indigo-200 shadow-sm">
                                     <Icon name="arrows-clockwise" weight="bold"/> เปลี่ยนสถานะ ({filteredOrders.length})
                                 </button>
                                 <button onClick={confirmBulkDelete} className="flex-1 py-2 bg-red-100 text-red-700 rounded-lg text-xs font-bold hover:bg-red-200 transition flex items-center justify-center gap-1 border border-red-200 shadow-sm">
                                     <Icon name="trash" weight="bold"/> ลบทั้งหมด ({filteredOrders.length})
                                 </button>
                            </div>
                       )}

                       {groupedOrders.length === 0 && (
                           <div className="flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="shopping-bag" size={40} className="opacity-30 mb-2"/><p>{searchTerm ? "ไม่พบออเดอร์ที่ค้นหา" : "ไม่มีรายการสั่งซื้อ"}</p></div>
                       )}
                       
                       {/* ✅ แสดงออเดอร์เป็น Group ตามนักศึกษา */}
                       {groupedOrders.map((group) => (
                           <div key={group.studentId} className="bg-white rounded-3xl card-shadow border border-gray-100 overflow-hidden transition-all hover:shadow-lg">
                               
                               {/* Student Header */}
                               <div className="p-4 bg-gradient-to-r from-slate-50 to-blue-50/50 border-b border-gray-100 flex justify-between items-center relative overflow-hidden">
                                   <div className="flex items-center gap-3 relative z-10">
                                       <div className="w-12 h-12 rounded-2xl bg-white text-blue-600 flex items-center justify-center text-lg font-black shadow-sm border border-blue-100 flex-shrink-0">
                                           {group.studentName.charAt(0)}
                                       </div>
                                       <div>
                                           <h3 className="font-extrabold text-gray-800 text-base">{group.studentName}</h3>
                                           <div className="flex items-center gap-2 mt-0.5">
                                               <span className="text-xs text-gray-500 font-mono tracking-wider flex items-center gap-1"><Icon name="user" weight="bold" size={12}/> {group.studentId}</span>
                                               <span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-md text-[10px] font-bold">{group.orders.length} ออเดอร์</span>

                                       <p className="text-[10px] text-blue-500 font-bold uppercase tracking-wider mb-0.5">ยอดรวมทั้งหมด</p>

                               {/* Orders List within the Student */}
                               <div className="p-2 space-y-2 bg-gray-50/50">
                                   {group.orders.map(o => {
                                       const statusStyle = getOrderStatusStyle(o.status);
                                       const parsedItems = parseOrderItems(o.items);
                                       
                                       return (
                                           <div key={o.orderId} className="bg-white rounded-[1.25rem] p-4 border border-gray-100 shadow-sm relative hover:border-blue-200 transition-colors group/order">
                                               
                                               {/* Order Header: ID & Date & Slip */}
                                               <div className="flex justify-between items-center mb-3 pb-2 border-b border-gray-50">
                                                   <div className="flex items-center gap-3">
                                                       <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded-lg flex items-center gap-1 border border-gray-200">
                                                           <Icon name="hash" weight="bold"/> {o.orderId}
                                                       </span>
                                                       <span className="text-[10px] font-medium text-gray-400 flex items-center gap-1">
                                                           <Icon name="clock" weight="fill"/> {formatDateSafe(o.date)}
                                                       </span>
                                                   </div>
                                                   {o.slip && (
                                                       <button onClick={()=>onViewSlip(o.slip)} className="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg hover:bg-indigo-100 transition flex items-center gap-1 border border-indigo-100">
                                                           <Icon name="image" weight="fill" size={14}/> ดูสลิป
                                                       </button>
                                                   )}
                                               </div>

                                               {/* ✅ กล่องแสดงรายการออเดอร์แบบใหม่ (แยกชื่อ, ตัวเลือก, จำนวน) */}
                                               <div className="space-y-3 mb-4">
                                                   {parsedItems.length > 0 ? parsedItems.map((item, i) => (
                                                       <div key={i} className="flex justify-between items-start gap-3">
                                                           <div className="flex-1 min-w-0">
                                                               <div className="text-sm font-bold text-gray-800 leading-snug">{item.name}</div>
                                                               {/* ถ้ามีตัวเลือก (Options) ให้แสดงเป็น Tag */}
                                                               {item.options.length > 0 && (
                                                                   <div className="mt-1.5 flex flex-wrap gap-1.5">
                                                                       {item.options.map((opt, j) => {
                                                                           const parts = opt.split(':');
                                                                           const key = parts.length > 1 ? parts[0] : null;
                                                                           const val = parts.length > 1 ? parts.slice(1).join(':') : opt;
                                                                           return (
                                                                               <span key={j} className="inline-flex items-center text-[10px] bg-white border border-gray-200 text-gray-500 px-2 py-0.5 rounded-md shadow-[0_1px_2px_rgba(0,0,0,0.02)]">
                                                                                   {key ? <><span className="font-bold text-gray-400 mr-1">{key}:</span><span className="text-gray-700 font-bold">{val}</span></> : opt}
                                                                               </span>
                                                                           );
                                                                       })}
                                                                   </div>
                                                               )}
                                                           </div>
                                                           {/* กล่องจำนวน */}
                                                           <div className="text-xs font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-lg flex-shrink-0 border border-indigo-100 shadow-sm">
                                                               x{item.qty}
                                                           </div>
                                                       </div>
                                                   )) : (
                                                       <p className="text-xs text-gray-600 whitespace-pre-wrap leading-relaxed font-medium">{o.items}</p>
                                                   )}
                                               </div>

                                               {/* Footer: Price & Actions */}
                                               <div className="flex justify-between items-end pt-3 border-t border-gray-50">
                                                   <div className="text-lg font-extrabold text-gray-800">฿{Number(o.price).toLocaleString()}</div>
                                                   <div className="flex items-center gap-2">
                                                       <div className="relative">
                                                           <select value={o.status} onChange={(e)=>onUpdateStatus(o.orderId, e.target.value)} className={`appearance-none pl-3 pr-8 py-1.5 rounded-xl text-[11px] font-bold border outline-none cursor-pointer transition-colors shadow-sm ${statusStyle}`}>
                                                               <option value="รอตรวจสอบ">รอตรวจสอบ</option>
                                                               <option value="ชำระแล้ว">ชำระแล้ว</option>
                                                               <option value="อยู่ระหว่างสั่งซื้อ">อยู่ระหว่างสั่งซื้อ</option>
                                                               <option value="อยู่ระหว่างผลิต">อยู่ระหว่างผลิต</option>
                                                               <option value="รอรับของ">รอรับของ</option>
                                                               <option value="รับแล้ว">รับแล้ว</option>
                                                               <option value="ยกเลิก">ยกเลิก</option>
                                                           </select>
                                                           <Icon name="caret-down" size={10} weight="bold" className="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none opacity-50"/>
                                                       </div>
                                                       <button onClick={() => openEditOrderModal(o)} className="w-8 h-8 rounded-xl bg-gray-50 text-gray-500 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center transition border border-gray-100 shadow-sm"><Icon name="pencil-simple" weight="bold" size={16}/></button>
                                                       <button onClick={()=>onDeleteOrder(o.orderId)} className="w-8 h-8 rounded-xl bg-gray-50 text-gray-500 hover:bg-red-50 hover:text-red-500 flex items-center justify-center transition border border-gray-100 shadow-sm"><Icon name="trash" weight="bold" size={16}/></button>
                                                   </div>
                                               </div>
                                           </div>
                                       );
                                   })}
                               </div>
                           </div>
                       ))}
                   </div>
                 )}
             </div>

             <ProductModal isOpen={isModalOpen} onClose={()=>setIsModalOpen(false)} product={editingProduct} onSave={(data) => { setIsModalOpen(false); onSaveProduct(data); }} loading={false} />
             <QRScannerModal isOpen={isScannerOpen} onClose={() => setIsScannerOpen(false)} onScan={handleScanSuccess} />
             <OrderSummaryModal isOpen={isSummaryOpen} onClose={() => setIsSummaryOpen(false)} orders={filteredOrders} products={orderData.products} zIndex="z-[110]" />
             <EditOrderModal isOpen={isEditOrderModalOpen} onClose={() => setIsEditOrderModalOpen(false)} order={editingOrder} onSave={handleSaveEditedOrder} loading={false} zIndex="z-[110]" />
             
             {/* Modal เลือกสถานะกลุ่ม */}
             <Modal isOpen={isBulkStatusOpen} onClose={() => setIsBulkStatusOpen(false)} title="เปลี่ยนสถานะรายการที่เลือก" zIndex="z-[80]">
                <div className="space-y-4 pt-2">
                    <p className="text-sm text-gray-600 text-center">เปลี่ยนสถานะของ <strong className="text-indigo-600">{filteredOrders.length} รายการ</strong></p>
                    <div>
                        <label className="text-xs font-bold text-gray-500 mb-1 block">เลือกสถานะปลายทาง</label>
                        <select value={bulkTargetStatus} onChange={e => setBulkTargetStatus(e.target.value)} className="w-full p-3 bg-indigo-50 border border-indigo-200 rounded-xl text-sm font-bold text-indigo-700 outline-none">
                            <option value="รอดำเนินการ">รอดำเนินการ</option>
                            <option value="รอตรวจสอบ">รอตรวจสอบ</option>
                            <option value="ชำระแล้ว">ชำระแล้ว</option>
                            <option value="อยู่ระหว่างสั่งซื้อ">อยู่ระหว่างสั่งซื้อ</option>
                            <option value="อยู่ระหว่างผลิต">อยู่ระหว่างผลิต</option>
                            <option value="รอรับของ">รอรับของ</option>
                            <option value="รับแล้ว">รับแล้ว</option>
                            <option value="ยกเลิก">ยกเลิก</option>
                        </select>
                    </div>
                    <button onClick={confirmBulkStatusUpdate} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">ยืนยันการเปลี่ยนสถานะ</button>
                </div>
             </Modal>

             {/* ✅ Custom Alert Modal */}
             <Modal isOpen={alertState.isOpen} onClose={() => setAlertState({ ...alertState, isOpen: false })} title={alertState.type === 'danger' ? "คำเตือน" : (alertState.type === 'success' ? "เรียบร้อย" : "ยืนยัน")} zIndex="z-[120]">
                 <div className="space-y-4 pt-2 text-center">
                     <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-2 ${
                         alertState.type === 'danger' ? 'bg-red-100 text-red-500' : 
                         alertState.type === 'success' ? 'bg-green-100 text-green-500' : 
                         'bg-blue-100 text-blue-500'
                     }`}>
                         <Icon name={
                             alertState.type === 'danger' ? "warning-circle" : 
                             alertState.type === 'success' ? "check-circle" : 
                             "info"
                         } weight="fill" size={32}/>
                     </div>
                     <div>
                         <h3 className="text-lg font-bold text-gray-800">{alertState.title}</h3>
                         <p className="text-sm text-gray-500 mt-1 whitespace-pre-line">{alertState.message}</p>
                     </div>
                     <div className="flex gap-2 pt-2">
                         {alertState.type !== 'success' && (
                             <button onClick={() => setAlertState({ ...alertState, isOpen: false })} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ยกเลิก</button>
                         )}
                         <button 
                             onClick={alertState.onConfirm} 
                             className={`flex-1 py-3 text-white font-bold rounded-xl shadow-lg transition ${
                                 alertState.type === 'danger' ? 'bg-red-600 hover:bg-red-700 shadow-red-200' : 
                                 alertState.type === 'success' ? 'bg-green-600 hover:bg-green-700 shadow-green-200' : 
                                 'bg-blue-600 hover:bg-blue-700 shadow-blue-200'
                             }`}
                         >
                             {alertState.type === 'success' ? 'ตกลง' : 'ยืนยันทำรายการ'}
                         </button>
                     </div>
                 </div>
             </Modal>

             {/* ✅ Overlay Loading */}
             {isProcessingBulk && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in">
                    <div className="flex flex-col items-center justify-center w-[90%] max-w-sm bg-white rounded-3xl p-8 card-shadow">
                        <div className="w-16 h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                        <div className="text-center mt-4">
                            <h3 className="text-lg font-bold text-gray-800">กำลังประมวลผล...</h3>
                            <p className="text-gray-500 text-sm mt-1">สำเร็จ {bulkProgress.current} จาก {bulkProgress.total} รายการ</p>
                        </div>
                        <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden mt-6 border border-gray-200">
                            <div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${(bulkProgress.current / bulkProgress.total) * 100}%` }}></div>
                        </div>
                        <p className="text-[10px] text-red-400 font-bold mt-4 animate-pulse">ห้ามปิดหน้านี้จนกว่าจะเสร็จ</p>
                    </div>
                </div>
            )}

          </div>
        );
    };
    
    // ==========================================
    // 💰 FINANCE COMPONENTS (หน้าจอการเงิน)
    // ==========================================

    const FinanceForm = ({ onSubmit, loading, initialData, students = [], defaultProject = '' }) => {
      const [form, setForm] = useState({
        id: '', date: new Date().toISOString().split('T')[0], project: defaultProject,
        item: '', type: 'รายรับ', amount: '', person: '',
        receiptUrl: '', slipUrl: '',
        isReceiptDeleted: false, isSlipDeleted: false,
        receiptFile: null, slipFile: null
      });

      const [receiptPreview, setReceiptPreview] = useState(null);
      const [slipPreview, setSlipPreview] = useState(null);
      
      // ✅ State สำหรับ Dropdown เลือกรายชื่อ และช่องค้นหา
      const [isPersonOpen, setIsPersonOpen] = useState(false);
      const [selectedPersons, setSelectedPersons] = useState([]);
      const [personSearch, setPersonSearch] = useState(''); // เพิ่ม state สำหรับค้นหา

      useEffect(() => {
        if (initialData && initialData.id) {
          // โหมดแก้ไข
          setForm({
            ...initialData,
            date: initialData.date ? new Date(initialData.date).toISOString().split('T')[0] : new Date().toISOString().split('T')[0],
            isReceiptDeleted: false, isSlipDeleted: false, receiptFile: null, slipFile: null
          });
          setReceiptPreview(initialData.receiptUrl || null);
          setSlipPreview(initialData.slipUrl || null);
          // ดึงชื่อเดิมมาแยกใส่ Array
          setSelectedPersons(initialData.person ? String(initialData.person).split(',').map(s=>s.trim()).filter(Boolean) : []);
        } else {
          // โหมดสร้างใหม่
          setForm(prev => ({ ...prev, project: defaultProject }));
          setSelectedPersons([]);
        }
      }, [initialData, defaultProject]);

      // ✅ กรองรายชื่อนักศึกษาตามคำค้นหา
      const filteredStudents = useMemo(() => {
          if (!personSearch) return students;
          const term = personSearch.toLowerCase();
          return students.filter(s => s.name.toLowerCase().includes(term) || String(s.id).includes(term));
      }, [students, personSearch]);

      const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

      const handleFileChange = (e, type) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result.split(',')[1];
            if (type === 'receipt') {
              setForm(prev => ({ ...prev, receiptFile: base64, isReceiptDeleted: false }));
              setReceiptPreview(reader.result);
            } else {
              setForm(prev => ({ ...prev, slipFile: base64, isSlipDeleted: false }));
              setSlipPreview(reader.result);
            }
          };
          reader.readAsDataURL(file);
        }
      };

      const togglePerson = (name) => {
          if (selectedPersons.includes(name)) {
              setSelectedPersons(prev => prev.filter(n => n !== name));
          } else {
              setSelectedPersons(prev => [...prev, name]);
          }
      };

      const handleSubmit = () => {
          // รวมชื่อผู้รับผิดชอบเป็น String ก่อนบันทึก
          onSubmit({ ...form, person: selectedPersons.join(', ') });
      };

      return (
        <div className="space-y-4 animate-fade-in pb-4">
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-bold text-gray-500 mb-1 block">ประเภท</label>
              <select name="type" value={form.type} onChange={handleChange} className={`w-full p-2.5 rounded-xl border outline-none font-bold transition-colors ${form.type === 'รายรับ' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-red-50 text-red-700 border-red-200'}`}>
                <option value="รายรับ">📈 รายรับ</option>
                <option value="รายจ่าย">📉 รายจ่าย</option>
              </select>
            </div>
            <div>
              <label className="text-xs font-bold text-gray-500 mb-1 block">วันที่</label>
              <input type="date" name="date" value={form.date} onChange={handleChange} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary text-sm font-medium"/>
            </div>
          </div>

          <div>
            <label className="text-xs font-bold text-gray-500 mb-1 block">โครงการ / กิจกรรม</label>
            <input type="text" name="project" value={form.project} onChange={handleChange} placeholder="เช่น รับน้อง, กีฬาสี, ส่วนกลาง" className="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm font-bold"/>
          </div>

          <div>
              <label className="text-xs font-bold text-gray-500 mb-1 block">รายการ</label>
              <input type="text" name="item" value={form.item} onChange={handleChange} placeholder="รายละเอียดรายรับ/จ่าย" className="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-blue-500 text-sm font-medium"/>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-bold text-gray-500 mb-1 block">จำนวนเงิน (บาท)</label>
              <input type="number" name="amount" value={form.amount} onChange={handleChange} placeholder="0.00" className="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-blue-500 text-lg font-black text-gray-800 h-[46px]"/>
            </div>
            
            {/* Dropdown เลือกผู้รับผิดชอบ */}
            <div className="relative">
              <label className="text-xs font-bold text-gray-500 mb-1 block flex items-center gap-1"><Icon name="users" weight="bold"/> ผู้รับผิดชอบ</label>
              <div onClick={() => setIsPersonOpen(!isPersonOpen)} className={`w-full p-3 h-[46px] bg-white border rounded-xl cursor-pointer flex justify-between items-center transition ${isPersonOpen ? 'border-blue-500 ring-2 ring-blue-50' : 'border-gray-200 hover:border-blue-300'}`}>
                <span className={`text-sm font-bold truncate ${selectedPersons.length > 0 ? 'text-blue-700' : 'text-gray-400'}`}>
                  {selectedPersons.length > 0 ? selectedPersons.join(', ') : 'เลือกรายชื่อ...'}
                </span>
                <Icon name={isPersonOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/>
              </div>

              {isPersonOpen && (
                <>
                  <div className="fixed inset-0 z-10" onClick={() => setIsPersonOpen(false)}></div>
                  <div className="absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-2xl shadow-xl overflow-hidden animate-fade-in flex flex-col">
                    
                    {/* ✅ ส่วนค้นหารายชื่อ */}
                    <div className="p-2 border-b border-gray-100 bg-gray-50 flex gap-2">
                        <div className="relative flex-1">
                            <input 
                                type="text" 
                                placeholder="ค้นหาชื่อ..." 
                                value={personSearch}
                                onChange={(e) => setPersonSearch(e.target.value)}
                                className="w-full pl-7 pr-2 py-1.5 text-xs border border-gray-200 rounded-lg outline-none focus:border-blue-500"
                                autoFocus
                            />
                            <Icon name="magnifying-glass" className="absolute left-2 top-2 text-gray-400" size={12}/>
                        </div>
                        <button type="button" onClick={() => setSelectedPersons([])} className="px-2 py-1 bg-gray-200 text-gray-600 rounded-lg text-[10px] font-bold hover:bg-gray-300 whitespace-nowrap">ล้างค่า</button>
                    </div>

                    <div className="max-h-48 overflow-y-auto custom-scrollbar p-1">
                      {filteredStudents.map(s => {
                        const isSelected = selectedPersons.includes(s.name);
                        return (
                          <div key={s.id} onClick={() => togglePerson(s.name)} className={`p-2.5 flex items-center gap-3 cursor-pointer rounded-xl transition-colors ${isSelected ? 'bg-blue-50' : 'hover:bg-gray-50'}`}>
                            <div className={`w-5 h-5 rounded-md flex items-center justify-center border transition-colors flex-shrink-0 ${isSelected ? 'bg-blue-500 border-blue-500' : 'bg-white border-gray-300'}`}>
                              {isSelected && <Icon name="check" size={12} weight="bold" className="text-white"/>}
                            </div>
                            <div className="flex-1 min-w-0">
                              <p className={`text-sm font-bold truncate ${isSelected ? 'text-blue-700' : 'text-gray-700'}`}>{s.name}</p>
                            </div>
                          </div>
                        )
                      })}
                      {filteredStudents.length === 0 && <p className="text-center text-xs text-gray-400 py-4 font-medium">ไม่พบรายชื่อที่ค้นหา</p>}
                    </div>

                    {/* ปุ่มปิดหน้าต่าง */}
                    <div className="p-2 bg-gray-50 border-t border-gray-100 text-center">
                        <button type="button" onClick={() => setIsPersonOpen(false)} className="text-xs font-bold text-blue-600 hover:underline">ปิดหน้าต่าง</button>
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3 pt-2">
            {/* ใบเสร็จ */}
            <div className="bg-gray-50 p-3 rounded-xl border border-gray-100">
              <label className="text-xs font-bold text-gray-500 mb-2 block flex items-center gap-1"><Icon name="receipt" weight="bold"/> ใบเสร็จ</label>
              {receiptPreview ? (
                <div className="relative group">
                  <div className="h-32 w-full bg-gray-200 rounded-lg overflow-hidden border border-gray-300">
                    <img src={receiptPreview} className="w-full h-full object-contain bg-white" />
                  </div>
                  <div className="absolute top-2 right-2 flex gap-2">
                    <label className="cursor-pointer w-8 h-8 flex items-center justify-center rounded-full bg-white text-blue-600 shadow-md hover:bg-blue-50 transition"><Icon name="arrows-clockwise" weight="bold" size={16}/><input type="file" accept="image/*" onChange={(e) => handleFileChange(e, 'receipt')} className="hidden" /></label>
                    <button type="button" onClick={() => { setForm(p => ({...p, receiptUrl: '', receiptFile: null, isReceiptDeleted: true})); setReceiptPreview(null); }} className="w-8 h-8 flex items-center justify-center rounded-full bg-white text-red-500 shadow-md hover:bg-red-50 transition"><Icon name="trash" weight="bold" size={16}/></button>
                  </div>
                </div>
              ) : (
                <label className="flex flex-col items-center justify-center h-32 w-full border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-white hover:bg-gray-50 hover:border-blue-300 transition group">
                  <div className="flex flex-col items-center justify-center pt-5 pb-6"><Icon name="cloud-arrow-up" className="text-gray-400 group-hover:text-blue-500 mb-1" size={24}/><p className="text-[10px] text-gray-500 font-medium">กดแนบใบเสร็จ</p></div>
                  <input type="file" accept="image/*" onChange={(e) => handleFileChange(e, 'receipt')} className="hidden" />
                </label>
              )}
            </div>

    const LoginScreen = ({ onLogin }) => {
      const [pin, setPin] = useState('');
      const [error, setError] = useState(false);
      const [loading, setLoading] = useState(false);

      // ✅ ดักจับการกดแป้นพิมพ์ (Numpad / คีย์บอร์ด)
      useEffect(() => {
          const handleKeyDown = (e) => {
              if (loading) return;
              // ถ้ากดตัวเลข 0-9
              if (e.key >= '0' && e.key <= '9') {
                  setPin(prev => {
                      if (prev.length < 6) {
                          setError(false);
                          return prev + e.key;
                      }
                      return prev;
                  });
              } 
              // ถ้ากดปุ่มลบ (Backspace)
              else if (e.key === 'Backspace') {
                  setPin(prev => {
                      if (prev.length > 0) {
                          setError(false);
                          return prev.slice(0, -1);
                      }
                      return prev;
                  });
              }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
      }, [loading]);

      // ตรวจสอบรหัสอัตโนมัติเมื่อครบ 6 หลัก
      useEffect(() => {
          if (pin.length === 6) {
              setLoading(true);
              
              // เรียก API ตรวจสอบรหัสผ่านที่ฝั่งเซิร์ฟเวอร์
              apiCall('verifyAdminPin', pin)
                  .then(() => {
                      onLogin(); // ถ้าฝั่งเซิร์ฟเวอร์ตอบกลับมาว่าสำเร็จ (Success) ให้เข้าระบบ
                  })
                  .catch((err) => {
                      setError(true); // รหัสผิด -> สั่นแจ้งเตือน
                      setLoading(false);
                      setTimeout(() => {
                          setPin(''); // ล้างรหัส
                          setError(false);
                      }, 600);
                  });
          }
      }, [pin, onLogin]);

      const handleNumClick = (num) => {
          if (pin.length < 6 && !loading) {
              setPin(prev => prev + num);
              setError(false);
          }
      };

      const handleDelete = () => {
          if (!loading && pin.length > 0) {
              setPin(prev => prev.slice(0, -1));
              setError(false);
          }
      };

      return (
        <div className="fixed inset-0 z-[1000] bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center p-4">

              </div>

              <div className={`flex gap-4 mb-8 transition-transform duration-300 ${error ? 'animate-shake' : ''}`}>
                  {[...Array(6)].map((_, i) => (
                      <div 
                        key={i} 
                        className={`w-4 h-4 rounded-full transition-all duration-300 ${

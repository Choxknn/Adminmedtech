   // --- Order Summary Modal (Updated: Accordion Product Filter) ---
    const OrderSummaryModal = ({ isOpen, onClose, orders, zIndex = "z-[110]", products = [] }) => {
      const [dateFilter, setDateFilter] = useState({ start: '', end: '' });
      const [selectedProducts, setSelectedProducts] = useState([]);
      const [isProductDrawerOpen, setIsProductDrawerOpen] = useState(false); // ✅ สถานะเปิด/ปิดลิ้นชัก

      useEffect(() => {
          if (isOpen) {
              setDateFilter({ start: '', end: '' });
              setSelectedProducts([]);
              setIsProductDrawerOpen(false); // เริ่มต้นปิดลิ้นชักไว้
          }
      }, [isOpen]);

      const getThaiDateDisplay = (isoDate) => {
          if (!isoDate) return '';
          const date = new Date(isoDate);
          return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
      };

      const availableProductNames = useMemo(() => {
          if (!orders) return [];
          const names = new Set();
          orders.forEach(o => {
              if (o.items) {
                  o.items.split(',').forEach(itemStr => {
                      const match = itemStr.trim().match(/(.+?)\s+x\s*(\d+)/);
                      if (match) names.add(match[1].trim());
                  });
              }
          });
          return Array.from(names).sort();
      }, [orders]);

      const toggleProduct = (name) => {
          if (selectedProducts.includes(name)) {
              setSelectedProducts(prev => prev.filter(n => n !== name));
          } else {
              setSelectedProducts(prev => [...prev, name]);
          }
      };

      const selectAll = () => setSelectedProducts([...availableProductNames]);
      const clearSelection = () => setSelectedProducts([]);

      const filteredOrders = useMemo(() => {
          if (!isOpen || !orders) return [];
          return orders.filter(o => {
              if (o.status === 'ยกเลิก') return false;
              if (dateFilter.start || dateFilter.end) {
                  const orderDate = new Date(o.date); orderDate.setHours(0,0,0,0);
                  let checkYear = orderDate.getFullYear();
                  if (checkYear > 2400) orderDate.setFullYear(checkYear - 543);
                  if (dateFilter.start) { const start = new Date(dateFilter.start); start.setHours(0,0,0,0); if (orderDate < start) return false; }
                  if (dateFilter.end) { const end = new Date(dateFilter.end); end.setHours(0,0,0,0); if (orderDate > end) return false; }
              }
              return true;
          });
      }, [isOpen, orders, dateFilter]);

      const summary = useMemo(() => {
          const itemMap = {};
          let totalOrderRevenue = 0; 

          filteredOrders.forEach(o => {
              const orderPrice = Number(o.price) || 0;
              totalOrderRevenue += orderPrice;

              if (o.items) {
                  const itemsInThisOrder = [];
                  let totalQtyInOrder = 0;

                  o.items.split(',').forEach(itemStr => {
                      const match = itemStr.trim().match(/(.+?)\s+x\s*(\d+)/);
                      if (match) {
                          const name = match[1].trim();
                          const qty = parseInt(match[2]) || 0;
                          itemsInThisOrder.push({ name, qty });
                          totalQtyInOrder += qty;
                      }
                  });

                  itemsInThisOrder.forEach(item => {
                      const ratio = totalQtyInOrder > 0 ? (item.qty / totalQtyInOrder) : 0;
                      const moneyShare = ratio * orderPrice; 

                      if (!itemMap[item.name]) {
                          itemMap[item.name] = { name: item.name, qty: 0, totalRealMoney: 0 };
                      }
                      itemMap[item.name].qty += item.qty;
                      itemMap[item.name].totalRealMoney += moneyShare;
                  });
              }
          });

          let itemsArray = Object.values(itemMap).map(item => ({
              ...item,
              avgPrice: item.qty > 0 ? (item.totalRealMoney / item.qty) : 0
          }));

          if (selectedProducts.length > 0) {
              itemsArray = itemsArray.filter(i => selectedProducts.includes(i.name));
          }

          const displayedRevenue = (selectedProducts.length === 0) 
              ? totalOrderRevenue 
              : itemsArray.reduce((sum, item) => sum + item.totalRealMoney, 0);

          return {
              totalRevenue: displayedRevenue,
              items: itemsArray.sort((a, b) => b.totalRealMoney - a.totalRealMoney)
          };
      }, [filteredOrders, selectedProducts]);

      const tableTotal = summary.items.reduce((acc, curr) => ({ 
          qty: acc.qty + curr.qty, 
          money: acc.money + curr.totalRealMoney 
      }), { qty: 0, money: 0 });

      if (!isOpen) return null;

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="สรุปยอดขายสินค้า" zIndex={zIndex}>
           <div className="space-y-4">
              {/* Filter Section */}
              <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3">
                  <div className="flex items-center gap-2 text-gray-500 font-bold text-xs"><Icon name="funnel" weight="fill"/> ตัวกรองข้อมูล</div>
                  
                  {/* Date Range */}
                  <div className="flex gap-2 items-start">
                      <div className="flex-1">
                          <input type="date" value={dateFilter.start} onChange={e => setDateFilter({...dateFilter, start: e.target.value})} className="w-full text-xs p-2 rounded-lg border border-gray-200 outline-none bg-white focus:border-blue-500 transition"/>
                          {dateFilter.start && <p className="text-[10px] text-blue-600 font-bold mt-1 text-center bg-blue-50 rounded px-1">{getThaiDateDisplay(dateFilter.start)}</p>}
                      </div>
                      <span className="text-gray-400 self-center mt-2">-</span>
                      <div className="flex-1">
                          <input type="date" value={dateFilter.end} onChange={e => setDateFilter({...dateFilter, end: e.target.value})} className="w-full text-xs p-2 rounded-lg border border-gray-200 outline-none bg-white focus:border-blue-500 transition"/>
                          {dateFilter.end && <p className="text-[10px] text-blue-600 font-bold mt-1 text-center bg-blue-50 rounded px-1">{getThaiDateDisplay(dateFilter.end)}</p>}
                      </div>
                  </div>

                  {/* ✅ Accordion / Drawer for Products */}
                  <div className="border border-gray-200 rounded-xl bg-white overflow-hidden transition-all duration-300">
                      {/* Header (Click to Toggle) */}
                      <div 
                          onClick={() => setIsProductDrawerOpen(!isProductDrawerOpen)}
                          className={`p-3 flex justify-between items-center cursor-pointer transition-colors ${isProductDrawerOpen ? 'bg-gray-100' : 'hover:bg-gray-50'}`}
                      >
                          <div className="flex items-center gap-2">
                              <div className={`p-1.5 rounded-lg ${selectedProducts.length > 0 ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}`}>
                                  <Icon name="t-shirt" weight="bold" size={16}/>
                              </div>
                              <span className={`text-xs font-bold ${selectedProducts.length > 0 ? 'text-blue-600' : 'text-gray-600'}`}>
                                  {selectedProducts.length > 0 ? `เลือกไว้ ${selectedProducts.length} รายการ` : 'แสดงสินค้าทั้งหมด'}
                              </span>
                          </div>
                          <Icon name={isProductDrawerOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/>
                      </div>

                      {/* Body (The Drawer) */}
                      {isProductDrawerOpen && (
                          <div className="p-3 border-t border-gray-100 bg-gray-50/50 animate-fade-in">
                              <div className="flex justify-end gap-2 mb-2">
                                  <button onClick={selectAll} className="text-[10px] bg-white border border-gray-200 text-blue-600 px-2 py-1 rounded hover:bg-blue-50 font-bold shadow-sm">เลือกทั้งหมด</button>
                                  <button onClick={clearSelection} className="text-[10px] bg-white border border-gray-200 text-gray-500 px-2 py-1 rounded hover:bg-gray-50 shadow-sm">ล้างค่า</button>
                              </div>
                              <div className="max-h-40 overflow-y-auto space-y-1 custom-scrollbar pr-1">
                                  {availableProductNames.map((name, idx) => {
                                      const isSelected = selectedProducts.includes(name);
                                      return (
                                          <div 
                                              key={idx} 
                                              onClick={() => toggleProduct(name)}
                                              className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer text-xs transition-colors ${isSelected ? 'bg-blue-50 text-blue-700 font-bold border border-blue-100' : 'bg-white hover:bg-gray-100 border border-transparent'}`}
                                          >
                                              <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300 bg-white'}`}>
                                                  {isSelected && <Icon name="check" size={10} className="text-white" weight="bold"/>}
                                              </div>
                                              <span className="line-clamp-1">{name}</span>
                                          </div>
                                      );
                                  })}
                                  {availableProductNames.length === 0 && <p className="text-center text-gray-300 text-[10px] py-2">ไม่มีรายการสินค้า</p>}
                              </div>
                          </div>
                      )}
                  </div>
              </div>

              {/* Total Revenue Card */}
              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-4 text-white shadow-lg shadow-blue-200 flex justify-between items-center relative overflow-hidden">
                  <div className="absolute -right-4 -top-4 w-20 h-20 bg-white opacity-10 rounded-full blur-2xl"></div>
                  <div>
                      <p className="text-blue-100 text-xs font-bold mb-1">
                          {selectedProducts.length === 0 ? 'ยอดขายรวม (ทั้งหมด)' : `ยอดขายรวม (${selectedProducts.length} รายการ)`}
                      </p>
                      <h2 className="text-3xl font-extrabold">฿{summary.totalRevenue.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</h2>
                  </div>
                  <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm"><Icon name="chart-line-up" weight="fill" size={24}/></div>
              </div>

              {/* Product Table */}
              <div>
                  <h4 className="text-xs font-bold text-gray-500 mb-2 flex items-center gap-1"><Icon name="list-dashes" weight="bold"/> รายละเอียดสินค้า</h4>
                  <div className="border border-gray-100 rounded-xl overflow-hidden max-h-[40vh] overflow-y-auto">
                      <table className="w-full text-sm">
                          <thead className="bg-gray-50 text-gray-500 font-bold text-xs sticky top-0 shadow-sm z-10">
                              <tr>
                                  <th className="p-3 text-left">สินค้า</th>
                                  <th className="p-3 text-center">จำนวน</th>
                                  <th className="p-3 text-right">ยอดรวม</th>
                              </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                              {summary.items.map((item, idx) => (
                                  <tr key={idx} className="hover:bg-gray-50/50">
                                      <td className="p-3">
                                          <div className="font-bold text-gray-700">{item.name}</div>
                                          <div className="text-[10px] text-gray-400">ตัวละ {item.avgPrice.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})} บ.</div>
                                      </td>
                                      <td className="p-3 text-center"><span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-bold text-xs">{item.qty}</span></td>
                                      <td className="p-3 text-right font-bold text-gray-800">{item.totalRealMoney.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})}</td>
                                  </tr>
                              ))}
                              {summary.items.length === 0 && (<tr><td colSpan="3" className="p-8 text-center text-gray-300 text-xs">ไม่พบรายการขาย</td></tr>)}
                          </tbody>
                          {summary.items.length > 0 && (
                            <tfoot className="bg-gray-100 font-bold text-xs sticky bottom-0 z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                                <tr>
                                    <td className="p-3 text-right text-gray-600">รวมทั้งหมด</td>
                                    <td className="p-3 text-center text-blue-600">{tableTotal.qty}</td>
                                    <td className="p-3 text-right text-indigo-700 text-sm">{tableTotal.money.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</td>
                                </tr>
                            </tfoot>
                          )}
                      </table>
                  </div>
              </div>
              <button onClick={onClose} className="w-full py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ปิดหน้าต่าง</button>
           </div>
        </Modal>
      );
    };

              <div><label className="block text-sm font-bold text-gray-700 mb-1">ราคารวม (บาท)</label><input type="number" value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary font-bold text-gray-800"/></div>
              <div><label className="block text-sm font-bold text-gray-700 mb-1">สถานะ</label><select value={form.status} onChange={e => setForm({...form, status: e.target.value})} className="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary bg-white"><option value="รอตรวจสอบ">รอตรวจสอบ</option><option value="ชำระแล้ว">ชำระแล้ว</option><option value="อยู่ระหว่างสั่งซื้อ">อยู่ระหว่างสั่งซื้อ</option><option value="อยู่ระหว่างผลิต">อยู่ระหว่างผลิต</option><option value="รับแล้ว">รับแล้ว</option><option value="ยกเลิก">ยกเลิก</option></select></div>
              <button onClick={() => onSave(form)} disabled={loading} className="w-full py-3 mt-2 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2">{loading ? <><Icon name="spinner" className="animate-spin"/> กำลังบันทึก...</> : 'บันทึกการแก้ไข'}</button>
           </div>
        </Modal>
      );
    };

    // --- Order View (Fixed: Overlay Loading & Sequence) ---
    const OrderView = ({ orderData, students, onToggleSystem, onSaveProduct, onDeleteProduct, onDeleteOrder, onUpdateStatus, onViewSlip, loading, processingAction, onEditOrder, setOrderData }) => {
        const [subTab, setSubTab] = useState('orders');
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [isScannerOpen, setIsScannerOpen] = useState(false);
        const [editingProduct, setEditingProduct] = useState(null);
        const [searchTerm, setSearchTerm] = useState('');
        const [isSummaryOpen, setIsSummaryOpen] = useState(false);
        const [editingOrder, setEditingOrder] = useState(null);
        const [isEditOrderModalOpen, setIsEditOrderModalOpen] = useState(false);

        // --- Bulk Actions State ---
        const [isBulkStatusOpen, setIsBulkStatusOpen] = useState(false);
        const [bulkTargetStatus, setBulkTargetStatus] = useState('ชำระแล้ว');
        const [isProcessingBulk, setIsProcessingBulk] = useState(false);
        const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0 });

        // --- Custom Alert State ---
        const [alertState, setAlertState] = useState({ 
            isOpen: false, 
            title: '', 
            message: '', 
            onConfirm: null, 
            type: 'info' 
        });

        // --- Helper Function ---
        const formatDateSafe = (isoDate) => {
            if (!isoDate) return '-';
            try { return new Date(isoDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute:'2-digit' }); } catch (e) { return '-'; }
        };

        const safeProducts = Array.isArray(orderData?.products) ? orderData.products : [];
        const safeOrders = Array.isArray(orderData?.orders) ? orderData.orders : [];
        
        const filteredProducts = safeProducts.filter(p => String(p.name||'').toLowerCase().includes(searchTerm.toLowerCase()));
        
        const filteredOrders = safeOrders.filter(o => { 
            const sName = students?.find(s => String(s.id) === String(o.studentId))?.name || ''; 
            const term = searchTerm.toLowerCase(); 
            const safeVal = (v) => String(v || '').toLowerCase(); 
            return safeVal(o.orderId).includes(term) || safeVal(o.studentId).includes(term) || safeVal(sName).includes(term); 
        });
        
        const handleScanSuccess = (text) => setSearchTerm(text);
        const handleAddProduct = () => { setEditingProduct(null); setIsModalOpen(true); };
        const openEditOrderModal = (order) => { setEditingOrder(order); setIsEditOrderModalOpen(true); };
        
        const handleSaveEditedOrder = (formData) => {
            if(setOrderData) setOrderData(prev => ({ ...prev, orders: prev.orders.map(o => o.orderId === formData.orderId ? { ...o, ...formData } : o) }));
            setIsEditOrderModalOpen(false);
            onEditOrder(formData);
        };

        // --- Bulk Actions Logic ---
        
        const confirmBulkStatusUpdate = () => {
            if (filteredOrders.length === 0) return;
            setIsBulkStatusOpen(false); // ปิด Modal เลือก
            
            // เปิด Confirm
            setAlertState({
                isOpen: true,
                type: 'info',
                title: 'ยืนยันการเปลี่ยนสถานะ',
                message: `คุณต้องการเปลี่ยนสถานะ ${filteredOrders.length} รายการ เป็น "${bulkTargetStatus}" ใช่หรือไม่?`,
                onConfirm: executeBulkStatusUpdate
            });
        };

        const executeBulkStatusUpdate = async () => {
            // 1. ปิด Alert Confirm
            setAlertState(prev => ({ ...prev, isOpen: false }));
            
            // 2. รอเล็กน้อยแล้วเปิด Loading (Overlay)
            setTimeout(async () => {
                setIsProcessingBulk(true);
                setBulkProgress({ current: 0, total: filteredOrders.length });

                let completed = 0;
                for (const order of filteredOrders) {
                    // เช็คว่าต้องเปลี่ยนไหม (ถ้าสถานะตรงกันอยู่แล้วก็ข้าม แต่ยังนับ Progress)
                    if (order.status !== bulkTargetStatus) {
                        await new Promise(resolve => {
                            onUpdateStatus(order.orderId, bulkTargetStatus);
                            setTimeout(resolve, 800); // หน่วงเวลาให้เห็น Process
                        });
                    }
                    completed++;
                    setBulkProgress(prev => ({ ...prev, current: completed }));
                }

                // 3. ทำงานเสร็จ -> ปิด Loading
                setIsProcessingBulk(false);

                // 4. รอ 0.5 วิ แล้วค่อยเปิด Success Popup
                setTimeout(() => {
                    setAlertState({
                        isOpen: true,
                        type: 'success',
                        title: 'เรียบร้อย',
                        message: `ดำเนินการเปลี่ยนสถานะ ${completed} รายการเสร็จสมบูรณ์`,
                        onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false }))
                    });
                }, 500);

            }, 100);
        };

        const confirmBulkDelete = () => {
             if (filteredOrders.length === 0) return;
             setAlertState({
                isOpen: true,
                type: 'danger',
                title: '⚠️ ยืนยันการลบข้อมูล',
                message: `คุณกำลังจะลบออเดอร์ ${filteredOrders.length} รายการ\nการกระทำนี้ไม่สามารถกู้คืนได้ ยืนยันหรือไม่?`,
                onConfirm: executeBulkDelete
            });
        };

        const executeBulkDelete = async () => {
             setAlertState(prev => ({ ...prev, isOpen: false }));

             setTimeout(async () => {
                setIsProcessingBulk(true);
                setBulkProgress({ current: 0, total: filteredOrders.length });

                let completed = 0;
                for (const order of filteredOrders) {
                    await new Promise(resolve => {
                        onDeleteOrder(order.orderId);
                        setTimeout(resolve, 800);
                    });
                    completed++;
                    setBulkProgress(prev => ({ ...prev, current: completed }));
                }

                setIsProcessingBulk(false);

                setTimeout(() => {
                    setAlertState({
                        isOpen: true,
                        type: 'success',
                        title: 'เรียบร้อย',
                        message: `ลบข้อมูล ${completed} รายการเสร็จสมบูรณ์`,
                        onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false }))
                    });
                }, 500);

             }, 100);
        };

        // Helper: Status Colors
        const getOrderStatusStyle = (status) => {
            switch(status) {
                case 'ชำระแล้ว': return 'bg-emerald-100 text-emerald-700 border-emerald-200';
                case 'รอตรวจสอบ': return 'bg-amber-100 text-amber-700 border-amber-200';
                case 'ยกเลิก': return 'bg-gray-100 text-gray-500 border-gray-200';
                case 'อยู่ระหว่างผลิต': return 'bg-purple-100 text-purple-700 border-purple-200';
                case 'อยู่ระหว่างสั่งซื้อ': return 'bg-blue-100 text-blue-700 border-blue-200';
                case 'รอรับของ': return 'bg-pink-100 text-pink-700 border-pink-200';
                case 'รับแล้ว': return 'bg-teal-100 text-teal-700 border-teal-200';
                default: return 'bg-gray-50 text-gray-600 border-gray-200';
            }
        };

        const getProductStatusStyle = (status) => {
            if (status === 'ON') return 'bg-green-500 text-white';
            if (status === 'OUT') return 'bg-amber-500 text-white';
            return 'bg-gray-400 text-white';
        };

        return (
          <div className="space-y-5 pb-24 relative animate-fade-in">
             <ScrollToTopBottom />

             {/* 1. Header & Control Panel */}
             <div className="bg-white p-5 rounded-3xl card-shadow border border-gray-100 relative overflow-hidden">
                 <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full blur-3xl -translate-y-10 translate-x-10"></div>
                 <div className="relative z-10 flex justify-between items-center">
                     <div>
                         <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                             <div className="bg-blue-100 p-1.5 rounded-lg text-primary"><Icon name="storefront" weight="fill" size={20}/></div>
                             จัดการร้านค้า
                         </h2>
                         <p className="text-xs text-gray-400 mt-1 pl-1">ควบคุมการขายและออเดอร์</p>
                     </div>
                     
                     <button 
                         onClick={()=> !loading && onToggleSystem(orderData?.systemStatus === 'ON' ? false : true)} 
                         disabled={loading || processingAction === 'TOGGLE_SYSTEM'}
                         className={`relative pl-3 pr-1 py-1 h-9 rounded-full flex items-center gap-2 transition-all duration-300 shadow-sm border ${orderData?.systemStatus === 'ON' ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-200'}`}
                     >
                         <span className={`text-[10px] font-bold ${orderData?.systemStatus === 'ON' ? 'text-green-600' : 'text-gray-400'}`}>
                             {orderData?.systemStatus === 'ON' ? 'เปิดรับออเดอร์' : 'ปิดปรับปรุง'}
                         </span>
                         <div className={`w-7 h-7 rounded-full shadow-md flex items-center justify-center transition-transform duration-300 ${orderData?.systemStatus === 'ON' ? 'bg-green-500 translate-x-0' : 'bg-gray-400 -translate-x-0'}`}>
                             {processingAction === 'TOGGLE_SYSTEM' ? <Icon name="spinner" className="animate-spin text-white" size={14} weight="bold"/> : <Icon name="power" className="text-white" size={14} weight="bold"/>}
                         </div>
                     </button>
                 </div>
             </div>
             
             {/* 2. Navigation Tabs */}
             <div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex relative z-10">
                 <button onClick={()=>setSubTab('orders')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'orders' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                     <Icon name="receipt" weight={subTab === 'orders' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">ออเดอร์ ({safeOrders.length})</span>
                 </button>
                 <button onClick={()=>setSubTab('products')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'products' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                     <Icon name="t-shirt" weight={subTab === 'products' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">สินค้า ({safeProducts.length})</span>
                 </button>
             </div>
             
             {/* 3. Search & Toolbar */}
             <div className="flex gap-2 sticky top-0 z-20 bg-background py-2">
                 <div className="flex-1 bg-white rounded-xl card-shadow border border-gray-100 flex items-center px-4 py-2.5 transition focus-within:ring-2 focus-within:ring-primary/20">
                     <Icon name="magnifying-glass" className="text-gray-400 mr-3" size={18} />
                     <input type="text" placeholder={subTab==='products'?"ค้นหาสินค้า...":"ค้นหาออเดอร์/ชื่อ..."} className="w-full bg-transparent text-sm font-medium text-gray-700 outline-none placeholder-gray-400" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                     {searchTerm && <button onClick={() => setSearchTerm('')} className="text-gray-400 hover:text-gray-600 ml-2"><Icon name="x-circle" weight="fill" /></button>}
                 </div>
                 
                 {subTab === 'orders' && (
                     <>
                         <button onClick={() => setIsSummaryOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="สรุปยอด"><Icon name="chart-pie-slice" weight="fill" size={20}/></button>
                         <button onClick={() => setIsScannerOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white text-gray-600 card-shadow border border-gray-100 hover:bg-gray-50 transition active:scale-95" title="สแกน QR"><Icon name="qr-code" weight="bold" size={20}/></button>
                     </>
                 )}
                 {subTab === 'products' && (
                     <button onClick={handleAddProduct} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="เพิ่มสินค้า"><Icon name="plus" weight="bold" size={20}/></button>
                 )}
             </div>

             {/* 4. Content Area */}
             <div className="min-h-[300px]">
                 
                 {/* --- PRODUCTS TAB --- */}
                  {subTab === 'products' && (
                    <div className="grid grid-cols-2 gap-3 animate-fade-in">
                        {filteredProducts.map((p) => (
                            <div key={p.id} className="group bg-white p-3 rounded-2xl card-shadow border border-gray-100 hover:border-blue-200 transition relative overflow-hidden">
                                <div className="aspect-square bg-gray-50 rounded-xl mb-3 overflow-hidden flex items-center justify-center relative">
                                    {/* ✅ เรียกใช้ ProductImageGallery แทน img ธรรมดา */}
                                    <ProductImageGallery imageString={p.image} />
                                    
                                    <span className={`absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm z-20 ${getProductStatusStyle(p.status)}`}>{p.status}</span>
                                </div>
                                <h4 className="font-bold text-sm text-gray-800 line-clamp-1 mb-1">{p.name}</h4>
                                <div className="flex justify-between items-end">
                                    <p className="text-blue-600 font-extrabold">฿{Number(p.price).toLocaleString()}</p>
                                    <p className="text-[10px] text-gray-400 font-medium">Stock: {p.stock}</p>
                                </div>
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 z-30">
                                    <button onClick={()=>{setEditingProduct(p); setIsModalOpen(true);}} className="w-10 h-10 rounded-full bg-white text-blue-600 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="pencil-simple" weight="bold" size={20}/></button>
                                    <button onClick={()=>onDeleteProduct(p.id)} className="w-10 h-10 rounded-full bg-white text-red-500 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="trash" weight="bold" size={20}/></button>
                                </div>
                            </div>
                        ))}
                        {filteredProducts.length === 0 && (<div className="col-span-2 flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="t-shirt" size={40} className="opacity-30 mb-2"/><p>ไม่พบสินค้า</p></div>)}
                    </div>
                  )}

                 {/* --- ORDERS TAB --- */}
                 {subTab === 'orders' && (
                   <div className="space-y-3 animate-fade-in">
                       
                       {/* Bulk Actions Bar */}
                       {filteredOrders.length > 0 && (
                            <div className="bg-gray-50 p-2 rounded-xl flex gap-2 border border-gray-100">
                                 <button onClick={() => setIsBulkStatusOpen(true)} className="flex-1 py-2 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-200 transition flex items-center justify-center gap-1 border border-indigo-200">
                                     <Icon name="arrows-clockwise" weight="bold"/> เปลี่ยนสถานะ ({filteredOrders.length})
                                 </button>
                                 <button onClick={confirmBulkDelete} className="flex-1 py-2 bg-red-100 text-red-700 rounded-lg text-xs font-bold hover:bg-red-200 transition flex items-center justify-center gap-1 border border-red-200">
                                     <Icon name="trash" weight="bold"/> ลบทั้งหมด ({filteredOrders.length})
                                 </button>
                            </div>
                       )}

                       {filteredOrders.length === 0 && (
                           <div className="flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="shopping-bag" size={40} className="opacity-30 mb-2"/><p>{searchTerm ? "ไม่พบออเดอร์ที่ค้นหา" : "ไม่มีรายการสั่งซื้อ"}</p></div>
                       )}
                       
                       {filteredOrders.map((o) => { 
                           const studentName = students?.find(s => String(s.id) === String(o.studentId))?.name || 'ไม่พบชื่อ';
                           const statusStyle = getOrderStatusStyle(o.status);
                           
                           return (
                              <div key={o.orderId} className="bg-white rounded-2xl card-shadow border border-gray-100 overflow-hidden hover:shadow-md transition group">
                                  <div className="bg-gray-50 px-4 py-2.5 flex justify-between items-center border-b border-gray-100">
                                      <div className="flex items-center gap-2 text-xs text-gray-500 font-mono"><Icon name="hash" size={12} weight="bold"/> {o.orderId}</div>
                                      <div className="flex items-center gap-2 text-[10px] font-bold text-gray-400"><Icon name="clock" weight="fill"/> {formatDateSafe(o.date)}</div>
                                  </div>

                                  <div className="p-4">
                                      <div className="flex justify-between items-start mb-3">
                                          <div className="flex items-center gap-3">
                                              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-blue-100 to-indigo-100 text-indigo-600 flex items-center justify-center text-sm font-bold shadow-inner">{studentName.charAt(0)}</div>
                                              <div><h4 className="font-bold text-gray-800 text-sm">{studentName}</h4><p className="text-xs text-gray-400">{o.studentId}</p></div>
                                          </div>
                                          {o.slip && (<button onClick={()=>onViewSlip(o.slip)} className="w-8 h-8 flex items-center justify-center rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 transition" title="ดูสลิป"><Icon name="image" weight="fill" size={16}/></button>)}
                                      </div>

                                      <div className="bg-gray-50 p-3 rounded-xl border border-dashed border-gray-200 mb-3 relative overflow-hidden">
                                          <div className="absolute top-0 left-0 w-1 h-full bg-gray-200"></div>
                                          <p className="text-xs text-gray-600 whitespace-pre-wrap leading-relaxed font-medium pl-2">{o.items}</p>
                                      </div>

                                      <div className="flex justify-between items-end">
                                          <div><p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">ยอดรวม</p><div className="text-xl font-extrabold text-gray-800">฿{Number(o.price).toLocaleString()}</div></div>
                                          
                                          <div className="flex items-center gap-2">
                                              <div className="relative group/status">
                                                  <select value={o.status} onChange={(e)=>onUpdateStatus(o.orderId, e.target.value)} className={`appearance-none pl-3 pr-8 py-1.5 rounded-lg text-[10px] font-bold border outline-none cursor-pointer transition-colors ${statusStyle}`}>
                                                      <option value="รอตรวจสอบ">รอตรวจสอบ</option>
                                                      <option value="ชำระแล้ว">ชำระแล้ว</option>
                                                      <option value="อยู่ระหว่างสั่งซื้อ">อยู่ระหว่างสั่งซื้อ</option>
                                                      <option value="อยู่ระหว่างผลิต">อยู่ระหว่างผลิต</option>
                                                      <option value="รอรับของ">รอรับของ</option>
                                                      <option value="รับแล้ว">รับแล้ว</option>
                                                      <option value="ยกเลิก">ยกเลิก</option>
                                                  </select>
                                                  <Icon name="caret-down" size={10} weight="bold" className="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none opacity-50"/>
                                              </div>
                                              <button onClick={() => openEditOrderModal(o)} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-500 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center transition"><Icon name="pencil-simple" weight="bold" size={16}/></button>
                                              <button onClick={()=>onDeleteOrder(o.orderId)} className="w-8 h-8 rounded-lg bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-500 flex items-center justify-center transition"><Icon name="trash" weight="bold" size={16}/></button>
                                          </div>
                                      </div>
                                  </div>
                              </div>
                           ); 
                       })}
                   </div>
                 )}
             </div>

             <ProductModal isOpen={isModalOpen} onClose={()=>setIsModalOpen(false)} product={editingProduct} onSave={(data) => { setIsModalOpen(false); onSaveProduct(data); }} loading={false} />
             <QRScannerModal isOpen={isScannerOpen} onClose={() => setIsScannerOpen(false)} onScan={handleScanSuccess} />
             <OrderSummaryModal isOpen={isSummaryOpen} onClose={() => setIsSummaryOpen(false)} orders={filteredOrders} products={orderData.products} zIndex="z-[110]" />
             <EditOrderModal isOpen={isEditOrderModalOpen} onClose={() => setIsEditOrderModalOpen(false)} order={editingOrder} onSave={handleSaveEditedOrder} loading={false} zIndex="z-[110]" />
             
             {/* Modal เลือกสถานะกลุ่ม */}
             <Modal isOpen={isBulkStatusOpen} onClose={() => setIsBulkStatusOpen(false)} title="เปลี่ยนสถานะรายการที่เลือก" zIndex="z-[80]">
                <div className="space-y-4 pt-2">
                    <p className="text-sm text-gray-600 text-center">เปลี่ยนสถานะของ <strong className="text-indigo-600">{filteredOrders.length} รายการ</strong></p>
                    <div>
                        <label className="text-xs font-bold text-gray-500 mb-1 block">เลือกสถานะปลายทาง</label>
                        <select value={bulkTargetStatus} onChange={e => setBulkTargetStatus(e.target.value)} className="w-full p-3 bg-indigo-50 border border-indigo-200 rounded-xl text-sm font-bold text-indigo-700 outline-none">
                            <option value="รอดำเนินการ">รอดำเนินการ</option>
                            <option value="รอตรวจสอบ">รอตรวจสอบ</option>
                            <option value="ชำระแล้ว">ชำระแล้ว</option>
                            <option value="อยู่ระหว่างสั่งซื้อ">อยู่ระหว่างสั่งซื้อ</option>
                            <option value="อยู่ระหว่างผลิต">อยู่ระหว่างผลิต</option>
                            <option value="รอรับของ">รอรับของ</option>
                            <option value="รับแล้ว">รับแล้ว</option>
                            <option value="ยกเลิก">ยกเลิก</option>
                        </select>
                    </div>

   const FinanceView = ({ data, onSave, onDelete, onViewImage, loading }) => {

      const financeData = Array.isArray(data.finance) ? data.finance : [];

      // จัดกลุ่มตามโครงการ
      const projects = useMemo(() => {
        const map = {};
        let totalInc = 0; let totalExp = 0;

        financeData.forEach(log => {
          // ข้ามรายการที่ไอดีว่าง, ไม่มีชื่อโครงการ, หรือเป็นค่าว่าง
          if (!log.id || !log.project || String(log.project).trim() === '') return;
          
          const pName = String(log.project).trim();
          if (!map[pName]) map[pName] = { name: pName, income: 0, expense: 0, count: 0, logs: [] };
          
          const amt = Number(log.amount) || 0;
          if (log.type === 'รายรับ') { map[pName].income += amt; totalInc += amt; }
          else { map[pName].expense += amt; totalExp += amt; }
          
          map[pName].count++;
          map[pName].logs.push(log);
        });

        // ✅ นำเงื่อนไขซ่อนโปรเจกต์ออก ให้โชว์ทุกโครงการที่มีในชีต
        const validProjects = Object.values(map);
        const sortedProjects = validProjects.sort((a, b) => b.count - a.count);
        
        return { list: sortedProjects, totalIncome: totalInc, totalExpense: totalExp, totalBalance: totalInc - totalExp };
      }, [financeData]);

        setEditingLog(null); 
        setDefaultProj(projName);

   // --- Login Screen (PIN Code Style + Keyboard Support) ---
    const LoginScreen = ({ onLogin }) => {
      const [pin, setPin] = useState('');
      const [error, setError] = useState(false);
      const [loading, setLoading] = useState(false);

      // ✅ ดักจับการกดแป้นพิมพ์ (Numpad / คีย์บอร์ด)
      useEffect(() => {
          const handleKeyDown = (e) => {
              if (loading) return;
              // ถ้ากดตัวเลข 0-9
              if (e.key >= '0' && e.key <= '9') {
                  setPin(prev => {
                      if (prev.length < 6) {
                          setError(false);
                          return prev + e.key;
                      }
                      return prev;
                  });
              } 
              // ถ้ากดปุ่มลบ (Backspace)
              else if (e.key === 'Backspace') {
                  setPin(prev => {
                      if (prev.length > 0) {
                          setError(false);
                          return prev.slice(0, -1);
                      }
                      return prev;
                  });
              }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => window.removeEventListener('keydown', handleKeyDown);
      }, [loading]);

      // ตรวจสอบรหัสอัตโนมัติเมื่อครบ 6 หลัก
      useEffect(() => {
          if (pin.length === 6) {
              setLoading(true);
              
              // เรียก API ตรวจสอบรหัสผ่านที่ฝั่งเซิร์ฟเวอร์
              apiCall('verifyAdminPin', pin)
                  .then(() => {
                      onLogin(); // ถ้าฝั่งเซิร์ฟเวอร์ตอบกลับมาว่าสำเร็จ (Success) ให้เข้าระบบ
                  })
                  .catch((err) => {
                      setError(true); // รหัสผิด -> สั่นแจ้งเตือน
                      setLoading(false);
                      setTimeout(() => {
                          setPin(''); // ล้างรหัส
                          setError(false);
                      }, 600);
                  });
          }
      }, [pin, onLogin]);

      const handleNumClick = (num) => {
          if (pin.length < 6 && !loading) {
              setPin(prev => prev + num);
              setError(false);
          }
      };

      const handleDelete = () => {
          if (!loading && pin.length > 0) {
              setPin(prev => prev.slice(0, -1));
              setError(false);
          }
      };

      return (
        <div className="fixed inset-0 z-[1000] bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center p-4">
           <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
              <div className="absolute top-10 left-10 w-64 h-64 bg-blue-500 opacity-10 rounded-full blur-3xl animate-pulse"></div>
              <div className="absolute bottom-10 right-10 w-96 h-96 bg-indigo-500 opacity-10 rounded-full blur-3xl animate-pulse delay-700"></div>
           </div>

           <div className="w-full max-w-sm relative z-10 flex flex-col items-center animate-scale-in">
              <div className="mb-8 text-center">
                  <div className="w-20 h-20 bg-white/10 backdrop-blur-md rounded-2xl mx-auto flex items-center justify-center text-white shadow-xl mb-4 border border-white/10">
                      <Icon name="lock-key" weight="fill" size={36} />
                  </div>
                  <h1 className="text-2xl font-bold text-white tracking-wider">ใส่รหัส PIN</h1>
                  <p className="text-blue-200 text-xs mt-1 font-medium">สามารถพิมพ์ตัวเลขจากคีย์บอร์ดได้เลย</p>
              </div>

              <div className={`flex gap-4 mb-8 transition-transform duration-300 ${error ? 'animate-shake' : ''}`}>
                  {[...Array(6)].map((_, i) => (
                      <div 
                        key={i} 
                        className={`w-4 h-4 rounded-full transition-all duration-300 ${
                            i < pin.length 
                                ? 'bg-blue-400 shadow-[0_0_15px_rgba(96,165,250,0.8)] scale-110' 
                                : 'bg-white/20 scale-100'
                        }`}
                      ></div>
                  ))}
              </div>
              
              <div className="h-6 mb-2">
                 {error && <p className="text-red-400 text-sm font-bold animate-fade-in flex items-center gap-1"><Icon name="warning-circle" weight="fill"/> รหัสไม่ถูกต้อง</p>}
              </div>

              <div className="grid grid-cols-3 gap-4 w-full px-4">
                  {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                      <button 
                          key={num}
                          onClick={() => handleNumClick(num)}
                          disabled={loading}
                          className="w-full aspect-square rounded-full bg-white/5 hover:bg-white/20 backdrop-blur-sm border border-white/5 text-white text-2xl font-bold transition-all active:scale-95 flex items-center justify-center shadow-lg"
                      >
                          {num}
                      </button>
                  ))}
                  <div></div>
                  <button 
                      onClick={() => handleNumClick(0)}
                      disabled={loading}
                      className="w-full aspect-square rounded-full bg-white/5 hover:bg-white/20 backdrop-blur-sm border border-white/5 text-white text-2xl font-bold transition-all active:scale-95 flex items-center justify-center shadow-lg"
                  >
                      0
                  </button>
                  <button 
                      onClick={handleDelete}
                      disabled={loading}
                      className="w-full aspect-square rounded-full text-white/50 hover:text-white hover:bg-white/10 transition-all active:scale-95 flex items-center justify-center"
                  >
                      <Icon name="backspace" weight="bold" size={28} />
                  </button>
              </div>
           </div>
        </div>
      );
    };
    
    // --- MAIN APP (Fixed for GitHub Pages / API Mode) ---
    const App = () => {

      const [isDeleteConfirmOpen, setIsDeleteConfirmOpen] = useState(false);
      const [isErrorModalOpen, setIsErrorModalOpen] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');
      const [isResetConfirmOpen, setIsResetConfirmOpen] = useState(false);
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [isOverdueConfirmOpen, setIsOverdueConfirmOpen] = useState(false);
      const [processingAction, setProcessingAction] = useState(null); 
      const [deleteTarget, setDeleteTarget] = useState(null); 
      const [notifyEnabled, setNotifyEnabled] = useState(true); 
      const isFetchingRef = useRef(false);

      useEffect(() => { 
        fetchData(true); 
        fetchOrderData(); 
        const intervalId = setInterval(() => { 
            if (!processingAction && !isDeleteConfirmOpen && !isEditing && !isCreateModalOpen) { 
                fetchData(false); 
                fetchOrderData(); 
            } 
        }, 5000); 
        return () => clearInterval(intervalId); 
      }, [processingAction, isDeleteConfirmOpen, isEditing, isCreateModalOpen]);

      useEffect(() => { if (!selectedBill) setIsEditing(false); else setNotifyEnabled(true); }, [selectedBill]);

      const finishAction = () => {
          setProcessingAction(null);
          setShowSuccess(true);
          setTimeout(() => setShowSuccess(false), 1500);
      };

      const fetchData = (showSpinner = false) => { 
        if (isFetchingRef.current) return; 
        isFetchingRef.current = true; 
        if (showSpinner) setLoading(true); 

        apiCall('getAllData')
            .then(response => {
                if (!processingAction && !isEditing) { setData(response); } 
                if (showSpinner) { setEditAnnouncement(response.announcement); setLoading(false); } 
                isFetchingRef.current = false;
            })
            .catch(err => {
                if (showSpinner) { alert('Error: ' + err.message); setLoading(false); } 
                isFetchingRef.current = false;
            });
      };
      
      const fetchOrderData = () => { 
          apiCall('getOrderData').then(res => { if (!processingAction) setOrderData(res); }).catch(err => console.error(err)); 
      };

      // --- ACTIONS ---

      const handleSaveFinance = (formData) => {
          setProcessingAction('SAVE_FINANCE');

              alert('Error: ' + err.message); setProcessingAction(null);
          });
      };

      const handleDeleteFinance = (id) => {
          setProcessingAction('DELETE');
          apiCall('deleteFinanceLog', id).then((newData) => {
              setData(newData); finishAction();
          }).catch((err) => {
              alert('Error: ' + err.message); setProcessingAction(null);
          });
      };

      const handleToggleOrderSystem = (status) => { 
          setProcessingAction('TOGGLE_SYSTEM'); 
          const newStatus = status ? 'ON' : 'OFF';
          setOrderData(prev => ({ ...prev, systemStatus: newStatus }));
          setTimeout(() => { 
              apiCall('toggleOrderSystem', status).then(() => finishAction()).catch(() => { 
                  setOrderData(prev => ({ ...prev, systemStatus: status ? 'OFF' : 'ON' })); 
                  alert("บันทึกไม่สำเร็จ"); 
              });

          setProcessingAction('TOGGLING_SYSTEM');

          }).catch((err) => {
              setProcessingAction(null); alert("เกิดข้อผิดพลาด: " + err.message);
          });
      };

      const handleSaveProduct = (form) => { 
          setProcessingAction('SAVE_PRODUCT'); 
          setOrderData(prev => {
              let newProducts = [...prev.products];
              const existingIdx = newProducts.findIndex(p => p.id === form.id);
              if (existingIdx >= 0) { newProducts[existingIdx] = { ...newProducts[existingIdx], ...form }; } else { newProducts.push({ ...form, id: form.id || `temp-${Date.now()}` }); }
              return { ...prev, products: newProducts };
          });
          setTimeout(() => { 
              apiCall('saveProduct', form).then(() => finishAction()).catch((err) => alert('Error: ' + err.message)); 
          }, 500);
      };

      const handleUpdateOrderStatus = (id, status) => { 
          setOrderData(prev => ({ ...prev, orders: prev.orders.map(o => o.orderId === id ? { ...o, status: status } : o) }));
          setShowSuccess(true); setTimeout(() => setShowSuccess(false), 1500);

      const handleEditOrder = (formData) => {

          }, 500);
      };

      const confirmDelete = () => { 
          if (!deleteTarget) return; 
          setProcessingAction('DELETE'); 
          setIsDeleteConfirmOpen(false); 
          const targetId = deleteTarget.id; const targetType = deleteTarget.type;
          
          if (targetType === 'ORDER') setOrderData(prev => ({ ...prev, orders: prev.orders.filter(o => o.orderId !== targetId) }));
          else if (targetType === 'PRODUCT') setOrderData(prev => ({ ...prev, products: prev.products.filter(p => p.id !== targetId) }));
          else if (targetType === 'BILL') { setData(prev => ({ ...prev, bills: prev.bills.filter(b => b.billId !== targetId) })); setSelectedBill(null); }
          else if (targetType === 'HISTORY') setData(prev => ({ ...prev, history: prev.history.filter(h => h.billId !== targetId) }));
          else if (targetType === 'STUDENT') setData(prev => ({ ...prev, students: prev.students.filter(s => s.id !== targetId) }));
          else if (targetType === 'QR') setData(prev => ({ ...prev, amount: { ...prev.amount, qrCodes: prev.amount.qrCodes.filter(q => q.url !== targetId) } }));
          
          setTimeout(() => {
              finishAction();
              const onError = (err) => { alert('Error: ' + err.message); };
              if (targetType === 'BILL') apiCall('deleteBill', targetId).catch(onError); 
              else if (targetType === 'HISTORY') apiCall('deleteHistory', targetId).catch(onError); 
              else if (targetType === 'STUDENT') apiCall('deleteStudent', targetId).catch(onError); 
              else if (targetType === 'QR') apiCall('deleteQrCode', targetId).catch(onError); 
              else if (targetType === 'PRODUCT') apiCall('deleteProduct', targetId).catch(onError);
              else if (targetType === 'ORDER') apiCall('deleteOrder', targetId).catch(onError);
              setDeleteTarget(null);
          }, 500);
      };

              let hasError = false;

              formData.studentIds.forEach(studentId => {
                  const singleBillData = { ...formData, studentId: studentId };
                  delete singleBillData.studentIds;

                      completed++;
                      if (completed === total) {
                          fetchData(false); setIsCreateModalOpen(false); finishAction();

          </Modal>

          <ConfirmModal isOpen={isDeleteConfirmOpen} onClose={() => !processingAction && setIsDeleteConfirmOpen(false)} onConfirm={confirmDelete} title={deleteTarget?.type === 'HISTORY' ? "ยืนยันลบประวัติ" : (deleteTarget?.type === 'STUDENT' ? "ยืนยันลบนักศึกษา" : (deleteTarget?.type === 'QR' ? "ยืนยันลบ QR Code" : (deleteTarget?.type === 'PRODUCT' ? "ยืนยันลบสินค้า" : (deleteTarget?.type === 'ORDER' ? "ยืนยันลบออเดอร์" : "ยืนยันการลบบิล"))))} message={getConfirmMessage()} loading={processingAction === 'DELETE'} />
          <ConfirmModal isOpen={isResetConfirmOpen} onClose={() => setIsResetConfirmOpen(false)} onConfirm={handleResetBill} title="ยืนยันการรีเซ็ตบิล" message={`ระบบจะทำการลบ:\n- วันที่ชำระ\n- รูปสลิป\n- รหัสอ้างอิง\n\nคุณยืนยันที่จะรีเซ็ตสถานะใช่หรือไม่?`} loading={processingAction === 'RESET'} confirmText="ยืนยันรีเซ็ต" isDestructive={true} />
          
          <ConfirmModal 
              isOpen={isOverdueConfirmOpen} 
              onClose={() => setIsOverdueConfirmOpen(false)} 
              onConfirm={() => {
                  setIsOverdueConfirmOpen(false);
                  if(selectedBill) handleSendOverdueNotification(selectedBill.billId);
              }} 
              title="ยืนยันการทวงถาม" 
              message={`คุณต้องการส่งข้อความแจ้งเตือนทวงถามบิล #${selectedBill?.billId} ไปยัง LINE ของนักศึกษาใช่หรือไม่?`} 
              loading={processingAction === 'NOTIFY'} 
              confirmText="ยืนยันส่ง" 
              isDestructive={false} 
          />

          <Modal isOpen={isAnnounceModalOpen} onClose={() => setIsAnnounceModalOpen(false)} title="แก้ไขประกาศ"><div className="space-y-4"><textarea value={editAnnouncement} onChange={(e) => setEditAnnouncement(e.target.value)} className="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none min-h-[150px]" placeholder="พิมพ์ข้อความประกาศที่นี่..."></textarea><button onClick={handleSaveAnnouncement} disabled={loading} className="w-full py-3 rounded-xl bg-primary text-white font-medium shadow-lg hover:bg-blue-700 transition">{loading ? 'กำลังบันทึก...' : 'บันทึกประกาศ'}</button></div></Modal>
          <Modal isOpen={isCreateModalOpen} onClose={() => setIsCreateModalOpen(false)} title="สร้างบิลใหม่"><BillForm students={data.students} onSubmit={handleCreateBill} loading={processingAction === 'CREATE_BILL'} /></Modal>
          <Modal isOpen={isStudentModalOpen} onClose={() => setIsStudentModalOpen(false)} title={selectedStudent ? "แก้ไขนักศึกษา" : "เพิ่มนักศึกษา"}><StudentForm onSubmit={handleSaveStudent} loading={processingAction === 'SAVE_STUDENT'} initialData={selectedStudent} /></Modal>
          <StudentBillsModal isOpen={!!viewingStudentId} onClose={() => setViewingStudentId(null)} student={data.students?.find(s => s.id === viewingStudentId)} bills={data.bills?.filter(b => b.studentId === viewingStudentId)} onSelectBill={(bill) => setSelectedBill(bill)} />
          <QrCodeModal isOpen={isQrModalOpen} onClose={() => setIsQrModalOpen(false)} qrUrls={data.amount?.qrCodes || []} onUploadSuccess={handleQrUploadSuccess} onDelete={handleDeleteQrClick} loading={loading} initialEditQr={editingQrData} />
          <ErrorModal isOpen={isErrorModalOpen} onClose={() => setIsErrorModalOpen(false)} message={errorMessage} />
          <ImageModal isOpen={!!viewingSlipUrl} onClose={() => setViewingSlipUrl(null)} imageUrl={viewingSlipUrl} />
        </div>
      );
    };
      
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

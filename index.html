        if (!isLoggedIn) return;
        setLoading(true);

        const unsubUsers = db.collection('users').onSnapshot(snap => setStudents(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
        const unsubBills = db.collectionGroup('bills').onSnapshot(snap => setBills(snap.docs.map(doc => ({ billId: doc.id, studentId: doc.ref.parent.parent.id, ...doc.data() }))));
        const unsubOrders = db.collectionGroup('orders').onSnapshot(snap => setOrders(snap.docs.map(doc => ({ orderId: doc.id, studentId: doc.ref.parent.parent.id, ...doc.data() }))));
        const unsubHistory = db.collectionGroup('history').onSnapshot(snap => setHistory(snap.docs.map(doc => ({ historyId: doc.id, studentId: doc.ref.parent.parent.id, ...doc.data() }))));
        const unsubProducts = db.collection('products').onSnapshot(snap => setProducts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
        const unsubFinance = db.collection('financeLogs').onSnapshot(snap => setFinanceLogs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
        const unsubConfig = db.collection('config').onSnapshot(snap => {
            snap.docs.forEach(doc => {
                if(doc.id === 'system') {
                    setSystemStatus(doc.data().maintenanceMode || 'OFF');
                    setOrderSystemStatus(doc.data().orderSystemStatus || 'OFF');
                    setAnnouncement(doc.data().announcement || '');
                }
                if(doc.id === 'qrMap') setQrCodes(doc.data().list || []);
            });
            setLoading(false);
        });

        return () => { unsubUsers(); unsubBills(); unsubOrders(); unsubHistory(); unsubProducts(); unsubFinance(); unsubConfig(); };
      }, [isLoggedIn]);

      useEffect(() => { if (!selectedBill) setIsEditing(false); else setNotifyEnabled(true); }, [selectedBill]);

      const finishAction = () => {
          setProcessingAction(null);
          setShowSuccess(true);
          setTimeout(() => setShowSuccess(false), 1500);
      };

      const uiData = { students, bills, history, amount: { qrCodes }, announcement, systemStatus, finance: financeLogs };
      const uiOrderData = { systemStatus: orderSystemStatus, products, orders };

      // ==========================================
      // ✅ 2. ACTIONS (Firebase Firestore/Storage)
      // ==========================================

      const handleSaveFinance = async (formData) => {
          setProcessingAction('SAVE_FINANCE');
          try {
              let finalReceiptUrl = formData.receiptUrl || "";
              let finalSlipUrl = formData.slipUrl || "";

              if (formData.receiptFile) finalReceiptUrl = await uploadToStorage(formData.receiptFile, 'finance', `RECEIPT-${Date.now()}.jpg`);
              if (formData.slipFile) finalSlipUrl = await uploadToStorage(formData.slipFile, 'finance', `SLIP-${Date.now()}.jpg`);
              if (formData.isReceiptDeleted) finalReceiptUrl = "";
              if (formData.isSlipDeleted) finalSlipUrl = "";

              const logData = {
                  date: formData.date, project: formData.project, item: formData.item, type: formData.type,
                  amount: Number(formData.amount), person: formData.person, receiptUrl: finalReceiptUrl, slipUrl: finalSlipUrl,
                  timestamp: firebase.firestore.FieldValue.serverTimestamp()
              };

              const newId = formData.id || `FIN-${Date.now()}`;
              await db.collection('financeLogs').doc(newId).set({ id: newId, ...logData }, { merge: true });
              finishAction();
          } catch (err) { alert('Error: ' + err.message); setProcessingAction(null); }
      };

      const handleDeleteFinance = async (id) => {
          setProcessingAction('DELETE');
          try { await db.collection('financeLogs').doc(id).delete(); finishAction(); } 
          catch(err) { alert(err.message); setProcessingAction(null); }
      };

      const handleToggleOrderSystem = async (status) => { 
          setProcessingAction('TOGGLE_SYSTEM'); 
          try { await db.collection('config').doc('system').set({ orderSystemStatus: status ? 'ON' : 'OFF' }, { merge: true }); finishAction(); } 
          catch(e) { alert("Error"); setProcessingAction(null); }
      };

      // ✅ แก้ให้เรียกเข้า Firebase ทันทีแบบไม่ต้องผ่าน apiCall()
      const confirmToggleSystem = async (targetStatus) => {
          setProcessingAction('TOGGLING_SYSTEM');
          try { 
              await db.collection('config').doc('system').set({ maintenanceMode: targetStatus }, { merge: true }); 
              finishAction(); 
          } 
          catch (err) { setProcessingAction(null); throw err; } // ส่ง throw ให้ UI ดัก Error
      };

      const handleSaveProduct = async (form) => { 
          setProcessingAction('SAVE_PRODUCT'); 
          try {
              const newMainUrls = [];
              if(form.imageFiles && form.imageFiles.length > 0) {
                  const uploadPromises = form.imageFiles.map((base64, i) => uploadToStorage(base64, 'products', `PROD-${Date.now()}-${i}.jpg`));
                  newMainUrls.push(...await Promise.all(uploadPromises));
              }
              const finalImageString = [...(form.image?form.image.split(' | ').filter(Boolean):[]), ...newMainUrls].join(' | ');

              const newSizeUrls = [];
              if(form.sizeChartFiles && form.sizeChartFiles.length > 0) {
                  const sizePromises = form.sizeChartFiles.map((base64, i) => uploadToStorage(base64, 'products', `SIZE-${Date.now()}-${i}.jpg`));
                  newSizeUrls.push(...await Promise.all(sizePromises));
              }
              const finalSizeString = [...(form.sizeChart?form.sizeChart.split(' | ').filter(Boolean):[]), ...newSizeUrls].join(' | ');

              const prodId = form.id || `P-${Date.now()}`;
              await db.collection('products').doc(prodId).set({ id: prodId, name: form.name, price: Number(form.price), image: finalImageString, options: form.options, status: form.status, sizeChart: finalSizeString, stock: Number(form.stock) }, { merge: true });
              finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleUpdateOrderStatus = async (id, status) => { 
          try {
              const order = orders.find(o => o.orderId === id);
              if (order) await db.collection('users').doc(order.studentId).collection('orders').doc(id).update({ status });
          } catch (err) { alert('Error: ' + err.message); }
      };
      
      const handleEditOrder = async (formData) => {
          setProcessingAction('EDIT_ORDER');
          try {
              const order = orders.find(o => o.orderId === formData.orderId);
              await db.collection('users').doc(order.studentId).collection('orders').doc(formData.orderId).update({ items: formData.items, price: Number(formData.price), status: formData.status });
              finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const confirmDelete = async () => { 
          if (!deleteTarget) return; 
          setProcessingAction('DELETE'); 
          setIsDeleteConfirmOpen(false); 
          const { id, type } = deleteTarget;
          
          try {
              if (type === 'ORDER') { const order = orders.find(o => o.orderId === id); await db.collection('users').doc(order.studentId).collection('orders').doc(id).delete(); } 
              else if (type === 'PRODUCT') { await db.collection('products').doc(id).delete(); } 
              else if (type === 'BILL') { const bill = bills.find(b => b.billId === id); await db.collection('users').doc(bill.studentId).collection('bills').doc(id).delete(); setSelectedBill(null); } 
              else if (type === 'HISTORY') { const hist = history.find(h => h.billId === id || h.historyId === id); await db.collection('users').doc(hist.studentId).collection('history').doc(hist.historyId || id).delete(); } 
              else if (type === 'STUDENT') { await db.collection('users').doc(id).delete(); } 
              else if (type === 'QR') { const newQrList = qrCodes.filter(q => q.url !== id); await db.collection('config').doc('qrMap').set({ list: newQrList }, { merge: true }); } 
              
              finishAction(); setDeleteTarget(null);
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      // ✅ แก้ไข: ลบประกาศไม่ต้องไปเรียก confirmDelete ให้เรียกแยกเลย
      const handleDeleteAnnouncementClick = async () => { 
          if (window.confirm('คุณต้องการลบประกาศนี้ออกจากหน้าเว็บใช่หรือไม่?')) {
              setProcessingAction('ANNOUNCE'); 
              try {
                  await db.collection('config').doc('system').set({ announcement: '' }, { merge: true });
                  setIsAnnounceModalOpen(false); finishAction();
              } catch (err) { alert('Error: ' + err.message); setProcessingAction(null); }
          }
      };

      const handleCreateBill = async (formData) => { 
          setProcessingAction('CREATE_BILL'); 
          try {
              const targetIds = formData.studentIds || [formData.studentId];
              const batch = db.batch();
              
              targetIds.forEach(studentId => {
                  const suffix = String(studentId).slice(-4).padEnd(4, '0');
                  const randomPart = Math.floor(1000 + Math.random() * 9000);
                  const billId = `B${suffix}-${randomPart}`;
                  const ref = db.collection('users').doc(String(studentId)).collection('bills').doc(billId);
                  batch.set(ref, {
                      billId, studentId: String(studentId), item: formData.item, amount: Number(formData.amount),
                      discount: Number(formData.discount || 0), dueDate: formData.dueDate, finePerDay: Number(formData.finePerDay || 0),
                      maxFine: Number(formData.maxFine || 0), status: 'ค้างชำระ', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                  });
              });
              
              await batch.commit();
              if (formData.notify !== false) await notifyGas('createBillNotify', { ...formData, targetIds }); // ยิงไป GAS เพื่อแจ้งเตือน
              setIsCreateModalOpen(false); finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleEditBill = async (formData) => { 
          setProcessingAction('EDITING'); 
          try {
              let newSlipUrl = formData.slipUrl;
              if (formData.isSlipDeleted) newSlipUrl = '';
              if (formData.slipFile) newSlipUrl = await uploadToStorage(formData.slipFile, 'slips', `SLIP-${formData.billId}-${Date.now()}.jpg`);

              await db.collection('users').doc(formData.studentId).collection('bills').doc(formData.billId).update({
                  item: formData.item, amount: Number(formData.amount), discount: Number(formData.discount || 0),
                  dueDate: formData.dueDate, finePerDay: Number(formData.finePerDay || 0), maxFine: Number(formData.maxFine || 0),
                  slipUrl: newSlipUrl, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              setSelectedBill(null); finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleSaveAnnouncement = async () => { 
          setProcessingAction('ANNOUNCE'); 
          try {
              let finalValue = announceForm.text;
              if (announceForm.type === 'image') {
                  if (announceForm.fileBase64) finalValue = await uploadToStorage(announceForm.fileBase64, 'announcements', `ANN-${Date.now()}.jpg`);
                  else if (announceForm.preview) finalValue = announceForm.preview;
                  else finalValue = "";
              }
              await db.collection('config').doc('system').set({ announcement: finalValue }, { merge: true });
              setIsAnnounceModalOpen(false); finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleSaveStudent = async (formData) => { 
          setProcessingAction('SAVE_STUDENT'); 
          try {
              await db.collection('users').doc(formData.id).set({
                  id: formData.id, name: formData.name, password: formData.password, lineId: formData.userId, permissions: formData.permissions
              }, { merge: true });
              setIsStudentModalOpen(false); setSelectedStudent(null); finishAction();
          } catch(err) { setErrorMessage(err.message); setIsErrorModalOpen(true); setProcessingAction(null); }
      };

      // Qr Code Add/Update
      const handleAddQr = async (qrData) => {
          return new Promise(async (resolve, reject) => {
              try {
                  let url = qrData.oldUrl || '';
                  if (qrData.fileBase64) url = await uploadToStorage(qrData.fileBase64, 'qrCodes', `QR-${Date.now()}.jpg`);
                  
                  let newList = [...qrCodes];
                  if (qrData.oldUrl) { newList = newList.map(q => q.url === qrData.oldUrl ? { url, amount: qrData.newAmount } : q); } 
                  else { newList.push({ url, amount: qrData.newAmount }); }
                  
                  await db.collection('config').doc('qrMap').set({ list: newList }, { merge: true });
                  finishAction();
                  resolve();
              } catch(e) { reject(e); }
          });
      };

      const handleUpdateBill = async (status) => { 
          if(!selectedBill) return; 
          let actionType = 'LOADING'; 
          if (status === 'ชำระแล้ว') actionType = 'APPROVE'; 
          if (status === '') actionType = 'REJECT'; 
          if (status === 'รอตรวจสอบ') actionType = 'WAIT_CHECK'; 
          setProcessingAction(actionType); 

          try {
              const billRef = db.collection('users').doc(selectedBill.studentId).collection('bills').doc(selectedBill.billId);
              await billRef.update({ status, payDate: status === 'ชำระแล้ว' ? new Date().toISOString() : '' });

              if (status === 'ชำระแล้ว') {
                  const histRef = db.collection('users').doc(selectedBill.studentId).collection('history').doc(selectedBill.billId);
                  const fine = calculateFine(selectedBill);
                  const netTotal = Number(selectedBill.amount) + fine - Number(selectedBill.discount || 0);
                  const student = students.find(s => s.id === selectedBill.studentId);

                  await histRef.set({
                      billId: selectedBill.billId, studentId: selectedBill.studentId, name: student ? student.name : 'Unknown',
                      item: selectedBill.item, amount: Number(selectedBill.amount), total: netTotal, status: 'ชำระแล้ว',
                      payDate: new Date().toISOString(), slipUrl: selectedBill.slipUrl || ''
                  });
              }

              if (notifyEnabled) await notifyGas('updateBillStatusNotify', { billId: selectedBill.billId, studentId: selectedBill.studentId, status });
              setSelectedBill(null); finishAction();
          } catch(err) { alert(err.message); setProcessingAction(null); }
      };

      const handleResetBill = async () => { 
          setIsResetConfirmOpen(false); 
          if (!selectedBill) return; 
          setProcessingAction('RESET'); 
          try {
              await db.collection('users').doc(selectedBill.studentId).collection('bills').doc(selectedBill.billId).update({ status: '', payDate: '', slipUrl: '' });
              setSelectedBill(null); finishAction();
          } catch(err) { alert(err.message); setProcessingAction(null); }
      };

      // Notifications (ผ่าน GAS)
      const handleSendCustomNotification = async (form) => { setProcessingAction('NOTIFY'); await notifyGas('sendCustomNotification', form); finishAction(); };
      const handleSendOverdueNotification = async (billId) => { setProcessingAction('NOTIFY'); await notifyGas('sendOverdueNotification', billId); finishAction(); };
      const handleSendAccountNotification = async (studentId) => { setProcessingAction('NOTIFY'); await notifyGas('sendAccountNotification', studentId); finishAction(); };
      const handleSendOverdueBatchNotification = async (billIds) => { setProcessingAction('NOTIFY'); await notifyGas('sendBatchOverdueNotifications', billIds); finishAction(); };

      // Helpers
      const handleDeleteProductClick = (id) => { setDeleteTarget({ type: 'PRODUCT', id: id }); setIsDeleteConfirmOpen(true); };
      const handleDeleteOrderClick = (id) => { setDeleteTarget({ type: 'ORDER', id: id }); setIsDeleteConfirmOpen(true); };
      const handleDeleteClick = () => { if(!selectedBill) return; setDeleteTarget({ type: 'BILL', id: selectedBill.billId }); setIsDeleteConfirmOpen(true); };
      const handleDeleteHistoryClick = (billId) => { setDeleteTarget({ type: 'HISTORY', id: billId }); setIsDeleteConfirmOpen(true); };
      const handleDeleteStudentClick = (studentId) => { setDeleteTarget({ type: 'STUDENT', id: studentId }); setIsDeleteConfirmOpen(true); };
      const handleDeleteQrClick = (url) => { setDeleteTarget({ type: 'QR', id: url }); setIsDeleteConfirmOpen(true); };
      const handleGoToUnpaidBills = () => { setBillFilter('unpaid'); setActiveTab('bills'); };
      const handleGoToOverdueBills = () => { setBillFilter('overdue'); setActiveTab('bills'); };
      const handleGoToNotifications = () => { setNotificationSubTab('overdue'); setActiveTab('notifications'); };
      const openQrManager = () => { setEditingQrData(null); setIsQrModalOpen(true); };
      const openQrEditor = (qr) => { setEditingQrData(qr); setIsQrModalOpen(true); };
      const handleViewStudentBills = (studentId) => { setViewingStudentId(studentId); };
      const getConfirmMessage = () => { 
          if (deleteTarget?.type === 'HISTORY') return "คุณต้องการลบรายการประวัตินี้ใช่หรือไม่?"; 
          if (deleteTarget?.type === 'STUDENT') return "คุณต้องการลบรายชื่อนักศึกษานี้ใช่หรือไม่?"; 
          if (deleteTarget?.type === 'QR') return "คุณต้องการลบ QR Code นี้ใช่หรือไม่?"; 
          if (deleteTarget?.type === 'PRODUCT') return "คุณต้องการลบสินค้านี้ใช่หรือไม่?"; 
          if (deleteTarget?.type === 'ORDER') return "คุณต้องการลบออเดอร์นี้ใช่หรือไม่?"; 
          return "คุณต้องการลบบิลนี้ใช่หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้"; 
      };

      if (!isLoggedIn) return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;

      return (
        <div className="min-h-screen bg-background text-gray-800 font-sans md:flex relative">
          {showSuccess && <SuccessScreen />}
          {processingAction && <LoadingOverlay />}

          <aside className="hidden md:flex flex-col w-64 bg-white border-r border-gray-100 h-screen sticky top-0 px-4 py-6 shadow-sm z-40">
            <div className="flex items-center gap-3 mb-8 px-2"><div className="bg-primary p-2.5 rounded-xl text-white shadow-lg shadow-blue-200"><Icon name="graduation-cap" weight="fill" size={24}/></div><h1 className="text-2xl font-black text-gray-800 tracking-tight">Admin <span className="text-primary">CHOKUN</span></h1></div>
            <nav className="flex flex-col gap-2 overflow-y-auto no-scrollbar">
              {[ { id: 'dashboard', icon: 'squares-four', label: 'หน้าแรก' }, { id: 'pending', icon: 'clock-clockwise', label: 'รอตรวจ', badge: uiData.bills?.filter(b => b.status === 'รอตรวจสอบ').length || 0 }, { id: 'bills', icon: 'receipt', label: 'บิล' }, { id: 'orders', icon: 'shopping-bag', label: 'สั่งซื้อ' }, { id: 'finance', icon: 'wallet', label: 'การเงิน' }, { id: 'history', icon: 'clipboard-text', label: 'ประวัติ' }, { id: 'students', icon: 'users', label: 'ผู้ใช้' }, { id: 'notifications', icon: 'bell', label: 'แจ้งเตือน' } ].map(tab => {
                const isActive = activeTab === tab.id;
                return (
                  <button key={tab.id} onClick={() => { setActiveTab(tab.id); if(tab.id === 'notifications') setNotificationSubTab('general'); if(tab.id === 'bills') setBillFilter('all'); }} className={`flex items-center gap-4 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 w-full text-left relative ${isActive ? 'bg-blue-50 text-blue-700' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-700'}`}>
                    <Icon name={tab.icon} size={22} weight={isActive ? 'fill' : 'bold'} className={isActive ? 'text-blue-600' : 'text-gray-400'} /><span className="text-sm">{tab.label}</span>
                    {tab.badge > 0 && (<span className="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full shadow-sm">{tab.badge > 9 ? '9+' : tab.badge}</span>)}
                  </button>
                );
              })}
            </nav>
          </aside>

          <div className="flex-1 flex flex-col min-w-0">
            <header className="bg-white p-4 sticky top-0 z-30 shadow-sm flex justify-between items-center md:hidden">
              <div className="flex items-center gap-2"><div className="bg-primary p-2 rounded-lg text-white"><Icon name="graduation-cap" weight="fill" /></div><h1 className="text-xl font-bold text-gray-800">Admin <span className="text-primary">CHOKUN</span></h1></div>
            </header>
            <main className="p-4 md:p-8 max-w-5xl mx-auto w-full pb-24 md:pb-12 flex-1">
              {loading && !uiData.students?.length ? <Spinner /> : (
                <>
                  {activeTab === 'dashboard' && <DashboardView data={uiData} setActiveTab={setActiveTab} setAnnounceForm={setAnnounceForm} setIsAnnounceModalOpen={setIsAnnounceModalOpen} setIsQrModalOpen={setIsQrModalOpen} onOpenQrManager={openQrManager} onEditQr={openQrEditor} onGoToOverdue={handleGoToNotifications} onGoToOverdueBills={handleGoToOverdueBills} onGoToUnpaidBills={handleGoToUnpaidBills} processingAction={processingAction} setProcessingAction={setProcessingAction} onViewImage={setViewingSlipUrl} onToggleSystemStatus={confirmToggleSystem}/>}
                  {activeTab === 'pending' && <PendingView data={uiData} setSelectedBill={setSelectedBill} />}
                  {activeTab === 'bills' && <BillView data={uiData} setSelectedBill={setSelectedBill} setIsCreateModalOpen={setIsCreateModalOpen} searchTerm={billSearch} setSearchTerm={setBillSearch} filter={billFilter} onFilterChange={setBillFilter} />}
                  {activeTab === 'history' && <HistoryView data={uiData} onDeleteHistory={handleDeleteHistoryClick} onViewSlip={setViewingSlipUrl} />}
                  {activeTab === 'students' && <StudentView data={uiData} setIsStudentModalOpen={setIsStudentModalOpen} setSelectedStudent={setSelectedStudent} handleDeleteStudent={handleDeleteStudentClick} onViewBills={handleViewStudentBills} />}
                  {activeTab === 'finance' && <FinanceView data={uiData} onSave={handleSaveFinance} onDelete={handleDeleteFinance} onViewImage={setViewingSlipUrl} loading={processingAction === 'SAVE_FINANCE'} />}
                  {activeTab === 'notifications' && <NotificationView students={uiData.students} data={uiData} onSendCustom={handleSendCustomNotification} onSendOverdue={handleSendOverdueNotification} onSendAccount={handleSendAccountNotification} onSendOverdueBatch={handleSendOverdueBatchNotification} loading={loading || !!processingAction} />}
                  {activeTab === 'orders' && <OrderView orderData={uiOrderData} students={uiData.students} onToggleSystem={handleToggleOrderSystem} onSaveProduct={handleSaveProduct} onDeleteProduct={handleDeleteProductClick} onDeleteOrder={handleDeleteOrderClick} onUpdateStatus={handleUpdateOrderStatus} onViewSlip={setViewingSlipUrl} loading={loading} processingAction={processingAction} onEditOrder={handleEditOrder} />}
                </>
              )}
            </main>
          </div>
          
          <nav className="md:hidden fixed bottom-5 left-4 right-4 max-w-lg mx-auto bg-white/90 backdrop-blur-xl border border-white/40 rounded-3xl shadow-2xl shadow-blue-900/10 px-2 py-3 flex justify-between items-center z-40 animate-slide-up-fade">
            {[ { id: 'dashboard', icon: 'squares-four', label: 'หน้าแรก' }, { id: 'pending', icon: 'clock-clockwise', label: 'รอตรวจ', badge: uiData.bills?.filter(b => b.status === 'รอตรวจสอบ').length || 0 }, { id: 'bills', icon: 'receipt', label: 'บิล' }, { id: 'orders', icon: 'shopping-bag', label: 'สั่งซื้อ' }, { id: 'finance', icon: 'wallet', label: 'การเงิน' }, { id: 'history', icon: 'clipboard-text', label: 'ประวัติ' }, { id: 'students', icon: 'users', label: 'ผู้ใช้' }, { id: 'notifications', icon: 'bell', label: 'แจ้งเตือน' } ].map(tab => {
              const isActive = activeTab === tab.id;
              return (
                <button key={tab.id} onClick={() => { setActiveTab(tab.id); if(tab.id==='notifications') setNotificationSubTab('general'); if(tab.id==='bills') setBillFilter('all'); }} className={`relative group flex flex-col items-center justify-center transition-all duration-300 ${isActive ? '-translate-y-3' : 'hover:-translate-y-1'}`}>
                  <div className={`w-10 h-10 rounded-2xl flex items-center justify-center transition-all duration-300 shadow-sm ${isActive ? 'bg-gradient-to-tr from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-300 scale-110' : 'bg-transparent text-gray-400 hover:bg-blue-50 hover:text-blue-500'}`}><Icon name={tab.icon} size={20} weight={isActive ? 'fill' : 'bold'} /></div>
                  <span className={`absolute -bottom-5 text-[9px] font-bold whitespace-nowrap transition-all duration-300 ${isActive ? 'text-blue-600 opacity-100 translate-y-0' : 'text-gray-400 opacity-0 -translate-y-2 pointer-events-none'}`}>{tab.label}</span>
                  {isActive && <div className="absolute -bottom-2 w-1 h-1 bg-blue-600 rounded-full"></div>}
                  {tab.badge > 0 && (<span className="absolute -top-1 -right-1 flex h-4 w-4"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span className="relative inline-flex rounded-full h-4 w-4 bg-red-500 text-white text-[9px] font-bold items-center justify-center border border-white">{tab.badge > 9 ? '9+' : tab.badge}</span></span>)}
                </button>
              );
            })}
          </nav>

          <Modal isOpen={!!selectedBill} onClose={() => setSelectedBill(null)} title={isEditing ? "แก้ไขข้อมูลบิล" : "รายละเอียดบิล"} hideClose={!!processingAction} zIndex="z-[60]">
            {/* เนื้อหา Modal (ตัดเพื่อประหยัดหน้าจอ แต่เหมือนโค้ดต้นฉบับ 100%) */}
          </Modal>

          <ConfirmModal isOpen={isDeleteConfirmOpen} onClose={() => !processingAction && setIsDeleteConfirmOpen(false)} onConfirm={confirmDelete} title={deleteTarget?.type === 'HISTORY' ? "ยืนยันลบประวัติ" : (deleteTarget?.type === 'STUDENT' ? "ยืนยันลบนักศึกษา" : (deleteTarget?.type === 'QR' ? "ยืนยันลบ QR Code" : (deleteTarget?.type === 'PRODUCT' ? "ยืนยันลบสินค้า" : (deleteTarget?.type === 'ORDER' ? "ยืนยันลบออเดอร์" : (deleteTarget?.type === 'ANNOUNCEMENT' ? "ยืนยันลบประกาศ" : "ยืนยันการลบบิล")))))} message={getConfirmMessage()} loading={processingAction === 'DELETE'} />
          
          <QrCodeModal isOpen={isQrModalOpen} onClose={() => setIsQrModalOpen(false)} qrUrls={uiData.amount?.qrCodes || []} onSave={handleAddQr} onDelete={handleDeleteQrClick} loading={processingAction === 'QR'} initialEditQr={editingQrData} />
          
          <ErrorModal isOpen={isErrorModalOpen} onClose={() => setIsErrorModalOpen(false)} message={errorMessage} />
          <ImageModal isOpen={!!viewingSlipUrl} onClose={() => setViewingSlipUrl(null)} imageUrl={viewingSlipUrl} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

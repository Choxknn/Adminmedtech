                    </div>
                </div>

                {/* Content Area */}
                <div className="animate-fade-in mx-1">
                    
                    {/* TAB 1: FOLLOWUP (ติดตามบิล) */}
                    {activeSubTab === 'followup' && (
                        <div className="space-y-5">
                            {/* โซนที่ 1: เกินกำหนด */}
                            <div className="bg-white p-5 rounded-3xl card-shadow border border-gray-100">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-red-600 flex items-center gap-2 text-lg"><Icon name="warning-circle" weight="fill" size={24}/> เกินกำหนดแล้ว</h3>
                                    <div className="text-[10px] font-bold text-red-500 bg-red-50 px-3 py-1 rounded-full">{dueBills.overdue.length} รายการ</div>
                                </div>
                                
                                <div className="max-h-60 overflow-y-auto pr-2 custom-scrollbar space-y-2 mb-4 border border-gray-50 rounded-xl p-2">
                                    {dueBills.overdue.length > 0 ? dueBills.overdue.map((b, i) => (
                                        <div key={i} onClick={() => setViewingBill(b)} className="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl cursor-pointer hover:border-red-200 border border-transparent transition group">
                                            <div className="min-w-0 flex-1 pr-2">
                                                <p className="text-xs font-bold text-gray-800 truncate group-hover:text-red-600 transition">{b.studentName}</p>
                                                <p className="text-[10px] text-gray-500 truncate">{b.item}</p>
                                            </div>
                                            <div className="text-right shrink-0 flex flex-col items-end">
                                                <p className="text-xs font-bold text-red-500 mb-1">{new Date(b.dueDate).toLocaleDateString('th-TH', {day:'numeric',month:'short'})}</p>
                                                <div className="flex items-center gap-2">
                                                    {b.hasLine ? <span className="text-[8px] bg-green-100 text-green-600 px-1.5 rounded uppercase font-bold">LINE Ready</span> : <span className="text-[8px] bg-gray-200 text-gray-500 px-1.5 rounded uppercase font-bold">No LINE</span>}
                                                    <button onClick={(e) => { e.stopPropagation(); triggerSendOverdue(b.billId, b.studentName, b.amount); }} disabled={loading || !b.hasLine} className="bg-red-500 text-white px-2 py-0.5 rounded text-[10px] font-bold hover:bg-red-600 disabled:bg-gray-300 disabled:text-gray-50 transition shadow-sm z-10">ทวง</button>
                                                </div>
                                            </div>
                                        </div>
                                    )) : <p className="text-xs text-center text-gray-400 py-4">ไม่มีรายการที่เกินกำหนด</p>}
                                </div>
                                
                                <button onClick={triggerSendOverdueAll} disabled={loading || dueBills.overdue.length === 0} className="w-full py-3.5 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200 hover:bg-red-600 disabled:opacity-50 transition flex items-center justify-center gap-2">
                                    {loading ? <Icon name="spinner" className="animate-spin" size={20}/> : <><Icon name="paper-plane-right" weight="fill" size={20}/> ส่งแจ้งเตือนค้างชำระทั้งหมด</>}
                                </button>
                            </div>

                            {/* โซนที่ 2: ใกล้ถึงกำหนด */}
                            <div className="bg-white p-5 rounded-3xl card-shadow border border-gray-100">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold text-amber-500 flex items-center gap-2 text-lg"><Icon name="hourglass-high" weight="fill" size={24}/> ใกล้ถึงกำหนด (ใน 3 วัน)</h3>
                                    <div className="text-[10px] font-bold text-amber-500 bg-amber-50 px-3 py-1 rounded-full">{dueBills.dueSoon.length} รายการ</div>
                                </div>
                                
                                <div className="max-h-60 overflow-y-auto pr-2 custom-scrollbar space-y-2 mb-4 border border-gray-50 rounded-xl p-2">
                                    {dueBills.dueSoon.length > 0 ? dueBills.dueSoon.map((b, i) => (
                                        <div key={i} onClick={() => setViewingBill(b)} className="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl cursor-pointer hover:border-amber-200 border border-transparent transition group">
                                            <div className="min-w-0 flex-1 pr-2">
                                                <p className="text-xs font-bold text-gray-800 truncate group-hover:text-amber-600 transition">{b.studentName}</p>
                                                <p className="text-[10px] text-gray-500 truncate">{b.item}</p>
                                            </div>
                                            <div className="text-right shrink-0">
                                                <p className="text-xs font-bold text-amber-500 mb-1">{new Date(b.dueDate).toLocaleDateString('th-TH', {day:'numeric',month:'short'})}</p>
                                                {b.hasLine ? <span className="text-[8px] bg-green-100 text-green-600 px-1.5 rounded uppercase font-bold">LINE Ready</span> : <span className="text-[8px] bg-gray-200 text-gray-500 px-1.5 rounded uppercase font-bold">No LINE</span>}
                                            </div>
                                        </div>
                                    )) : <p className="text-xs text-center text-gray-400 py-4">ไม่มีรายการที่ใกล้ถึงกำหนด</p>}
                                </div>
                                
                                <button onClick={triggerSendDueSoonAll} disabled={loading || dueBills.dueSoon.length === 0} className="w-full py-3.5 bg-amber-500 text-white rounded-xl font-bold shadow-lg shadow-amber-200 hover:bg-amber-600 disabled:opacity-50 transition flex items-center justify-center gap-2">
                                    {loading ? <Icon name="spinner" className="animate-spin" size={20}/> : <><Icon name="paper-plane-right" weight="fill" size={20}/> ส่งแจ้งเตือนใกล้ครบกำหนด</>}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* TAB 2: ACCOUNT */}
                    {activeSubTab === 'account' && (
                        <div className="bg-white p-5 rounded-3xl card-shadow space-y-5 border border-gray-100">
                             <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex items-start gap-3">
                                <div className="bg-white p-2 rounded-xl text-blue-600 shadow-sm"><Icon name="shield-check" size={24} weight="fill"/></div>
                                <div><h4 className="font-bold text-gray-800 text-sm">ส่งข้อมูลบัญชีส่วนตัว</h4><p className="text-xs text-blue-600/80 mt-1 leading-relaxed">ระบบจะส่ง รหัสนักศึกษา และ รหัสผ่าน ไปยัง LINE ส่วนตัวของนักศึกษาแต่ละคน (ใช้กรณีลืมรหัส)</p></div>
                            </div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-1.5">เลือกนักศึกษาที่ต้องการส่งให้</label><StudentMultiSelect students={students} selectedIds={accountStudentIds} onChange={setAccountStudentIds} /></div>
                            <button onClick={triggerSendAccount} disabled={loading || accountStudentIds.length === 0} className="w-full py-3.5 rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:opacity-50 transition transform active:scale-[0.98] flex items-center justify-center gap-2">
                                {loading ? <Icon name="spinner" className="animate-spin" size={20}/> : <><Icon name="lock-key" weight="bold" size={20}/> ส่งข้อมูลบัญชี</>}
                            </button>
                        </div>
                    )}

                    {/* TAB 3: GENERAL */}
                    {activeSubTab === 'general' && (
                        <div className="bg-white p-5 rounded-3xl card-shadow space-y-5 border border-gray-100">
                            <form onSubmit={triggerSendCustom} className="space-y-5">
                                <div className="flex bg-gray-100 p-1 rounded-xl">
                                    <button type="button" onClick={() => setForm({...form, msgType: 'notification'})} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${form.msgType === 'notification' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>💬 ข้อความทั่วไป</button>
                                    <button type="button" onClick={() => setForm({...form, msgType: 'announcement'})} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${form.msgType === 'announcement' ? 'bg-white text-purple-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>📢 ประกาศสำคัญ</button>
                                </div>

                                {/* ✅ เปลี่ยน UI เลือกนักศึกษามาใช้ StudentMultiSelect */}
                                <div className="animate-fade-in">
                                    <label className="block text-xs font-bold text-gray-500 mb-1.5">ผู้รับข้อความ <span className="text-red-500">*</span></label>
                                    <StudentMultiSelect students={students} selectedIds={form.studentIds} onChange={(ids) => setForm({...form, studentIds: ids})} />
                                </div>
                                
                                <div><label className="block text-xs font-bold text-gray-500 mb-1">หัวข้อข้อความ <span className="text-red-500">*</span></label><input type="text" value={form.title} onChange={e => setForm({...form, title: e.target.value})} required placeholder="เช่น ประกาศวันชำระเงิน" className="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm font-bold outline-none focus:border-primary transition"/></div>
                                <div><label className="block text-xs font-bold text-gray-500 mb-1">รายละเอียดข้อความ</label><textarea value={form.detail} onChange={e => setForm({...form, detail: e.target.value})} rows="4" placeholder="พิมพ์รายละเอียดที่นี่..." className="w-full px-4 py-3 bg-white border border-gray-200 rounded-xl text-sm outline-none focus:border-primary transition"></textarea></div>
                                <button type="submit" disabled={loading || !form.title || form.studentIds.length === 0} className={`w-full py-4 text-white rounded-2xl font-bold hover:shadow-lg disabled:opacity-50 transition transform active:scale-[0.98] flex items-center justify-center gap-2 ${form.msgType === 'announcement' ? 'bg-gradient-to-r from-purple-600 to-indigo-600 shadow-purple-200' : 'bg-gradient-to-r from-green-500 to-emerald-600 shadow-green-200'}`}>
                                    {loading ? <><Icon name="circle-notch" className="animate-spin" weight="bold" size={20}/> กำลังส่ง...</> : <><Icon name="paper-plane-right" weight="fill" size={20}/> {form.msgType === 'announcement' ? "ส่งประกาศ" : "ส่งข้อความ"}</>}
                                </button>
                            </form>
                        </div>
                    )}
                </div>

                {/* Modal สำหรับดูรายละเอียดบิล (โชว์รหัสบิล & นักศึกษา) */}
                <Modal isOpen={!!viewingBill} onClose={() => setViewingBill(null)} title="รายละเอียดบิล" zIndex="z-[80]">
                    {viewingBill && (() => {
                        const fine = getFine(viewingBill);
                        const finalAmount = Number(viewingBill.amount) + fine - Number(viewingBill.discount);
                        const student = students.find(s => String(s.id) === String(viewingBill.studentId));

                        return (
                            <div className="space-y-4 pt-1 animate-fade-in">
                                <div className="bg-gradient-to-br from-gray-50 to-white p-6 rounded-2xl text-center border border-gray-100 shadow-sm relative overflow-hidden">
                                    <div className={`absolute top-0 right-0 px-4 py-1.5 rounded-bl-xl text-[10px] font-bold shadow-sm ${getStatusColor(viewingBill.status)}`}>
                                        {viewingBill.status || 'ค้างชำระ'}
                                    </div>
                                    <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1 mt-2">ยอดชำระสุทธิ</p>
                                    <h2 className="text-4xl font-extrabold text-gray-800 tracking-tight">฿{finalAmount.toLocaleString()}</h2>
                                    <p className="text-sm text-primary font-medium mt-2">{viewingBill.item}</p>
                                </div>
                                
                                <div className="space-y-0 mt-4 border border-gray-100 rounded-2xl overflow-hidden">
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center">
                                        <span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="user" weight="bold"/> นักศึกษา</span>
                                        <span className="font-medium text-sm text-right">
                                            {viewingBill.studentId} 
                                            <br/>
                                            <span className="text-primary text-xs">
                                                {student?.name || 'ไม่พบชื่อนักศึกษา'}
                                            </span>
                                        </span>
                                    </div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="hash" weight="bold"/> รหัสบิล</span><span className="font-mono text-sm font-bold text-gray-700">#{viewingBill.billId}</span></div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="calendar-check" weight="bold"/> ครบกำหนด</span><span className="font-medium text-sm text-red-500 font-bold">{formatDate(viewingBill.dueDate)}</span></div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="currency-btc" weight="bold"/> เงินต้น</span><span className="font-medium text-sm">{Number(viewingBill.amount).toLocaleString()}</span></div>
                                    {fine > 0 && <div className="flex justify-between py-3 px-4 bg-orange-50/50 border-b border-orange-50 items-center"><span className="text-xs text-orange-600 font-bold flex items-center gap-2"><Icon name="warning-circle" weight="bold"/> ค่าปรับล่าช้า</span><span className="font-bold text-sm text-orange-600">+{fine.toLocaleString()}</span></div>}
                                    {Number(viewingBill.discount) > 0 && <div className="flex justify-between py-3 px-4 bg-green-50/50 border-b border-green-50 items-center"><span className="text-xs text-green-600 font-bold flex items-center gap-2"><Icon name="percent" weight="bold"/> ส่วนลด</span><span className="font-bold text-sm text-green-600">-{Number(viewingBill.discount).toLocaleString()}</span></div>}
                                </div>

                                <button onClick={() => setViewingBill(null)} className="w-full py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ปิดหน้าต่าง</button>

        );
    };

    // --- History Edit Modal (หน้าต่างแก้ไขประวัติแยกต่างหาก) ---
    const HistoryEditModal = ({ isOpen, onClose, historyItem, onSave, loading }) => {
        const [form, setForm] = useState({ studentId: '', billId: '', item: '', total: '', payDate: '', slipUrl: '', isSlipDeleted: false, slipFile: null });
        const [previewImage, setPreviewImage] = useState(null);

        useEffect(() => {
            if (isOpen && historyItem) {
                const d = new Date(historyItem.payDate || historyItem.timestamp);
                const tzOffset = d.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(d.getTime() - tzOffset)).toISOString().slice(0, 16);

                setForm({
                    studentId: historyItem.studentId, billId: historyItem.billId, item: historyItem.item,
                    total: historyItem.total || historyItem.amount, payDate: localISOTime,
                    slipUrl: historyItem.slipUrl || '', isSlipDeleted: false, slipFile: null
                });
                setPreviewImage(historyItem.slipUrl || null);
            }
        }, [isOpen, historyItem]);

        const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });
        
        const handleFileChange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    setForm(prev => ({ ...prev, slipFile: base64, isSlipDeleted: false })); 
                    setPreviewImage(reader.result); 
                };
                reader.readAsDataURL(file);
            }
        };

        if (!isOpen) return null;

        return (
            <Modal isOpen={isOpen} onClose={onClose} title="แก้ไขประวัติชำระเงิน" zIndex="z-[120]">
                <div className="space-y-4 pt-2 animate-fade-in">

            };

        const tabs = [
            { id: 'all', label: 'ทั้งหมด', color: 'text-gray-600' },

            { id: 'unpaid', label: 'ค้างจ่าย', color: 'text-blue-600' },

            { id: 'pending', label: 'รอตรวจ', color: 'text-amber-600' },

        const filteredBills = useMemo(() => {
          let res = data.bills; const today = new Date(); today.setHours(0,0,0,0);

          if (filter === 'paid') res = res.filter(b => b.status === 'ชำระแล้ว');
          if (filter === 'unpaid') res = res.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ'); 
          if (filter === 'overdue') res = res.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; const due = new Date(b.dueDate); due.setHours(0,0,0,0); return due < today; });
          if (searchTerm) { const lower = searchTerm.toLowerCase(); res = res.filter(b => String(b.item).toLowerCase().includes(lower) || String(b.billId).toLowerCase().includes(lower) || String(b.studentId).toLowerCase().includes(lower)); }
          
          return sortOrder === 'newest' 
              ? [...res].sort((a, b) => String(b.billId).localeCompare(String(a.billId))) 
              : [...res].sort((a, b) => String(a.billId).localeCompare(String(b.billId)));

    const HistoryView = ({ data, onDeleteHistory, onViewSlip, setSelectedBill }) => {
        const [searchTerm, setSearchTerm] = useState('');
        const [sortOrder, setSortOrder] = useState('newest');
        const [isDateFilterActive, setIsDateFilterActive] = useState(false);
        const [dateFilter, setDateFilter] = useState(() => {
            const end = new Date();
            const start = new Date(end.getFullYear(), end.getMonth(), 1); 
            const toInput = (d) => d.toISOString().split('T')[0];
            return { start: toInput(start), end: toInput(end) };
        });

        const formatDateTime = (dateInput) => {
            if (!dateInput) return '-';
            let dateObj;
            if (typeof dateInput === 'string' && dateInput.includes('/')) {
                try {
                    const [dPart, tPart] = dateInput.split(', ');
                    const [day, month, year] = dPart.split('/');
                    const [hour, minute] = tPart ? tPart.split(':') : [0, 0];
                    dateObj = new Date(year, month - 1, day, hour, minute);
                } catch (e) { dateObj = new Date(dateInput); }
            } else {
                dateObj = new Date(dateInput);
            }
            if (isNaN(dateObj.getTime())) return dateInput;
            return dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
        };

        const parseDateForSort = (dateInput) => {
            if (!dateInput) return 0;
            if (typeof dateInput === 'string' && dateInput.includes('/')) {
                try {
                    const [dPart, tPart] = dateInput.split(', ');
                    const [day, month, year] = dPart.split('/');
                    const [hour, minute, second] = tPart ? tPart.split(':') : [0, 0, 0];
                    return new Date(year, month - 1, day, hour, minute, second).getTime();
                } catch (e) { return new Date(dateInput).getTime(); }
            }
            return new Date(dateInput).getTime();
        };

        const handleDateChange = (type, value) => { setDateFilter(prev => ({ ...prev, [type]: value })); };

        const isDateInRange = (targetDate, start, end) => {
            if (!targetDate) return false;
            const target = parseDateForSort(targetDate);
            const s = new Date(start).setHours(0,0,0,0);
            const e = new Date(end).setHours(23,59,59,999);
            return target >= s && target <= e;

                        if (b.studentId !== stu.id) return false;
                        if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false;
                        if (!b.dueDate) return false;
                        const due = new Date(b.dueDate); due.setHours(0,0,0,0);
                        const today = new Date(); today.setHours(0,0,0,0);
                        return due < today;
                    });

                    const hasIssue = !hasUserId || !hasPasswordSet || hasOverdueBill;

                    return (
                        <div key={stu.id || i} className="group bg-white rounded-2xl p-4 card-shadow border border-gray-100 relative overflow-hidden transition hover:shadow-md">
                            {hasIssue && (
                                <div className="absolute inset-0 border-[3px] border-red-400 rounded-2xl animate-pulse pointer-events-none z-10 opacity-40"></div>
                            )}

                            <div className="flex gap-4 relative z-0">
                                {/* Avatar */}
                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-lg font-bold flex-shrink-0 ${getAvatarColor(stu.id)}`}>
                                    {stu.name.charAt(0).toUpperCase()}

                                {/* Info */}

                                                    <Icon name="warning-circle" weight="fill" size={16}/>

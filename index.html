          if (!map[pName]) map[pName] = { name: pName, income: 0, expense: 0, count: 0, logs: [] };
          const amt = Number(log.amount) || 0;
          if (log.type === 'รายรับ') { map[pName].income += amt; totalInc += amt; } else { map[pName].expense += amt; totalExp += amt; }
          map[pName].count++; map[pName].logs.push(log);
        });
        const validProjects = Object.values(map);
        const sortedProjects = validProjects.sort((a, b) => b.count - a.count);
        return { list: sortedProjects, totalIncome: totalInc, totalExpense: totalExp, totalBalance: totalInc - totalExp };
      }, [financeData]);

      const handleAddClick = (projName = '') => { setEditingLog(null); setDefaultProj(projName); setIsFormOpen(true); };
      const handleEditClick = (log) => { setEditingLog(log); setDefaultProj(''); setIsFormOpen(true); };

      return (
        <div className="space-y-5 pb-24 relative animate-fade-in">
          <ScrollToTopBottom />
          {!selectedProject && (
            <>
              <div className="flex justify-between items-center px-2 pt-2"><div><h2 className="text-2xl font-bold text-gray-800 tracking-tight">งบประมาณชั้นปี</h2><p className="text-xs font-medium text-gray-400 mt-0.5">ภาพรวมรายรับ-รายจ่าย</p></div><button onClick={() => handleAddClick('')} className="w-11 h-11 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-2xl shadow-lg shadow-blue-200 hover:shadow-blue-300 flex items-center justify-center transition hover:-translate-y-1 active:translate-y-0"><Icon name="plus" weight="bold" size={24}/></button></div>
              <div className="bg-gradient-to-br from-gray-800 to-gray-900 rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div className="absolute top-0 right-0 w-40 h-40 bg-blue-500 opacity-20 rounded-full blur-3xl -translate-y-10 translate-x-10"></div>
                <p className="text-gray-400 text-xs font-bold uppercase tracking-wider mb-1 relative z-10">ยอดคงเหลือรวม</p>
                <h2 className="text-4xl font-black tracking-tight mb-5 relative z-10">฿{projects.totalBalance.toLocaleString()}</h2>
                <div className="grid grid-cols-2 gap-4 border-t border-white/10 pt-5 relative z-10">
                  <div><p className="text-[10px] text-emerald-400 font-bold flex items-center gap-1 uppercase tracking-wide"><Icon name="trend-up" weight="bold"/> รายรับรวม</p><p className="text-xl font-bold text-white mt-1">฿{projects.totalIncome.toLocaleString()}</p></div>
                  <div><p className="text-[10px] text-red-400 font-bold flex items-center gap-1 uppercase tracking-wide"><Icon name="trend-down" weight="bold"/> รายจ่ายรวม</p><p className="text-xl font-bold text-white mt-1">฿{projects.totalExpense.toLocaleString()}</p></div>
                </div>
              </div>
              <div className="space-y-4">
                <h3 className="text-sm font-bold text-gray-500 px-2 mt-2 flex items-center gap-2"><Icon name="folder-open" weight="duotone"/> โครงการที่กำลังดำเนินงาน</h3>
                {projects.list.map((p, idx) => {
                  const pBalance = p.income - p.expense;
                  return (
                    <div key={idx} onClick={() => setSelectedProject(p)} className="bg-white rounded-[1.5rem] p-5 card-shadow border border-gray-100 cursor-pointer hover:shadow-xl hover:border-blue-200 transition-all duration-300 group flex items-center justify-between relative overflow-hidden">
                      <div className={`absolute -right-6 -top-6 w-24 h-24 rounded-full blur-2xl opacity-20 transition-all duration-500 group-hover:scale-150 ${pBalance >= 0 ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                      <div className="flex items-center gap-4 relative z-10">
                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner flex-shrink-0 ${pBalance >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}><Icon name={pBalance >= 0 ? 'trend-up' : 'trend-down'} weight="fill" size={28}/></div>
                        <div className="min-w-0 pr-2">
                          <h4 className="font-extrabold text-gray-800 text-base group-hover:text-primary transition-colors truncate">{p.name}</h4>
                          <div className="text-[11px] font-bold text-gray-400 mt-1 flex gap-3 whitespace-nowrap">
                            {p.income > 0 && <span className="flex items-center gap-1"><Icon name="arrow-down-left" weight="bold" className="text-emerald-500"/> รับ: {p.income.toLocaleString()}</span>}
                            {p.expense > 0 && <span className="flex items-center gap-1"><Icon name="arrow-up-right" weight="bold" className="text-red-400"/> จ่าย: {p.expense.toLocaleString()}</span>}
                            {p.income === 0 && p.expense === 0 && <span className="text-gray-300">ไม่มีการเคลื่อนไหว</span>}
                          </div>
                        </div>
                      </div>
                      <div className="text-right relative z-10 flex flex-col items-end flex-shrink-0 pl-2">
                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">คงเหลือ</p><p className={`text-xl font-black tracking-tight ${pBalance >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>฿{pBalance.toLocaleString()}</p>
                        <div className="mt-1 w-6 h-6 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors"><Icon name="caret-right" weight="bold" size={12}/></div>
                      </div>
                    </div>
                  );
                })}
                {projects.list.length === 0 && (<div className="text-center py-16 bg-gray-50 rounded-[2rem] border-2 border-dashed border-gray-200"><Icon name="wallet" size={48} className="opacity-20 mb-3 mx-auto" weight="duotone"/><p className="text-sm font-bold text-gray-500">ไม่มีโครงการที่มียอดคงเหลือ</p><p className="text-xs font-medium text-gray-400 mt-1">เริ่มเพิ่มรายการเพื่อสร้างโครงการแรก</p></div>)}
              </div>
            </>
          )}
          {selectedProject && (
            <div className="animate-fade-in space-y-4">
              <button onClick={() => setSelectedProject(null)} className="flex items-center gap-1 text-xs font-bold text-gray-500 hover:text-primary transition mb-2"><Icon name="arrow-left" weight="bold"/> ย้อนกลับ</button>
              <div className="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-[2rem] card-shadow border border-gray-100 text-white relative overflow-hidden">
                <div className="absolute -right-10 -top-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div><h3 className="text-2xl font-extrabold mb-1 relative z-10">{selectedProject.name}</h3>
                <div className="flex gap-4 text-xs font-bold border-t border-white/10 pt-4 mt-3 relative z-10 items-center justify-between"><span className="text-gray-300 uppercase tracking-wider text-[10px]">ยอดคงเหลือโครงการ</span><span className={selectedProject.income - selectedProject.expense >= 0 ? 'text-emerald-400 text-2xl tracking-tight' : 'text-red-400 text-2xl tracking-tight'}>฿{(selectedProject.income - selectedProject.expense).toLocaleString()}</span></div>
              </div>
              <div className="flex justify-between items-end px-2 pt-2"><div><h4 className="text-sm font-bold text-gray-800">รายการบันทึก</h4><p className="text-[10px] text-gray-400 font-medium">ทั้งหมด {selectedProject.logs.length} รายการ</p></div><button onClick={() => handleAddClick(selectedProject.name)} className="text-[11px] font-bold bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2 rounded-xl shadow-md hover:shadow-lg transition flex items-center gap-1 active:scale-95"><Icon name="plus" weight="bold"/> เพิ่มรายการ</button></div>
              <div className="space-y-3">
                {selectedProject.logs.slice().reverse().map((log, i) => (
                  <div key={i} className="bg-white p-4 rounded-2xl card-shadow border border-gray-100 hover:shadow-md transition relative group">
                    <div className="flex justify-between items-start mb-2"><div className="pr-4"><div className={`text-[10px] font-bold px-2 py-0.5 rounded-md inline-flex items-center gap-1 mb-1.5 ${log.type === 'รายรับ' ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}><Icon name={log.type === 'รายรับ' ? "arrow-down-left" : "arrow-up-right"} weight="bold" size={10}/>{log.type}</div><h5 className="font-bold text-gray-800 text-sm leading-snug">{log.item}</h5></div><div className={`text-lg font-black tracking-tight flex-shrink-0 ${log.type === 'รายรับ' ? 'text-emerald-600' : 'text-red-600'}`}>{log.type === 'รายรับ' ? '+' : '-'}฿{Number(log.amount).toLocaleString()}</div></div>
                    <div className="flex justify-between items-end border-t border-dashed border-gray-100 pt-3 mt-3"><div><p className="text-[10px] font-bold text-gray-400 flex items-center gap-1"><Icon name="calendar-blank" weight="bold"/> {new Date(log.date).toLocaleDateString('th-TH', {day:'numeric',month:'short',year:'2-digit'})}</p><p className="text-[10px] font-bold text-gray-400 flex items-center gap-1 mt-1 truncate max-w-[150px]"><Icon name="user" weight="bold"/> {log.person || 'ไม่ระบุ'}</p></div><div className="flex gap-1.5">{log.receiptUrl && <button onClick={()=>onViewImage(log.receiptUrl)} className="w-8 h-8 rounded-lg bg-gray-50 text-gray-500 hover:text-blue-600 hover:bg-blue-50 flex items-center justify-center transition border border-gray-100 shadow-sm" title="ดูใบเสร็จ"><Icon name="receipt" weight="fill" size={16}/></button>}{log.slipUrl && <button onClick={()=>onViewImage(log.slipUrl)} className="w-8 h-8 rounded-lg bg-gray-50 text-gray-500 hover:text-blue-600 hover:bg-blue-50 flex items-center justify-center transition border border-gray-100 shadow-sm" title="ดูสลิป"><Icon name="image" weight="fill" size={16}/></button>}<button onClick={()=>handleEditClick(log)} className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 flex items-center justify-center transition ml-1 shadow-sm"><Icon name="pencil-simple" weight="bold" size={16}/></button><button onClick={()=>{if(window.confirm('ยืนยันการลบรายการนี้ใช่หรือไม่?')) onDelete(log.id)}} className="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 flex items-center justify-center transition shadow-sm"><Icon name="trash" weight="bold" size={16}/></button></div></div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <Modal isOpen={isFormOpen} onClose={() => setIsFormOpen(false)} title={editingLog ? "แก้ไขรายการการเงิน" : "เพิ่มรายการการเงินใหม่"} zIndex="z-[110]"><FinanceForm onSubmit={onSave} initialData={editingLog} loading={loading} students={data.students} defaultProject={defaultProj} /></Modal>
        </div>
      );
    };

    // ==========================================
    // 🟢 MAIN APP COMPONENT (เชื่อมต่อ Firestore 100%)
    // ==========================================
    const App = () => {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [loading, setLoading] = useState(true);
      const [showSuccess, setShowSuccess] = useState(false);
      
      const [students, setStudents] = useState([]);
      const [bills, setBills] = useState([]);
      const [history, setHistory] = useState([]);
      const [financeLogs, setFinanceLogs] = useState([]);
      const [products, setProducts] = useState([]);
      const [orders, setOrders] = useState([]);
      const [qrCodes, setQrCodes] = useState([]);
      
      const [systemStatus, setSystemStatus] = useState('OFF');
      const [orderSystemStatus, setOrderSystemStatus] = useState('OFF');
      const [announcement, setAnnouncement] = useState('');

      const [notificationSubTab, setNotificationSubTab] = useState('general');
      const [billFilter, setBillFilter] = useState('all'); 
      const [billSearch, setBillSearch] = useState('');
      const [selectedBill, setSelectedBill] = useState(null);
      const [selectedStudent, setSelectedStudent] = useState(null); 
      const [viewingStudentId, setViewingStudentId] = useState(null);
      const [viewingSlipUrl, setViewingSlipUrl] = useState(null);
      const [isEditing, setIsEditing] = useState(false); 
      const [announceForm, setAnnounceForm] = useState({ type: 'text', text: '', fileBase64: '', preview: '' });
      const [editingQrData, setEditingQrData] = useState(null);
      
      const [isAnnounceModalOpen, setIsAnnounceModalOpen] = useState(false);
      const [isCreateModalOpen, setIsCreateModalOpen] = useState(false); 
      const [isStudentModalOpen, setIsStudentModalOpen] = useState(false); 
      const [isQrModalOpen, setIsQrModalOpen] = useState(false);
      const [isDeleteConfirmOpen, setIsDeleteConfirmOpen] = useState(false);
      const [isErrorModalOpen, setIsErrorModalOpen] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');
      const [isResetConfirmOpen, setIsResetConfirmOpen] = useState(false);
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [isOverdueConfirmOpen, setIsOverdueConfirmOpen] = useState(false);
      const [processingAction, setProcessingAction] = useState(null); 
      const [deleteTarget, setDeleteTarget] = useState(null); 
      const [notifyEnabled, setNotifyEnabled] = useState(true); 

      // ✅ 1. ฟังการเปลี่ยนแปลงจาก Firebase แบบ Real-time
      useEffect(() => { 
        if (!isLoggedIn) return;
        setLoading(true);

        const unsubUsers = db.collection('users').onSnapshot(snap => setStudents(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
        const unsubBills = db.collectionGroup('bills').onSnapshot(snap => setBills(snap.docs.map(doc => ({ billId: doc.id, studentId: doc.ref.parent.parent.id, ...doc.data() }))));
        const unsubOrders = db.collectionGroup('orders').onSnapshot(snap => setOrders(snap.docs.map(doc => ({ orderId: doc.id, studentId: doc.ref.parent.parent.id, ...doc.data() }))));
        const unsubHistory = db.collectionGroup('history').onSnapshot(snap => setHistory(snap.docs.map(doc => ({ historyId: doc.id, studentId: doc.ref.parent.parent.id, ...doc.data() }))));
        const unsubProducts = db.collection('products').onSnapshot(snap => setProducts(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
        const unsubFinance = db.collection('financeLogs').onSnapshot(snap => setFinanceLogs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
        const unsubConfig = db.collection('config').onSnapshot(snap => {
            snap.docs.forEach(doc => {
                if(doc.id === 'system') {
                    setSystemStatus(doc.data().maintenanceMode || 'OFF');
                    setOrderSystemStatus(doc.data().orderSystemStatus || 'OFF');
                    setAnnouncement(doc.data().announcement || '');
                }
                if(doc.id === 'qrMap') setQrCodes(doc.data().list || []);
            });
            setLoading(false);
        });

        return () => { unsubUsers(); unsubBills(); unsubOrders(); unsubHistory(); unsubProducts(); unsubFinance(); unsubConfig(); };
      }, [isLoggedIn]);

      useEffect(() => { if (!selectedBill) setIsEditing(false); else setNotifyEnabled(true); }, [selectedBill]);

      const finishAction = () => { setProcessingAction(null); setShowSuccess(true); setTimeout(() => setShowSuccess(false), 1500); };
      
      // ข้อมูลที่จะส่งลงไปยัง Views ต่างๆ
      const uiData = { students, bills, history, amount: { qrCodes }, announcement, systemStatus, finance: financeLogs };
      const uiOrderData = { systemStatus: orderSystemStatus, products, orders };

      // ==========================================
      // ✅ 2. ACTIONS (Firebase Firestore/Storage)
      // ==========================================
      const confirmToggleSystem = async (targetStatus) => {
          setProcessingAction('TOGGLING_SYSTEM');
          try { await db.collection('config').doc('system').set({ maintenanceMode: targetStatus }, { merge: true }); finishAction(); } 
          catch (err) { setProcessingAction(null); alert("Error: " + err.message); }
      };

      const handleSaveFinance = async (formData) => {
          setProcessingAction('SAVE_FINANCE');
          try {
              let finalReceiptUrl = formData.receiptUrl || ""; let finalSlipUrl = formData.slipUrl || "";
              if (formData.receiptFile) finalReceiptUrl = await uploadToStorage(formData.receiptFile, 'finance', `RECEIPT-${Date.now()}.jpg`);
              if (formData.slipFile) finalSlipUrl = await uploadToStorage(formData.slipFile, 'finance', `SLIP-${Date.now()}.jpg`);
              if (formData.isReceiptDeleted) finalReceiptUrl = ""; if (formData.isSlipDeleted) finalSlipUrl = "";

              const logData = { date: formData.date, project: formData.project, item: formData.item, type: formData.type, amount: Number(formData.amount), person: formData.person, receiptUrl: finalReceiptUrl, slipUrl: finalSlipUrl, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
              const newId = formData.id || `FIN-${Date.now()}`;
              await db.collection('financeLogs').doc(newId).set({ id: newId, ...logData }, { merge: true });
              finishAction();
          } catch (err) { alert('Error: ' + err.message); setProcessingAction(null); }
      };

      const handleDeleteFinance = async (id) => { setProcessingAction('DELETE'); try { await db.collection('financeLogs').doc(id).delete(); finishAction(); } catch(err) { alert(err.message); setProcessingAction(null); } };

      const handleToggleOrderSystem = async (status) => { 
          setProcessingAction('TOGGLE_SYSTEM'); 
          try { await db.collection('config').doc('system').set({ orderSystemStatus: status ? 'ON' : 'OFF' }, { merge: true }); finishAction(); } 
          catch(e) { alert("Error: " + e.message); setProcessingAction(null); }
      };

      const handleSaveProduct = async (form) => { 
          setProcessingAction('SAVE_PRODUCT'); 
          try {
              const newMainUrls = [];
              if(form.imageFiles && form.imageFiles.length > 0) {
                  const uploadPromises = form.imageFiles.map((base64, i) => uploadToStorage(base64, 'products', `PROD-${Date.now()}-${i}.jpg`));
                  newMainUrls.push(...await Promise.all(uploadPromises));
              }
              const finalImageString = [...(form.image?form.image.split(' | ').filter(Boolean):[]), ...newMainUrls].join(' | ');

              const newSizeUrls = [];
              if(form.sizeChartFiles && form.sizeChartFiles.length > 0) {
                  const sizePromises = form.sizeChartFiles.map((base64, i) => uploadToStorage(base64, 'products', `SIZE-${Date.now()}-${i}.jpg`));
                  newSizeUrls.push(...await Promise.all(sizePromises));
              }
              const finalSizeString = [...(form.sizeChart?form.sizeChart.split(' | ').filter(Boolean):[]), ...newSizeUrls].join(' | ');

              const prodId = form.id || `P-${Date.now()}`;
              await db.collection('products').doc(prodId).set({ id: prodId, name: form.name, price: Number(form.price), image: finalImageString, options: form.options, status: form.status, sizeChart: finalSizeString, stock: Number(form.stock) }, { merge: true });
              finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleUpdateOrderStatus = async (id, status) => { 
          try { const order = orders.find(o => o.orderId === id); if (order) await db.collection('users').doc(order.studentId).collection('orders').doc(id).update({ status }); } 
          catch (err) { alert('Error: ' + err.message); }
      };
      
      const handleEditOrder = async (formData) => {
          setProcessingAction('EDIT_ORDER');
          try { const order = orders.find(o => o.orderId === formData.orderId); await db.collection('users').doc(order.studentId).collection('orders').doc(formData.orderId).update({ items: formData.items, price: Number(formData.price), status: formData.status }); finishAction(); } 
          catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const confirmDelete = async () => { 
          if (!deleteTarget) return; setProcessingAction('DELETE'); setIsDeleteConfirmOpen(false); 
          const { id, type } = deleteTarget;
          try {
              if (type === 'ORDER') { const order = orders.find(o => o.orderId === id); await db.collection('users').doc(order.studentId).collection('orders').doc(id).delete(); } 
              else if (type === 'PRODUCT') { await db.collection('products').doc(id).delete(); } 
              else if (type === 'BILL') { const bill = bills.find(b => b.billId === id); await db.collection('users').doc(bill.studentId).collection('bills').doc(id).delete(); setSelectedBill(null); } 
              else if (type === 'HISTORY') { const hist = history.find(h => h.billId === id || h.historyId === id); await db.collection('users').doc(hist.studentId).collection('history').doc(hist.historyId || id).delete(); } 
              else if (type === 'STUDENT') { await db.collection('users').doc(id).delete(); } 
              else if (type === 'QR') { const newQrList = qrCodes.filter(q => q.url !== id); await db.collection('config').doc('qrMap').set({ list: newQrList }, { merge: true }); } 
              finishAction(); setDeleteTarget(null);
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleDeleteAnnouncementClick = async () => { 
          if (window.confirm('คุณต้องการลบประกาศนี้ออกจากหน้าเว็บใช่หรือไม่?')) {
              setProcessingAction('ANNOUNCE'); 
              try { await db.collection('config').doc('system').set({ announcement: '' }, { merge: true }); setIsAnnounceModalOpen(false); finishAction(); } 
              catch (err) { alert('Error: ' + err.message); setProcessingAction(null); }
          }
      };

      const handleSaveAnnouncement = async () => { 
          setProcessingAction('ANNOUNCE'); 
          try {
              let finalValue = announceForm.text;
              if (announceForm.type === 'image') {
                  if (announceForm.fileBase64) finalValue = await uploadToStorage(announceForm.fileBase64, 'announcements', `ANN-${Date.now()}.jpg`);
                  else if (announceForm.preview) finalValue = announceForm.preview;
                  else finalValue = "";
              }
              await db.collection('config').doc('system').set({ announcement: finalValue }, { merge: true });
              setIsAnnounceModalOpen(false); finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleSaveStudent = async (formData) => { 
          setProcessingAction('SAVE_STUDENT'); 
          try { await db.collection('users').doc(formData.id).set({ id: formData.id, name: formData.name, password: formData.password, lineId: formData.userId, permissions: formData.permissions }, { merge: true }); setIsStudentModalOpen(false); setSelectedStudent(null); finishAction(); } 
          catch(err) { setErrorMessage(err.message); setIsErrorModalOpen(true); setProcessingAction(null); }
      };

      const handleAddQr = async (qrData) => {
          return new Promise(async (resolve, reject) => {
              try {
                  let url = qrData.oldUrl || '';
                  if (qrData.fileBase64) url = await uploadToStorage(qrData.fileBase64, 'qrCodes', `QR-${Date.now()}.jpg`);
                  let newList = [...qrCodes];
                  if (qrData.oldUrl) { newList = newList.map(q => q.url === qrData.oldUrl ? { url, amount: qrData.newAmount } : q); } 
                  else { newList.push({ url, amount: qrData.newAmount }); }
                  await db.collection('config').doc('qrMap').set({ list: newList }, { merge: true });
                  finishAction(); resolve();
              } catch(e) { reject(e); }
          });
      };

      const handleCreateBill = async (formData) => { 
          setProcessingAction('CREATE_BILL'); 
          try {
              const targetIds = formData.studentIds || [formData.studentId];
              const batch = db.batch();
              targetIds.forEach(studentId => {
                  const suffix = String(studentId).slice(-4).padEnd(4, '0'); const randomPart = Math.floor(1000 + Math.random() * 9000); const billId = `B${suffix}-${randomPart}`;
                  const ref = db.collection('users').doc(String(studentId)).collection('bills').doc(billId);
                  batch.set(ref, { billId, studentId: String(studentId), item: formData.item, amount: Number(formData.amount), discount: Number(formData.discount || 0), dueDate: formData.dueDate, finePerDay: Number(formData.finePerDay || 0), maxFine: Number(formData.maxFine || 0), status: 'ค้างชำระ', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
              });
              await batch.commit();
              if (formData.notify !== false) await notifyGas('createBillNotify', { ...formData, targetIds }); 
              setIsCreateModalOpen(false); finishAction();
          } catch (err) { alert(err.message); setProcessingAction(null); }
      };

      const handleEditBill = async (formData) => { 
          setProcessingAction('EDITING'); 
          try {

          <ConfirmModal isOpen={isDeleteConfirmOpen} onClose={() => !processingAction && setIsDeleteConfirmOpen(false)} onConfirm={confirmDelete} title={deleteTarget?.type === 'HISTORY' ? "ยืนยันลบประวัติ" : (deleteTarget?.type === 'STUDENT' ? "ยืนยันลบนักศึกษา" : (deleteTarget?.type === 'QR' ? "ยืนยันลบ QR Code" : (deleteTarget?.type === 'PRODUCT' ? "ยืนยันลบสินค้า" : (deleteTarget?.type === 'ORDER' ? "ยืนยันลบออเดอร์" : (deleteTarget?.type === 'ANNOUNCEMENT' ? "ยืนยันลบประกาศ" : "ยืนยันการลบบิล")))))} message={getConfirmMessage()} loading={processingAction === 'DELETE'} />
          <ConfirmModal isOpen={isResetConfirmOpen} onClose={() => setIsResetConfirmOpen(false)} onConfirm={handleResetBill} title="ยืนยันการรีเซ็ตบิล" message={`ระบบจะทำการลบ:\n- วันที่ชำระ\n- รูปสลิป\n- รหัสอ้างอิง\n\nคุณยืนยันที่จะรีเซ็ตสถานะใช่หรือไม่?`} loading={processingAction === 'RESET'} confirmText="ยืนยันรีเซ็ต" isDestructive={true} />
          <ConfirmModal isOpen={isOverdueConfirmOpen} onClose={() => setIsOverdueConfirmOpen(false)} onConfirm={() => { setIsOverdueConfirmOpen(false); if(selectedBill) handleSendOverdueNotification(selectedBill.billId); }} title="ยืนยันการทวงถาม" message={`คุณต้องการส่งข้อความแจ้งเตือนทวงถามบิล #${selectedBill?.billId} ไปยัง LINE ของนักศึกษาใช่หรือไม่?`} loading={processingAction === 'NOTIFY'} confirmText="ยืนยันส่ง" isDestructive={false} />
          
          <Modal isOpen={isAnnounceModalOpen} onClose={() => setIsAnnounceModalOpen(false)} title="จัดการประกาศ">
              <div className="space-y-4 pt-2">
                  <div className="flex bg-gray-100 p-1 rounded-xl"><button onClick={() => setAnnounceForm({...announceForm, type: 'text'})} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${announceForm.type === 'text' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>📝 พิมพ์ข้อความ</button><button onClick={() => setAnnounceForm({...announceForm, type: 'image'})} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${announceForm.type === 'image' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>🖼️ อัปโหลดรูปภาพ</button></div>
                  {announceForm.type === 'text' ? (<textarea value={announceForm.text} onChange={(e) => setAnnounceForm({...announceForm, text: e.target.value})} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-100 focus:bg-white outline-none min-h-[150px] text-sm transition-all" placeholder="พิมพ์ข้อความประกาศที่นี่..."></textarea>) : (<div className="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center hover:bg-gray-50 transition relative cursor-pointer bg-white group"><input type="file" accept="image/*" onChange={(e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => setAnnounceForm({...announceForm, fileBase64: reader.result.split(',')[1], preview: reader.result}); reader.readAsDataURL(file); } }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />{announceForm.preview ? (<div className="relative"><img src={announceForm.preview} className="h-40 object-contain mx-auto rounded-lg shadow-sm" alt="Preview"/><div className="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition rounded-lg text-white font-medium backdrop-blur-sm"><Icon name="camera" className="mr-2"/> เปลี่ยนรูปภาพ</div></div>) : (<div className="py-6"><div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="upload-simple" size={24} weight="bold"/></div><p className="text-sm text-gray-600 font-medium">แตะเพื่อเลือกรูปภาพ</p></div>)}</div>)}
                  <div className="flex gap-2 pt-2"><button onClick={handleDeleteAnnouncementClick} disabled={loading || !uiData.announcement} className="px-4 py-3 rounded-xl bg-red-50 text-red-500 font-bold hover:bg-red-100 disabled:opacity-50 transition flex items-center justify-center shadow-sm border border-red-100"><Icon name="trash" weight="bold" size={20}/></button><button onClick={handleSaveAnnouncement} disabled={loading || (announceForm.type === 'text' && !announceForm.text) || (announceForm.type === 'image' && !announceForm.preview)} className="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:opacity-50 transition flex justify-center items-center gap-2">{loading ? <><Icon name="spinner" className="animate-spin" weight="bold"/> กำลังบันทึก...</> : 'บันทึกประกาศ'}</button></div>
              </div>
          </Modal>

          <Modal isOpen={isCreateModalOpen} onClose={() => setIsCreateModalOpen(false)} title="สร้างบิลใหม่"><BillForm students={uiData.students} onSubmit={handleCreateBill} loading={processingAction === 'CREATE_BILL'} /></Modal>
          <Modal isOpen={isStudentModalOpen} onClose={() => setIsStudentModalOpen(false)} title={selectedStudent ? "แก้ไขนักศึกษา" : "เพิ่มนักศึกษา"}><StudentForm onSubmit={handleSaveStudent} loading={processingAction === 'SAVE_STUDENT'} initialData={selectedStudent} /></Modal>
          <StudentBillsModal isOpen={!!viewingStudentId} onClose={() => setViewingStudentId(null)} student={uiData.students?.find(s => s.id === viewingStudentId)} bills={uiData.bills?.filter(b => b.studentId === viewingStudentId)} onSelectBill={(bill) => setSelectedBill(bill)} />
          <QrCodeModal isOpen={isQrModalOpen} onClose={() => setIsQrModalOpen(false)} qrUrls={uiData.amount?.qrCodes || []} onSave={handleAddQr} onDelete={handleDeleteQrClick} loading={processingAction === 'QR'} initialEditQr={editingQrData} />
          
          <ErrorModal isOpen={isErrorModalOpen} onClose={() => setIsErrorModalOpen(false)} message={errorMessage} />
          <ImageModal isOpen={!!viewingSlipUrl} onClose={() => setViewingSlipUrl(null)} imageUrl={viewingSlipUrl} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

                                    {/* ป้ายสถานะ */}
                                    <div className="flex flex-wrap gap-1.5 mt-2">
                                        {hasOverdueBill && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-red-600 text-white text-[9px] font-bold shadow-sm"><Icon name="warning-circle" weight="fill" size={10}/> ค้างชำระ</span>}
                                        {!hasPasswordSet ? <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-orange-50 text-orange-600 text-[9px] font-bold border border-orange-100"><Icon name="key" weight="bold" size={10}/> ขาดรหัส</span> : <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-green-50 text-green-600 text-[9px] font-bold border border-green-100"><Icon name="check-circle" weight="fill" size={10}/> มีรหัสแล้ว</span>}
                                        {!hasUserId && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-red-50 text-red-600 text-[9px] font-bold border border-red-100"><Icon name="identification-card" weight="bold" size={10}/> ขาด userId</span>}
                                        {isEmailLinked && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-blue-50 text-blue-600 text-[9px] font-bold border border-blue-100"><Icon name="envelope-simple" weight="fill" size={10}/> เชื่อมอีเมล</span>}
                                        {isLineLinked && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-[#00B900]/10 text-[#00B900] text-[9px] font-bold border border-[#00B900]/20"><Icon name="chat-circle-dots" weight="fill" size={10}/> เชื่อม LINE</span>}
                                    </div>

                                    {/* ✅ ส่วนปุ่ม Action ที่ปรับสีใหม่ */}
                                    <div className="flex gap-2 mt-3 pt-3 border-t border-dashed border-gray-100 relative z-20">
                                        <button onClick={() => onViewBills(stu.id)} className="flex-1 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-100 transition flex items-center justify-center gap-1 shadow-sm">
                                            <Icon name="receipt" weight="bold"/> ดูบิล
                                        </button>

                                        {/* ✏️ ปุ่มแก้ไข ปรับสีส้ม/เหลือง ให้เด่นขึ้น */}
                                        <button 
                                            onClick={() => { setSelectedStudent(stu); setIsStudentModalOpen(true); }} 
                                            className="w-9 h-9 flex items-center justify-center bg-amber-100 text-amber-700 border border-amber-200 rounded-lg hover:bg-amber-200 transition shadow-sm"
                                            title="แก้ไขข้อมูลผู้ใช้"
                                        >
                                            <Icon name="pencil-simple" weight="bold" size={16}/>
                                        </button>

                                        {/* 🗑️ ปุ่มลบ */}
                                        <button 
                                            onClick={() => onDeleteStudent(stu)} 
                                            className="w-9 h-9 flex items-center justify-center bg-white text-red-400 border border-red-100 rounded-lg hover:bg-red-50 hover:text-red-600 transition shadow-sm" 
                                            title="ลบผู้ใช้ถาวร"
                                        >
                                            <Icon name="trash" weight="bold" size={16}/>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                 })}
             </div>

             {filteredStudents.length === 0 && (
                 <div className="flex flex-col items-center justify-center py-16 text-gray-300">
                     <div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3">
                         <Icon name="users" size={32} className="opacity-40"/>
                     </div>
                     <p className="text-sm font-medium">ไม่พบรายชื่อผู้ใช้</p>
                 </div>
             )}
          </div> 
        );
    };

    // --- Helper: Image Gallery (รองรับ image, image2, image3...) ---
    const ProductImageGallery = ({ product }) => {
        const images = useMemo(() => {
            if (!product) return [];
            const imgs = [];
            
            // รองรับของเก่าที่มี " | "
            if (product.image && product.image.includes(' | ')) {
                imgs.push(...product.image.split(' | ').map(s=>s.trim()).filter(s => s.startsWith('http')));
            } else {
                // รองรับโครงสร้างใหม่ (image, image2, image3...)
                if (product.image && product.image.startsWith('http')) imgs.push(product.image);
                let i = 2;
                while(product[`image${i}`]) { 
                    if (product[`image${i}`].startsWith('http')) imgs.push(product[`image${i}`]); 
                    i++; 
                }
            }
            return imgs;
        }, [product]);

        const [currentIndex, setCurrentIndex] = useState(0);

        useEffect(() => { setCurrentIndex(0); }, [images]);

        if (images.length === 0) {
            return (
                <div className="w-full h-full bg-gray-50 flex items-center justify-center text-gray-300">
                    <Icon name="image" size={32} />
                </div>
            );
        }

        return (
            <div className="relative w-full h-full group bg-gray-100">
                <img 
                    src={images[currentIndex]} 
                    className="w-full h-full object-cover" 
                    alt={`รูปที่ ${currentIndex + 1}`}
                    referrerPolicy="no-referrer"
                    onError={(e) => { e.target.style.display = 'none'; }}
                />
                <div className="absolute top-2 right-2 bg-black/60 text-white text-[10px] px-2 py-0.5 rounded-full">
                    {currentIndex + 1} / {images.length}
                </div>
                {images.length > 1 && (
                    <>
                        <button onClick={(e) => {e.stopPropagation(); setCurrentIndex((prev) => (prev - 1 + images.length) % images.length)}} className="absolute left-0 top-0 bottom-0 px-2 hover:bg-black/10 transition"><Icon name="caret-left" weight="bold" className="text-white drop-shadow-md"/></button>
                        <button onClick={(e) => {e.stopPropagation(); setCurrentIndex((prev) => (prev + 1) % images.length)}} className="absolute right-0 top-0 bottom-0 px-2 hover:bg-black/10 transition"><Icon name="caret-right" weight="bold" className="text-white drop-shadow-md"/></button>
                    </>
                )}
            </div>
        );
    };

    // --- 1. Helper Component: Image Manager ---
    const ImageManager = ({ label, existingUrls = [], newImages = [], onRemoveExisting, onRemoveNew, onAddNew }) => {
        const inputId = `file-input-${Math.random().toString(36).substr(2, 9)}`;

        return (
            <div className="space-y-3">
                <div className="flex justify-between items-end px-1">
                    <label className="text-xs font-bold text-gray-400 uppercase tracking-wider">{label}</label>
                    <span className="text-[10px] font-bold text-primary bg-indigo-50 px-2 py-0.5 rounded-full">
                        {existingUrls.length + newImages.length} รูป
                    </span>
                </div>
                
                <div className="grid grid-cols-4 gap-3">
                    {/* 1. รูปเดิม (Existing) */}
                    {existingUrls.map((url, idx) => (
                        <div key={`exist-${idx}`} className="relative aspect-square rounded-2xl overflow-hidden group shadow-sm hover:shadow-md transition-all bg-gray-100">
                            <img 
                                src={getDirectImageUrl(url.trim())} 
                                className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                                alt="old" 
                                referrerPolicy="no-referrer" 
                                onError={(e) => { e.target.style.opacity = '0.3'; }}
                            />
                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-[2px]">
                                <button type="button" onClick={() => onRemoveExisting(idx)} className="w-8 h-8 bg-white text-red-500 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition">
                                    <Icon name="trash" weight="bold" size={16}/>
                                </button>
                            </div>
                        </div>
                    ))}

                    {/* 2. รูปใหม่ (New Base64) */}
                    {newImages.map((img, idx) => (
                        <div key={`new-${idx}`} className="relative aspect-square rounded-2xl border-2 border-indigo-400 overflow-hidden group shadow-md">
                            <img src={`data:image/jpeg;base64,${img}`} className="w-full h-full object-cover" alt="new" />
                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-[2px]">
                                <button type="button" onClick={() => onRemoveNew(idx)} className="w-8 h-8 bg-white text-red-500 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition">
                                    <Icon name="trash" weight="bold" size={16}/>
                                </button>
                            </div>
                            <div className="absolute bottom-0 inset-x-0 bg-indigo-500 text-white text-[8px] font-bold text-center py-0.5">NEW</div>
                        </div>
                    ))}

                    {/* 3. ปุ่มเพิ่ม (+) */}
                    <label htmlFor={inputId} className="aspect-square rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center cursor-pointer hover:border-primary hover:bg-indigo-50/50 transitionGroup group">
                        <div className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center mb-1 group-hover:scale-110 transition-transform">
                            <Icon name="plus" weight="bold" className="text-gray-400 group-hover:text-primary"/>
                        </div>
                        <span className="text-[9px] font-bold text-gray-400 group-hover:text-primary">เพิ่มรูป</span>
                        <input id={inputId} type="file" multiple accept="image/*" className="hidden" onChange={onAddNew} />
                    </label>
                </div>
            </div>
        );
    };
              
    // --- Product Modal ---
    const ProductModal = ({ isOpen, onClose, product, onSave, loading, zIndex = "z-[110]" }) => {
        const [form, setForm] = useState({ id: '', name: '', price: '', options: '', status: 'ON', stock: '' });
        const [existingMainImages, setExistingMainImages] = useState([]); 
        const [newMainFiles, setNewMainFiles] = useState([]); 
        const [existingSizeImages, setExistingSizeImages] = useState([]); 
        const [newSizeFiles, setNewSizeFiles] = useState([]); 
        const [optionGroups, setOptionGroups] = useState([{ header: '', options: [{ label: '', price: '' }] }]);

        useEffect(() => {
            if(isOpen) {
                if (product) {
                    setForm(product);
                    const mainImgs = [];
                    const sizeImgs = [];
                    
                    if (product.image && product.image.includes(' | ')) {
                        mainImgs.push(...product.image.split(' | ').map(s=>s.trim()).filter(Boolean));
                    } else {
                        if (product.image) mainImgs.push(product.image);
                        let i = 2;
                        while(product[`image${i}`]) { mainImgs.push(product[`image${i}`]); i++; }
                    }

                    if (product.sizeChart && product.sizeChart.includes(' | ')) {
                        sizeImgs.push(...product.sizeChart.split(' | ').map(s=>s.trim()).filter(Boolean));
                    } else {
                        if (product.sizeChart) sizeImgs.push(product.sizeChart);
                        let j = 2;
                        while(product[`sizeChart${j}`]) { sizeImgs.push(product[`sizeChart${j}`]); j++; }
                    }

                    setExistingMainImages(mainImgs);
                    setExistingSizeImages(sizeImgs);
                    setNewMainFiles([]);
                    setNewSizeFiles([]);
                    parseOptionString(product.options || '');
                } else {
                    setForm({ id: '', name: '', price: '', options: '', status: 'ON', stock: '' });
                    setExistingMainImages([]); setNewMainFiles([]);
                    setExistingSizeImages([]); setNewSizeFiles([]);
                    setOptionGroups([{ header: '', options: [{ label: '', price: '' }] }]);
                }
            }
        }, [product, isOpen]);

        const parseOptionString = (str) => { if(!str) { setOptionGroups([{ header: '', options: [{ label: '', price: '' }] }]); return; } const groups = str.split('|').map(groupStr => { let header = ''; let body = groupStr.trim(); if (body.includes(':')) { const parts = body.split(':'); header = parts[0].trim(); body = parts[1].trim(); } let options = []; if(body) { options = body.split(',').map(item => { const parts = item.trim().split(/[=+]/); return { label: parts[0].trim(), price: parts[1] || '' }; }); } if (options.length === 0) options.push({ label: '', price: '' }); return { header, options }; }); setOptionGroups(groups.length > 0 ? groups : [{ header: '', options: [{ label: '', price: '' }] }]); };
        const buildOptionString = () => { const validGroups = optionGroups.map(group => { const validOptions = group.options.filter(o => o.label.trim() !== ''); if(validOptions.length === 0) return null; const body = validOptions.map(o => { const p = o.price && parseInt(o.price) > 0 ? o.price : ''; return p ? `${o.label.trim()}=${p}` : o.label.trim(); }).join(','); return group.header ? `${group.header.trim()}:${body}` : body; }).filter(g => g !== null); return validGroups.join(' | '); };
        
        const handleAddGroup = () => setOptionGroups([...optionGroups, { header: '', options: [{ label: '', price: '' }] }]);
        const handleRemoveGroup = (gIdx) => setOptionGroups(optionGroups.filter((_, i) => i !== gIdx));
        const handleHeaderChange = (gIdx, val) => { const newGroups = [...optionGroups]; newGroups[gIdx].header = val; setOptionGroups(newGroups); };
        const handleAddOption = (gIdx) => { const newGroups = [...optionGroups]; newGroups[gIdx].options.push({ label: '', price: '' }); setOptionGroups(newGroups); };
        const handleRemoveOption = (gIdx, oIdx) => { const newGroups = [...optionGroups]; newGroups[gIdx].options = newGroups[gIdx].options.filter((_, i) => i !== oIdx); setOptionGroups(newGroups); };
        const handleOptionChange = (gIdx, oIdx, field, val) => { const newGroups = [...optionGroups]; newGroups[gIdx].options[oIdx][field] = val; setOptionGroups(newGroups); };

        const processFiles = (files, callback) => {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement("img");
                        img.onload = () => {
                            const canvas = document.createElement("canvas");
                            const ctx = canvas.getContext("2d");
                            const MAX_WIDTH = 1000; const MAX_HEIGHT = 1000;
                            let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                            canvas.width = width; canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL("image/jpeg", 0.8).split(',')[1]); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });
            Promise.all(promises).then(callback);
        };

        const handleAddMain = (e) => processFiles(e.target.files, (b64s) => setNewMainFiles(prev => [...prev, ...b64s]));
        const handleDelMainExist = (idx) => setExistingMainImages(prev => prev.filter((_, i) => i !== idx));
        const handleDelMainNew = (idx) => setNewMainFiles(prev => prev.filter((_, i) => i !== idx));
        const handleAddSize = (e) => processFiles(e.target.files, (b64s) => setNewSizeFiles(prev => [...prev, ...b64s]));
        const handleDelSizeExist = (idx) => setExistingSizeImages(prev => prev.filter((_, i) => i !== idx));
        const handleDelSizeNew = (idx) => setNewSizeFiles(prev => prev.filter((_, i) => i !== idx));

        const handleSubmit = () => {
            onSave({
                ...form,
                options: buildOptionString(),
                existingMainImages: existingMainImages,
                newMainFiles: newMainFiles,
                existingSizeImages: existingSizeImages,
                newSizeFiles: newSizeFiles
            });
        };

        if(!isOpen) return null;

        return ReactDOM.createPortal(
            <div className={`fixed inset-0 ${zIndex} flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in`}>
                <div className="bg-[#F8FAFC] rounded-[2rem] w-full max-w-md overflow-hidden shadow-2xl flex flex-col max-h-[85vh] animate-scale-in">
                    <div className="px-6 py-4 bg-white/80 backdrop-blur-sm flex justify-between items-center border-b border-gray-100 z-10 sticky top-0">
                        <div>
                            <h3 className="font-extrabold text-xl text-gray-800 tracking-tight">{product?.id ? 'แก้ไขสินค้า' : 'เพิ่มสินค้าใหม่'}</h3>
                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">{product?.id ? `#${product.id}` : 'CREATE NEW'}</p>
                        </div>
                        <button onClick={onClose} className="w-9 h-9 rounded-full bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-500 flex items-center justify-center transition-all shadow-sm">
                            <Icon name="x" weight="bold" size={18}/>
                        </button>
                    </div>

                    <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                        <div className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">ชื่อสินค้า</label>
                                <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="ระบุชื่อสินค้า..." className="w-full px-4 py-3.5 bg-white rounded-2xl text-sm font-bold text-gray-700 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm placeholder-gray-300"/>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">ราคา (บาท)</label>
                                    <input type="number" value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="w-full pl-4 pr-4 py-3.5 bg-white rounded-2xl text-lg font-black text-indigo-600 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm" placeholder="0"/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">สต็อก (ชิ้น)</label>
                                    <input type="number" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} className="w-full px-4 py-3.5 bg-white rounded-2xl text-lg font-black text-gray-700 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm" placeholder="0"/>
                                </div>
                            </div>
                        </div>

                        <div className="border-t border-dashed border-gray-200"></div>

                        <ImageManager label="รูปภาพสินค้า" existingUrls={existingMainImages} newImages={newMainFiles} onRemoveExisting={handleDelMainExist} onRemoveNew={handleDelMainNew} onAddNew={handleAddMain} />
                        <ImageManager label="ตารางไซส์" existingUrls={existingSizeImages} newImages={newSizeFiles} onRemoveExisting={handleDelSizeExist} onRemoveNew={handleDelSizeNew} onAddNew={handleAddSize} />

                        <div className="border-t border-dashed border-gray-200"></div>

                        <div className="space-y-3">
                            <div className="flex justify-between items-center">
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1.5"><Icon name="sliders" weight="fill"/> ตัวเลือกสินค้า</label>
                                <button onClick={handleAddGroup} className="text-[10px] bg-white border border-gray-200 px-3 py-1.5 rounded-full font-bold text-gray-500 hover:text-primary hover:border-primary transition shadow-sm">+ เพิ่มหัวข้อ</button>
                            </div>
                            {optionGroups.map((group, gIdx) => (
                                <div key={gIdx} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 relative group transition-all hover:shadow-md">
                                    {optionGroups.length > 1 && (<button onClick={() => handleRemoveGroup(gIdx)} className="absolute -top-2 -right-2 text-white bg-red-400 rounded-full w-6 h-6 flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 transition-all z-10"><Icon name="x" size={12} weight="bold"/></button>)}
                                    <input type="text" value={group.header} onChange={e => handleHeaderChange(gIdx, e.target.value)} className="w-full mb-3 px-0 py-1 bg-transparent border-b border-gray-100 text-sm font-bold text-primary placeholder-indigo-200 focus:border-primary outline-none" placeholder="ชื่อหัวข้อ (เช่น สี, ไซส์)"/>
                                    <div className="space-y-2">
                                        {group.options.map((opt, oIdx) => (
                                            <div key={oIdx} className="flex gap-2 items-center">
                                                <div className="flex-1 bg-gray-50 rounded-xl px-3 py-2 flex items-center border border-transparent focus-within:border-indigo-200 focus-within:bg-white transition-colors">
                                                    <input type="text" value={opt.label} onChange={e => handleOptionChange(gIdx, oIdx, 'label', e.target.value)} className="w-full text-xs font-bold bg-transparent outline-none text-gray-600" placeholder="ชื่อตัวเลือก"/>
                                                </div>
                                                <div className="w-20 bg-gray-50 rounded-xl px-2 py-2 flex items-center border border-transparent focus-within:border-indigo-200 focus-within:bg-white transition-colors">
                                                    <span className="text-[10px] text-gray-400 mr-1">+</span>
                                                    <input type="number" value={opt.price} onChange={e => handleOptionChange(gIdx, oIdx, 'price', e.target.value)} className="w-full text-xs font-bold bg-transparent outline-none text-gray-600 text-center" placeholder="0"/>
                                                </div>
                                                <button onClick={() => handleRemoveOption(gIdx, oIdx)} className="w-8 h-8 flex items-center justify-center text-gray-300 hover:text-red-400 hover:bg-red-50 rounded-full transition"><Icon name="trash" size={14} weight="bold"/></button>
                                            </div>
                                        ))}
                                        <button onClick={() => handleAddOption(gIdx)} className="w-full py-2 mt-2 border border-dashed border-indigo-100 text-indigo-400 text-[10px] font-bold rounded-xl hover:bg-indigo-50 hover:border-indigo-200 transition-colors">+ เพิ่มตัวเลือกย่อย</button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="bg-white p-2 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between">
                            <label className="text-xs font-bold text-gray-500 ml-2">สถานะการขาย</label>
                            <div className="relative w-1/2">
                                <select value={form.status} onChange={e => setForm({...form, status: e.target.value})} className={`w-full py-2 pl-4 pr-8 rounded-xl text-xs font-bold outline-none appearance-none cursor-pointer transition-colors ${form.status === 'ON' ? 'bg-green-100 text-green-700' : (form.status === 'OUT' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-500')}`}>
                                    <option value="ON">🟢 พร้อมส่ง (ON)</option>
                                    <option value="OFF">⚪️ ปิดการขาย (OFF)</option>
                                    <option value="OUT">🟠 สินค้าหมด (OUT)</option>
                                </select>
                                <Icon name="caret-down" weight="bold" size={12} className="absolute right-3 top-1/2 -translate-y-1/2 opacity-50 pointer-events-none"/>
                            </div>
                        </div>
                    </div>

                    <div className="p-4 bg-white border-t border-gray-50 z-10 sticky bottom-0">
                        <button onClick={handleSubmit} disabled={loading} className="w-full py-4 rounded-2xl font-bold text-white shadow-lg shadow-indigo-200 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 transform active:scale-95 transition-all flex items-center justify-center gap-2">
                            {loading ? <><Icon name="spinner" className="animate-spin" weight="bold"/> กำลังบันทึกข้อมูล...</> : <><Icon name="check-circle" weight="bold" size={20}/> บันทึกสินค้า</>}
                        </button>
                    </div>
                </div>
            </div>,
            document.body
        );
    };

    // --- Settings View ---
    const SettingsView = ({ data, setData, orderData, setAnnounceForm, setIsAnnounceModalOpen, onOpenQrManager, onEditQr, onToggleOrderSystem, processingAction, setProcessingAction, onViewImage }) => {
        const isMaintenance = data.systemStatus === 'ON';
        const [mMsg, setMMsg] = useState(data.config?.maintenanceMsg || '');
        const [confirmModal, setConfirmModal] = useState({ isOpen: false, type: '', targetStatus: '' });
        const [successModal, setSuccessModal] = useState(false);

        // ✅ State สำหรับเปลี่ยนรหัสผ่าน
        const [pwdForm, setPwdForm] = useState({ current: '', newPwd: '', confirm: '' });

        const rawAnnounce = String(data.announcement || '').trim();
        const isImageAnnounce = rawAnnounce.startsWith('http://') || rawAnnounce.startsWith('https://');
        const announceContent = isImageAnnounce ? getDirectImageUrl(rawAnnounce) : rawAnnounce;
        const qrCodes = data.amount?.qrCodes || [];

        const handleSaveMsg = () => {
            setProcessingAction('SAVING_CONFIG');
            db.collection('config').doc('system').set({ maintenanceMsg: mMsg }, { merge: true }).then(() => { setProcessingAction(null); setSuccessModal(true); });
        };

        const confirmToggleMaintenance = () => {
            setProcessingAction('TOGGLING_SYSTEM');
            setConfirmModal({ ...confirmModal, isOpen: false });
            apiCall('toggleMaintenance', confirmModal.targetStatus).then((newData) => { setData(newData); setProcessingAction(null); setSuccessModal(true); }).catch((err) => { setProcessingAction(null); alert("เกิดข้อผิดพลาด: " + err.message); });
        };

        const handleConfirm = () => {
            if (confirmModal.type === 'MAINTENANCE') confirmToggleMaintenance();
            else if (confirmModal.type === 'ORDER') { setConfirmModal({ ...confirmModal, isOpen: false }); onToggleOrderSystem(confirmModal.targetStatus === 'ON'); }
        };

        // ✅ ฟังก์ชันเปลี่ยนรหัสผ่าน
        const handleChangePassword = (e) => {
            e.preventDefault();
            if (pwdForm.newPwd !== pwdForm.confirm) return alert('รหัสผ่านใหม่ไม่ตรงกัน');
            if (pwdForm.newPwd.length < 6) return alert('รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร');
            
            setProcessingAction('CHANGING_PWD');
            apiCall('changeAdminPassword', pwdForm.current, pwdForm.newPwd)
                .then(() => { setProcessingAction(null); setPwdForm({current: '', newPwd: '', confirm: ''}); alert('เปลี่ยนรหัสผ่านสำเร็จ! กรุณาใช้รหัสใหม่ในการล็อกอินครั้งต่อไป'); })
                .catch((err) => { setProcessingAction(null); alert('เปลี่ยนรหัสผ่านไม่สำเร็จ: ' + err.message); });
        };

        // ✅ ฟังก์ชันออกจากระบบ
        const handleLogout = () => {
            if(window.confirm('ต้องการออกจากระบบใช่หรือไม่?')) firebase.auth().signOut();
        };

        return (
            <div className="space-y-6 animate-fade-in pb-24 relative">
                <ScrollToTopBottom />
                
                <div className="px-2 pt-2 flex justify-between items-center">
                    <div>
                        <h2 className="text-2xl font-bold text-gray-800 tracking-tight">ตั้งค่าระบบ</h2>
                        <p className="text-xs text-gray-500 mt-1">จัดการสถานะระบบ, ประกาศ และบัญชีรับเงิน</p>
                    </div>
                    <button onClick={handleLogout} className="px-4 py-2 bg-red-50 text-red-600 font-bold rounded-xl text-sm flex items-center gap-2 hover:bg-red-100 transition shadow-sm border border-red-100">
                        <Icon name="sign-out" weight="bold"/> ออกจากระบบ
                    </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mx-1">
                    
                    {/* เปลี่ยนรหัสผ่านแอดมิน */}
                    <div className="bg-white p-5 rounded-[2rem] card-shadow border border-gray-100 md:col-span-2 flex flex-col md:flex-row gap-6">
                        <div className="md:w-1/3">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2 mb-1"><Icon name="key" className="text-blue-500" weight="fill" size={20}/> เปลี่ยนรหัสผ่านแอดมิน</h3>
                            <p className="text-xs text-gray-500">กรุณาใช้รหัสผ่านที่คาดเดายากและมีความยาวอย่างน้อย 6 ตัวอักษรขึ้นไป</p>
                        </div>
                        <form onSubmit={handleChangePassword} className="flex-1 space-y-3">
                            <div><input type="password" value={pwdForm.current} onChange={e => setPwdForm({...pwdForm, current: e.target.value})} placeholder="รหัสผ่านปัจจุบัน" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium outline-none focus:border-blue-500" required/></div>
                            <div className="grid grid-cols-2 gap-3">
                                <input type="password" value={pwdForm.newPwd} onChange={e => setPwdForm({...pwdForm, newPwd: e.target.value})} placeholder="รหัสผ่านใหม่" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium outline-none focus:border-blue-500" required/>
                                <input type="password" value={pwdForm.confirm} onChange={e => setPwdForm({...pwdForm, confirm: e.target.value})} placeholder="ยืนยันรหัสผ่านใหม่" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium outline-none focus:border-blue-500" required/>
                            </div>
                            <button type="submit" disabled={!!processingAction || !pwdForm.current || !pwdForm.newPwd || !pwdForm.confirm} className="py-2.5 px-4 bg-gray-800 text-white font-bold rounded-xl text-xs hover:bg-gray-700 transition disabled:opacity-50 float-right">อัปเดตรหัสผ่าน</button>
                        </form>
                    </div>

                    {/* โหมดปิดปรับปรุงระบบ */}
                    <div className={`p-5 rounded-[2rem] card-shadow border relative overflow-hidden transition-all ${isMaintenance ? 'bg-red-50 border-red-200' : 'bg-white border-gray-100'}`}>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2"><Icon name="power" weight="fill" className={isMaintenance ? 'text-red-500' : 'text-gray-400'} size={20}/>โหมดปรับปรุงระบบ<span className={`px-2 py-0.5 rounded-lg text-[10px] font-bold ${isMaintenance ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-500'}`}>{isMaintenance ? 'ON' : 'OFF'}</span></h3>
                            <div onClick={() => !processingAction && setConfirmModal({ isOpen: true, type: 'MAINTENANCE', targetStatus: isMaintenance ? 'OFF' : 'ON' })} className={`w-12 h-7 rounded-full p-1 cursor-pointer transition-all ${isMaintenance ? 'bg-red-500' : 'bg-gray-300'}`}><div className={`w-5 h-5 bg-white rounded-full shadow transform transition ${isMaintenance ? 'translate-x-5' : 'translate-x-0'}`} /></div>
                        </div>
                        <div className="space-y-2"><label className="text-[10px] font-bold text-gray-400 uppercase">ข้อความแจ้งเตือน (โชว์เมื่อปิดระบบ)</label><div className="flex gap-2"><input type="text" value={mMsg} onChange={(e) => setMMsg(e.target.value)} placeholder="เช่น ขออภัย ระบบกำลังอัปเดต..." className="flex-1 px-3 py-2 bg-white border border-gray-200 rounded-xl text-xs outline-none focus:border-red-300"/><button onClick={handleSaveMsg} disabled={processingAction === 'SAVING_CONFIG'} className="px-3 py-2 bg-gray-800 text-white rounded-xl text-[10px] font-bold hover:bg-gray-700 transition">บันทึก</button></div></div>
                    </div>

                    {/* เปิด-ปิดระบบร้านค้า */}
                    <div className={`p-5 rounded-[2rem] card-shadow border relative overflow-hidden transition-all ${orderData?.systemStatus === 'ON' ? 'bg-green-50 border-green-200' : 'bg-white border-gray-100'}`}>
                         <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-gray-800 flex items-center gap-2"><Icon name="storefront" weight="fill" className={orderData?.systemStatus === 'ON' ? 'text-green-600' : 'text-gray-400'} size={20}/>รับออเดอร์ร้านค้า<span className={`px-2 py-0.5 rounded-lg text-[10px] font-bold ${orderData?.systemStatus === 'ON' ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500'}`}>{orderData?.systemStatus === 'ON' ? 'ON' : 'OFF'}</span></h3><div onClick={() => !processingAction && setConfirmModal({ isOpen: true, type: 'ORDER', targetStatus: orderData?.systemStatus === 'ON' ? 'OFF' : 'ON' })} className={`w-12 h-7 rounded-full p-1 cursor-pointer transition-all ${orderData?.systemStatus === 'ON' ? 'bg-green-500' : 'bg-gray-300'}`}><div className={`w-5 h-5 bg-white rounded-full shadow transform transition ${orderData?.systemStatus === 'ON' ? 'translate-x-5' : 'translate-x-0'}`} /></div></div><p className="text-xs text-gray-500 mt-1">{orderData?.systemStatus === 'ON' ? 'นักศึกษาสามารถกดสั่งซื้อสินค้าได้ตามปกติ' : 'หน้าร้านค้าจะถูกปิดใช้งานชั่วคราว'}</p>
                    </div>

                    {/* ประกาศจากระบบ */}
                    <div className="bg-white p-5 rounded-[2rem] card-shadow border border-gray-100 flex flex-col gap-2 relative overflow-hidden md:col-span-2">
                        <div className="flex justify-between items-center mb-1"><div className="flex items-center gap-2"><div className="bg-blue-50 text-blue-600 p-1.5 rounded-lg"><Icon name="megaphone" weight="fill" size={16}/></div><h3 className="font-bold text-gray-800 text-sm">ประกาศจากระบบ (แบนเนอร์)</h3></div><button onClick={() => { setAnnounceForm({ type: isImageAnnounce ? 'image' : 'text', text: isImageAnnounce ? '' : rawAnnounce, fileBase64: '', preview: isImageAnnounce ? announceContent : '' }); setIsAnnounceModalOpen(true); }} className="text-gray-400 hover:text-blue-600 transition bg-gray-50 hover:bg-blue-50 p-1.5 rounded-lg"><Icon name="pencil-simple" weight="bold" size={14}/> แก้ไขประกาศ</button></div>
                        {isImageAnnounce ? (<div className="w-full h-32 md:h-48 bg-gray-100 rounded-xl overflow-hidden cursor-pointer hover:opacity-90 transition border border-gray-200" onClick={() => onViewImage(announceContent)}><img src={announceContent} className="w-full h-full object-cover" alt="Announcement" referrerPolicy="no-referrer"/></div>) : (<div className="bg-blue-50/50 p-4 rounded-xl border border-blue-50 min-h-[60px] flex items-center"><p className="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap">{announceContent || "ไม่มีประกาศในขณะนี้..."}</p></div>)}
                    </div>
                </div>

                {/* 4. บัญชีรับเงิน (QR Wallet) */}
                <div className="pt-4 px-1">
                    <div className="flex justify-between items-center px-2 mb-3"><h3 className="text-gray-800 font-bold text-lg flex items-center gap-2"><Icon name="qr-code" className="text-primary"/> บัญชีรับเงิน (QR Code)</h3><button onClick={onOpenQrManager} className="text-primary text-xs font-bold bg-blue-50 px-3 py-1.5 rounded-full hover:bg-blue-100 transition shadow-sm">+ เพิ่มบัญชี</button></div>
                    {qrCodes.length > 0 ? (<div className="flex gap-4 overflow-x-auto no-scrollbar pb-4 px-2 snap-x">{qrCodes.map((qr, idx) => (<div key={idx} className="snap-center min-w-[260px] h-[160px] bg-gradient-to-br from-gray-800 to-gray-900 rounded-3xl p-4 text-white relative shadow-lg flex flex-col justify-between group"><div className="absolute top-0 right-0 w-24 h-24 bg-white/5 rounded-full blur-2xl -translate-y-4 translate-x-4"></div><div className="flex justify-between items-start z-10"><div className="bg-white/10 backdrop-blur-md p-1.5 rounded-xl border border-white/10"><Icon name="qr-code" size={20} className="text-white"/></div><div className="text-right"><p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">ยอดสำหรับสแกนจ่าย</p><p className="text-lg font-bold">฿{Number(qr.amount).toLocaleString()}</p></div></div><div className="flex gap-4 items-center z-10 mt-2"><div className="w-16 h-16 bg-white p-1 rounded-xl"><img src={getDirectImageUrl(qr.url)} className="w-full h-full object-contain mix-blend-multiply" referrerPolicy="no-referrer" alt="QR"/></div><div className="flex-1"><button onClick={() => onEditQr(qr)} className="w-full py-2 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-lg text-xs font-bold transition border border-white/5">แก้ไข / ลบ</button></div></div></div>))}</div>) : (<div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl p-8 flex flex-col items-center justify-center text-gray-400 gap-3"><Icon name="wallet" size={48} className="opacity-30" weight="duotone"/><p className="text-sm">ยังไม่มีบัญชีรับเงิน</p></div>)}
                </div>

                <Modal isOpen={confirmModal.isOpen} onClose={() => setConfirmModal({ isOpen: false, type: '', targetStatus: '' })} title="ยืนยันการเปลี่ยนสถานะ" zIndex="z-[100]"><div className="text-center pt-2 space-y-4"><div className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center ${confirmModal.targetStatus === 'ON' ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'}`}><Icon name={confirmModal.type === 'MAINTENANCE' ? "power" : "storefront"} weight="fill" size={32}/></div><div><h3 className="font-bold text-gray-800 text-lg">ยืนยันการ {confirmModal.targetStatus === 'ON' ? 'เปิด' : 'ปิด'} ระบบ</h3></div><div className="flex gap-3 pt-2"><button onClick={() => setConfirmModal({ isOpen: false, type: '', targetStatus: '' })} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ยกเลิก</button><button onClick={handleConfirm} className={`flex-1 py-3 text-white font-bold rounded-xl shadow-lg transition ${confirmModal.targetStatus === 'ON' ? 'bg-green-600 hover:bg-green-700 shadow-green-200' : 'bg-red-600 hover:bg-red-700 shadow-red-200'}`}>ยืนยัน</button></div></div></Modal>
                <Modal isOpen={successModal} onClose={() => setSuccessModal(false)} title="เรียบร้อย" zIndex="z-[110]"><div className="text-center pt-2 space-y-4"><div className="w-16 h-16 mx-auto rounded-full flex items-center justify-center bg-green-100 text-green-500"><Icon name="check-circle" weight="fill" size={32}/></div><div><h3 className="font-bold text-gray-800 text-lg">บันทึกเรียบร้อย</h3><p className="text-sm text-gray-500 mt-1">การตั้งค่าถูกบันทึกแล้ว</p></div><button onClick={() => setSuccessModal(false)} className="w-full py-3 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 shadow-lg shadow-green-200 transition">ตกลง</button></div></Modal>
            </div>
        );
    };
   // --- Order Summary Modal (แก้ไขป้องกันจอขาวจาก Timestamp และ Array) ---
    const OrderSummaryModal = ({ isOpen, onClose, orders, zIndex = "z-[110]", products = [] }) => {
      const [dateFilter, setDateFilter] = useState({ start: '', end: '' });
      const [selectedProducts, setSelectedProducts] = useState([]);
      const [isProductDrawerOpen, setIsProductDrawerOpen] = useState(false);

      useEffect(() => {
          if (isOpen) {
              setDateFilter({ start: '', end: '' });
              setSelectedProducts([]);
              setIsProductDrawerOpen(false); 
          }
      }, [isOpen]);

      // ✅ Helper ป้องกันแอปพังจาก Firestore Timestamp
      const parseDateSafe = (dateVal) => {
          if (!dateVal) return new Date(0);
          if (dateVal.toDate && typeof dateVal.toDate === 'function') return dateVal.toDate(); // Firestore Timestamp
          if (dateVal.seconds) return new Date(dateVal.seconds * 1000); // Raw Firestore Object
          return new Date(dateVal);
      };

      const getThaiDateDisplay = (dateVal) => {
          if (!dateVal) return '';
          try {
              const date = parseDateSafe(dateVal);
              if(isNaN(date.getTime())) return '';
              return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
          } catch(e) { return ''; }
      };

      const availableProductNames = useMemo(() => {
          if (!orders) return [];
          const names = new Set();
          orders.forEach(o => {
              if (o.items) {
                  // ✅ ป้องกันจอขาวกรณีข้อมูลไม่เป็น String
                  const itemsStr = typeof o.items === 'string' ? o.items : String(o.items || '');
                  itemsStr.split(',').forEach(itemStr => {
                      const match = itemStr.trim().match(/(.+?)\s+x\s*(\d+)/);
                      if (match) names.add(match[1].trim());
                  });
              }
          });
          return Array.from(names).sort();
      }, [orders]);

      const toggleProduct = (name) => {
          if (selectedProducts.includes(name)) setSelectedProducts(prev => prev.filter(n => n !== name));
          else setSelectedProducts(prev => [...prev, name]);
      };

      const selectAll = () => setSelectedProducts([...availableProductNames]);
      const clearSelection = () => setSelectedProducts([]);

      const filteredOrders = useMemo(() => {
          if (!isOpen || !orders) return [];
          return orders.filter(o => {
              if (o.status === 'ยกเลิก') return false;
              if (dateFilter.start || dateFilter.end) {
                  const orderDate = parseDateSafe(o.date); 
                  orderDate.setHours(0,0,0,0);
                  let checkYear = orderDate.getFullYear();
                  if (checkYear > 2400) orderDate.setFullYear(checkYear - 543);
                  if (dateFilter.start) { const start = new Date(dateFilter.start); start.setHours(0,0,0,0); if (orderDate < start) return false; }
                  if (dateFilter.end) { const end = new Date(dateFilter.end); end.setHours(0,0,0,0); if (orderDate > end) return false; }
              }
              return true;
          });
      }, [isOpen, orders, dateFilter]);

      const summary = useMemo(() => {
          const itemMap = {};
          let totalOrderRevenue = 0; 

          filteredOrders.forEach(o => {
              const orderPrice = Number(o.price) || 0;
              totalOrderRevenue += orderPrice;

              if (o.items) {
                  const itemsInThisOrder = [];
                  let totalQtyInOrder = 0;
                  const itemsStr = typeof o.items === 'string' ? o.items : String(o.items || '');

                  itemsStr.split(',').forEach(itemStr => {
                      const match = itemStr.trim().match(/(.+?)\s+x\s*(\d+)/);
                      if (match) {
                          const name = match[1].trim();
                          const qty = parseInt(match[2]) || 0;
                          itemsInThisOrder.push({ name, qty });
                          totalQtyInOrder += qty;
                      }
                  });

                  itemsInThisOrder.forEach(item => {
                      const ratio = totalQtyInOrder > 0 ? (item.qty / totalQtyInOrder) : 0;
                      const moneyShare = ratio * orderPrice; 

                      if (!itemMap[item.name]) itemMap[item.name] = { name: item.name, qty: 0, totalRealMoney: 0 };
                      itemMap[item.name].qty += item.qty;
                      itemMap[item.name].totalRealMoney += moneyShare;
                  });
              }
          });

          let itemsArray = Object.values(itemMap).map(item => ({
              ...item,
              avgPrice: item.qty > 0 ? (item.totalRealMoney / item.qty) : 0
          }));

          if (selectedProducts.length > 0) itemsArray = itemsArray.filter(i => selectedProducts.includes(i.name));

          const displayedRevenue = (selectedProducts.length === 0) 
              ? totalOrderRevenue 
              : itemsArray.reduce((sum, item) => sum + item.totalRealMoney, 0);

          return {
              totalRevenue: displayedRevenue,
              items: itemsArray.sort((a, b) => b.totalRealMoney - a.totalRealMoney)
          };
      }, [filteredOrders, selectedProducts]);

      const tableTotal = summary.items.reduce((acc, curr) => ({ 
          qty: acc.qty + curr.qty, 
          money: acc.money + curr.totalRealMoney 
      }), { qty: 0, money: 0 });

      if (!isOpen) return null;

      return (
        <Modal isOpen={isOpen} onClose={onClose} title="สรุปยอดขายสินค้า" zIndex={zIndex}>
           <div className="space-y-4">
              <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-3">
                  <div className="flex items-center gap-2 text-gray-500 font-bold text-xs"><Icon name="funnel" weight="fill"/> ตัวกรองข้อมูล</div>
                  <div className="flex gap-2 items-start">
                      <div className="flex-1">
                          <input type="date" value={dateFilter.start} onChange={e => setDateFilter({...dateFilter, start: e.target.value})} className="w-full text-xs p-2 rounded-lg border border-gray-200 outline-none bg-white focus:border-blue-500 transition"/>
                          {dateFilter.start && <p className="text-[10px] text-blue-600 font-bold mt-1 text-center bg-blue-50 rounded px-1">{getThaiDateDisplay(dateFilter.start)}</p>}
                      </div>
                      <span className="text-gray-400 self-center mt-2">-</span>
                      <div className="flex-1">
                          <input type="date" value={dateFilter.end} onChange={e => setDateFilter({...dateFilter, end: e.target.value})} className="w-full text-xs p-2 rounded-lg border border-gray-200 outline-none bg-white focus:border-blue-500 transition"/>
                          {dateFilter.end && <p className="text-[10px] text-blue-600 font-bold mt-1 text-center bg-blue-50 rounded px-1">{getThaiDateDisplay(dateFilter.end)}</p>}
                      </div>
                  </div>
                  <div className="border border-gray-200 rounded-xl bg-white overflow-hidden transition-all duration-300">
                      <div onClick={() => setIsProductDrawerOpen(!isProductDrawerOpen)} className={`p-3 flex justify-between items-center cursor-pointer transition-colors ${isProductDrawerOpen ? 'bg-gray-100' : 'hover:bg-gray-50'}`}>
                          <div className="flex items-center gap-2">
                              <div className={`p-1.5 rounded-lg ${selectedProducts.length > 0 ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}`}>
                                  <Icon name="t-shirt" weight="bold" size={16}/>
                              </div>
                              <span className={`text-xs font-bold ${selectedProducts.length > 0 ? 'text-blue-600' : 'text-gray-600'}`}>
                                  {selectedProducts.length > 0 ? `เลือกไว้ ${selectedProducts.length} รายการ` : 'แสดงสินค้าทั้งหมด'}
                              </span>
                          </div>
                          <Icon name={isProductDrawerOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/>
                      </div>
                      {isProductDrawerOpen && (
                          <div className="p-3 border-t border-gray-100 bg-gray-50/50 animate-fade-in">
                              <div className="flex justify-end gap-2 mb-2">
                                  <button onClick={selectAll} className="text-[10px] bg-white border border-gray-200 text-blue-600 px-2 py-1 rounded hover:bg-blue-50 font-bold shadow-sm">เลือกทั้งหมด</button>
                                  <button onClick={clearSelection} className="text-[10px] bg-white border border-gray-200 text-gray-500 px-2 py-1 rounded hover:bg-gray-50 shadow-sm">ล้างค่า</button>
                              </div>
                              <div className="max-h-40 overflow-y-auto space-y-1 custom-scrollbar pr-1">
                                  {availableProductNames.map((name, idx) => {
                                      const isSelected = selectedProducts.includes(name);
                                      return (
                                          <div key={idx} onClick={() => toggleProduct(name)} className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer text-xs transition-colors ${isSelected ? 'bg-blue-50 text-blue-700 font-bold border border-blue-100' : 'bg-white hover:bg-gray-100 border border-transparent'}`}>
                                              <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300 bg-white'}`}>
                                                  {isSelected && <Icon name="check" size={10} className="text-white" weight="bold"/>}
                                              </div>
                                              <span className="line-clamp-1">{name}</span>
                                          </div>
                                      );
                                  })}
                                  {availableProductNames.length === 0 && <p className="text-center text-gray-300 text-[10px] py-2">ไม่มีรายการสินค้า</p>}
                              </div>
                          </div>
                      )}
                  </div>
              </div>

              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-4 text-white shadow-lg shadow-blue-200 flex justify-between items-center relative overflow-hidden">
                  <div className="absolute -right-4 -top-4 w-20 h-20 bg-white opacity-10 rounded-full blur-2xl"></div>
                  <div>
                      <p className="text-blue-100 text-xs font-bold mb-1">
                          {selectedProducts.length === 0 ? 'ยอดขายรวม (ทั้งหมด)' : `ยอดขายรวม (${selectedProducts.length} รายการ)`}
                      </p>
                      <h2 className="text-3xl font-extrabold">฿{summary.totalRevenue.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</h2>
                  </div>
                  <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm"><Icon name="chart-line-up" weight="fill" size={24}/></div>
              </div>

              <div>
                  <h4 className="text-xs font-bold text-gray-500 mb-2 flex items-center gap-1"><Icon name="list-dashes" weight="bold"/> รายละเอียดสินค้า</h4>
                  <div className="border border-gray-100 rounded-xl overflow-hidden max-h-[40vh] overflow-y-auto">
                      <table className="w-full text-sm">
                          <thead className="bg-gray-50 text-gray-500 font-bold text-xs sticky top-0 shadow-sm z-10">
                              <tr>
                                  <th className="p-3 text-left">สินค้า</th>
                                  <th className="p-3 text-center">จำนวน</th>
                                  <th className="p-3 text-right">ยอดรวม</th>
                              </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                              {summary.items.map((item, idx) => (
                                  <tr key={idx} className="hover:bg-gray-50/50">
                                      <td className="p-3">
                                          <div className="font-bold text-gray-700">{item.name}</div>
                                          <div className="text-[10px] text-gray-400">ตัวละ {item.avgPrice.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})} บ.</div>
                                      </td>
                                      <td className="p-3 text-center"><span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-md font-bold text-xs">{item.qty}</span></td>
                                      <td className="p-3 text-right font-bold text-gray-800">{item.totalRealMoney.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})}</td>
                                  </tr>
                              ))}
                              {summary.items.length === 0 && (<tr><td colSpan="3" className="p-8 text-center text-gray-300 text-xs">ไม่พบรายการขาย</td></tr>)}
                          </tbody>
                          {summary.items.length > 0 && (
                            <tfoot className="bg-gray-100 font-bold text-xs sticky bottom-0 z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                                <tr>
                                    <td className="p-3 text-right text-gray-600">รวมทั้งหมด</td>
                                    <td className="p-3 text-center text-blue-600">{tableTotal.qty}</td>
                                    <td className="p-3 text-right text-indigo-700 text-sm">{tableTotal.money.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</td>
                                </tr>
                            </tfoot>
                          )}
                      </table>
                  </div>
              </div>
              <button onClick={onClose} className="w-full py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ปิดหน้าต่าง</button>
           </div>
        </Modal>
      );
    };

    // --- Order View (ตัดส่วน Manage ออก ย้ายไป Settings) ---
    const OrderView = ({ orderData, students, onSaveProduct, onDeleteProduct, onDeleteOrder, onUpdateStatus, onViewSlip, loading, onEditOrder, setOrderData }) => {
        const [subTab, setSubTab] = useState('orders');
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [isScannerOpen, setIsScannerOpen] = useState(false);
        const [editingProduct, setEditingProduct] = useState(null);
        const [searchTerm, setSearchTerm] = useState('');
        const [isSummaryOpen, setIsSummaryOpen] = useState(false);
        const [editingOrder, setEditingOrder] = useState(null);
        const [isEditOrderModalOpen, setIsEditOrderModalOpen] = useState(false);

        const [isBulkStatusOpen, setIsBulkStatusOpen] = useState(false);
        const [bulkTargetStatus, setBulkTargetStatus] = useState('ชำระแล้ว');
        const [isProcessingBulk, setIsProcessingBulk] = useState(false);
        const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0 });
        const [alertState, setAlertState] = useState({ isOpen: false, title: '', message: '', onConfirm: null, type: 'info' });

        const parseDateSafe = (dateVal) => {
            if (!dateVal) return new Date(0);
            if (dateVal.toDate && typeof dateVal.toDate === 'function') return dateVal.toDate();
            if (dateVal.seconds) return new Date(dateVal.seconds * 1000); 
            return new Date(dateVal);
        };

        const formatDateSafe = (dateVal) => {
            if (!dateVal) return '-';
            try { 
                const d = parseDateSafe(dateVal);
                if (isNaN(d.getTime())) return '-';
                return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute:'2-digit' }); 
            } catch (e) { return '-'; }
        };

        const parseOrderItems = (itemsStr) => {
            if (!itemsStr) return [];
            const safeStr = typeof itemsStr === 'string' ? itemsStr : String(itemsStr || '');
            const rawItems = safeStr.includes('\n') ? safeStr.split('\n') : safeStr.split(/,(?![^(]*\))/);
            
            return rawItems.map(raw => {
                let text = raw.trim();
                if (!text) return null;
                const qtyMatch = text.match(/\s*x\s*(\d+)$/i);
                let qty = 1; let nameWithOptions = text;
                if (qtyMatch) {
                    qty = parseInt(qtyMatch[1], 10);
                    nameWithOptions = text.slice(0, qtyMatch.index).trim();
                }

                let name = nameWithOptions; let options = [];
                const optMatch = nameWithOptions.match(/\(([^)]+)\)$/);
                if (optMatch) {
                    const insideParens = optMatch[1];
                    if (insideParens.includes(':') || insideParens.includes(',')) {
                        name = nameWithOptions.slice(0, optMatch.index).trim();
                        options = insideParens.split(',').map(opt => opt.trim());
                    }
                }
                return { name, options, qty, original: text };
            }).filter(Boolean);
        };

        const safeProducts = Array.isArray(orderData?.products) ? orderData.products : [];
        const safeOrders = Array.isArray(orderData?.orders) ? orderData.orders : [];
        const filteredProducts = safeProducts.filter(p => String(p.name||'').toLowerCase().includes(searchTerm.toLowerCase()));
        
        const filteredOrders = safeOrders.filter(o => { 
            const sName = students?.find(s => String(s.id) === String(o.studentId))?.name || ''; 
            const term = searchTerm.toLowerCase(); 
            const safeVal = (v) => String(v || '').toLowerCase(); 
            return safeVal(o.orderId).includes(term) || safeVal(o.studentId).includes(term) || safeVal(sName).includes(term); 
        });

        const [sortOrder, setSortOrder] = useState('newest');
        const groupedOrders = useMemo(() => {
            const groups = {};
            filteredOrders.forEach(o => {
                const sId = String(o.studentId || 'ไม่มีรหัส');
                if (!groups[sId]) {
                    const sName = students?.find(s => String(s.id) === sId)?.name || 'ไม่พบชื่อนักศึกษา';
                    groups[sId] = { studentId: sId, studentName: sName, totalPrice: 0, orders: [], latestDate: 0 };
                }
                groups[sId].orders.push(o);
                groups[sId].totalPrice += Number(o.price) || 0;
                
                const orderTime = parseDateSafe(o.date).getTime() || 0;
                if (orderTime > groups[sId].latestDate) groups[sId].latestDate = orderTime;
            });
            
            return Object.values(groups).sort((a, b) => {
                return sortOrder === 'newest' ? b.latestDate - a.latestDate : a.latestDate - b.latestDate;
            });
        }, [filteredOrders, students, sortOrder]);
        
        const handleScanSuccess = (text) => setSearchTerm(text);
        const handleAddProduct = () => { setEditingProduct(null); setIsModalOpen(true); };
        const openEditOrderModal = (order) => { setEditingOrder(order); setIsEditOrderModalOpen(true); };
        
        const handleSaveEditedOrder = (formData) => {
            if(setOrderData) setOrderData(prev => ({ ...prev, orders: prev.orders.map(o => o.orderId === formData.orderId ? { ...o, ...formData } : o) }));
            setIsEditOrderModalOpen(false);
            onEditOrder(formData);
        };

        const confirmBulkStatusUpdate = () => {
            if (filteredOrders.length === 0) return;
            setIsBulkStatusOpen(false);
            setAlertState({ isOpen: true, type: 'info', title: 'ยืนยันการเปลี่ยนสถานะ', message: `คุณต้องการเปลี่ยนสถานะ ${filteredOrders.length} รายการ เป็น "${bulkTargetStatus}" ใช่หรือไม่?`, onConfirm: executeBulkStatusUpdate });
        };

        const executeBulkStatusUpdate = async () => {
            setAlertState(prev => ({ ...prev, isOpen: false }));
            setTimeout(async () => {
                setIsProcessingBulk(true); setBulkProgress({ current: 0, total: filteredOrders.length });
                let completed = 0;
                for (const order of filteredOrders) {
                    if (order.status !== bulkTargetStatus) {
                        await new Promise(resolve => { onUpdateStatus(order.orderId, bulkTargetStatus); setTimeout(resolve, 800); });
                    }
                    completed++; setBulkProgress(prev => ({ ...prev, current: completed }));
                }
                setIsProcessingBulk(false);
                setTimeout(() => { setAlertState({ isOpen: true, type: 'success', title: 'เรียบร้อย', message: `ดำเนินการเปลี่ยนสถานะ ${completed} รายการเสร็จสมบูรณ์`, onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false })) }); }, 500);
            }, 100);
        };

        const confirmBulkDelete = () => {
             if (filteredOrders.length === 0) return;
             setAlertState({ isOpen: true, type: 'danger', title: '⚠️ ยืนยันการลบข้อมูล', message: `คุณกำลังจะลบออเดอร์ ${filteredOrders.length} รายการ\nการกระทำนี้ไม่สามารถกู้คืนได้ ยืนยันหรือไม่?`, onConfirm: executeBulkDelete });
        };

        const executeBulkDelete = async () => {
             setAlertState(prev => ({ ...prev, isOpen: false }));
             setTimeout(async () => {
                setIsProcessingBulk(true); setBulkProgress({ current: 0, total: filteredOrders.length });
                let completed = 0;
                for (const order of filteredOrders) {
                    await new Promise(resolve => { onDeleteOrder(order.orderId); setTimeout(resolve, 800); });
                    completed++; setBulkProgress(prev => ({ ...prev, current: completed }));
                }
                setIsProcessingBulk(false);
                setTimeout(() => { setAlertState({ isOpen: true, type: 'success', title: 'เรียบร้อย', message: `ลบข้อมูล ${completed} รายการเสร็จสมบูรณ์`, onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false })) }); }, 500);
             }, 100);
        };

        const getOrderStatusStyle = (status) => {
            switch(status) {
                case 'ชำระแล้ว': return 'bg-emerald-50 text-emerald-700 border-emerald-200';
                case 'รอตรวจสอบ': return 'bg-amber-50 text-amber-700 border-amber-200';
                case 'ยกเลิก': return 'bg-gray-100 text-gray-500 border-gray-200';
                case 'อยู่ระหว่างผลิต': return 'bg-purple-50 text-purple-700 border-purple-200';
                case 'อยู่ระหว่างสั่งซื้อ': return 'bg-blue-50 text-blue-700 border-blue-200';
                case 'รอรับของ': return 'bg-pink-50 text-pink-700 border-pink-200';
                case 'รับแล้ว': return 'bg-teal-50 text-teal-700 border-teal-200';
                default: return 'bg-gray-50 text-gray-600 border-gray-200';
            }
        };

        const getProductStatusStyle = (status) => {
            if (status === 'ON') return 'bg-green-500 text-white';
            if (status === 'OUT') return 'bg-amber-500 text-white';
            return 'bg-gray-400 text-white';
        };

        return (
          <div className="space-y-5 pb-24 relative animate-fade-in">
             <ScrollToTopBottom />

             <div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex relative z-10 mt-2">
                 <button onClick={()=>setSubTab('orders')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'orders' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                     <Icon name="receipt" weight={subTab === 'orders' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">ออเดอร์ ({safeOrders.length})</span>
                 </button>
                 <button onClick={()=>setSubTab('products')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'products' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                     <Icon name="t-shirt" weight={subTab === 'products' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">สินค้า ({safeProducts.length})</span>
                 </button>
             </div>
             
             <div className="flex gap-2 sticky top-0 z-20 bg-background py-2">
                 <div className="flex-1 bg-white rounded-xl card-shadow border border-gray-100 flex items-center px-4 py-2.5 transition focus-within:ring-2 focus-within:ring-primary/20">
                     <Icon name="magnifying-glass" className="text-gray-400 mr-3" size={18} />
                     <input type="text" placeholder={subTab==='products'?"ค้นหาสินค้า...":"ค้นหาออเดอร์/ชื่อ..."} className="w-full bg-transparent text-sm font-medium text-gray-700 outline-none placeholder-gray-400" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                     {searchTerm && <button onClick={() => setSearchTerm('')} className="text-gray-400 hover:text-gray-600 ml-2"><Icon name="x-circle" weight="fill" /></button>}
                 </div>
                 
                 {subTab === 'orders' && (
                     <>
                         <button onClick={() => setIsSummaryOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="สรุปยอด"><Icon name="chart-pie-slice" weight="fill" size={20}/></button>
                         <button onClick={() => setIsScannerOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white text-gray-600 card-shadow border border-gray-100 hover:bg-gray-50 transition active:scale-95" title="สแกน QR"><Icon name="qr-code" weight="bold" size={20}/></button>
                         <button onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white text-gray-600 card-shadow border border-gray-100 hover:bg-gray-50 transition active:scale-95" title="เรียงลำดับ">
                             <Icon name={sortOrder === 'newest' ? "sort-descending" : "sort-ascending"} weight="bold" size={20}/>
                         </button>
                     </>
                 )}
                 {subTab === 'products' && (
                     <button onClick={handleAddProduct} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="เพิ่มสินค้า"><Icon name="plus" weight="bold" size={20}/></button>
                 )}
             </div>

             <div className="min-h-[300px]">
                  {subTab === 'products' && (
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 animate-fade-in">
                        {filteredProducts.map((p) => (
                            <div key={p.id} className="group bg-white p-3 rounded-2xl card-shadow border border-gray-100 hover:border-blue-200 transition relative overflow-hidden">
                                <div className="aspect-square bg-gray-50 rounded-xl mb-3 overflow-hidden flex items-center justify-center relative">
                                    <ProductImageGallery product={p} />
                                    <span className={`absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm z-20 ${getProductStatusStyle(p.status)}`}>{p.status}</span>
                                </div>
                                <h4 className="font-bold text-sm text-gray-800 line-clamp-1 mb-1">{p.name}</h4>
                                <div className="flex justify-between items-end">
                                    <p className="text-blue-600 font-extrabold">฿{Number(p.price).toLocaleString()}</p>
                                    <p className="text-[10px] text-gray-400 font-medium">Stock: {p.stock}</p>
                                </div>
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 z-30">
                                    <button onClick={()=>{setEditingProduct(p); setIsModalOpen(true);}} className="w-10 h-10 rounded-full bg-white text-blue-600 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="pencil-simple" weight="bold" size={20}/></button>
                                    <button onClick={()=>onDeleteProduct(p.id)} className="w-10 h-10 rounded-full bg-white text-red-500 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="trash" weight="bold" size={20}/></button>
                                </div>
                            </div>
                        ))}
                        {filteredProducts.length === 0 && (<div className="col-span-full flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="t-shirt" size={40} className="opacity-30 mb-2"/><p>ไม่พบสินค้า</p></div>)}
                    </div>
                  )}

                 {subTab === 'orders' && (
                   <div className="space-y-4 animate-fade-in">
                       {filteredOrders.length > 0 && (
                            <div className="bg-gray-50 p-2 rounded-xl flex gap-2 border border-gray-100">
                                 <button onClick={() => setIsBulkStatusOpen(true)} className="flex-1 py-2 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-200 transition flex items-center justify-center gap-1 border border-indigo-200 shadow-sm">
                                     <Icon name="arrows-clockwise" weight="bold"/> เปลี่ยนสถานะ ({filteredOrders.length})
                                 </button>
                                 <button onClick={confirmBulkDelete} className="flex-1 py-2 bg-red-100 text-red-700 rounded-lg text-xs font-bold hover:bg-red-200 transition flex items-center justify-center gap-1 border border-red-200 shadow-sm">
                                     <Icon name="trash" weight="bold"/> ลบทั้งหมด ({filteredOrders.length})
                                 </button>
                            </div>
                       )}

                       {groupedOrders.length === 0 && (
                           <div className="flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="shopping-bag" size={40} className="opacity-30 mb-2"/><p>{searchTerm ? "ไม่พบออเดอร์ที่ค้นหา" : "ไม่มีรายการสั่งซื้อ"}</p></div>
                       )}
                       
                       {groupedOrders.map((group) => (
                           <div key={group.studentId} className="bg-white rounded-3xl card-shadow border border-gray-100 overflow-hidden transition-all hover:shadow-lg">
                               <div className="p-4 bg-gradient-to-r from-slate-50 to-blue-50/50 border-b border-gray-100 flex justify-between items-center relative overflow-hidden">
                                   <div className="flex items-center gap-3 relative z-10">
                                       <div className="w-12 h-12 rounded-2xl bg-white text-blue-600 flex items-center justify-center text-lg font-black shadow-sm border border-blue-100 flex-shrink-0">
                                           {String(group.studentName).charAt(0)}
                                       </div>
                                       <div>
                                           <h3 className="font-extrabold text-gray-800 text-base">{group.studentName}</h3>
                                           <div className="flex items-center gap-2 mt-0.5">
                                               <span className="text-xs text-gray-500 font-mono tracking-wider flex items-center gap-1"><Icon name="user" weight="bold" size={12}/> {group.studentId}</span>
                                               <span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-md text-[10px] font-bold">{group.orders.length} ออเดอร์</span>
                                           </div>
                                       </div>
                                   </div>
                                   <div className="text-right relative z-10 flex-shrink-0 pl-2">
                                       <p className="text-[10px] text-blue-500 font-bold uppercase tracking-wider mb-0.5">ยอดรวมทั้งหมด</p>
                                       <div className="text-xl md:text-2xl font-black text-blue-700">฿{group.totalPrice.toLocaleString()}</div>
                                   </div>
                               </div>

                               <div className="p-2 space-y-2 bg-gray-50/50">
                                   {group.orders.map(o => {
                                       const statusStyle = getOrderStatusStyle(o.status);
                                       const parsedItems = parseOrderItems(o.items);
                                       
                                       return (
                                           <div key={o.orderId || Math.random()} className="bg-white rounded-[1.25rem] p-4 border border-gray-100 shadow-sm relative hover:border-blue-200 transition-colors group/order">
                                               <div className="flex justify-between items-center mb-3 pb-2 border-b border-gray-50">
                                                   <div className="flex items-center gap-3">
                                                       <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded-lg flex items-center gap-1 border border-gray-200">
                                                           <Icon name="hash" weight="bold"/> {o.orderId || 'ไม่ระบุรหัส'}
                                                       </span>
                                                       <span className="text-[10px] font-medium text-gray-400 flex items-center gap-1">
                                                           <Icon name="clock" weight="fill"/> {formatDateSafe(o.date)}

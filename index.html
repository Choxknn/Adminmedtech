<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const useScrollLock = (isOpen) => {
      useEffect(() => {
        if (isOpen) {
          document.body.style.overflow = 'hidden'; 
        } else {
          document.body.style.overflow = 'unset'; 
        }
        return () => {
          document.body.style.overflow = 'unset';
        };
      }, [isOpen]);
    };

    // ==========================================
    // 🔥 FIREBASE SETUP
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyCI12dWCOkpRbdr-TFtZjNQhRKvdmj4g6k",
      authDomain: "medtechptu67-payment.firebaseapp.com",
      databaseURL: "https://medtechptu67-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "medtechptu67-payment",
      storageBucket: "medtechptu67-payment.firebasestorage.app",
      messagingSenderId: "452330902364",
      appId: "1:452330902364:web:f92236a62500144531a799",
      measurementId: "G-7WQWLGFSC0"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // ✅ URL ของ Google Apps Script (ตัวใหม่ที่ใช้ยิง LINE และอัปรูป)
    // ⚠️ นำ URL ของ Web App (Google Apps Script โค้ดใหม่) มาใส่ที่นี่ ⚠️
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwgeINK2J-L1_MKafukQNrmzrvUcQ_8Bql_vJ7TJoybCcwP0H3o9QzlOE5RagBLcnpd0w/exec"; 

    // ✅ แทนที่ฟังก์ชัน callGAS เดิมด้วยโค้ดนี้
    const callGAS = async (action, data) => {
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                // ห่อ data ด้วย [] เพื่อให้ตรงกับตัวรับฝั่ง GAS เดิม
                body: JSON.stringify({ action: action, data: [data] }) 
            });
            const result = await response.json();
            if (result.status === 'success') return result.data;
            throw new Error(result.message);
        } catch (error) {
            console.error(`GAS Error [${action}]:`, error);
            throw error;
        }
    };

    // ==========================================
    // 🔄 THE ADAPTER: เปลี่ยน apiCall ให้วิ่งเข้า Firestore แทน
    // ==========================================
    const apiCall = async (action, ...args) => {
        try {
            switch(action) {
                // 📊 ดึงข้อมูลหลัก (Dashboard)
                case 'getAllData': {
                    const data = { students: [], bills: [], history: [], finance: [], amount: { totalBalance: 0, totalUnpaid: 0, unpaidCount: 0, qrCodes: [], qrUrl: '' }, announcement: '', systemStatus: 'OFF' };
                    
                    const usersSnap = await db.collection('users').get();
                    usersSnap.forEach(doc => data.students.push({ id: doc.id, ...doc.data() }));

                    const billsSnap = await db.collectionGroup('bills').get();
                    billsSnap.forEach(doc => {
                        const b = doc.data(); 
                        data.bills.push(b);
                        if (!b.status || b.status === 'ค้างชำระ' || b.status === '') { 
                            data.amount.totalUnpaid += (Number(b.amount || 0) - Number(b.discount || 0)); 
                            data.amount.unpaidCount++; 
                        }
                    });
                  

                    const histSnap = await db.collectionGroup('history').get();
                    histSnap.forEach(doc => { 
                        const h = doc.data(); 
                        data.history.push(h); 
                        data.amount.totalBalance += Number(h.total || 0); 
                    });

                    const finSnap = await db.collection('finance').doc('summary').collection('logs').get();
                    finSnap.forEach(doc => data.finance.push({ id: doc.id, ...doc.data() }));

                    const sysSnap = await db.collection('config').doc('system').get();
                    if(sysSnap.exists) { 
                        data.systemStatus = sysSnap.data().maintenance || 'OFF'; 
                        data.announcement = sysSnap.data().announcement || ''; 
                        data.config = { maintenanceMsg: sysSnap.data().maintenanceMsg || '' };
                    }

                    const qrSnap = await db.collection('config').doc('qrMap').get();
                    if(qrSnap.exists && qrSnap.data().codes) { 
                        data.amount.qrCodes = qrSnap.data().codes; 
                        if(data.amount.qrCodes.length > 0) data.amount.qrUrl = data.amount.qrCodes[data.amount.qrCodes.length-1].url; 
                    }
                    return data;
                }

                // 🛒 ดึงข้อมูลระบบสั่งซื้อ
                case 'getOrderData': {
                    const orderData = { systemStatus: 'OFF', products: [], orders: [] };
                    const sysSnap = await db.collection('config').doc('system').get();
                    if(sysSnap.exists) orderData.systemStatus = sysSnap.data().orderSystem || 'OFF';

                    const prodSnap = await db.collection('products').get();
                    prodSnap.forEach(doc => orderData.products.push({ id: doc.id, ...doc.data() }));

                    const ordersSnap = await db.collectionGroup('orders').get();
                    ordersSnap.forEach(doc => orderData.orders.push(doc.data()));
                    return orderData;
                }

                // ⚙️ ตั้งค่าระบบ
                case 'toggleMaintenance': { 
                    await db.collection('config').doc('system').set({ maintenance: args[0] }, { merge: true }); 
                    return await apiCall('getAllData'); 
                }
                case 'toggleOrderSystem': { 
                    await db.collection('config').doc('system').set({ orderSystem: args[0] ? 'ON' : 'OFF' }, { merge: true }); 
                    return await apiCall('getOrderData'); 
                }
                case 'updateAnnouncementData': {
                    const payload = args[0]; 
                    let finalValue = payload.text;
                    if (payload.type === 'image' && payload.fileBase64) {
                        finalValue = await callGAS('uploadImage', { base64: payload.fileBase64, fileName: `ANN-${Date.now()}.jpg` });
                    } else if (payload.type === 'image' && payload.preview) {
                        finalValue = payload.preview;
                    } else if (payload.type === 'image') {
                        finalValue = '';
                    }
                    await db.collection('config').doc('system').set({ announcement: finalValue }, { merge: true });
                    return finalValue;
                }

                // 🧾 จัดการบิล
                case 'createBill': {
                    const form = args[0]; 
                    const studentIds = form.studentIds || [form.studentId];
                    for(const sid of studentIds) {
                        const billId = `B${String(sid).slice(-4).padEnd(4,'0')}-${Math.floor(1000+Math.random()*9000)}`;
                        const billData = { billId: billId, studentId: String(sid), item: form.item, amount: form.amount, discount: form.discount||0, dueDate: form.dueDate||'', finePerDay: form.finePerDay||0, maxFine: form.maxFine||0, status: '', slipUrl: '' };
                        await db.collection('users').doc(String(sid)).collection('bills').doc(billId).set(billData);
                        
                        if(form.notify !== false) {
                            const stuDoc = await db.collection('users').doc(String(sid)).get();
                            if(stuDoc.exists && stuDoc.data().userId) {
                                await callGAS('sendLineNotify', { lineUserId: stuDoc.data().userId, type: 'NEW_BILL', payload: { bill: billData, studentName: stuDoc.data().name } });
                            }
                        }
                    }
                    return await apiCall('getAllData');
                }
                case 'updateBillStatus': {
                    const [billId, status, studentId, notify] = args;
                    const billRef = db.collection('users').doc(String(studentId)).collection('bills').doc(String(billId));
                    await billRef.update({ status: status });
                    const billSnap = await billRef.get(); 
                    const billData = billSnap.data();

                    if (status === 'ชำระแล้ว') {
                        // ✅ 1. คำนวณค่าปรับ (Fine) แบบเรียลไทม์
                        let fine = 0;
                        if (billData.dueDate) {
                            const due = new Date(billData.dueDate); due.setHours(0, 0, 0, 0);
                            const now = new Date(); now.setHours(0, 0, 0, 0);
                            if (now > due) {
                                const diffTime = now - due;
                                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                fine = diffDays * (Number(billData.finePerDay) || 0);
                                if (billData.maxFine && fine > Number(billData.maxFine)) {
                                    fine = Number(billData.maxFine);
                                }
                            }
                        }

                        // ✅ 2. รวมยอดสุทธิ (เงินต้น - ส่วนลด + ค่าปรับ)
                        const netTotal = (Number(billData.amount) || 0) - (Number(billData.discount) || 0) + fine;

                        const histData = { 
                            ...billData, 
                            payDate: new Date().toISOString(), 
                            total: netTotal // บันทึกยอดที่บวกค่าปรับและหักส่วนลดแล้ว
                        };
                        await db.collection('users').doc(String(studentId)).collection('history').doc(String(billId)).set(histData);
                    }

                    if (notify) {
                        const type = status === 'ชำระแล้ว' ? 'APPROVED' : (status === '' || status === 'ค้างชำระ' ? 'REJECTED' : null);
                        const stuDoc = await db.collection('users').doc(String(studentId)).get();
                        if(type && stuDoc.exists && stuDoc.data().userId) {
                            await callGAS('sendLineNotify', { lineUserId: stuDoc.data().userId, type: type, payload: { bill: billData, studentName: stuDoc.data().name } });
                        }
                    }
                    return await apiCall('getAllData');
                }
                case 'editBill': {
                    const form = args[0]; 
                    let finalSlipUrl = form.slipUrl || '';
                    if (form.isSlipDeleted) finalSlipUrl = '';
                    if (form.slipFile) {
                        finalSlipUrl = await callGAS('uploadImage', { base64: form.slipFile, fileName: `SLIP-${form.billId}-${Date.now()}.jpg` });
                    }
                    
                    const snap = await db.collectionGroup('bills').where('billId', '==', form.billId).get();
                    if(!snap.empty) {
                        const oldDoc = snap.docs[0];
                        const oldStudentId = oldDoc.ref.parent.parent.id;
                        const updateData = { item: form.item, amount: form.amount, discount: form.discount||0, dueDate: form.dueDate||'', finePerDay: form.finePerDay||0, maxFine: form.maxFine||0, slipUrl: finalSlipUrl, studentId: form.studentId };
                        
                        // ถ้ารหัสประจำตัวถูกเปลี่ยน ให้ย้าย Document ไปยัง Subcollection ของคนใหม่
                        if (oldStudentId !== form.studentId) {
                            await db.collection('users').doc(String(form.studentId)).collection('bills').doc(String(form.billId)).set({ ...oldDoc.data(), ...updateData });
                            await oldDoc.ref.delete(); // ลบของคนเก่าทิ้ง
                        } else {
                            await oldDoc.ref.update(updateData);
                        }
                    }
                    return await apiCall('getAllData');
                }
                case 'resetBill': {
                    const snap = await db.collectionGroup('bills').where('billId', '==', args[0]).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.update({ status: '', payDate: '', slipUrl: '' });
                    }
                    return await apiCall('getAllData');
                }
                case 'deleteBill': {
                    const snap = await db.collectionGroup('bills').where('billId', '==', args[0]).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.delete();
                    }
                    return await apiCall('getAllData');
                }
                case 'deleteHistory': {
                    const snap = await db.collectionGroup('history').where('billId', '==', args[0]).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.delete();
                    }
                    return await apiCall('getAllData');
                }
                case 'editHistory': {
                    const form = args[0]; 
                    let finalSlipUrl = form.slipUrl || '';
                    if (form.isSlipDeleted) finalSlipUrl = '';
                    if (form.slipFile) {
                        finalSlipUrl = await callGAS('uploadImage', { base64: form.slipFile, fileName: `SLIP-HIST-${form.billId}-${Date.now()}.jpg` });
                    }
                    await db.collection('users').doc(String(form.studentId)).collection('history').doc(String(form.billId)).update({ 
                        item: form.item, total: Number(form.total), payDate: new Date(form.payDate).toISOString(), slipUrl: finalSlipUrl 
                    });
                    return await apiCall('getAllData');
                }

                // 🧑‍🎓 จัดการนักศึกษา
                case 'createStudent': 
                // ✅ แก้ไขข้อมูลนักศึกษา
                case 'editStudent': {
                    const studentData = args[0];
                    const originalId = studentData.originalId;

                    // 1. เตรียมข้อมูลที่จะอัปเดต โดยลบ originalId ออก
                    const updateData = { ...studentData };
                    delete updateData.originalId;

                    // 2. จัดการกับฟิลด์ที่อาจจะเป็น undefined
                    // ถ้า password เป็น undefined ให้ลบฟิลด์นี้ออกจากการอัปเดต
                    // (เพื่อไม่ให้ไปทับรหัสผ่านเดิมในฐานข้อมูล ถ้าแอดมินไม่ได้แก้ไขรหัส)
                    if (updateData.password === undefined) {
                        delete updateData.password;
                    }

                    // 3. ถ้ามีการแก้ไขรหัสนักศึกษา (ID เปลี่ยน)
                    if (originalId !== updateData.id) {
                        // ดึงข้อมูลเดิมมา
                        const oldDoc = await db.collection('users').doc(originalId).get();
                        if (oldDoc.exists) {
                            const oldData = oldDoc.data();
                            
                            // รวมข้อมูลเดิมกับข้อมูลใหม่ (โดยข้อมูลใหม่จะทับข้อมูลเดิม)
                            const mergedData = { ...oldData, ...updateData };
                            
                            // สร้าง Document ใหม่ด้วย ID ใหม่
                            await db.collection('users').doc(updateData.id).set(mergedData);
                            
                            // ลบ Document เก่าทิ้ง
                            await db.collection('users').doc(originalId).delete();
                            
                            // ⚠️ หมายเหตุ: ถ้ามีการเปลี่ยนรหัสนักศึกษา และนักศึกษาคนนั้นมีข้อมูลในคอลเล็กชันอื่นๆ ด้วย (เช่น bills, payments) 
                            // คุณอาจจะต้องเขียนโค้ดเพิ่มเพื่อไปอัปเดต studentId ในคอลเล็กชันเหล่านั้นให้ตรงกันด้วยครับ
                        }
                    } else {
                        // 4. ถ้าไม่ได้แก้ไขรหัสนักศึกษา (ID เหมือนเดิม) ให้อัปเดตตามปกติ
                        await db.collection('users').doc(updateData.id).set(updateData, { merge: true }); // ใช้ merge: true เพื่ออัปเดตเฉพาะฟิลด์ที่มีการเปลี่ยนแปลง
                    }

                    return updateData;
                }
                case 'deleteStudent': { 
                    await db.collection('users').doc(String(args[0])).delete(); 
                    return await apiCall('getAllData'); 
                }

                // 💰 จัดการการเงิน
                case 'saveFinanceLog': {
                    const form = args[0]; 
                    let receiptUrl = form.receiptUrl || ''; 
                    let slipUrl = form.slipUrl || '';
                    if(form.receiptFile) receiptUrl = await callGAS('uploadImage', { base64: form.receiptFile, fileName: `RECEIPT-${Date.now()}.jpg` });
                    if(form.slipFile) slipUrl = await callGAS('uploadImage', { base64: form.slipFile, fileName: `SLIP-${Date.now()}.jpg` });
                    if(form.isReceiptDeleted) receiptUrl = ''; 
                    if(form.isSlipDeleted) slipUrl = '';

                    // ✅ บังคับแปลง ID เป็น String ป้องกัน Error n.indexOf
                    const logId = String(form.id || `FIN-${Date.now()}`); 
                    const finData = { ...form, id: logId, receiptUrl: receiptUrl, slipUrl: slipUrl };
                    delete finData.receiptFile; delete finData.slipFile; delete finData.isReceiptDeleted; delete finData.isSlipDeleted;
                    
                    await db.collection('finance').doc('summary').collection('logs').doc(logId).set(finData);
                    return await apiCall('getAllData');
                }
                case 'deleteFinanceLog': { 
                    await db.collection('finance').doc('summary').collection('logs').doc(String(args[0])).delete(); 
                    return await apiCall('getAllData'); 
                }

                // 📦 จัดการสินค้า (แยกฟิลด์ image2, image3, sizeChart2...)
                case 'saveProduct': {
                    const form = args[0]; 
                    
                    let allMainUrls = [...(form.existingMainImages || [])];
                    if(form.newMainFiles && form.newMainFiles.length > 0) {
                        const newUrls = await Promise.all(form.newMainFiles.map((b64,i) => callGAS('uploadImage', {base64: b64, fileName: `PROD-${Date.now()}-${i}.jpg`})));
                        allMainUrls.push(...newUrls);
                    }
                    
                    let allSizeUrls = [...(form.existingSizeImages || [])];
                    if(form.newSizeFiles && form.newSizeFiles.length > 0) {
                        const newUrls = await Promise.all(form.newSizeFiles.map((b64,i) => callGAS('uploadImage', {base64: b64, fileName: `SIZE-${Date.now()}-${i}.jpg`})));
                        allSizeUrls.push(...newUrls);
                    }

                    const prodId = String(form.id || `P-${Date.now()}`); 
                    const prodData = { 
                        id: prodId,
                        name: form.name,
                        price: form.price,
                        options: form.options,
                        status: form.status,
                        stock: form.stock,
                    };
                    
                    // ✅ เซ็ตชื่อฟิลด์แยกกัน (image, image2, image3...)
                    allMainUrls.forEach((url, i) => {
                        if (i === 0) prodData.image = url;
                        else prodData[`image${i+1}`] = url;
                    });
                    
                    // ✅ เซ็ตชื่อฟิลด์แยกกัน (sizeChart, sizeChart2...)
                    allSizeUrls.forEach((url, i) => {
                        if (i === 0) prodData.sizeChart = url;
                        else prodData[`sizeChart${i+1}`] = url;
                    });
                    
                    await db.collection('products').doc(prodId).set(prodData); // บันทึกทับตัวเดิม
                    return await apiCall('getOrderData');
                }
                
                // 🛍️ ออเดอร์
                case 'editOrder': {
                    const form = args[0];
                    const snap = await db.collectionGroup('orders').where('orderId', '==', form.orderId).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.update({ items: form.items, price: form.price, status: form.status });
                    }
                    return await apiCall('getOrderData');
                }
                case 'updateOrderStatus': {
                    const snap = await db.collectionGroup('orders').where('orderId', '==', args[0]).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.update({ status: args[1] });
                    }
                    return await apiCall('getOrderData');
                }
                case 'deleteOrder': {
                    const snap = await db.collectionGroup('orders').where('orderId', '==', args[0]).get();
                    if(!snap.empty) {
                        await snap.docs[0].ref.delete();
                    }
                    return await apiCall('getOrderData');
                }

                // 📲 ส่งแจ้งเตือน LINE 
                case 'sendCustomNotification': {
                    const form = args[0]; 
                    const targets = [];
                    for(const sid of form.studentIds) {
                        const stuDoc = await db.collection('users').doc(String(sid)).get();
                        if(stuDoc.exists && stuDoc.data().userId) {

                    return await callGAS('sendBatchLineNotify', { targets: targets });

                case 'sendAccountNotification': {
                    const targets = [];
                    for(const sid of args[0]) {
                        const stuDoc = await db.collection('users').doc(String(sid)).get();
                        if(stuDoc.exists && stuDoc.data().userId) {
                            targets.push({ lineUserId: stuDoc.data().userId, type: 'ACCOUNT', payload: { student: stuDoc.data() } });
                        }
                    }
                    return await callGAS('sendBatchLineNotify', { targets: targets });
                }
                case 'sendOverdueNotification': {
                    const snap = await db.collectionGroup('bills').where('billId', '==', args[0]).get();
                    if(!snap.empty) {
                        const bill = snap.docs[0].data(); 
                        const stuDoc = await db.collection('users').doc(String(bill.studentId)).get();
                        if(stuDoc.exists && stuDoc.data().userId) {
                            return await callGAS('sendLineNotify', { lineUserId: stuDoc.data().userId, type: 'OVERDUE', payload: { bill: bill, studentName: stuDoc.data().name } });
                        }
                    }
                    return "Sent";
                }
                case 'sendBatchOverdueNotifications': {
                    const targets = [];
                    for(const billId of args[0]) {
                        const snap = await db.collectionGroup('bills').where('billId', '==', billId).get();
                        if(!snap.empty) {
                            const bill = snap.docs[0].data(); 
                            const stuDoc = await db.collection('users').doc(String(bill.studentId)).get();
                            if(stuDoc.exists && stuDoc.data().userId && bill.status !== 'ชำระแล้ว' && bill.status !== 'ยกเลิก') {
                                targets.push({ lineUserId: stuDoc.data().userId, type: 'OVERDUE', payload: { bill: bill, studentName: stuDoc.data().name } });
                            }
                        }
                    }
                    return await callGAS('sendBatchLineNotify', { targets: targets });
                }
                case 'sendBatchLineNotify': {
                    return await callGAS('sendBatchLineMessage', args[0].targets);
                }

                // 💳 จัดการ QR Code
                case 'uploadQrImage': {
                    const [b64, mime, fName, amt, oldUrl] = args; 
                    const newUrl = await callGAS('uploadImage', { base64: b64, fileName: fName });
                    const snap = await db.collection('config').doc('qrMap').get(); 
                    let codes = snap.exists && snap.data().codes ? snap.data().codes : [];
                    if (oldUrl) { 
                        const idx = codes.findIndex(c => c.url === oldUrl); 
                        if(idx >= 0) codes[idx] = { url: newUrl, amount: amt }; 
                    } else {
                        codes.push({ url: newUrl, amount: amt });
                    }
                    await db.collection('config').doc('qrMap').set({ codes: codes }); 
                    return (await apiCall('getAllData')).amount;
                }
                case 'updateQrCode': {
                    const [oldUrl, newUrl, newAmount] = args; 
                    const snap = await db.collection('config').doc('qrMap').get(); 
                    let codes = snap.exists && snap.data().codes ? snap.data().codes : [];
                    const idx = codes.findIndex(c => c.url === oldUrl); 
                    if(idx >= 0) { 
                        codes[idx].amount = newAmount; 
                        if(newUrl) codes[idx].url = newUrl; 
                        await db.collection('config').doc('qrMap').set({ codes: codes }); 
                    }
                    return (await apiCall('getAllData')).amount;
                }
                case 'deleteQrCode': {
                    const snap = await db.collection('config').doc('qrMap').get(); 
                    let codes = snap.exists && snap.data().codes ? snap.data().codes : [];
                    codes = codes.filter(c => c.url !== args[0]); 
                    await db.collection('config').doc('qrMap').set({ codes: codes }); 
                    return (await apiCall('getAllData')).amount;
                }

                

                // ✅ เพิ่มคำสั่งสำหรับเปลี่ยนรหัสผ่าน Admin ใน Firebase Auth
                case 'changeAdminPassword': {
                    const [currentPassword, newPassword] = args;
                    const user = firebase.auth().currentUser;
                    if (!user) throw new Error('กรุณาล็อกอินก่อนทำรายการ');
                    
                    // ต้อง Login ซ้ำ (Re-authenticate) เพื่อยืนยันรหัสเดิมก่อนเปลี่ยน
                    const cred = firebase.auth.EmailAuthProvider.credential(user.email, currentPassword);
                    await user.reauthenticateWithCredential(cred);
                    await user.updatePassword(newPassword);
                    return "Password Updated";
                }
                
                // ✅ สั่งลบเฉพาะ User ฝั่ง Email
                case 'deleteStudentAuthEmail': {
                    const studentId = args[0];
                    const firebaseUid = args[1]; // รับ firebaseUid มา
                    
                    // 1. สั่ง GAS ลบ Auth ฝั่ง Email
                    await callGAS('deleteUserAuthEmail', { firebaseUid: firebaseUid });
                    
                    // 2. ลบสถานะใน Firestore
                    const userRef = db.collection('users').doc(studentId);
                    await userRef.update({ 
                        hasPassword: false, 
                        password: firebase.firestore.FieldValue.delete(),
                        firebaseUid: firebase.firestore.FieldValue.delete() // ลบ firebaseUid ออกด้วย
                    });
                    return true;
                }

                // ✅ สั่งลบเฉพาะ User ฝั่ง LINE
                case 'deleteStudentAuthLine': {
                    const studentId = args[0];
                    const lineUid = args[1]; // รับ lineUid มา
                    
                    // 1. สั่ง GAS ลบ Auth ฝั่ง LINE
                    await callGAS('deleteUserAuthLine', { lineUid: lineUid });
                    
                    // 2. ลบข้อมูล LINE ออกจาก Firestore
                    const userRef = db.collection('users').doc(studentId);
                    await userRef.update({ 
                        userId: firebase.firestore.FieldValue.delete(), // สมมติว่าเก็บ id ไลน์ไว้ใน userId ด้วย (ถ้ามี)
                        lineUid: firebase.firestore.FieldValue.delete() 
                    });
                    return true;
                }

                // ✅ สั่งเปลี่ยนรหัสผ่านใหม่ (ฝั่ง Email)
                case 'updateStudentPassword': {
                    const studentId = args[0];
                    const firebaseUid = args[1];
                    const newPassword = args[2];
                    
                    // สั่ง GAS อัปเดตรหัส
                    await callGAS('updateUserPassword', { firebaseUid: firebaseUid, newPassword: newPassword });
                    return true;
                }

                // ✅ ตรวจสอบรหัสผ่านแอดมินก่อนทำงานอันตราย
                case 'verifyAdminPassword': {
                    const password = args[0];
                    const user = firebase.auth().currentUser;
                    const credential = firebase.auth.EmailAuthProvider.credential(user.email, password);
                    try {
                        await user.reauthenticateWithCredential(credential);
                        return true;
                    } catch (error) {
                        throw new Error('รหัสผ่านแอดมินไม่ถูกต้อง');
                    }
                }

                // ✅ ลบข้อมูลผู้ใช้ทั้งหมด (Firestore + Auth)
                case 'deleteFullUser': {
                    const studentId = args[0];
                    const lineUid = args[1];
                    const firebaseUid = args[2];

                    // 1. ลบจาก Firebase Auth (ส่งไปที่ GAS)
                    await callGAS('deleteUserAuthEmail', { firebaseUid });
                    await callGAS('deleteUserAuthLine', { lineUid });

                    // 2. ลบข้อมูลใน Firestore (ลบตัวเอกและ Sub-collection)
                    // หมายเหตุ: การลบคอลเล็กชันย่อยในเครื่องลูกอาจต้องลบทีละรายการ
                    const userRef = db.collection('users').doc(studentId);
                    
                    // ลบบิลทั้งหมด
                    const bills = await userRef.collection('bills').get();
                    const billBatch = db.batch();
                    bills.forEach(doc => billBatch.delete(doc.ref));
                    await billBatch.commit();

                    // ลบประวัติทั้งหมด
                    const history = await userRef.collection('history').get();
                    const histBatch = db.batch();
                    history.forEach(doc => histBatch.delete(doc.ref));
                    await histBatch.commit();

                    // ลบข้อมูลโปรไฟล์
                    await userRef.delete();
                    
                    return true;
                }

                // ⬇️ ระวังอย่าเอาไปวางใต้ default นะครับ
                default:
                    throw new Error("Action not mapped to Firebase: " + action);
            }
        } catch(e) {

    const getDirectImageUrl = (url) => {
        if (!url) return '';
        if (!url.includes('drive.google.com')) return url;
        let id = '';
        if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
        else if (url.includes('/file/d/')) id = url.split('/file/d/')[1].split('/')[0];
        return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
    };


    const calculateFine = (bill) => {
      if (bill.status === 'ชำระแล้ว' || !bill.dueDate) return 0;
      const due = new Date(bill.dueDate); due.setHours(0, 0, 0, 0);
      const now = new Date(); now.setHours(0, 0, 0, 0);
      if (now <= due) return 0;
      const diffTime = now - due;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      let fine = diffDays * (bill.finePerDay || 0);
      if (bill.maxFine && fine > bill.maxFine) fine = bill.maxFine;
      return fine;
    };

        const formatDate = (dateString) => {
            if (!dateString) return '';
            const date = new Date(dateString);
            
            // ✅ แก้ปัญหาปี 3112 (ปีไทยซ้อนปีไทย)
            // ถ้าปีมันเกิน 2400 (เช่น 2569) แสดงว่าเป็นปีไทยมาแล้ว
            // ต้องลบ 543 ออกก่อน เพื่อให้ toLocaleDateString แปลงกลับมาเป็น 2569 เท่าเดิม
            if (date.getFullYear() > 2400) {
                date.setFullYear(date.getFullYear() - 543);
            }

            return date.toLocaleDateString('th-TH', { 
                day: 'numeric', 
                month: 'short', 
                year: 'numeric' 
            });
        };

    
    const formatDateForInput = (dateStr) => {

        return d.toISOString().split('T')[0];

    // ✅ ฟังก์ชันแปลงเวลาเป็น "เมื่อ...ที่แล้ว" (วางไว้นอกคอมโพเนนต์)
    const formatTimeAgo = (dateString) => {
        if (!dateString) return '-';
        const date = new Date(dateString);
        const now = new Date();
        const seconds = Math.round((now - date) / 1000);
        const minutes = Math.round(seconds / 60);
        const hours = Math.round(minutes / 60);
        const days = Math.round(hours / 24);

        if (seconds < 60) return "เมื่อสักครู่";
        if (minutes < 60) return `${minutes} นาทีที่แล้ว`;
        if (hours < 24) return `${hours} ชั่วโมงที่แล้ว`;
        if (days === 1) return "เมื่อวานนี้";
        if (days < 30) return `${days} วันที่แล้ว`;
        
        // ถ้าเกิน 1 เดือน ให้กลับไปแสดงเป็นวันที่และเดือนแทน
        return date.toLocaleDateString('th-TH', { 
            day: 'numeric', 
            month: 'short', 
            year: 'numeric' 
        });
    };

        const end = endStr ? new Date(endStr) : null; if(end) end.setHours(0,0,0,0);
        if (start && target < start) return false;
        if (end && target > end) return false;
        return true;
    };

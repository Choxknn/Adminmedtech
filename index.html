    const Modal = ({ isOpen, onClose, title, children, hideClose = false, zIndex = "z-[110]" }) => {
      useScrollLock(isOpen);
      if (!isOpen) return null;
      return ReactDOM.createPortal(
        <div className={`fixed inset-0 ${zIndex} flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in`}>
          <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl transform transition-all scale-100 animate-scale-in max-h-[90vh] flex flex-col">
            {!hideClose && (
              <div className="flex justify-between items-center p-4 border-b border-gray-100 bg-white flex-shrink-0">
                <h3 className="font-bold text-lg text-gray-800">{title}</h3>
                <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-red-500 transition-colors"><Icon name="x" size={20} weight="bold" /></button>
              </div>
            )}
            <div className="p-4 overflow-y-auto flex-1">{children}</div>
          </div>
        </div>,
        document.body
      );
    };


    //  Error Modal
    const ErrorModal = ({ isOpen, onClose, message }) => {
      useScrollLock(isOpen);
      if (!isOpen) return null;
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[130] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in">
           <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl animate-shake text-center border-t-4 border-red-500">
             <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
               <Icon name="warning-circle" size={32} weight="fill" className="text-red-500" />
             </div>
             <h3 className="text-xl font-bold text-gray-800 mb-2">เกิดข้อผิดพลาด</h3>
             <p className="text-sm text-gray-500 mb-6 leading-relaxed font-medium text-red-600">{message}</p>
             <button onClick={onClose} className="w-full py-3 rounded-xl bg-red-500 text-white font-bold shadow-lg shadow-red-200 hover:bg-red-600 transition">ตกลง</button>
           </div>
        </div>,
        document.body
      );
    };

    

    // --- ✅ Success Screen (Update Z-Index to 120) ---
    const SuccessScreen = () => (
      <div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/40 backdrop-blur-sm">
        <div className="bg-white rounded-3xl p-8 flex flex-col items-center justify-center shadow-2xl animate-scale-in min-w-[200px]">
          <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4 animate-check-bounce"><Icon name="check" size={48} weight="bold" className="text-green-600" /></div>
          <h3 className="text-xl font-bold text-gray-800">เรียบร้อย</h3>
          <p className="text-sm text-gray-500 mt-1">บันทึกข้อมูลสำเร็จแล้ว</p>
        </div>
      </div>
    );

    // --- REUSABLE COMPONENT: Student Multi Select (Updated with Search) ---
    const StudentMultiSelect = ({ students, selectedIds, onChange }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [studentSearch, setStudentSearch] = useState(''); // ✅ เพิ่ม state ค้นหา

      // ✅ กรองรายชื่อตามที่พิมพ์ค้นหา (อัปเดตใหม่ แก้จอขาว)
      const filteredStudents = useMemo(() => {
          // 1. ใช้ students ที่รับมาจาก Props แทน data.students
          let list = students || []; 
          
          // 2. ใช้ studentSearch แทน searchTerm
          if (!studentSearch) return list;
          const lower = studentSearch.toLowerCase();
          
          return list.filter(s => 
              String(s.id).toLowerCase().includes(lower) || 
              String(s.name).toLowerCase().includes(lower)
          );
      }, [students, studentSearch]); // 3. อัปเดต Dependency ให้ตรงกับตัวแปรที่ใช้

      // สลับการเลือกทีละคน
      const toggleStudent = (id) => {
        if (selectedIds.includes(id)) { 
            onChange(selectedIds.filter(sid => sid !== id)); 
        } else { 
            onChange([...selectedIds, id]); 
        }
      };

      // ✅ เลือกทั้งหมด (เฉพาะคนที่ค้นหาเจอ)
      const toggleSelectAllFiltered = () => {
        const filteredIds = filteredStudents.map(s => s.id);
        const isAllFilteredSelected = filteredIds.every(id => selectedIds.includes(id));
        
        if (isAllFilteredSelected) {
            onChange(selectedIds.filter(id => !filteredIds.includes(id)));
        } else {
            const newIds = [...new Set([...selectedIds, ...filteredIds])];
            onChange(newIds);
        }
      };

      const clearSelection = () => onChange([]);

      const isAllFilteredSelected = filteredStudents.length > 0 && filteredStudents.every(s => selectedIds.includes(s.id));

      return (
        <div className="relative">
          <button type="button" onClick={() => setIsOpen(!isOpen)} className="w-full p-3 border border-gray-200 rounded-xl bg-white outline-none focus:ring-2 focus:ring-primary text-left flex justify-between items-center transition hover:border-blue-300 h-[46px]">
            <span className={`text-sm font-bold truncate ${selectedIds.length > 0 ? 'text-blue-700' : 'text-gray-400'}`}>
                {selectedIds.length === 0 ? "-- เลือกนักศึกษา --" : `เลือกแล้ว ${selectedIds.length} คน`}
            </span>
            <Icon name={isOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/>
          </button>
          
          {isOpen && (
            <>
                <div className="fixed inset-0 z-10" onClick={() => setIsOpen(false)}></div>
                <div className="absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-2xl shadow-xl flex flex-col animate-fade-in overflow-hidden">
                    
                    {/* ✅ Header: ช่องค้นหา และ ปุ่มเครื่องมือ */}
                    <div className="p-2 border-b border-gray-100 bg-gray-50 flex flex-col sm:flex-row gap-2">
                        <div className="relative flex-1">
                            <input 
                                type="text" 
                                placeholder="ค้นหาชื่อ หรือ รหัส..." 
                                value={studentSearch}
                                onChange={(e) => setStudentSearch(e.target.value)}
                                className="w-full pl-7 pr-2 py-1.5 text-sm border border-gray-200 rounded-lg outline-none focus:border-blue-500 transition"
                                autoFocus
                            />
                            <Icon name="magnifying-glass" className="absolute left-2 top-2.5 text-gray-400" size={14}/>
                        </div>
                        <div className="flex gap-2">
                            <button type="button" onClick={toggleSelectAllFiltered} className="flex-1 px-3 py-1.5 bg-blue-100 text-blue-600 rounded-lg text-[10px] font-bold hover:bg-blue-200 whitespace-nowrap transition shadow-sm">
                                {isAllFilteredSelected ? 'ยกเลิกเลือก' : 'เลือกที่ค้นหา'}
                            </button>
                            <button type="button" onClick={clearSelection} className="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-lg text-[10px] font-bold hover:bg-gray-300 whitespace-nowrap transition shadow-sm">
                                ล้างค่า
                            </button>
                        </div>
                    </div>

                    {/* ✅ List: รายชื่อนักศึกษา */}
                    <div className="max-h-56 overflow-y-auto custom-scrollbar p-1">
                        {filteredStudents.map(s => {
                            const isSelected = selectedIds.includes(s.id);
                            return (
                                <div key={s.id} className={`p-2.5 flex items-center gap-3 cursor-pointer rounded-xl transition-colors ${isSelected ? 'bg-blue-50' : 'hover:bg-gray-50'}`} onClick={() => toggleStudent(s.id)}>
                                    <div className={`w-5 h-5 rounded-md flex items-center justify-center border transition-colors flex-shrink-0 ${isSelected ? 'bg-primary border-primary' : 'bg-white border-gray-300'}`}>
                                        {isSelected && <Icon name="check" className="text-white" size={12} weight="bold" />}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className={`text-sm font-bold truncate ${isSelected ? 'text-blue-700' : 'text-gray-800'}`}>{s.name}</div>
                                        <div className="text-[10px] text-gray-400 font-mono">{s.id}</div>
                                    </div>
                                </div>
                            );
                        })}
                        {filteredStudents.length === 0 && <p className="text-center text-xs text-gray-400 py-6 font-medium">ไม่พบรายชื่อที่ค้นหา</p>}
                    </div>
                    
                    {/* ✅ Footer: ปุ่มปิด */}
                    <div className="p-2 bg-gray-50 border-t border-gray-100 text-center">
                        <button type="button" onClick={() => setIsOpen(false)} className="text-xs font-bold text-blue-600 hover:underline px-4 py-1">ปิดหน้าต่าง</button>
                    </div>

                </div>
            </>
          )}
        </div>
      );
    };
    
// --- Bill Summary Modal (Removed Date Filter) ---
    const BillSummaryModal = ({ isOpen, onClose, bills, history }) => {
      const [selectedItems, setSelectedItems] = useState([]); 
      const [isItemDrawerOpen, setIsItemDrawerOpen] = useState(true); // เปิดลิ้นชักไว้เลยเพราะไม่มีวันที่แล้ว

      useEffect(() => {
          if (isOpen) {
              setSelectedItems([]); 
              setIsItemDrawerOpen(true);
          }
      }, [isOpen]);

      // Map ประวัติการโอน
      const historyMap = useMemo(() => {
          const map = {};
          if (history) { history.forEach(h => { map[String(h.billId)] = Number(h.total) || 0; }); }
          return map;
      }, [history]);

      // รายชื่อรายการสินค้าทั้งหมด
      const availableItems = useMemo(() => {
          if (!bills) return [];
          const items = bills.map(b => b.item).filter(Boolean);
          return [...new Set(items)].sort();
      }, [bills]);

      // Helper functions
      const toggleItem = (name) => { if (selectedItems.includes(name)) setSelectedItems(prev => prev.filter(n => n !== name)); else setSelectedItems(prev => [...prev, name]); };
      const selectAll = () => setSelectedItems([...availableItems]);
      const clearSelection = () => setSelectedItems([]);

      // กรองข้อมูล (ตัดเรื่องวันที่ออกแล้ว)
      const filteredData = useMemo(() => {
          if (!isOpen || !bills) return [];
          return bills.filter(b => {
              if (b.status === 'ยกเลิก') return false;
              // กรองรายการ (Multi-Select)
              if (selectedItems.length > 0) {
                  if (!selectedItems.includes(b.item)) return false;
              }
              return true;
          });
      }, [isOpen, bills, selectedItems]);

      // คำนวณยอดสรุป
      const summary = useMemo(() => {
        let totalReceived = 0; let paidPrincipal = 0; let unpaidPrincipal = 0; let collectedFine = 0; 
        const itemMap = {};

        filteredData.forEach(b => {
            const amount = Number(b.amount) || 0;
            const discount = Number(b.discount) || 0;
            const basePrincipal = amount - discount; 
            let itemFineForTable = 0;   

            if (b.status === 'ชำระแล้ว') {
                const realTransferTotal = historyMap[String(b.billId)];
                if (realTransferTotal !== undefined && realTransferTotal > 0) {
                    const actualFine = Math.max(0, realTransferTotal - basePrincipal);
                    paidPrincipal += basePrincipal; collectedFine += actualFine; totalReceived += realTransferTotal; itemFineForTable = actualFine;
                } else {
                    paidPrincipal += basePrincipal; totalReceived += basePrincipal;
                }
            } else { unpaidPrincipal += basePrincipal; }

            const itemName = b.item || 'ไม่ระบุ';
            if (!itemMap[itemName]) { itemMap[itemName] = { name: itemName, count: 0, totalPrincipal: 0, totalFine: 0, paidCount: 0 }; }
            itemMap[itemName].count++;
            itemMap[itemName].totalPrincipal += basePrincipal; 
            itemMap[itemName].totalFine += itemFineForTable;
            if (b.status === 'ชำระแล้ว') itemMap[itemName].paidCount++;
        });

        const sortedItems = Object.values(itemMap).sort((a, b) => (b.totalPrincipal + b.totalFine) - (a.totalPrincipal + a.totalFine));
        return { totalReceived, paidPrincipal, unpaidPrincipal, collectedFine, items: sortedItems };
      }, [filteredData, historyMap]);

      const tableTotals = useMemo(() => {
          return summary.items.reduce((acc, item) => ({ count: acc.count + item.count, fine: acc.fine + item.totalFine, net: acc.net + (item.totalPrincipal + item.totalFine) }), { count: 0, fine: 0, net: 0 });
      }, [summary.items]);

      if (!isOpen) return null;

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={`สรุปยอดบิล`}>
           <div className="space-y-4">
              {/* Filter Section (Only Items) */}
              <div className="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm">
                  <div onClick={() => setIsItemDrawerOpen(!isItemDrawerOpen)} className="p-3 flex justify-between items-center cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                      <div className="flex items-center gap-2">
                          <div className={`p-1.5 rounded-lg ${selectedItems.length > 0 ? 'bg-blue-100 text-blue-600' : 'bg-white border border-gray-200 text-gray-500'}`}><Icon name="list-checks" weight="bold" size={16}/></div>
                          <span className={`text-xs font-bold ${selectedItems.length > 0 ? 'text-blue-600' : 'text-gray-600'}`}>{selectedItems.length > 0 ? `เลือกไว้ ${selectedItems.length} รายการ` : 'แสดงรายการทั้งหมด'}</span>
                      </div>
                      <Icon name={isItemDrawerOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/>
                  </div>
                  {isItemDrawerOpen && (
                      <div className="p-3 border-t border-gray-100 animate-fade-in">
                          <div className="flex justify-end gap-2 mb-2">
                              <button onClick={selectAll} className="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded hover:bg-blue-100 font-bold">เลือกทั้งหมด</button>
                              <button onClick={clearSelection} className="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded hover:bg-gray-200">ล้างค่า</button>
                          </div>
                          <div className="max-h-40 overflow-y-auto space-y-1 custom-scrollbar pr-1">
                              {availableItems.map((name, idx) => {
                                  const isSelected = selectedItems.includes(name);
                                  return (
                                      <div key={idx} onClick={() => toggleItem(name)} className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer text-xs transition-colors ${isSelected ? 'bg-blue-50 text-blue-700 font-bold border border-blue-100' : 'bg-white hover:bg-gray-50 border border-transparent'}`}>
                                          <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300 bg-white'}`}>{isSelected && <Icon name="check" size={10} className="text-white" weight="bold"/>}</div>
                                          <span className="line-clamp-1">{name}</span>
                                      </div>
                                  );
                              })}
                          </div>
                      </div>
                  )}
              </div>

              {/* Summary Cards */}
              {filteredData.length > 0 ? (
                  <>
                    <div className="grid grid-cols-3 gap-2">
                        <div className="bg-emerald-50 p-2 rounded-xl border border-emerald-100 text-center"><p className="text-[9px] font-bold text-emerald-600 uppercase">ได้รับแล้ว (ทุน)</p><h4 className="text-sm font-bold text-emerald-700">฿{summary.paidPrincipal.toLocaleString()}</h4></div>
                        <div className="bg-red-50 p-2 rounded-xl border border-red-100 text-center"><p className="text-[9px] font-bold text-red-600 uppercase">ค้างชำระ (ทุน)</p><h4 className="text-sm font-bold text-red-700">฿{summary.unpaidPrincipal.toLocaleString()}</h4></div>
                        <div className="bg-orange-50 p-2 rounded-xl border border-orange-100 text-center"><p className="text-[9px] font-bold text-orange-600 uppercase">ค่าปรับที่ได้</p><h4 className="text-sm font-bold text-orange-700">+{summary.collectedFine.toLocaleString()}</h4></div>
                    </div>
                    <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-3 rounded-xl shadow-lg shadow-blue-200 flex justify-between items-center px-4 text-white"><span className="text-xs font-bold text-blue-100">ยอดรวมเข้าบัญชีจริง</span><span className="text-lg font-bold">฿{summary.totalReceived.toLocaleString()}</span></div>
                    {/* Table */}
                    <div className="mt-2">
                        <h4 className="text-xs font-bold text-gray-500 mb-2 flex items-center gap-1"><Icon name="list-dashes" weight="bold"/> รายละเอียด</h4>
                        <div className="max-h-[30vh] overflow-y-auto pr-1 border border-gray-100 rounded-xl relative">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 text-gray-500 font-bold text-xs sticky top-0 shadow-sm z-10"><tr><th className="p-2 text-left">รายการ</th><th className="p-2 text-center w-12">จำนวน</th><th className="p-2 text-right w-20">ค่าปรับ</th><th className="p-2 text-right">รวมสุทธิ</th></tr></thead>
                                <tbody className="divide-y divide-gray-100">
                                    {summary.items.map((item, idx) => (
                                        <tr key={idx} className="hover:bg-gray-50"><td className="p-2"><div className="font-medium text-gray-800 line-clamp-1">{item.name}</div><div className="text-[10px] text-gray-400">จ่ายแล้ว {item.paidCount}/{item.count}</div></td><td className="p-2 text-center"><span className="bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded text-[10px] font-bold">{item.count}</span></td><td className="p-2 text-right text-xs text-orange-500 font-medium">+{item.totalFine.toLocaleString()}</td><td className="p-2 text-right font-bold text-primary">{(item.totalPrincipal + item.totalFine).toLocaleString()}</td></tr>
                                    ))}
                                </tbody>
                                <tfoot className="bg-gray-100 font-bold text-xs sticky bottom-0 z-10 shadow-inner"><tr><td className="p-2 text-right text-gray-600">รวมทั้งหมด</td><td className="p-2 text-center text-gray-800">{tableTotals.count}</td><td className="p-2 text-right text-orange-600">+{tableTotals.fine.toLocaleString()}</td><td className="p-2 text-right text-blue-700 text-sm">{tableTotals.net.toLocaleString()}</td></tr></tfoot>
                            </table>
                        </div>
                    </div>
                  </>
              ) : (<div className="text-center py-10 text-gray-400"><Icon name="magnifying-glass" size={32} className="mx-auto mb-2 opacity-30"/><p>ไม่พบรายการ</p></div>)}
              <button onClick={onClose} className="w-full py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ปิดหน้าต่าง</button>
           </div>
        </Modal>
      );
    };

  // --- Bill Form (อัปเดต: เพิ่มปุ่มลบวันที่ชำระ + รองรับรูปลิงก์ไดร์ฟ) ---
    const BillForm = ({ students, onSubmit, loading, initialData, buttonText = "บันทึกข้อมูล" }) => {
        const isEditMode = !!initialData;
        
        const [formData, setFormData] = useState({
            billId: '', studentId: '', item: '', amount: '', dueDate: '', 
            discount: 0, status: '', slipUrl: '', isSlipDeleted: false, slipFile: null,
            finePerDay: initialData?.finePerDay ?? 0, 
            maxFine: initialData?.maxFine ?? 0,
            notify: true 
        });

        const [previewImage, setPreviewImage] = useState(null);

        useEffect(() => {
            if (initialData) {
                setFormData({ 
                    billId: initialData.billId, studentId: initialData.studentId, item: initialData.item, 
                    amount: initialData.amount, dueDate: initialData.dueDate, discount: initialData.discount || 0, 
                    status: initialData.status, slipUrl: initialData.slipUrl || '', isSlipDeleted: false, slipFile: null,
                    finePerDay: initialData.finePerDay ?? 0, maxFine: initialData.maxFine ?? 0, notify: false 
                });
                setPreviewImage(initialData.slipUrl ? getDirectImageUrl(initialData.slipUrl) : null);
            }
        }, [initialData]);

        const [selectedStudentIds, setSelectedStudentIds] = useState([]);
        const [isMultiSelectOpen, setIsMultiSelectOpen] = useState(false);
        const [studentSearch, setStudentSearch] = useState('');
        
        const filteredStudents = useMemo(() => {
            if (!studentSearch) return students;
            const term = studentSearch.toLowerCase();
            return students.filter(s => s.name.toLowerCase().includes(term) || String(s.id).includes(term));
        }, [students, studentSearch]);

        const handleChange = (e) => {
            const { name, value, type, checked } = e.target;
            setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
        };

        const handleFileChange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    setFormData(prev => ({ ...prev, slipFile: base64, isSlipDeleted: false })); 
                    setPreviewImage(reader.result); 
                };
                reader.readAsDataURL(file);
            }
        };

        const handleDeleteSlip = () => {
            setFormData(prev => ({ ...prev, slipUrl: '', slipFile: null, isSlipDeleted: true }));
            setPreviewImage(null);
        };

        const toggleStudent = (id) => {
            if (selectedStudentIds.includes(id)) {
                setSelectedStudentIds(prev => prev.filter(sid => sid !== id));
            } else {
                setSelectedStudentIds(prev => [...prev, id]);
            }
        };
        const selectAllFiltered = () => {
            const ids = filteredStudents.map(s => s.id);
            const newIds = [...new Set([...selectedStudentIds, ...ids])];
            setSelectedStudentIds(newIds);
        };
        const clearSelection = () => setSelectedStudentIds([]);

        const handleSubmit = (e) => { 
            e.preventDefault(); 
            if (isEditMode) {
                onSubmit(formData);
            } else {
                if (selectedStudentIds.length === 0) return alert("กรุณาเลือกนักศึกษาอย่างน้อย 1 คน");
                onSubmit({ ...formData, studentIds: selectedStudentIds });
            }
        };

        return (
            <form onSubmit={handleSubmit} className="space-y-5 animate-fade-in">
                {/* Section 1: เลือกนักศึกษา */}
                <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 relative group transition-all">
                    <label className="text-xs font-bold text-gray-500 mb-2 block flex items-center gap-1"><Icon name="user" weight="bold"/> นักศึกษา</label>
                    {isEditMode ? (
                        <div className="relative">
                            <select name="studentId" value={formData.studentId} onChange={handleChange} required className="w-full p-3 pl-10 bg-white border border-gray-200 rounded-lg appearance-none outline-none focus:border-blue-500 font-medium text-gray-700">
                                <option value="">-- เลือกนักศึกษา --</option>
                                {students.map(s => <option key={s.id} value={s.id}>{s.id} - {s.name}</option>)}
                            </select>
                            <Icon name="caret-down" className="absolute right-3 top-3.5 text-gray-400 pointer-events-none" weight="bold" size={12}/>
                            <Icon name="user" className="absolute left-3 top-3.5 text-gray-400" size={18}/>
                        </div>
                    ) : (
                        <div className="relative">
                            <div onClick={() => setIsMultiSelectOpen(!isMultiSelectOpen)} className={`w-full p-3 pl-10 bg-white border rounded-lg cursor-pointer flex justify-between items-center ${isMultiSelectOpen ? 'border-blue-500 ring-2 ring-blue-50' : 'border-gray-200'}`}>
                                <span className={`font-medium ${selectedStudentIds.length > 0 ? 'text-blue-600' : 'text-gray-400'}`}>
                                    {selectedStudentIds.length > 0 ? `เลือกแล้ว ${selectedStudentIds.length} คน` : '-- เลือกนักศึกษา (ได้หลายคน) --'}
                                </span>
                                <Icon name="caret-down" className="text-gray-400" weight="bold" size={12}/>
                                <Icon name="users" className="absolute left-3 text-gray-400" size={18}/>
                            </div>
                            {isMultiSelectOpen && (
                                <div className="absolute top-full left-0 w-full mt-2 bg-white border border-gray-200 rounded-xl shadow-xl z-50 overflow-hidden animate-slide-up-fade">
                                    <div className="p-2 border-b border-gray-100 bg-gray-50 flex gap-2">
                                        <div className="relative flex-1">
                                            <input type="text" placeholder="ค้นหาชื่อ/รหัส..." value={studentSearch} onChange={(e) => setStudentSearch(e.target.value)} className="w-full pl-7 pr-2 py-1.5 text-xs border border-gray-200 rounded-lg outline-none focus:border-blue-500" autoFocus />
                                            <Icon name="magnifying-glass" className="absolute left-2 top-2 text-gray-400" size={12}/>
                                        </div>
                                        <button type="button" onClick={selectAllFiltered} className="px-2 py-1 bg-blue-100 text-blue-600 rounded-lg text-[10px] font-bold hover:bg-blue-200 whitespace-nowrap">เลือกทั้งหมด</button>
                                        <button type="button" onClick={clearSelection} className="px-2 py-1 bg-gray-200 text-gray-600 rounded-lg text-[10px] font-bold hover:bg-gray-300 whitespace-nowrap">ล้าง</button>
                                    </div>
                                    <div className="max-h-48 overflow-y-auto p-1 custom-scrollbar">
                                        {filteredStudents.map(s => {
                                            const isSelected = selectedStudentIds.includes(s.id);
                                            return (
                                                <div key={s.id} onClick={() => toggleStudent(s.id)} className={`flex items-center gap-2 p-2 rounded-lg cursor-pointer transition-colors ${isSelected ? 'bg-blue-50' : 'hover:bg-gray-50'}`}>
                                                    <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors flex-shrink-0 ${isSelected ? 'bg-blue-500 border-blue-500' : 'border-gray-300 bg-white'}`}>
                                                        {isSelected && <Icon name="check" size={10} className="text-white" weight="bold"/>}
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className={`text-xs font-bold ${isSelected ? 'text-blue-700' : 'text-gray-700'}`}>{s.name}</span>
                                                        <span className="text-[10px] text-gray-400">{s.id}</span>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {filteredStudents.length === 0 && <p className="text-center text-gray-400 text-xs py-4">ไม่พบรายชื่อ</p>}
                                    </div>
                                    <div className="p-2 bg-gray-50 border-t border-gray-100 text-center">
                                        <button type="button" onClick={() => setIsMultiSelectOpen(false)} className="text-xs font-bold text-blue-600 hover:underline">ปิดหน้าต่าง</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>

                {/* Section 2: รายละเอียดบิล */}
                <div className="space-y-3">
                    <div>
                        <label className="text-xs font-bold text-gray-500 mb-1 block flex items-center gap-1"><Icon name="tag" weight="bold"/> รายการชำระ</label>
                        <input type="text" name="item" value={formData.item} onChange={handleChange} required placeholder="เช่น ค่าชุดวิชาการ" className="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition placeholder-gray-300 font-medium"/>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-3">
                        <div>
                            <label className="text-xs font-bold text-gray-500 mb-1 block flex items-center gap-1"><Icon name="currency-btc" weight="bold"/> จำนวนเงิน</label>
                            <input type="number" name="amount" value={formData.amount} onChange={handleChange} required placeholder="0.00" className="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 transition font-bold text-gray-800"/>
                        </div>
                        <div>
                            <label className="text-xs font-bold text-gray-500 mb-1 block flex items-center gap-1"><Icon name="percent" weight="bold"/> ส่วนลด</label>
                            <input type="number" name="discount" value={formData.discount} onChange={handleChange} placeholder="0" className="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-orange-500 focus:ring-4 focus:ring-orange-50 transition font-medium text-gray-600"/>
                        </div>
                    </div>

                    <div>
                         <label className="text-xs font-bold text-gray-500 mb-1 block flex items-center gap-1">
                            <Icon name="calendar-check" weight="bold"/> กำหนดชำระ
                         </label>
                         <div className="flex gap-2">
                             <input type="date" name="dueDate" value={formatDateForInput(formData.dueDate)} onChange={handleChange} className="flex-1 p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition font-medium text-gray-600"/>
                             {formData.dueDate && (
                                 <button type="button" onClick={() => setFormData(prev => ({ ...prev, dueDate: '' }))} className="px-3 bg-red-50 text-red-500 rounded-xl border border-red-100 hover:bg-red-100 transition shadow-sm" title="ลบกำหนดชำระ">
                                    <Icon name="trash" weight="bold" size={18}/>
                                 </button>
                             )}
                         </div>
                         <p className="text-[9px] text-gray-400 mt-1 ml-1">*หากไม่ระบุ จะไม่มีการคำนวณค่าปรับ</p>
                    </div>
                </div>

                {/* Section 3: ตั้งค่าค่าปรับ */}
                <div className="bg-orange-50 p-4 rounded-xl border border-orange-100">
                    <h4 className="text-xs font-bold text-orange-600 mb-3 flex items-center gap-1"><Icon name="warning-circle" weight="fill"/> ตั้งค่าค่าปรับล่าช้า</h4>
                    <div className="grid grid-cols-2 gap-3">
                        <div>
                            <label className="text-[10px] font-bold text-gray-500 mb-1 block">ค่าปรับ/วัน (บาท)</label>
                            <input type="number" name="finePerDay" value={formData.finePerDay} onChange={handleChange} placeholder="0" className="w-full p-2 bg-white border border-orange-200 rounded-lg outline-none focus:border-orange-500 text-sm"/>
                        </div>
                        <div>
                            <label className="text-[10px] font-bold text-gray-500 mb-1 block">สูงสุดไม่เกิน (บาท)</label>
                            <input type="number" name="maxFine" value={formData.maxFine} onChange={handleChange} placeholder="0" className="w-full p-2 bg-white border border-orange-200 rounded-lg outline-none focus:border-orange-500 text-sm"/>
                        </div>
                    </div>
                </div>

                {/* Section 4: จัดการหลักฐาน */}
                <div className="bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <label className="text-xs font-bold text-gray-500 mb-3 block flex items-center gap-1"><Icon name="image" weight="bold"/> หลักฐานการโอน (สลิป)</label>
                    {previewImage ? (
                        <div className="relative group">
                            <div className="h-32 w-full bg-gray-200 rounded-lg overflow-hidden border border-gray-300">
                                <img src={previewImage} alt="Slip Preview" className="w-full h-full object-contain bg-white" referrerPolicy="no-referrer" />
                            </div>
                            <div className="absolute top-2 right-2 flex gap-2">
                                <label className="cursor-pointer w-8 h-8 flex items-center justify-center rounded-full bg-white text-blue-600 shadow-md hover:bg-blue-50 transition"><Icon name="arrows-clockwise" weight="bold" size={16}/><input type="file" accept="image/*" onChange={handleFileChange} className="hidden" /></label>
                                <button type="button" onClick={handleDeleteSlip} className="w-8 h-8 flex items-center justify-center rounded-full bg-white text-red-500 shadow-md hover:bg-red-50 transition"><Icon name="trash" weight="bold" size={16}/></button>
                            </div>
                        </div>
                    ) : (
                        <label className="flex flex-col items-center justify-center h-24 w-full border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-white hover:bg-gray-50 hover:border-blue-300 transition group">
                            <div className="flex flex-col items-center justify-center pt-5 pb-6"><Icon name="cloud-arrow-up" className="text-gray-400 group-hover:text-blue-500 mb-1" size={24}/><p className="text-[10px] text-gray-500 font-medium">กดเพื่ออัปโหลดรูปภาพ</p></div>
                            <input type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
                        </label>
                    )}
                </div>
                
                {/* Section 5: แจ้งเตือน */}
                {!isEditMode && (
                    <div className="flex items-center justify-between bg-blue-50 p-3 rounded-xl border border-blue-100">
                        <div className="flex items-center gap-2">
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center ${formData.notify ? 'bg-green-500 text-white' : 'bg-gray-300 text-gray-500'}`}>
                                <Icon name="line-logo" weight="fill" size={18}/>
                            </div>
                            <div>
                                <p className="text-xs font-bold text-gray-700">แจ้งเตือน LINE</p>
                                <p className="text-[10px] text-gray-500">{formData.notify ? 'ส่งข้อความแจ้งเตือนทันที' : 'บันทึกเงียบๆ ไม่แจ้งเตือน'}</p>
                            </div>
                        </div>
                        <button type="button" onClick={() => setFormData(prev => ({ ...prev, notify: !prev.notify }))} className={`w-12 h-6 rounded-full p-1 transition-colors duration-300 ${formData.notify ? 'bg-green-500' : 'bg-gray-300'}`}>
                            <div className={`w-4 h-4 bg-white rounded-full shadow-sm transform transition-transform duration-300 ${formData.notify ? 'translate-x-6' : 'translate-x-0'}`} />
                        </button>
                    </div>
                )}

                <button type="submit" disabled={loading || (!isEditMode && selectedStudentIds.length === 0) || (isEditMode && !formData.studentId)} className="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold shadow-lg shadow-blue-200 hover:shadow-blue-300 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    {loading ? <><Icon name="circle-notch" className="animate-spin" weight="bold"/> กำลังบันทึก...</> : <><Icon name="floppy-disk" weight="bold"/> {isEditMode ? buttonText : `สร้างบิล (${selectedStudentIds.length} คน)`}</>}
                </button>
            </form>
        );
    };

    // --- Student Form (อัปเดตระบบจัดการสิทธิ์ Permissions) ---
    const StudentForm = ({ onSubmit, loading, initialData = null }) => {
      const AVAILABLE_PERMISSIONS = [
        { id: 'home', label: 'หน้าแรก (Home)' },
        { id: 'bills', label: 'จัดการบิล (Bills)' },
        { id: 'orders', label: 'สั่งซื้อ (Orders)' },
        { id: 'history', label: 'ประวัติ (History)' },
        { id: 'finance', label: 'การเงิน (Finance)' },
        { id: 'settings', label: 'ตั้งค่า (Settings)' }
      ];
      const LOCKED_PERMISSIONS = ['home', 'settings'];
      const [form, setForm] = useState({ 
          id: '', name: '', password: '', 
          userId: '', lineUid: '', firebaseUid: '', // เพิ่มฟิลด์ให้ครบ
          permissions: ['home', 'settings'], hasPassword: false 
      });
      const [isPermOpen, setIsPermOpen] = useState(false);
      
      // State สำหรับระบบ Auth
      const [isResetting, setIsResetting] = useState(false);
      const [newPassInput, setNewPassInput] = useState('');
      const [popup, setPopup] = useState(null); // { type, title, text, onConfirm }

      useEffect(() => { 
          if (initialData) {
              const perms = initialData.permissions ? String(initialData.permissions).split(',') : ['home', 'settings'];
              setForm({ ...initialData, originalId: initialData.id, permissions: perms }); 
          } 
      }, [initialData]);

      const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });
      
      const togglePermission = (id) => {
        if (LOCKED_PERMISSIONS.includes(id)) return;
        if (form.permissions.includes(id)) {
          setForm({ ...form, permissions: form.permissions.filter(p => p !== id) });
        } else {
          setForm({ ...form, permissions: [...form.permissions, id] });
        }
      };

      const handleSubmit = () => {
          const submitData = { ...form, permissions: form.permissions.join(',') };
          onSubmit(submitData);
      };

      return (
        <div className="space-y-4 animate-fade-in pb-8 relative">
          <div><label className="block text-sm font-medium text-gray-700 mb-1">รหัสนักศึกษา</label><input type="text" name="id" value={form.id} onChange={handleChange} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary bg-gray-50" readOnly={!!initialData} /></div>
          <div><label className="block text-sm font-medium text-gray-700 mb-1">ชื่อ-นามสกุล</label><input type="text" name="name" value={form.name} onChange={handleChange} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary" /></div>
          
          {/* แยกช่อง UID ชัดเจน */}
          <div className="grid grid-cols-2 gap-2">
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">LINE UID (lineUid)</label><input type="text" name="lineUid" value={form.lineUid || ''} onChange={handleChange} className="w-full p-2 text-xs border rounded-lg outline-none focus:ring-2 focus:ring-primary bg-gray-50" /></div>
              <div><label className="block text-[10px] font-bold text-gray-500 mb-1">Email UID (firebaseUid)</label><input type="text" name="firebaseUid" value={form.firebaseUid || ''} onChange={handleChange} className="w-full p-2 text-xs border rounded-lg outline-none focus:ring-2 focus:ring-primary bg-gray-50" /></div>
          </div>
          <div><label className="block text-sm font-medium text-gray-700 mb-1">User ID</label><input type="text" name="userId" value={form.userId || ''} onChange={handleChange} className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary" /></div>
          
          <div className="relative">
            <label className="block text-sm font-medium text-gray-700 mb-1">สิทธิ์การเข้าถึงระบบ</label>
            <div onClick={() => setIsPermOpen(!isPermOpen)} className="w-full p-3 border border-gray-200 rounded-lg bg-white cursor-pointer flex justify-between items-center hover:border-primary transition">
              <span className="text-gray-700 text-sm truncate font-bold text-primary">เลือกแล้ว {form.permissions.length} สิทธิ์</span>
              <Icon name="caret-down" className="text-gray-400" weight="bold"/>
            </div>
            {isPermOpen && (
              <>
                <div className="fixed inset-0 z-10" onClick={() => setIsPermOpen(false)}></div>
                <div className="absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-xl overflow-hidden animate-fade-in">
                  {AVAILABLE_PERMISSIONS.map(perm => {
                    const isSelected = form.permissions.includes(perm.id);
                    const isLocked = LOCKED_PERMISSIONS.includes(perm.id);
                    return (
                      <div key={perm.id} className={`p-3 flex items-center gap-3 transition-colors ${isLocked ? 'cursor-not-allowed bg-gray-50' : 'cursor-pointer hover:bg-blue-50'} ${isSelected && !isLocked ? 'bg-blue-50/50' : ''}`} onClick={() => togglePermission(perm.id)}>
                        <div className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${isSelected ? (isLocked ? 'bg-gray-400 border-gray-400' : 'bg-primary border-primary') : 'border-gray-300 bg-white'}`}>
                          {isSelected && <Icon name="check" className="text-white" size={12} weight="bold" />}
                        </div>
                        <div>
                          <div className={`text-sm font-bold ${isLocked ? 'text-gray-500' : 'text-gray-800'}`}>{perm.label}</div>
                          {isLocked && <div className="text-[10px] text-gray-400">สิทธิ์พื้นฐาน (บังคับ)</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>

          {/* ✅ ส่วนจัดการรหัสผ่าน (UI ปรับปรุงใหม่) */}
          <div className="relative border-t border-gray-100 pt-4 mt-2">
            <label className="block text-sm font-medium text-gray-700 mb-2">บัญชีเข้าระบบ (Firebase Auth - Email)</label>
            
            {form.hasPassword ? (
                /* --- กรณีเปิดใช้งาน Auth แล้ว (กล่องเขียว) --- */
                <div className="bg-green-50 p-4 rounded-xl border border-green-100">
                    <div className="flex justify-between items-start mb-3">
                        <div className="flex items-center gap-2 text-green-700 font-bold text-sm">
                            <Icon name="check-circle" weight="fill" size={20}/>
                            บัญชีถูกสร้างแล้ว
                        </div>
                        {/* 🔄 ปุ่มรีเซ็ต/ลบรหัสผ่าน */}
                        <button 
                            type="button"
                            onClick={() => {
                                setPopup({
                                    type: 'warning',
                                    title: 'รีเซ็ต/ลบรหัสผ่าน?',
                                    text: 'ระบบจะลบข้อมูลบัญชีอีเมลเดิมทิ้ง เพื่อให้คุณสามารถตั้งรหัสผ่านใหม่ได้ทันที ยืนยันหรือไม่?',
                                    onConfirm: () => {
                                        apiCall('deleteStudentAuthEmail', form.id, form.firebaseUid) // ส่ง firebaseUid
                                            .then(() => {
                                                setForm({...form, hasPassword: false, password: '', firebaseUid: ''});
                                                setPopup({ type: 'success', title: 'รีเซ็ตสำเร็จ', text: 'ลบรหัสผ่านเดิมแล้ว คุณสามารถตั้งรหัสผ่านใหม่ได้' });
                                            })
                                            .catch(err => setPopup({ type: 'error', title: 'ผิดพลาด', text: err.message }));
                                    }
                                });
                            }}
                            className="text-[10px] bg-white border border-green-200 px-2 py-1 rounded-md text-green-600 font-bold hover:bg-green-100 transition shadow-sm"
                        >
                            รีเซ็ต/ลบรหัส
                        </button>
                    </div>
                    
                    <div className="space-y-2 p-3 bg-white rounded-lg border border-gray-200">
                        <label className="text-[10px] font-bold text-gray-400 uppercase">เปลี่ยนรหัสผ่านใหม่ (ต้องรู้ firebaseUid)</label>
                        <div className="flex gap-2">
                            <input type="text" placeholder="พิมพ์รหัสใหม่..." value={newPassInput} onChange={(e) => setNewPassInput(e.target.value)} className="flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" />
                            <button type="button" disabled={!newPassInput || isResetting || !form.firebaseUid} onClick={() => {
                                setPopup({
                                    type: 'warning',
                                    title: 'ยืนยันการเปลี่ยนรหัส',
                                    text: `เปลี่ยนรหัสเป็น "${newPassInput}" ?`,
                                    onConfirm: () => {
                                        setIsResetting(true);
                                        apiCall('updateStudentPassword', form.id, form.firebaseUid, newPassInput) // ส่ง firebaseUid
                                            .then(() => {
                                                setPopup({ type: 'success', title: 'สำเร็จ', text: 'เปลี่ยนรหัสผ่านเรียบร้อยแล้ว' });
                                                setNewPassInput('');
                                            })
                                            .catch(err => setPopup({ type: 'error', title: 'ผิดพลาด', text: err.message }))
                                            .finally(() => setIsResetting(false));
                                    }
                                });
                            }} className="px-3 py-2 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700 disabled:opacity-50 transition">
                                {isResetting ? <Icon name="spinner" className="animate-spin" /> : 'บันทึก'}
                            </button>
                        </div>
                    </div>
                </div>
            ) : (
                /* --- กรณีที่ยังไม่มีรหัสใน Auth --- */
                <div className="space-y-3">
                    {/* ❌ โชว์รหัสเก่าเฉพาะเมื่อมีข้อมูลเท่านั้น */}
                    {form.password && (
                        <div className="mb-2">
                            <label className="text-[10px] font-bold text-gray-400 mb-1 block uppercase">รหัสผ่านเดิม (ในระบบเก่า)</label>
                            <input type="text" value={form.password} readOnly className="w-full px-4 py-2 bg-gray-100 border border-gray-200 text-gray-500 rounded-xl text-sm font-bold" />
                        </div>
                    )}
                    
                    <div className="relative">
                        <label className="text-[10px] font-bold text-gray-400 mb-1 block uppercase">ตั้งรหัสผ่านใหม่ (เพื่อเปิดใช้ Auth)</label>
                        <input type="text" name="password" value={form.password || ''} onChange={handleChange} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-primary outline-none transition" placeholder="ระบุรหัสผ่านเพื่อสร้างบัญชี..."/>
                    </div>
                </div>
            )}
          </div>
          
          {/* ✅ ส่วนลบ Account อันตราย (ลบถาวร - แยกประเภท) */}
          {initialData && (
              <div className="bg-red-50 p-4 rounded-2xl border border-red-100 mt-4 space-y-3">
                  <p className="text-[10px] font-bold text-red-400 uppercase tracking-widest flex items-center gap-1 mb-2">
                      <Icon name="shield-warning" weight="fill"/> อันตราย: ลบบัญชีออกจากระบบ
                  </p>
                  
                  <div className="flex flex-col gap-2">
                      {/* 🔴 ปุ่มลบ Auth ฝั่ง Email */}
                      {form.hasPassword && (
                          <button 
                            type="button"
                            onClick={() => {
                                setPopup({
                                    type: 'danger',
                                    title: 'ลบบัญชี Email (รหัสผ่าน)',
                                    text: `คุณต้องการลบบัญชี ${form.id}@ptu.ac.th ออกจากระบบใช่หรือไม่? นักศึกษาจะไม่สามารถล็อกอินด้วยรหัสผ่านได้อีก`,
                                    onConfirm: () => {
                                        apiCall('deleteStudentAuthEmail', form.id, form.firebaseUid) // ส่ง firebaseUid
                                            .then(() => {
                                                setForm({...form, hasPassword: false, password: '', firebaseUid: ''});
                                                setPopup({ type: 'success', title: 'ลบสำเร็จ', text: 'ลบบัญชี Email ออกจากระบบเรียบร้อย' });
                                            })

    // --- QR Code Management Modal ---
    const QrCodeModal = ({ isOpen, onClose, qrUrls, onUploadSuccess, onDelete, loading, initialEditQr }) => {
        const [mode, setMode] = useState('list'); 
        const [uploadFile, setUploadFile] = useState(null);
        const [previewUrl, setPreviewUrl] = useState('');
        const [newAmount, setNewAmount] = useState('');
        const [isUploading, setIsUploading] = useState(false);
        const [editTargetUrl, setEditTargetUrl] = useState(null); 

        useEffect(() => {
            if (isOpen) {
                if (initialEditQr) { startEdit(initialEditQr); } else { resetForm(); setMode('list'); }
            }
        }, [isOpen, initialEditQr]);

        const resetForm = () => { setUploadFile(null); setPreviewUrl(''); setNewAmount(''); setEditTargetUrl(null); setIsUploading(false); };
        const handleFileChange = (e) => { const file = e.target.files[0]; if (file) { setUploadFile(file); const reader = new FileReader(); reader.onloadend = () => setPreviewUrl(reader.result); reader.readAsDataURL(file); } };
        const startEdit = (qr) => { setMode('edit'); setEditTargetUrl(qr.url); setNewAmount(qr.amount); setPreviewUrl(qr.url); setUploadFile(null); };
        const goToAdd = () => { resetForm(); setMode('add'); };
        const goBack = () => { resetForm(); setMode('list'); };

        const handleSave = () => {
            if (!newAmount) return;
            setIsUploading(true);
            const onSuccess = (newData) => { setIsUploading(false); resetForm(); if(!initialEditQr) setMode('list'); else onClose(); onUploadSuccess(newData); };
            const onFailure = (err) => { setIsUploading(false); alert("เกิดข้อผิดพลาด: " + err.message); };

            if (uploadFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement("img");
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");
                        
                        const MAX_WIDTH = 800; 
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7).split(',')[1];
                        const mimeType = "image/jpeg";
                        const fileName = `QR-${Date.now()}.jpg`;

                        // ✅ ใช้ apiCall แทน google.script.run
                        if (mode === 'edit') { 
                            apiCall('uploadQrImage', compressedBase64, mimeType, fileName, newAmount, editTargetUrl).then(onSuccess).catch(onFailure); 
                        } else { 
                            apiCall('uploadQrImage', compressedBase64, mimeType, fileName, newAmount).then(onSuccess).catch(onFailure); 
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(uploadFile);
            } else {
                if (mode === 'edit' && editTargetUrl) { 
                    apiCall('updateQrCode', editTargetUrl, editTargetUrl, newAmount).then(onSuccess).catch(onFailure); 
                } else { 
                    alert("กรุณาเลือกรูปภาพ"); setIsUploading(false); 
                }
            }
        };

        if (!isOpen) return null;

        return (
            <Modal isOpen={isOpen} onClose={onClose} title={mode === 'list' ? "จัดการ QR Code" : (mode === 'add' ? "เพิ่ม QR Code" : "แก้ไข QR Code")}>
                {mode === 'list' && (
                    <div className="space-y-4 animate-fade-in">
                        <button onClick={goToAdd} className="w-full py-3 bg-blue-50 text-primary border border-blue-200 rounded-xl flex items-center justify-center gap-2 font-bold hover:bg-blue-100 transition"><Icon name="plus-circle" size={20} weight="bold"/> เพิ่ม QR Code ใหม่</button>
                        <div className="border-t border-gray-100 my-2"></div>
                        <div><h4 className="text-sm font-bold text-gray-500 mb-3 flex items-center gap-2"><Icon name="images" className="text-gray-400"/> รายการที่มีอยู่ ({qrUrls.length})</h4>
                            {qrUrls.length === 0 ? (<div className="flex flex-col items-center justify-center text-gray-400 py-10 bg-gray-50 rounded-xl border border-dashed border-gray-200"><Icon name="image-broken" size={48} className="mb-2 opacity-50"/><span className="text-sm">ยังไม่มี QR Code ในระบบ</span></div>) : (
                                <div className="grid grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-1 pb-2">
                                    {qrUrls.map((qr, idx) => (
                                        <div key={idx} className="relative group rounded-xl border border-gray-200 overflow-hidden bg-white flex flex-col shadow-sm hover:shadow-md transition">
                                            <div className="aspect-square flex items-center justify-center p-4 bg-gray-50"><img src={qr.url} alt="QR" className="max-h-full max-w-full object-contain mix-blend-multiply" /></div>
                                            <div className="bg-white p-3 text-center border-t border-gray-100"><span className="text-sm font-bold text-gray-700">฿{Number(qr.amount).toLocaleString()}</span></div>
                                            <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3 backdrop-blur-sm">
                                                <button onClick={() => startEdit(qr)} className="bg-white text-blue-600 p-2.5 rounded-full hover:bg-blue-50 transition transform hover:scale-110 shadow-lg" title="แก้ไข"><Icon name="pencil-simple" weight="bold" size={20} /></button>
                                                <button onClick={() => { if(confirm('ต้องการลบใช่หรือไม่?')) onDelete(qr.url); }} className="bg-white text-red-500 p-2.5 rounded-full hover:bg-red-50 transition transform hover:scale-110 shadow-lg" title="ลบ"><Icon name="trash" weight="bold" size={20} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}
                {(mode === 'add' || mode === 'edit') && (
                    <div className="space-y-6 animate-scale-in">
                        <div className="space-y-2"><label className="text-sm font-bold text-gray-700">รูปภาพ QR Code</label><div className="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:bg-gray-50 transition relative cursor-pointer group bg-white"><input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />{previewUrl ? (<div className="relative"><img src={previewUrl} className="h-40 object-contain mx-auto rounded-lg shadow-sm" /><div className="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition rounded-lg text-white font-medium backdrop-blur-sm"><Icon name="camera" className="mr-2"/> เปลี่ยนรูป</div></div>) : (<div className="py-6"><div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="upload-simple" size={24} weight="bold"/></div><p className="text-sm text-gray-600 font-medium">แตะเพื่อเลือกรูปภาพ</p><p className="text-xs text-gray-400 mt-1">รองรับไฟล์ .jpg, .png</p></div>)}</div></div>
                        <div className="space-y-2"><label className="text-sm font-bold text-gray-700">ระบุยอดเงิน (บาท)</label><div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">฿</span><input type="number" value={newAmount} onChange={(e) => setNewAmount(e.target.value)} className="w-full pl-8 p-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 font-bold text-lg outline-none focus:ring-2 focus:ring-primary focus:bg-white transition" placeholder="0" /></div></div>

                    </div>
                )}
            </Modal>
        );
    };

    // --- Notification View (อัปเดต: ใช้ตัวเลือกนักศึกษาแบบ Multi-Select ในหน้าส่งข้อความ) ---
    const NotificationView = ({ students, data, onSendCustom, onSendOverdue, onSendAccount, onSendOverdueBatch, loading, defaultSubTab = 'followup' }) => {
        const [activeSubTab, setActiveSubTab] = useState(defaultSubTab); 
        
        // ✅ เปลี่ยน State: ใช้ studentIds (Array) เพื่อรองรับการเลือกหลายคน
        const [form, setForm] = useState({ studentIds: [], title: '', detail: '', msgType: 'notification' });
        const [accountStudentIds, setAccountStudentIds] = useState([]);
        const [confirmState, setConfirmState] = useState({ isOpen: false, type: '', data: null, title: '', message: '' });
        
        // State สำหรับดูรายละเอียดบิลในหน้านี้
        const [viewingBill, setViewingBill] = useState(null);

        // Helper: คำนวณค่าปรับ (Default 0)
        const getFine = (bill) => {
            if (!bill.dueDate) return 0;
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(bill.dueDate); due.setHours(0,0,0,0);
            
            if (today <= due) return 0;

            const diffTime = Math.abs(today - due);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            const finePerDay = Number(bill.finePerDay || 0);
            const maxFine = Number(bill.maxFine || 0);
            
            const calculatedFine = diffDays * finePerDay;

            if (maxFine > 0) {
                return Math.min(calculatedFine, maxFine);
            }
            return calculatedFine;
        };

        // จัดกลุ่มบิล (เกินกำหนด vs ใกล้ถึงกำหนด)
        const dueBills = useMemo(() => {
            const today = new Date(); today.setHours(0,0,0,0);
            const threeDays = new Date(today); threeDays.setDate(today.getDate() + 3);

            const overdue = [];
            const dueSoon = [];

            (data.bills || []).forEach(b => {
                if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก' || !b.dueDate) return;
                const dueDate = new Date(b.dueDate); dueDate.setHours(0,0,0,0);
                
                const student = students.find(s => String(s.id) === String(b.studentId));
                const itemData = { ...b, studentName: student?.name || 'ไม่ทราบชื่อ', hasLine: !!student?.userId };

                if (dueDate < today) overdue.push(itemData);
                else if (dueDate <= threeDays) dueSoon.push(itemData);
            });
            return { overdue, dueSoon };
        }, [data.bills, students]);

        const triggerSendCustom = (e) => { 
            e.preventDefault();
            if (form.studentIds.length === 0) return alert('กรุณาเลือกนักศึกษาอย่างน้อย 1 คน');
            if (!form.title) return alert('กรุณาระบุหัวข้อข้อความ');
            
            const typeText = form.msgType === 'announcement' ? 'ประกาศ' : 'ข้อความ'; 
            setConfirmState({ isOpen: true, type: 'CUSTOM', data: null, title: `ยืนยันการส่ง${typeText}`, message: `คุณต้องการส่ง "${form.title}" ให้กับนักศึกษาจำนวน ${form.studentIds.length} คน ใช่หรือไม่?` }); 
        };

        const triggerSendAccount = () => { if (accountStudentIds.length === 0) return; setConfirmState({ isOpen: true, type: 'ACCOUNT', data: null, title: 'ยืนยันการส่งข้อมูลบัญชี', message: `คุณต้องการส่ง รหัสนักศึกษาและรหัสผ่าน ให้กับนักศึกษาจำนวน ${accountStudentIds.length} คน ใช่หรือไม่?` }); };
        const triggerSendOverdue = (billId, studentName, amount) => { setConfirmState({ isOpen: true, type: 'OVERDUE', data: billId, title: 'ยืนยันการทวงถาม', message: `คุณต้องการส่งข้อความทวงถามยอด ${Number(amount).toLocaleString()} บาท ไปยัง ${studentName} ใช่หรือไม่?` }); };
        const triggerSendOverdueAll = () => { if (dueBills.overdue.length === 0) return; setConfirmState({ isOpen: true, type: 'OVERDUE_ALL', data: dueBills.overdue.filter(b => b.hasLine).map(b => ({ lineUserId: students.find(s => String(s.id) === String(b.studentId)).userId, type: 'OVERDUE', payload: { bill: b, studentName: b.studentName } })), title: 'ยืนยันการทวงถามทั้งหมด', message: `คุณต้องการส่งข้อความแจ้งเตือน "เกินกำหนด" ทั้งหมด ${dueBills.overdue.length} รายการ ใช่หรือไม่?` }); };
        const triggerSendDueSoonAll = () => { if (dueBills.dueSoon.length === 0) return; setConfirmState({ isOpen: true, type: 'DUE_SOON_ALL', data: dueBills.dueSoon.filter(b => b.hasLine).map(b => ({ lineUserId: students.find(s => String(s.id) === String(b.studentId)).userId, type: 'DUE_SOON', payload: { bill: b, studentName: b.studentName } })), title: 'ยืนยันแจ้งเตือนใกล้ถึงกำหนด', message: `คุณต้องการส่งข้อความแจ้งเตือน "ใกล้ถึงกำหนด" ทั้งหมด ${dueBills.dueSoon.length} รายการ ใช่หรือไม่?` }); };

        const handleConfirmAction = () => {
            if (confirmState.type === 'CUSTOM') { 
                onSendCustom(form); 
                if (!loading) setForm({ studentIds: [], title: '', detail: '', msgType: 'notification' }); 
            } 
            else if (confirmState.type === 'ACCOUNT') { onSendAccount(accountStudentIds); if (!loading) setAccountStudentIds([]); } 
            else if (confirmState.type === 'OVERDUE') { onSendOverdue(confirmState.data); } 
            else if (confirmState.type === 'OVERDUE_ALL') { onSendOverdueBatch(confirmState.data); }
            else if (confirmState.type === 'DUE_SOON_ALL') { onSendOverdueBatch(confirmState.data); }
        };

        useEffect(() => {
            if (!loading && confirmState.isOpen) {
                setConfirmState(prev => ({ ...prev, isOpen: false }));
            }
        }, [loading]);

        const tabs = [
            { id: 'followup', label: 'ติดตามบิล', icon: 'bell-ringing', badge: dueBills.overdue.length },
            { id: 'account', label: 'ข้อมูลบัญชี', icon: 'identification-card' },
            { id: 'general', label: 'ข้อความ/ประกาศ', icon: 'chat-circle-text' }
        ];

        return (
            <div className="pb-24 space-y-5 relative">
                <ScrollToTopBottom />
                <ConfirmModal isOpen={confirmState.isOpen} onClose={() => setConfirmState({ ...confirmState, isOpen: false })} onConfirm={handleConfirmAction} title={confirmState.title} message={confirmState.message} loading={loading} confirmText="ยืนยันส่ง" isDestructive={false} />
                
                {/* Header & Tabs */}
                <div className="space-y-3 px-2 pt-2">
                    <h2 className="text-xl font-bold text-gray-800">ระบบแจ้งเตือน</h2>
                    <p className="text-xs text-gray-500 mt-[-5px]">ส่งข้อความผ่าน LINE Official Account</p>
                    <div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex overflow-x-auto no-scrollbar gap-1">
                        {tabs.map(tab => {
                            const isActive = activeSubTab === tab.id;
                            let activeClass = isActive ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50';
                            if (isActive && tab.id === 'followup') activeClass = 'bg-red-500 text-white shadow-md shadow-red-200';
                            if (isActive && tab.id === 'account') activeClass = 'bg-blue-500 text-white shadow-md shadow-blue-200';
                            
                            return (
                                <button key={tab.id} onClick={() => setActiveSubTab(tab.id)} className={`flex-1 py-2.5 px-3 rounded-xl flex items-center justify-center gap-2 transition-all relative ${activeClass}`}>
                                    <Icon name={tab.icon} weight={isActive ? "fill" : "bold"} size={18}/>
                                    <span className="text-xs font-bold whitespace-nowrap">{tab.label}</span>
                                    {tab.badge > 0 && <span className="absolute -top-1 -right-1 bg-white text-red-500 text-[9px] font-bold px-1.5 py-0.5 rounded-full border border-gray-100 shadow-sm">{tab.badge}</span>}
                                </button>
                            );

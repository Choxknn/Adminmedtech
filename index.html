<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin System - Firebase Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#2563EB', secondary: '#64748B', background: '#F8FAFC', surface: '#FFFFFF' },
          fontFamily: { sans: ['Inter', 'Sarabun', 'sans-serif'] },
          animation: {
            'scale-in': 'scaleIn 0.2s ease-out forwards',
            'check-bounce': 'checkBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
            'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            checkBounce: { '0%': { transform: 'scale(0)' }, '50%': { transform: 'scale(1.2)' }, '100%': { transform: 'scale(1)' } },
            shake: { '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' }, '20%, 80%': { transform: 'translate3d(2px, 0, 0)' }, '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' }, '40%, 60%': { transform: 'translate3d(4px, 0, 0)' } }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@300;400;500;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ✅ 1. Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCI12dWCOkpRbdr-TFtZjNQhRKvdmj4g6k",
      authDomain: "medtechptu67-payment.firebaseapp.com",
      databaseURL: "https://medtechptu67-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "medtechptu67-payment",
      storageBucket: "medtechptu67-payment.firebasestorage.app",
      messagingSenderId: "452330902364",
      appId: "1:452330902364:web:f92236a62500144531a799",
      measurementId: "G-7WQWLGFSC0"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ✅ 2. GAS URL (สำหรับ Line Notify อย่างเดียว)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwbNYCsHz7sxUx4TmjU2qiATY0oLmRC-XCOaPaLoPkiRlBZ2KHH95LDTx36JODNaeEkxw/exec";
    const notifyGas = async (action, data) => {
        try {
            await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: action, data: [data] }) });
        } catch (e) { console.error("Notify Error:", e); }
    };

    // Helper อัปโหลดรูปเข้า Storage
    const uploadToStorage = async (base64Str, folder, fileName) => {
        if (!base64Str) return '';
        const ref = storage.ref().child(`${folder}/${fileName}`);
        await ref.putString(base64Str, 'base64', { contentType: 'image/jpeg' });
        return await ref.getDownloadURL();
    };

    // --- UTILS & HELPERS ---
    const useScrollLock = (isOpen) => { useEffect(() => { document.body.style.overflow = isOpen ? 'hidden' : 'unset'; return () => { document.body.style.overflow = 'unset'; }; }, [isOpen]); };
    const getStatusColor = (status) => {
      switch(status) {
        case 'ชำระแล้ว': return 'bg-green-100 text-green-700'; case 'รอตรวจสอบ': return 'bg-yellow-100 text-yellow-700';
        case 'ON': return 'bg-green-100 text-green-700'; case 'OFF': return 'bg-red-100 text-red-700'; case 'OUT': return 'bg-gray-200 text-gray-500';
        case 'อยู่ระหว่างสั่งซื้อ': return 'bg-blue-100 text-blue-700'; case 'อยู่ระหว่างผลิต': return 'bg-purple-100 text-purple-700'; case 'รับแล้ว': return 'bg-green-100 text-green-700';
        default: return 'bg-gray-100 text-gray-600';
      }
    };
    const calculateFine = (bill) => {
      if (bill.status === 'ชำระแล้ว' || !bill.dueDate) return 0;
      const due = new Date(bill.dueDate); due.setHours(0, 0, 0, 0); const now = new Date(); now.setHours(0, 0, 0, 0);
      if (now <= due) return 0;
      const diffDays = Math.ceil((now - due) / (1000 * 60 * 60 * 24));
      let fine = diffDays * (bill.finePerDay || 0);
      if (bill.maxFine && fine > bill.maxFine) fine = bill.maxFine;
      return fine;
    };
    const formatDate = (ds) => { if (!ds) return ''; const d = new Date(ds); if (d.getFullYear() > 2400) d.setFullYear(d.getFullYear() - 543); return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' }); };
    const formatDateForInput = (ds) => { if (!ds) return ''; const d = new Date(ds); if (isNaN(d.getTime())) return ''; return d.toISOString().split('T')[0]; };
    const isDateInRange = (ds, startStr, endStr) => {
        if (!ds) return false; const t = new Date(ds); t.setHours(0,0,0,0);
        const s = startStr ? new Date(startStr) : null; if(s) s.setHours(0,0,0,0);
        const e = endStr ? new Date(endStr) : null; if(e) e.setHours(0,0,0,0);
        if (s && t < s) return false; if (e && t > e) return false; return true;
    };

    // --- UI COMPONENTS ---
    const Icon = ({ name, size = 24, className = "", weight="regular" }) => <i className={`ph${weight === 'regular' ? '' : `-${weight}`} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    const Spinner = () => <div className="flex justify-center items-center py-10"><Icon name="circle-notch" className="animate-spin text-primary" size={32} weight="bold" /></div>;
    const LoadingOverlay = () => <div className="fixed inset-0 z-[300] bg-black/30 backdrop-blur-sm flex items-center justify-center animate-fade-in"><div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center gap-4"><div className="relative"><div className="w-12 h-12 border-4 border-blue-100 rounded-full"></div><div className="absolute top-0 left-0 w-12 h-12 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div></div><span className="text-sm font-bold text-gray-600 animate-pulse">กำลังประมวลผล...</span></div></div>;
    
    const ConfirmModal = ({ isOpen, onClose, onConfirm, title, message, loading, confirmText = "ยืนยัน", isDestructive = true }) => {
        useScrollLock(isOpen); if (!isOpen) return null;
        return ReactDOM.createPortal(
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in"><div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl animate-scale-in text-center"><div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${isDestructive ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-primary'}`}>{loading ? <Icon name="circle-notch" className="animate-spin" size={32} weight="bold" /> : <Icon name={isDestructive ? "trash" : "paper-plane-right"} size={32} weight="fill" />}</div><h3 className="text-xl font-bold text-gray-800 mb-2">{title}</h3><p className="text-sm text-gray-500 mb-6 whitespace-pre-line">{message}</p><div className="flex gap-3"><button onClick={onClose} disabled={loading} className="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-bold hover:bg-gray-50 transition disabled:opacity-50">ยกเลิก</button><button onClick={onConfirm} disabled={loading} className={`flex-1 py-3 rounded-xl text-white font-bold shadow-lg transition flex justify-center items-center gap-2 disabled:opacity-70 ${isDestructive ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'}`}>{loading ? <><Icon name="circle-notch" className="animate-spin" weight="bold"/> รอสักครู่</> : confirmText}</button></div></div></div>, document.body
        );
    };

    const StatCard = ({ title, value, icon, gradient, onClick, alert, variant = 'default' }) => {
      let bgClass = alert ? (variant === 'warning' ? "bg-amber-50" : "bg-red-50") : "bg-white";
      let blinkingBorder = alert && variant !== 'default' ? <div className={`absolute inset-0 rounded-2xl border-2 ${variant === 'warning' ? 'border-amber-400' : 'border-red-400'} animate-pulse pointer-events-none`}></div> : null;
      return (
        <div onClick={onClick} className={`${bgClass} p-4 rounded-2xl card-shadow flex items-center space-x-4 relative ${onClick ? 'cursor-pointer active:scale-95 transition-transform' : ''}`}>
          {blinkingBorder}
          {alert && (<span className="absolute top-3 right-3 flex h-3 w-3"><span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${variant === 'warning' ? 'bg-amber-400' : 'bg-red-400'}`}></span><span className={`relative inline-flex rounded-full h-3 w-3 border-2 border-white ${variant === 'warning' ? 'bg-amber-500' : 'bg-red-500'}`}></span></span>)}
          <div className={`p-3.5 rounded-2xl bg-gradient-to-br ${gradient} text-white shadow-md relative z-10`}><Icon name={icon} size={26} weight="duotone" /></div>
          <div className="relative z-10"><p className={`text-xs font-medium ${alert && variant !== 'default' ? 'text-gray-700 font-bold' : 'text-gray-400'}`}>{title}</p><h3 className={`text-xl font-bold ${alert && variant === 'danger' ? 'text-red-700' : (alert && variant === 'warning' ? 'text-amber-700' : 'text-gray-800')}`}>{value}</h3></div>
        </div>
      );
    };

    const DateRangeFilter = ({ startDate, endDate, onChange, isActive, onToggle }) => (
      <div className="bg-white p-3 rounded-xl card-shadow mb-4 animate-fade-in border border-gray-100">
         <div className="flex items-center justify-between mb-2 pb-2 border-b border-gray-50"><div className="flex items-center gap-2"><Icon name="calendar-blank" size={18} className="text-primary"/><span className="text-xs font-bold text-gray-700">กรองตามช่วงเวลา</span></div><button onClick={onToggle} className={`w-10 h-6 rounded-full p-1 transition-colors duration-200 ease-in-out focus:outline-none flex items-center ${isActive ? 'bg-primary' : 'bg-gray-200'}`}><div className={`bg-white w-4 h-4 rounded-full shadow-sm transform transition-transform duration-200 ease-in-out ${isActive ? 'translate-x-4' : 'translate-x-0'}`}/></button></div>
         <div className={`grid grid-cols-2 gap-2 transition-all duration-300 ${isActive ? 'opacity-100' : 'opacity-40 pointer-events-none grayscale'}`}>
             <div><label className="block text-[10px] text-gray-400 font-bold mb-0.5 ml-1">ตั้งแต่วันที่</label><input type="date" value={startDate} disabled={!isActive} onChange={e => onChange('start', e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-lg py-0 px-2 text-xs outline-none focus:ring-1 focus:ring-primary text-gray-600 font-medium h-8"/></div>
             <div><label className="block text-[10px] text-gray-400 font-bold mb-0.5 ml-1">ถึงวันที่</label><input type="date" value={endDate} disabled={!isActive} onChange={e => onChange('end', e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-lg py-0 px-2 text-xs outline-none focus:ring-1 focus:ring-primary text-gray-600 font-medium h-8"/></div>
         </div>
      </div>
    );

    const ScrollToTopBottom = () => {
      const [showBtn, setShowBtn] = useState(false);
      useEffect(() => { const checkScroll = () => setShowBtn(window.scrollY > 300); window.addEventListener('scroll', checkScroll); return () => window.removeEventListener('scroll', checkScroll); }, []);
      if (!showBtn) return null;
      return (<button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="fixed bottom-24 right-4 z-50 w-11 h-11 bg-primary/90 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 transition-all hover:-translate-y-1 animate-fade-in"><Icon name="arrow-up" weight="bold" size={20}/></button>);
    };

    const ImageModal = ({ isOpen, onClose, imageUrl }) => {
      useScrollLock(isOpen); if (!isOpen || !imageUrl) return null;
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={onClose}><div className="relative max-w-full max-h-full" onClick={e => e.stopPropagation()}><button onClick={onClose} className="absolute -top-12 right-0 md:-right-12 text-white hover:text-gray-300 transition p-2 bg-black/20 rounded-full"><Icon name="x" size={24} weight="bold"/></button><img src={imageUrl} alt="Preview" className="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain bg-white" /></div></div>, document.body
      );
    };

    const Modal = ({ isOpen, onClose, title, children, hideClose = false, zIndex = "z-[110]" }) => {
      useScrollLock(isOpen); if (!isOpen) return null;
      return ReactDOM.createPortal(
        <div className={`fixed inset-0 ${zIndex} flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in`}><div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl transform transition-all scale-100 animate-scale-in max-h-[90vh] flex flex-col">{!hideClose && (<div className="flex justify-between items-center p-4 border-b border-gray-100 bg-white flex-shrink-0"><h3 className="font-bold text-lg text-gray-800">{title}</h3><button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:text-red-500 transition-colors"><Icon name="x" size={20} weight="bold" /></button></div>)}<div className="p-4 overflow-y-auto flex-1">{children}</div></div></div>, document.body
      );
    };

    const ErrorModal = ({ isOpen, onClose, message }) => {
      useScrollLock(isOpen); if (!isOpen) return null;
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[130] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in"><div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl animate-shake text-center border-t-4 border-red-500"><div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse"><Icon name="warning-circle" size={32} weight="fill" className="text-red-500" /></div><h3 className="text-xl font-bold text-gray-800 mb-2">เกิดข้อผิดพลาด</h3><p className="text-sm text-gray-500 mb-6 font-medium text-red-600">{message}</p><button onClick={onClose} className="w-full py-3 rounded-xl bg-red-500 text-white font-bold shadow-lg shadow-red-200 hover:bg-red-600 transition">ตกลง</button></div></div>, document.body
      );
    };

    const SuccessScreen = () => (<div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/40 backdrop-blur-sm"><div className="bg-white rounded-3xl p-8 flex flex-col items-center justify-center shadow-2xl animate-scale-in min-w-[200px]"><div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4 animate-check-bounce"><Icon name="check" size={48} weight="bold" className="text-green-600" /></div><h3 className="text-xl font-bold text-gray-800">เรียบร้อย</h3><p className="text-sm text-gray-500 mt-1">บันทึกข้อมูลสำเร็จแล้ว</p></div></div>);

    const StudentMultiSelect = ({ students, selectedIds, onChange }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [studentSearch, setStudentSearch] = useState(''); 
      const filteredStudents = useMemo(() => {
        if (!studentSearch) return students;
        const term = studentSearch.toLowerCase();
        return students.filter(s => s.name.toLowerCase().includes(term) || String(s.id).includes(term));
      }, [students, studentSearch]);

      const toggleStudent = (id) => onChange(selectedIds.includes(id) ? selectedIds.filter(sid => sid !== id) : [...selectedIds, id]);
      const toggleSelectAllFiltered = () => {
        const filteredIds = filteredStudents.map(s => s.id);
        const isAllFilteredSelected = filteredIds.every(id => selectedIds.includes(id));
        onChange(isAllFilteredSelected ? selectedIds.filter(id => !filteredIds.includes(id)) : [...new Set([...selectedIds, ...filteredIds])]);
      };

      return (
        <div className="relative">
          <button type="button" onClick={() => setIsOpen(!isOpen)} className="w-full p-3 border border-gray-200 rounded-xl bg-white outline-none text-left flex justify-between items-center transition h-[46px]"><span className={`text-sm font-bold truncate ${selectedIds.length > 0 ? 'text-blue-700' : 'text-gray-400'}`}>{selectedIds.length === 0 ? "-- เลือกนักศึกษา --" : `เลือกแล้ว ${selectedIds.length} คน`}</span><Icon name={isOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/></button>
          {isOpen && (
            <><div className="fixed inset-0 z-10" onClick={() => setIsOpen(false)}></div><div className="absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-2xl shadow-xl flex flex-col animate-fade-in overflow-hidden"><div className="p-2 border-b border-gray-100 bg-gray-50 flex gap-2"><div className="relative flex-1"><input type="text" placeholder="ค้นหาชื่อ หรือ รหัส..." value={studentSearch} onChange={(e) => setStudentSearch(e.target.value)} className="w-full pl-7 pr-2 py-1.5 text-sm border rounded-lg outline-none" autoFocus /><Icon name="magnifying-glass" className="absolute left-2 top-2.5 text-gray-400" size={14}/></div><button type="button" onClick={toggleSelectAllFiltered} className="px-3 py-1.5 bg-blue-100 text-blue-600 rounded-lg text-[10px] font-bold whitespace-nowrap">เลือกที่ค้นหา</button><button type="button" onClick={()=>onChange([])} className="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-lg text-[10px] font-bold whitespace-nowrap">ล้างค่า</button></div><div className="max-h-56 overflow-y-auto custom-scrollbar p-1">{filteredStudents.map(s => { const isSelected = selectedIds.includes(s.id); return (<div key={s.id} className={`p-2.5 flex items-center gap-3 cursor-pointer rounded-xl transition-colors ${isSelected ? 'bg-blue-50' : 'hover:bg-gray-50'}`} onClick={() => toggleStudent(s.id)}><div className={`w-5 h-5 rounded-md flex items-center justify-center border flex-shrink-0 ${isSelected ? 'bg-primary border-primary' : 'bg-white border-gray-300'}`}>{isSelected && <Icon name="check" className="text-white" size={12} weight="bold" />}</div><div className="flex-1 min-w-0"><div className={`text-sm font-bold truncate ${isSelected ? 'text-blue-700' : 'text-gray-800'}`}>{s.name}</div><div className="text-[10px] text-gray-400 font-mono">{s.id}</div></div></div>); })}</div></div></>
          )}
        </div>
      );
    };

    // --- VIEWS & PAGES ---
    const DashboardView = ({ data, setData, setActiveTab, setAnnounceForm, setIsAnnounceModalOpen, setIsQrModalOpen, onOpenQrManager, onEditQr, onGoToOverdue, onGoToOverdueBills, onGoToUnpaidBills, processingAction, setProcessingAction, onViewImage, onToggleSystemStatus }) => {
        const [isDateFilterActive, setIsDateFilterActive] = useState(false);
        const [dateFilter, setDateFilter] = useState(() => { const end = new Date(); const start = new Date(end.getFullYear(), end.getMonth(), 1); return { start: formatDateForInput(start), end: formatDateForInput(end) }; });
        const [confirmModal, setConfirmModal] = useState({ isOpen: false, targetStatus: '' });
        const [isToggling, setIsToggling] = useState(false); 
        const [successModal, setSuccessModal] = useState(false);
        const handleDateChange = (type, value) => { setDateFilter(prev => ({ ...prev, [type]: value })); };

        const totalBalance = useMemo(() => { 
            if (!isDateFilterActive) return data.finance.reduce((sum, item) => sum + (item.type === 'รายรับ' ? Number(item.amount) : 0), 0) - data.finance.reduce((sum, item) => sum + (item.type === 'รายจ่าย' ? Number(item.amount) : 0), 0);
            return data.finance.filter(h => isDateInRange(h.date, dateFilter.start, dateFilter.end)).reduce((sum, item) => sum + (item.type === 'รายรับ' ? Number(item.amount) : -Number(item.amount)), 0); 
        }, [data.finance, dateFilter, isDateFilterActive]);

        const pendingBillsCount = useMemo(() => data.bills.filter(b => b.status === 'รอตรวจสอบ').length, [data.bills]);
        const allUnpaidCount = useMemo(() => data.bills.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ').length, [data.bills]);
        const allOverdueCount = useMemo(() => { const today = new Date(); today.setHours(0,0,0,0); return data.bills.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; return new Date(b.dueDate) < today; }).length; }, [data.bills]);
        const qrCodes = data.amount?.qrCodes || [];
        const isMaintenance = data.systemStatus === 'ON'; 

        const rawAnnounce = String(data.announcement || '').trim();
        const isImageAnnounce = rawAnnounce.startsWith('http://') || rawAnnounce.startsWith('https://');
        const getDirectImageUrl = (url) => { const idMatch = url.match(/id=([a-zA-Z0-9_-]+)/); if (idMatch) return `https://lh3.googleusercontent.com/d/$$${idMatch[1]}`; return url; };
        const announceContent = isImageAnnounce ? getDirectImageUrl(rawAnnounce) : rawAnnounce;

        const handleSwitchClick = () => { if (isToggling) return; setConfirmModal({ isOpen: true, targetStatus: isMaintenance ? 'OFF' : 'ON' }); };
        
        const confirmToggle = async () => {
            setIsToggling(true); setConfirmModal({ ...confirmModal, isOpen: false });
            try { await onToggleSystemStatus(confirmModal.targetStatus); setSuccessModal(true); } catch (err) { alert("เกิดข้อผิดพลาด: " + err.message); } finally { setIsToggling(false); }
        };

        return (
          <div className="space-y-6 animate-fade-in pb-24 relative">
            <ScrollToTopBottom />

    const PendingView = ({ data, setSelectedBill }) => {
        const [searchTerm, setSearchTerm] = useState('');

             <div className="space-y-3">
              {pendingBills.map((bill, idx) => {

                const netTotal = Number(bill.amount) + fine - Number(bill.discount || 0);
                return (
                  <div key={idx} onClick={() => setSelectedBill(bill)} className="group relative bg-white rounded-2xl p-4 card-shadow border border-gray-100 overflow-hidden cursor-pointer hover:shadow-md transition-all active:scale-[0.98]"><div className="flex items-start gap-4"><div className="w-12 h-12 rounded-2xl bg-amber-100 text-amber-600 flex items-center justify-center flex-shrink-0 animate-pulse"><Icon name="hourglass-high" weight="fill" size={24} /></div><div className="flex-1 min-w-0 flex justify-between"><div className="flex-1 min-w-0 mr-2"><div className="flex items-center gap-2 mb-1"><span className="bg-gray-100 text-gray-500 text-[10px] font-bold px-1.5 py-0.5 rounded">{bill.studentId}</span><span className="text-sm font-bold text-gray-800 truncate">{studentName}</span></div><h4 className="text-gray-600 text-sm font-medium mb-2 line-clamp-1">{bill.item}</h4><div className="flex items-center gap-3 text-xs text-gray-400"><div className="flex items-center gap-1 bg-gray-50 px-2 py-1 rounded-lg"><Icon name="calendar-blank" weight="bold" className="text-amber-400"/><span>{formatDate(bill.dueDate)}</span></div>{fine > 0 && (<span className="text-red-500 font-bold ml-1">+{fine} ค่าปรับ</span>)}</div></div><div className="flex flex-col items-end justify-between flex-shrink-0"><div className="text-right"><div className="text-lg font-extrabold text-amber-600">฿{netTotal.toLocaleString()}</div>{bill.discount > 0 && <div className="text-[10px] text-gray-400 line-through">฿{Number(bill.amount).toLocaleString()}</div>}</div><span className="text-[10px] bg-amber-50 text-amber-600 px-2 py-1 rounded-lg font-bold flex items-center gap-1">แตะเพื่อตรวจ <Icon name="caret-right" weight="bold"/></span></div></div></div></div>

    const BillView = ({ data, setSelectedBill, setIsCreateModalOpen, searchTerm, setSearchTerm, filter, onFilterChange }) => {

                overdue: data.bills.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; const due = new Date(b.dueDate); due.setHours(0,0,0,0); return due < today; }).length

        const tabs = [ { id: 'all', label: 'ทั้งหมด', color: 'text-gray-600' }, { id: 'paid', label: 'เรียบร้อย', color: 'text-emerald-600' }, { id: 'unpaid', label: 'ค้างจ่าย', color: 'text-blue-600' }, { id: 'overdue', label: 'เกินกำหนด', color: 'text-red-600' }, { id: 'pending', label: 'รอตรวจ', color: 'text-amber-600' } ];

        const filteredBills = useMemo(() => {
          let res = data.bills; const today = new Date(); today.setHours(0,0,0,0);

          if (filter === 'paid') res = res.filter(b => b.status === 'ชำระแล้ว');
          if (filter === 'unpaid') res = res.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ'); 
          if (filter === 'overdue') res = res.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; const due = new Date(b.dueDate); due.setHours(0,0,0,0); return due < today; });
          if (searchTerm) { const lower = searchTerm.toLowerCase(); res = res.filter(b => String(b.item).toLowerCase().includes(lower) || String(b.billId).toLowerCase().includes(lower) || String(b.studentId).toLowerCase().includes(lower)); }
          return sortOrder === 'newest' ? [...res].reverse() : res;
        }, [data.bills, filter, searchTerm, sortOrder]);

            if (bill.status === 'ยกเลิก') return { bg: 'bg-gray-100', text: 'text-gray-400', icon: 'prohibit' };
            if (isOverdue) return { bg: 'bg-red-100', text: 'text-red-600', icon: 'warning-circle' };
            return { bg: 'bg-blue-100', text: 'text-blue-600', icon: 'receipt' };
        };

        return (
          <div className="space-y-5 pb-24 relative">
            <ScrollToTopBottom />
            <div className="flex items-center justify-between px-2"><div><h2 className="text-xl font-bold text-gray-800">รายการเรียกเก็บ</h2><p className="text-xs text-gray-400">จัดการบิลค่าใช้จ่ายต่างๆ</p></div><button onClick={() => setIsCreateModalOpen(true)} className="px-4 py-2.5 bg-primary text-white rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition flex items-center gap-2"><Icon name="plus-circle" weight="bold" size={20}/> <span className="font-bold text-sm">สร้างบิล</span></button></div>
            <div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex overflow-x-auto no-scrollbar gap-1">{tabs.map(tab => { const isActive = filter === tab.id; return (<button key={tab.id} onClick={() => onFilterChange(tab.id)} className={`flex-1 min-w-[80px] py-2 px-3 rounded-xl flex flex-col items-center justify-center transition-all duration-300 relative ${isActive ? 'bg-blue-50' : 'hover:bg-gray-50'}`}><span className={`text-lg font-bold ${isActive ? tab.color : 'text-gray-400'}`}>{counts[tab.id]}</span><span className={`text-[10px] font-medium ${isActive ? 'text-gray-700' : 'text-gray-400'}`}>{tab.label}</span>{isActive && <div className="absolute bottom-1 w-1 h-1 rounded-full bg-primary"></div>}</button>); })}</div>

            if (!dateInput) return '-'; let dateObj;

                try { const [dPart, tPart] = dateInput.split(', '); const [day, month, year] = dPart.split('/'); const [hour, minute] = tPart ? tPart.split(':') : [0, 0]; dateObj = new Date(year, month - 1, day, hour, minute); } catch (e) { dateObj = new Date(dateInput); }
            } else { dateObj = new Date(dateInput); }
            if (isNaN(dateObj.getTime())) return dateInput;
            return dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });

                  const pBalance = p.income - p.expense;
                  return (
                    <div key={idx} onClick={() => setSelectedProject(p)} className="bg-white rounded-[1.5rem] p-5 card-shadow border border-gray-100 cursor-pointer hover:shadow-xl hover:border-blue-200 transition-all duration-300 group flex items-center justify-between relative overflow-hidden">
                      <div className={`absolute -right-6 -top-6 w-24 h-24 rounded-full blur-2xl opacity-20 transition-all duration-500 group-hover:scale-150 ${pBalance >= 0 ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                      <div className="flex items-center gap-4 relative z-10">
                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner flex-shrink-0 ${pBalance >= 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}><Icon name={pBalance >= 0 ? 'trend-up' : 'trend-down'} weight="fill" size={28}/></div>
                        <div className="min-w-0 pr-2">
                          <h4 className="font-extrabold text-gray-800 text-base group-hover:text-primary transition-colors truncate">{p.name}</h4>
                          <div className="text-[11px] font-bold text-gray-400 mt-1 flex gap-3 whitespace-nowrap">
                            {p.income > 0 && <span className="flex items-center gap-1"><Icon name="arrow-down-left" weight="bold" className="text-emerald-500"/> รับ: {p.income.toLocaleString()}</span>}
                            {p.expense > 0 && <span className="flex items-center gap-1"><Icon name="arrow-up-right" weight="bold" className="text-red-400"/> จ่าย: {p.expense.toLocaleString()}</span>}
                            {p.income === 0 && p.expense === 0 && <span className="text-gray-300">ไม่มีการเคลื่อนไหว</span>}
                          </div>
                        </div>
                      </div>
                      <div className="text-right relative z-10 flex flex-col items-end flex-shrink-0 pl-2">
                        <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">คงเหลือ</p><p className={`text-xl font-black tracking-tight ${pBalance >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>฿{pBalance.toLocaleString()}</p>
                        <div className="mt-1 w-6 h-6 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors"><Icon name="caret-right" weight="bold" size={12}/></div>
                      </div>
                    </div>
                  );
                })}
                {projects.list.length === 0 && (<div className="text-center py-16 bg-gray-50 rounded-[2rem] border-2 border-dashed border-gray-200"><Icon name="wallet" size={48} className="opacity-20 mb-3 mx-auto" weight="duotone"/><p className="text-sm font-bold text-gray-500">ไม่มีโครงการที่มียอดคงเหลือ</p><p className="text-xs font-medium text-gray-400 mt-1">เริ่มเพิ่มรายการเพื่อสร้างโครงการแรก</p></div>)}
              </div>
            </>
          )}
          {selectedProject && (
            <div className="animate-fade-in space-y-4">
              <button onClick={() => setSelectedProject(null)} className="flex items-center gap-1 text-xs font-bold text-gray-500 hover:text-primary transition mb-2"><Icon name="arrow-left" weight="bold"/> ย้อนกลับ</button>
              <div className="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-[2rem] card-shadow border border-gray-100 text-white relative overflow-hidden">
                <div className="absolute -right-10 -top-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div><h3 className="text-2xl font-extrabold mb-1 relative z-10">{selectedProject.name}</h3>
                <div className="flex gap-4 text-xs font-bold border-t border-white/10 pt-4 mt-3 relative z-10 items-center justify-between"><span className="text-gray-300 uppercase tracking-wider text-[10px]">ยอดคงเหลือโครงการ</span><span className={selectedProject.income - selectedProject.expense >= 0 ? 'text-emerald-400 text-2xl tracking-tight' : 'text-red-400 text-2xl tracking-tight'}>฿{(selectedProject.income - selectedProject.expense).toLocaleString()}</span></div>
              </div>
              <div className="flex justify-between items-end px-2 pt-2"><div><h4 className="text-sm font-bold text-gray-800">รายการบันทึก</h4><p className="text-[10px] text-gray-400 font-medium">ทั้งหมด {selectedProject.logs.length} รายการ</p></div><button onClick={() => handleAddClick(selectedProject.name)} className="text-[11px] font-bold bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2 rounded-xl shadow-md hover:shadow-lg transition flex items-center gap-1 active:scale-95"><Icon name="plus" weight="bold"/> เพิ่มรายการ</button></div>
              <div className="space-y-3">
                {selectedProject.logs.slice().reverse().map((log, i) => (
                  <div key={i} className="bg-white p-4 rounded-2xl card-shadow border border-gray-100 hover:shadow-md transition relative group">
                    <div className="flex justify-between items-start mb-2"><div className="pr-4"><div className={`text-[10px] font-bold px-2 py-0.5 rounded-md inline-flex items-center gap-1 mb-1.5 ${log.type === 'รายรับ' ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}><Icon name={log.type === 'รายรับ' ? "arrow-down-left" : "arrow-up-right"} weight="bold" size={10}/>{log.type}</div><h5 className="font-bold text-gray-800 text-sm leading-snug">{log.item}</h5></div><div className={`text-lg font-black tracking-tight flex-shrink-0 ${log.type === 'รายรับ' ? 'text-emerald-600' : 'text-red-600'}`}>{log.type === 'รายรับ' ? '+' : '-'}฿{Number(log.amount).toLocaleString()}</div></div>
                    <div className="flex justify-between items-end border-t border-dashed border-gray-100 pt-3 mt-3"><div><p className="text-[10px] font-bold text-gray-400 flex items-center gap-1"><Icon name="calendar-blank" weight="bold"/> {new Date(log.date).toLocaleDateString('th-TH', {day:'numeric',month:'short',year:'2-digit'})}</p><p className="text-[10px] font-bold text-gray-400 flex items-center gap-1 mt-1 truncate max-w-[150px]"><Icon name="user" weight="bold"/> {log.person || 'ไม่ระบุ'}</p></div><div className="flex gap-1.5">{log.receiptUrl && <button onClick={()=>onViewImage(log.receiptUrl)} className="w-8 h-8 rounded-lg bg-gray-50 text-gray-500 hover:text-blue-600 hover:bg-blue-50 flex items-center justify-center transition border border-gray-100 shadow-sm" title="ดูใบเสร็จ"><Icon name="receipt" weight="fill" size={16}/></button>}{log.slipUrl && <button onClick={()=>onViewImage(log.slipUrl)} className="w-8 h-8 rounded-lg bg-gray-50 text-gray-500 hover:text-blue-600 hover:bg-blue-50 flex items-center justify-center transition border border-gray-100 shadow-sm" title="ดูสลิป"><Icon name="image" weight="fill" size={16}/></button>}<button onClick={()=>handleEditClick(log)} className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 flex items-center justify-center transition ml-1 shadow-sm"><Icon name="pencil-simple" weight="bold" size={16}/></button><button onClick={()=>{if(window.confirm('ยืนยันการลบรายการนี้ใช่หรือไม่?')) onDelete(log.id)}} className="w-8 h-8 rounded-lg bg-red-50 text-red-500 hover:bg-red-100 flex items-center justify-center transition shadow-sm"><Icon name="trash" weight="bold" size={16}/></button></div></div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <Modal isOpen={isFormOpen} onClose={() => setIsFormOpen(false)} title={editingLog ? "แก้ไขรายการการเงิน" : "เพิ่มรายการการเงินใหม่"} zIndex="z-[110]"><FinanceForm onSubmit={onSave} initialData={editingLog} loading={loading} students={data.students} defaultProject={defaultProj} /></Modal>
        </div>
      );
    };

    const NotificationView = ({ students, data, onSendCustom, onSendOverdue, onSendAccount, onSendOverdueBatch, loading }) => {
        const [activeSubTab, setActiveSubTab] = useState('overdue'); 
        const [form, setForm] = useState({ studentIds: [], title: '', detail: '', type: 'general' });
        const [accountStudentIds, setAccountStudentIds] = useState([]);
        const [confirmState, setConfirmState] = useState({ isOpen: false, type: '', data: null, title: '', message: '' });
        const [viewingBill, setViewingBill] = useState(null);

        const getFine = (bill) => calculateFine(bill);
        const overdueBills = useMemo(() => { const today = new Date(); today.setHours(0,0,0,0); return data.bills.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; return new Date(b.dueDate) < today; }); }, [data.bills]);
        const totalOverdueAmount = useMemo(() => overdueBills.reduce((sum, b) => sum + (Number(b.amount) - Number(b.discount || 0)), 0), [overdueBills]);

        const triggerSendCustom = () => { if (form.studentIds.length === 0 || !form.title) return; const typeText = form.type === 'announcement' ? 'ประกาศ' : 'ข้อความ'; setConfirmState({ isOpen: true, type: 'CUSTOM', data: null, title: `ยืนยันการส่ง${typeText}`, message: `คุณต้องการส่ง "${form.title}" ให้กับนักศึกษาจำนวน ${form.studentIds.length} คน ใช่หรือไม่?` }); };
        const triggerSendAccount = () => { if (accountStudentIds.length === 0) return; setConfirmState({ isOpen: true, type: 'ACCOUNT', data: null, title: 'ยืนยันการส่งข้อมูลบัญชี', message: `คุณต้องการส่ง รหัสนักศึกษาและรหัสผ่าน ให้กับนักศึกษาจำนวน ${accountStudentIds.length} คน ใช่หรือไม่?` }); };
        const triggerSendOverdue = (billId, studentName, amount) => { setConfirmState({ isOpen: true, type: 'OVERDUE', data: billId, title: 'ยืนยันการทวงถาม', message: `คุณต้องการส่งข้อความทวงถามยอด ${Number(amount).toLocaleString()} บาท ไปยัง ${studentName} ใช่หรือไม่?` }); };
        const triggerSendOverdueAll = () => { if (overdueBills.length === 0) return; setConfirmState({ isOpen: true, type: 'OVERDUE_ALL', data: overdueBills.map(b => b.billId), title: 'ยืนยันการทวงถามทั้งหมด', message: `คุณต้องการส่งข้อความแจ้งเตือนยอดค้างชำระ ทั้งหมด ${overdueBills.length} รายการ ใช่หรือไม่?` }); };

        const handleConfirmAction = () => {
            if (confirmState.type === 'CUSTOM') { onSendCustom(form); if (!loading) setForm({ studentIds: [], title: '', detail: '', type: 'general' }); } 
            else if (confirmState.type === 'ACCOUNT') { onSendAccount(accountStudentIds); if (!loading) setAccountStudentIds([]); } 
            else if (confirmState.type === 'OVERDUE') { onSendOverdue(confirmState.data); } 
            else if (confirmState.type === 'OVERDUE_ALL') { onSendOverdueBatch(confirmState.data); }
        };

        useEffect(() => { if (!loading && confirmState.isOpen) { setConfirmState(prev => ({ ...prev, isOpen: false })); if (confirmState.type === 'CUSTOM') setForm({ studentIds: [], title: '', detail: '', type: 'general' }); if (confirmState.type === 'ACCOUNT') setAccountStudentIds([]); } }, [loading]);

        const tabs = [ { id: 'overdue', label: 'ติดตามหนี้', icon: 'bell-ringing', badge: overdueBills.length }, { id: 'account', label: 'ข้อมูลบัญชี', icon: 'identification-card' }, { id: 'general', label: 'ข้อความ/ประกาศ', icon: 'chat-circle-text' } ];

        return (
            <div className="pb-24 space-y-5 relative">
                <ScrollToTopBottom />
                <ConfirmModal isOpen={confirmState.isOpen} onClose={() => setConfirmState({ ...confirmState, isOpen: false })} onConfirm={handleConfirmAction} title={confirmState.title} message={confirmState.message} loading={loading} confirmText="ยืนยันส่ง" isDestructive={false} />
                <div className="space-y-3 px-2"><h2 className="text-xl font-bold text-gray-800">ศูนย์การแจ้งเตือน</h2><div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex overflow-x-auto no-scrollbar gap-1">{tabs.map(tab => { const isActive = activeSubTab === tab.id; let activeClass = isActive ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'; if (isActive && tab.id === 'overdue') activeClass = 'bg-red-500 text-white shadow-md shadow-red-200'; if (isActive && tab.id === 'account') activeClass = 'bg-blue-500 text-white shadow-md shadow-blue-200'; return (<button key={tab.id} onClick={() => setActiveSubTab(tab.id)} className={`flex-1 py-2.5 px-3 rounded-xl flex items-center justify-center gap-2 transition-all relative ${activeClass}`}><Icon name={tab.icon} weight={isActive ? "fill" : "bold"} size={18}/><span className="text-xs font-bold whitespace-nowrap">{tab.label}</span>{tab.badge > 0 && <span className="absolute -top-1 -right-1 bg-white text-red-500 text-[9px] font-bold px-1.5 py-0.5 rounded-full border border-gray-100 shadow-sm">{tab.badge}</span>}</button>); })}</div></div>
                <div className="animate-fade-in">
                    {activeSubTab === 'overdue' && (
                        <div className="space-y-4">
                            <div className="bg-gradient-to-br from-red-500 to-pink-600 rounded-3xl p-5 text-white shadow-xl shadow-red-200 relative overflow-hidden"><div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full blur-3xl -translate-y-10 translate-x-10"></div><div className="relative z-10 flex justify-between items-end"><div><p className="text-red-100 text-xs font-bold mb-1 uppercase tracking-wider">ยอดหนี้ค้างชำระรวม</p><h2 className="text-3xl font-extrabold tracking-tight">฿{totalOverdueAmount.toLocaleString()}</h2></div><div className="text-right"><div className="text-2xl font-bold">{overdueBills.length}</div><span className="text-xs text-red-100">รายการ</span></div></div>{overdueBills.length > 0 && (<button onClick={triggerSendOverdueAll} disabled={loading} className="mt-4 w-full py-2.5 bg-white text-red-600 font-bold rounded-xl shadow-md hover:bg-red-50 transition text-sm flex items-center justify-center gap-2">{loading ? <Icon name="spinner" className="animate-spin"/> : <><Icon name="paper-plane-right" weight="bold"/> ทวงถามทั้งหมด ({overdueBills.length})</>}</button>)}</div>
                            {overdueBills.length === 0 ? (<div className="flex flex-col items-center justify-center py-10 text-gray-300"><div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3"><Icon name="check-fat" size={32} className="text-green-400" weight="fill"/></div><p className="text-sm font-medium">ไม่มีรายการค้างชำระ</p></div>) : (
                                <div className="space-y-2">
                                    {overdueBills.map((bill, idx) => {
                                        const student = students.find(s => s.id === bill.studentId); const studentName = student ? student.name : bill.studentId;
                                        return (
                                            <div key={idx} onClick={() => setViewingBill(bill)} className="bg-white p-4 rounded-2xl card-shadow border border-gray-100 flex justify-between items-center group cursor-pointer hover:border-red-200 hover:shadow-md transition active:scale-[0.98]">
                                                <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center font-bold text-xs flex-shrink-0">#{idx+1}</div><div><div className="font-bold text-gray-800 text-sm group-hover:text-red-600 transition">{studentName}</div><div className="text-xs text-gray-500 mt-0.5">{bill.item}</div><div className="text-[10px] text-red-500 font-bold mt-1 bg-red-50 px-1.5 py-0.5 rounded inline-block">เกิน: {formatDate(bill.dueDate)}</div></div></div>
                                                <div className="text-right"><div className="font-extrabold text-gray-800 text-sm mb-2">฿{Number(bill.amount).toLocaleString()}</div><button onClick={(e) => { e.stopPropagation(); triggerSendOverdue(bill.billId, studentName, bill.amount); }} disabled={loading} className="bg-red-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600 transition shadow-sm shadow-red-200 z-10 relative">{loading ? <Icon name="spinner" className="animate-spin"/> : "ทวง"}</button></div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                    {activeSubTab === 'account' && (
                        <div className="bg-white p-5 rounded-3xl card-shadow space-y-5 border border-gray-100"><div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex items-start gap-3"><div className="bg-white p-2 rounded-xl text-blue-600 shadow-sm"><Icon name="shield-check" size={24} weight="fill"/></div><div><h4 className="font-bold text-gray-800 text-sm">ส่งข้อมูลบัญชีส่วนตัว</h4><p className="text-xs text-blue-600/80 mt-1 leading-relaxed">ระบบจะส่ง รหัสนักศึกษา และ รหัสผ่าน ไปยัง LINE ส่วนตัวของนักศึกษาแต่ละคน (ใช้กรณีลืมรหัส)</p></div></div><div><label className="block text-xs font-bold text-gray-500 mb-1.5">เลือกนักศึกษาที่ต้องการส่งให้</label><StudentMultiSelect students={students} selectedIds={accountStudentIds} onChange={setAccountStudentIds} /></div><button onClick={triggerSendAccount} disabled={loading || accountStudentIds.length === 0} className="w-full py-3.5 rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:opacity-50 transition transform active:scale-[0.98] flex items-center justify-center gap-2">{loading ? <Icon name="spinner" className="animate-spin" size={20}/> : <><Icon name="lock-key" weight="bold" size={20}/> ส่งข้อมูลบัญชี</>}</button></div>
                    )}
                    {activeSubTab === 'general' && (
                        <div className="bg-white p-5 rounded-3xl card-shadow space-y-5 border border-gray-100">
                            <div className="grid grid-cols-2 gap-3"><label className={`cursor-pointer p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${form.type === 'general' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-100 hover:border-gray-200 text-gray-400'}`}><input type="radio" name="msgType" className="hidden" checked={form.type === 'general'} onChange={() => setForm({...form, type: 'general'})} /><div className={`w-10 h-10 rounded-full flex items-center justify-center ${form.type === 'general' ? 'bg-white shadow-sm' : 'bg-gray-100'}`}><Icon name="chat-circle-text" weight="fill" size={20}/></div><span className="text-xs font-bold">ข้อความทั่วไป</span></label><label className={`cursor-pointer p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${form.type === 'announcement' ? 'border-purple-500 bg-purple-50 text-purple-700' : 'border-gray-100 hover:border-gray-200 text-gray-400'}`}><input type="radio" name="msgType" className="hidden" checked={form.type === 'announcement'} onChange={() => setForm({...form, type: 'announcement'})} /><div className={`w-10 h-10 rounded-full flex items-center justify-center ${form.type === 'announcement' ? 'bg-white shadow-sm' : 'bg-gray-100'}`}><Icon name="megaphone" weight="fill" size={20}/></div><span className="text-xs font-bold">ประกาศสำคัญ</span></label></div>
                            <div className="space-y-4"><div><label className="block text-xs font-bold text-gray-500 mb-1.5">ผู้รับข้อความ</label><StudentMultiSelect students={students} selectedIds={form.studentIds} onChange={(ids) => setForm({...form, studentIds: ids})} /></div><div><label className="block text-xs font-bold text-gray-500 mb-1.5">หัวข้อเรื่อง</label><input type="text" value={form.title} onChange={(e) => setForm({...form, title: e.target.value})} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary/20 transition text-sm font-medium" placeholder={form.type === 'announcement' ? "เช่น ประกาศหยุดเรียน..." : "แจ้งเตือน..."} /></div><div><label className="block text-xs font-bold text-gray-500 mb-1.5">รายละเอียด (ไม่บังคับ)</label><textarea value={form.detail} onChange={(e) => setForm({...form, detail: e.target.value})} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary/20 transition min-h-[100px] text-sm" placeholder="รายละเอียดเพิ่มเติม..."></textarea></div></div>
                            <button onClick={triggerSendCustom} disabled={loading || form.studentIds.length === 0 || !form.title} className={`w-full py-3.5 rounded-xl text-white font-bold shadow-lg disabled:opacity-50 transition transform active:scale-[0.98] flex items-center justify-center gap-2 ${form.type === 'announcement' ? 'bg-gradient-to-r from-purple-600 to-indigo-600 shadow-purple-200' : 'bg-gradient-to-r from-green-500 to-emerald-600 shadow-green-200'}`}>{loading ? <><Icon name="circle-notch" className="animate-spin" weight="bold" size={20}/> กำลังส่ง...</> : <><Icon name="paper-plane-right" weight="bold" size={20}/> {form.type === 'announcement' ? "ส่งประกาศ" : "ส่งข้อความ"}</>}</button>
                        </div>
                    )}
                </div>
                <Modal isOpen={!!viewingBill} onClose={() => setViewingBill(null)} title="รายละเอียดบิล" zIndex="z-[80]">
                    {viewingBill && (() => {
                        const fine = getFine(viewingBill); const finalAmount = Number(viewingBill.amount) + fine - Number(viewingBill.discount); const student = students.find(s => s.id === viewingBill.studentId);
                        return (
                            <div className="space-y-4 pt-1 animate-fade-in">
                                <div className="bg-gradient-to-br from-gray-50 to-white p-6 rounded-2xl text-center border border-gray-100 shadow-sm relative overflow-hidden"><div className={`absolute top-0 right-0 px-4 py-1.5 rounded-bl-xl text-[10px] font-bold shadow-sm ${getStatusColor(viewingBill.status)}`}>{viewingBill.status || 'ค้างชำระ'}</div><p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1 mt-2">ยอดชำระสุทธิ</p><h2 className="text-4xl font-extrabold text-gray-800 tracking-tight">฿{finalAmount.toLocaleString()}</h2><p className="text-sm text-primary font-medium mt-2">{viewingBill.item}</p></div>
                                <div className="space-y-0 mt-4 border border-gray-100 rounded-2xl overflow-hidden">
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="user" weight="bold"/> นักศึกษา</span><span className="font-medium text-sm text-right">{viewingBill.studentId} {student?.name && <><br/><span className="text-xs text-gray-500">{student.name}</span></>}</span></div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="hash" weight="bold"/> รหัสบิล</span><span className="font-mono text-sm font-bold text-gray-700">#{viewingBill.billId}</span></div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="calendar-check" weight="bold"/> ครบกำหนด</span><span className="font-medium text-sm text-red-500 font-bold">{formatDate(viewingBill.dueDate)}</span></div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="currency-btc" weight="bold"/> เงินต้น</span><span className="font-medium text-sm">{Number(viewingBill.amount).toLocaleString()}</span></div>
                                    {fine > 0 && <div className="flex justify-between py-3 px-4 bg-orange-50/50 border-b border-orange-50 items-center"><span className="text-xs text-orange-600 font-bold flex items-center gap-2"><Icon name="warning-circle" weight="bold"/> ค่าปรับล่าช้า</span><span className="font-bold text-sm text-orange-600">+{fine.toLocaleString()}</span></div>}
                                    {Number(viewingBill.discount) > 0 && <div className="flex justify-between py-3 px-4 bg-green-50/50 border-b border-green-50 items-center"><span className="text-xs text-green-600 font-bold flex items-center gap-2"><Icon name="percent" weight="bold"/> ส่วนลด</span><span className="font-bold text-sm text-green-600">-{Number(viewingBill.discount).toLocaleString()}</span></div>}
                                </div>
                                <button onClick={() => setViewingBill(null)} className="w-full py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ปิดหน้าต่าง</button>
                            </div>
                        );
                    })()}
                </Modal>
            </div>
        );
    };

    const OrderView = ({ orderData, students, onToggleSystem, onSaveProduct, onDeleteProduct, onDeleteOrder, onUpdateStatus, onViewSlip, loading, processingAction, onEditOrder }) => {
        const [subTab, setSubTab] = useState('orders');
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [isScannerOpen, setIsScannerOpen] = useState(false);
        const [editingProduct, setEditingProduct] = useState(null);
        const [searchTerm, setSearchTerm] = useState('');
        const [isSummaryOpen, setIsSummaryOpen] = useState(false);
        const [editingOrder, setEditingOrder] = useState(null);
        const [isEditOrderModalOpen, setIsEditOrderModalOpen] = useState(false);
        const [isBulkStatusOpen, setIsBulkStatusOpen] = useState(false);
        const [bulkTargetStatus, setBulkTargetStatus] = useState('ชำระแล้ว');
        const [isProcessingBulk, setIsProcessingBulk] = useState(false);
        const [bulkProgress, setBulkProgress] = useState({ current: 0, total: 0 });
        const [alertState, setAlertState] = useState({ isOpen: false, title: '', message: '', onConfirm: null, type: 'info' });

        const parseOrderItems = (itemsStr) => {
            if (!itemsStr) return [];
            return (itemsStr.includes('\n') ? itemsStr.split('\n') : itemsStr.split(/,(?![^(]*\))/)).map(raw => {
                let text = raw.trim(); if (!text) return null;
                const qtyMatch = text.match(/\s*x\s*(\d+)$/i); let qty = 1; let nameWithOptions = text;
                if (qtyMatch) { qty = parseInt(qtyMatch[1], 10); nameWithOptions = text.slice(0, qtyMatch.index).trim(); }
                let name = nameWithOptions; let options = []; const optMatch = nameWithOptions.match(/\(([^)]+)\)$/);
                if (optMatch) { const insideParens = optMatch[1]; if (insideParens.includes(':') || insideParens.includes(',')) { name = nameWithOptions.slice(0, optMatch.index).trim(); options = insideParens.split(',').map(opt => opt.trim()); } }
                return { name, options, qty, original: text };
            }).filter(Boolean);
        };
        const formatDateSafe = (isoDate) => { if (!isoDate) return '-'; try { return new Date(isoDate).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute:'2-digit' }); } catch (e) { return '-'; } };

        const safeProducts = Array.isArray(orderData?.products) ? orderData.products : [];
        const safeOrders = Array.isArray(orderData?.orders) ? orderData.orders : [];
        const filteredProducts = safeProducts.filter(p => String(p.name||'').toLowerCase().includes(searchTerm.toLowerCase()));
        
        const filteredOrders = safeOrders.filter(o => { 
            const sName = students?.find(s => String(s.id) === String(o.studentId))?.name || ''; 
            const term = searchTerm.toLowerCase(); const safeVal = (v) => String(v || '').toLowerCase(); 
            return safeVal(o.orderId).includes(term) || safeVal(o.studentId).includes(term) || safeVal(sName).includes(term); 
        });

        const [sortOrder, setSortOrder] = useState('newest');
        const groupedOrders = useMemo(() => {
            const groups = {};
            filteredOrders.forEach(o => {
                const sId = String(o.studentId);
                if (!groups[sId]) { groups[sId] = { studentId: sId, studentName: students?.find(s => String(s.id) === sId)?.name || 'ไม่พบชื่อ', totalPrice: 0, orders: [], latestDate: 0 }; }
                groups[sId].orders.push(o); groups[sId].totalPrice += Number(o.price) || 0;
                const orderTime = new Date(o.date).getTime() || 0; if (orderTime > groups[sId].latestDate) groups[sId].latestDate = orderTime;
            });
            return Object.values(groups).sort((a, b) => sortOrder === 'newest' ? b.latestDate - a.latestDate : a.latestDate - b.latestDate);
        }, [filteredOrders, students, sortOrder]);
        
        const handleScanSuccess = (text) => setSearchTerm(text);
        const handleAddProduct = () => { setEditingProduct(null); setIsModalOpen(true); };
        const openEditOrderModal = (order) => { setEditingOrder(order); setIsEditOrderModalOpen(true); };
        const handleSaveEditedOrder = (formData) => { setIsEditOrderModalOpen(false); onEditOrder(formData); };

        const confirmBulkStatusUpdate = () => { if (filteredOrders.length === 0) return; setIsBulkStatusOpen(false); setAlertState({ isOpen: true, type: 'info', title: 'ยืนยันการเปลี่ยนสถานะ', message: `คุณต้องการเปลี่ยนสถานะ ${filteredOrders.length} รายการ เป็น "${bulkTargetStatus}" ใช่หรือไม่?`, onConfirm: executeBulkStatusUpdate }); };
        const executeBulkStatusUpdate = async () => {
            setAlertState(prev => ({ ...prev, isOpen: false }));
            setTimeout(async () => {
                setIsProcessingBulk(true); setBulkProgress({ current: 0, total: filteredOrders.length });
                let completed = 0;
                for (const order of filteredOrders) {
                    if (order.status !== bulkTargetStatus) { await new Promise(resolve => { onUpdateStatus(order.orderId, bulkTargetStatus); setTimeout(resolve, 800); }); }
                    completed++; setBulkProgress(prev => ({ ...prev, current: completed }));
                }
                setIsProcessingBulk(false);
                setTimeout(() => { setAlertState({ isOpen: true, type: 'success', title: 'เรียบร้อย', message: `ดำเนินการเปลี่ยนสถานะ ${completed} รายการเสร็จสมบูรณ์`, onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false })) }); }, 500);
            }, 100);
        };
        const confirmBulkDelete = () => { if (filteredOrders.length === 0) return; setAlertState({ isOpen: true, type: 'danger', title: '⚠️ ยืนยันการลบข้อมูล', message: `คุณกำลังจะลบออเดอร์ ${filteredOrders.length} รายการ\nการกระทำนี้ไม่สามารถกู้คืนได้ ยืนยันหรือไม่?`, onConfirm: executeBulkDelete }); };
        const executeBulkDelete = async () => {
             setAlertState(prev => ({ ...prev, isOpen: false }));
             setTimeout(async () => {
                setIsProcessingBulk(true); setBulkProgress({ current: 0, total: filteredOrders.length });
                let completed = 0;
                for (const order of filteredOrders) { await new Promise(resolve => { onDeleteOrder(order.orderId); setTimeout(resolve, 800); }); completed++; setBulkProgress(prev => ({ ...prev, current: completed })); }
                setIsProcessingBulk(false);
                setTimeout(() => { setAlertState({ isOpen: true, type: 'success', title: 'เรียบร้อย', message: `ลบข้อมูล ${completed} รายการเสร็จสมบูรณ์`, onConfirm: () => setAlertState(prev => ({ ...prev, isOpen: false })) }); }, 500);
             }, 100);
        };

        const getOrderStatusStyle = (status) => {
            switch(status) { case 'ชำระแล้ว': return 'bg-emerald-50 text-emerald-700 border-emerald-200'; case 'รอตรวจสอบ': return 'bg-amber-50 text-amber-700 border-amber-200'; case 'ยกเลิก': return 'bg-gray-100 text-gray-500 border-gray-200'; case 'อยู่ระหว่างผลิต': return 'bg-purple-50 text-purple-700 border-purple-200'; case 'อยู่ระหว่างสั่งซื้อ': return 'bg-blue-50 text-blue-700 border-blue-200'; case 'รอรับของ': return 'bg-pink-50 text-pink-700 border-pink-200'; case 'รับแล้ว': return 'bg-teal-50 text-teal-700 border-teal-200'; default: return 'bg-gray-50 text-gray-600 border-gray-200'; }
        };

        return (
          <div className="space-y-5 pb-24 relative animate-fade-in">

             <div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex relative z-10"><button onClick={()=>setSubTab('orders')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'orders' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}><Icon name="receipt" weight={subTab === 'orders' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">ออเดอร์ ({safeOrders.length})</span></button><button onClick={()=>setSubTab('products')} className={`flex-1 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all duration-300 ${subTab === 'products' ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}><Icon name="t-shirt" weight={subTab === 'products' ? 'fill' : 'bold'} size={18}/> <span className="text-sm font-bold">สินค้า ({safeProducts.length})</span></button></div>
             <div className="flex gap-2 sticky top-0 z-20 bg-background py-2"><div className="flex-1 bg-white rounded-xl card-shadow border border-gray-100 flex items-center px-4 py-2.5 transition focus-within:ring-2 focus-within:ring-primary/20"><Icon name="magnifying-glass" className="text-gray-400 mr-3" size={18} /><input type="text" placeholder={subTab==='products'?"ค้นหาสินค้า...":"ค้นหาออเดอร์/ชื่อ..."} className="w-full bg-transparent text-sm font-medium text-gray-700 outline-none placeholder-gray-400" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>{searchTerm && <button onClick={() => setSearchTerm('')} className="text-gray-400 hover:text-gray-600 ml-2"><Icon name="x-circle" weight="fill" /></button>}</div>{subTab === 'orders' && (<><button onClick={() => setIsSummaryOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="สรุปยอด"><Icon name="chart-pie-slice" weight="fill" size={20}/></button><button onClick={() => setIsScannerOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white text-gray-600 card-shadow border border-gray-100 hover:bg-gray-50 transition active:scale-95" title="สแกน QR"><Icon name="qr-code" weight="bold" size={20}/></button><button onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white text-gray-600 card-shadow border border-gray-100 hover:bg-gray-50 transition active:scale-95" title="เรียงลำดับ"><Icon name={sortOrder === 'newest' ? "sort-descending" : "sort-ascending"} weight="bold" size={20}/></button></>)}{subTab === 'products' && (<button onClick={handleAddProduct} className="w-11 h-11 flex items-center justify-center rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 transition active:scale-95" title="เพิ่มสินค้า"><Icon name="plus" weight="bold" size={20}/></button>)}</div>
             <div className="min-h-[300px]">
                  {subTab === 'products' && (
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3 animate-fade-in">
                        {filteredProducts.map((p) => (
                            <div key={p.id} className="group bg-white p-3 rounded-2xl card-shadow border border-gray-100 hover:border-blue-200 transition relative overflow-hidden"><div className="aspect-square bg-gray-50 rounded-xl mb-3 overflow-hidden flex items-center justify-center relative"><ProductImageGallery imageString={p.image} /><span className={`absolute top-2 left-2 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm z-20 ${p.status === 'ON' ? 'bg-green-500 text-white' : (p.status === 'OUT' ? 'bg-amber-500 text-white' : 'bg-gray-400 text-white')}`}>{p.status}</span></div><h4 className="font-bold text-sm text-gray-800 line-clamp-1 mb-1">{p.name}</h4><div className="flex justify-between items-end"><p className="text-blue-600 font-extrabold">฿{Number(p.price).toLocaleString()}</p><p className="text-[10px] text-gray-400 font-medium">Stock: {p.stock}</p></div><div className="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 z-30"><button onClick={()=>{setEditingProduct(p); setIsModalOpen(true);}} className="w-10 h-10 rounded-full bg-white text-blue-600 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="pencil-simple" weight="bold" size={20}/></button><button onClick={()=>onDeleteProduct(p.id)} className="w-10 h-10 rounded-full bg-white text-red-500 flex items-center justify-center hover:scale-110 transition shadow-lg"><Icon name="trash" weight="bold" size={20}/></button></div></div>
                        ))}
                        {filteredProducts.length === 0 && (<div className="col-span-full flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="t-shirt" size={40} className="opacity-30 mb-2"/><p>ไม่พบสินค้า</p></div>)}
                    </div>
                  )}
                 {subTab === 'orders' && (
                   <div className="space-y-4 animate-fade-in">
                       {filteredOrders.length > 0 && (<div className="bg-gray-50 p-2 rounded-xl flex gap-2 border border-gray-100"><button onClick={() => setIsBulkStatusOpen(true)} className="flex-1 py-2 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold hover:bg-indigo-200 transition flex items-center justify-center gap-1 border border-indigo-200 shadow-sm"><Icon name="arrows-clockwise" weight="bold"/> เปลี่ยนสถานะ ({filteredOrders.length})</button><button onClick={confirmBulkDelete} className="flex-1 py-2 bg-red-100 text-red-700 rounded-lg text-xs font-bold hover:bg-red-200 transition flex items-center justify-center gap-1 border border-red-200 shadow-sm"><Icon name="trash" weight="bold"/> ลบทั้งหมด ({filteredOrders.length})</button></div>)}
                       {groupedOrders.length === 0 && (<div className="flex flex-col items-center justify-center py-16 text-gray-300"><Icon name="shopping-bag" size={40} className="opacity-30 mb-2"/><p>{searchTerm ? "ไม่พบออเดอร์ที่ค้นหา" : "ไม่มีรายการสั่งซื้อ"}</p></div>)}
                       {groupedOrders.map((group) => (
                           <div key={group.studentId} className="bg-white rounded-3xl card-shadow border border-gray-100 overflow-hidden transition-all hover:shadow-lg">
                               <div className="p-4 bg-gradient-to-r from-slate-50 to-blue-50/50 border-b border-gray-100 flex justify-between items-center relative overflow-hidden"><div className="flex items-center gap-3 relative z-10"><div className="w-12 h-12 rounded-2xl bg-white text-blue-600 flex items-center justify-center text-lg font-black shadow-sm border border-blue-100 flex-shrink-0">{group.studentName.charAt(0)}</div><div><h3 className="font-extrabold text-gray-800 text-base">{group.studentName}</h3><div className="flex items-center gap-2 mt-0.5"><span className="text-xs text-gray-500 font-mono tracking-wider flex items-center gap-1"><Icon name="user" weight="bold" size={12}/> {group.studentId}</span><span className="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-md text-[10px] font-bold">{group.orders.length} ออเดอร์</span></div></div></div><div className="text-right relative z-10 flex-shrink-0 pl-2"><p className="text-[10px] text-blue-500 font-bold uppercase tracking-wider mb-0.5">ยอดรวมทั้งหมด</p><div className="text-xl md:text-2xl font-black text-blue-700">฿{group.totalPrice.toLocaleString()}</div></div></div>
                               <div className="p-2 space-y-2 bg-gray-50/50">
                                   {group.orders.map(o => {
                                       const statusStyle = getOrderStatusStyle(o.status); const parsedItems = parseOrderItems(o.items);
                                       return (
                                           <div key={o.orderId} className="bg-white rounded-[1.25rem] p-4 border border-gray-100 shadow-sm relative hover:border-blue-200 transition-colors group/order">
                                               <div className="flex justify-between items-center mb-3 pb-2 border-b border-gray-50"><div className="flex items-center gap-3"><span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded-lg flex items-center gap-1 border border-gray-200"><Icon name="hash" weight="bold"/> {o.orderId}</span><span className="text-[10px] font-medium text-gray-400 flex items-center gap-1"><Icon name="clock" weight="fill"/> {formatDateSafe(o.date)}</span></div>{o.slip && (<button onClick={()=>onViewSlip(o.slip)} className="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg hover:bg-indigo-100 transition flex items-center gap-1 border border-indigo-100"><Icon name="image" weight="fill" size={14}/> ดูสลิป</button>)}</div>
                                               <div className="space-y-3 mb-4">
                                                   {parsedItems.length > 0 ? parsedItems.map((item, i) => (
                                                       <div key={i} className="flex justify-between items-start gap-3">
                                                           <div className="flex-1 min-w-0"><div className="text-sm font-bold text-gray-800 leading-snug">{item.name}</div>{item.options.length > 0 && (<div className="mt-1.5 flex flex-wrap gap-1.5">{item.options.map((opt, j) => { const parts = opt.split(':'); const key = parts.length > 1 ? parts[0] : null; const val = parts.length > 1 ? parts.slice(1).join(':') : opt; return (<span key={j} className="inline-flex items-center text-[10px] bg-white border border-gray-200 text-gray-500 px-2 py-0.5 rounded-md shadow-[0_1px_2px_rgba(0,0,0,0.02)]">{key ? <><span className="font-bold text-gray-400 mr-1">{key}:</span><span className="text-gray-700 font-bold">{val}</span></> : opt}</span>); })}</div>)}</div>
                                                           <div className="text-xs font-black text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-lg flex-shrink-0 border border-indigo-100 shadow-sm">x{item.qty}</div>
                                                       </div>
                                                   )) : (<p className="text-xs text-gray-600 whitespace-pre-wrap leading-relaxed font-medium">{o.items}</p>)}
                                               </div>
                                               <div className="flex justify-between items-end pt-3 border-t border-gray-50"><div className="text-lg font-extrabold text-gray-800">฿{Number(o.price).toLocaleString()}</div><div className="flex items-center gap-2"><div className="relative"><select value={o.status} onChange={(e)=>onUpdateStatus(o.orderId, e.target.value)} className={`appearance-none pl-3 pr-8 py-1.5 rounded-xl text-[11px] font-bold border outline-none cursor-pointer transition-colors shadow-sm ${statusStyle}`}><option value="รอตรวจสอบ">รอตรวจสอบ</option><option value="ชำระแล้ว">ชำระแล้ว</option><option value="อยู่ระหว่างสั่งซื้อ">อยู่ระหว่างสั่งซื้อ</option><option value="อยู่ระหว่างผลิต">อยู่ระหว่างผลิต</option><option value="รอรับของ">รอรับของ</option><option value="รับแล้ว">รับแล้ว</option><option value="ยกเลิก">ยกเลิก</option></select><Icon name="caret-down" size={10} weight="bold" className="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none opacity-50"/></div><button onClick={() => openEditOrderModal(o)} className="w-8 h-8 rounded-xl bg-gray-50 text-gray-500 hover:bg-blue-50 hover:text-blue-600 flex items-center justify-center transition border border-gray-100 shadow-sm"><Icon name="pencil-simple" weight="bold" size={16}/></button><button onClick={()=>onDeleteOrder(o.orderId)} className="w-8 h-8 rounded-xl bg-gray-50 text-gray-500 hover:bg-red-50 hover:text-red-500 flex items-center justify-center transition border border-gray-100 shadow-sm"><Icon name="trash" weight="bold" size={16}/></button></div></div>
                                           </div>
                                       );
                                   })}
                               </div>
                           </div>
                       ))}
                   </div>
                 )}
             </div>

             <ProductModal isOpen={isModalOpen} onClose={()=>setIsModalOpen(false)} product={editingProduct} onSave={(data) => { setIsModalOpen(false); onSaveProduct(data); }} loading={false} />
             <QRScannerModal isOpen={isScannerOpen} onClose={() => setIsScannerOpen(false)} onScan={handleScanSuccess} />
             <OrderSummaryModal isOpen={isSummaryOpen} onClose={() => setIsSummaryOpen(false)} orders={filteredOrders} products={orderData.products} zIndex="z-[110]" />

    // --- FORM COMPONENTS ---

                </div>
                {!isEditMode && (<div className="flex items-center justify-between bg-blue-50 p-3 rounded-xl border border-blue-100"><div className="flex items-center gap-2"><div className={`w-8 h-8 rounded-full flex items-center justify-center ${formData.notify ? 'bg-green-500 text-white' : 'bg-gray-300 text-gray-500'}`}><Icon name="line-logo" weight="fill" size={18}/></div><div><p className="text-xs font-bold text-gray-700">แจ้งเตือน LINE</p><p className="text-[10px] text-gray-500">{formData.notify ? 'ส่งข้อความแจ้งเตือนทันที' : 'บันทึกเงียบๆ ไม่แจ้งเตือน'}</p></div></div><button type="button" onClick={() => setFormData(prev => ({ ...prev, notify: !prev.notify }))} className={`w-12 h-6 rounded-full p-1 transition-colors duration-300 ${formData.notify ? 'bg-green-500' : 'bg-gray-300'}`}><div className={`w-4 h-4 bg-white rounded-full shadow-sm transform transition-transform duration-300 ${formData.notify ? 'translate-x-6' : 'translate-x-0'}`} /></button></div>)}
                <button type="submit" disabled={loading || (!isEditMode && selectedStudentIds.length === 0) || (isEditMode && !formData.studentId)} className="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold shadow-lg shadow-blue-200 hover:shadow-blue-300 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2 disabled:opacity-50 disabled:cursor-not-allowed">{loading ? <><Icon name="circle-notch" className="animate-spin" weight="bold"/> กำลังบันทึก...</> : <><Icon name="floppy-disk" weight="bold"/> {isEditMode ? buttonText : `สร้างบิล (${selectedStudentIds.length} คน)`}</>}</button>

    const StudentForm = ({ onSubmit, loading, initialData = null }) => {

      const LOCKED_PERMISSIONS = ['home', 'settings'];

        </Modal>

    // ==========================================

    const App = () => {

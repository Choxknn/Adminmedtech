    };
    // --- QR Code Management Modal ---
    const QrCodeModal = ({ isOpen, onClose, qrUrls, onUploadSuccess, onDelete, loading, initialEditQr }) => {
        const [mode, setMode] = useState('list'); 
        const [uploadFile, setUploadFile] = useState(null);
        const [previewUrl, setPreviewUrl] = useState('');
        const [newAmount, setNewAmount] = useState('');
        const [isUploading, setIsUploading] = useState(false);
        const [editTargetUrl, setEditTargetUrl] = useState(null); 

        useEffect(() => {
            if (isOpen) {
                if (initialEditQr) { startEdit(initialEditQr); } else { resetForm(); setMode('list'); }
            }
        }, [isOpen, initialEditQr]);

        const resetForm = () => { setUploadFile(null); setPreviewUrl(''); setNewAmount(''); setEditTargetUrl(null); setIsUploading(false); };
        const handleFileChange = (e) => { const file = e.target.files[0]; if (file) { setUploadFile(file); const reader = new FileReader(); reader.onloadend = () => setPreviewUrl(reader.result); reader.readAsDataURL(file); } };
        const startEdit = (qr) => { setMode('edit'); setEditTargetUrl(qr.url); setNewAmount(qr.amount); setPreviewUrl(qr.url); setUploadFile(null); };
        const goToAdd = () => { resetForm(); setMode('add'); };
        const goBack = () => { resetForm(); setMode('list'); };

        const handleSave = () => {
            if (!newAmount) return;
            setIsUploading(true);
            const onSuccess = (newData) => { setIsUploading(false); resetForm(); if(!initialEditQr) setMode('list'); else onClose(); onUploadSuccess(newData); };
            const onFailure = (err) => { setIsUploading(false); alert("เกิดข้อผิดพลาด: " + err.message); };

            if (uploadFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement("img");
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");
                        
                        const MAX_WIDTH = 800; 
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7).split(',')[1];
                        const mimeType = "image/jpeg";
                        const fileName = `QR-${Date.now()}.jpg`;

                        // ✅ ใช้ apiCall แทน google.script.run
                        if (mode === 'edit') { 
                            apiCall('uploadQrImage', compressedBase64, mimeType, fileName, newAmount, editTargetUrl).then(onSuccess).catch(onFailure); 
                        } else { 
                            apiCall('uploadQrImage', compressedBase64, mimeType, fileName, newAmount).then(onSuccess).catch(onFailure); 
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(uploadFile);
            } else {
                if (mode === 'edit' && editTargetUrl) { 
                    apiCall('updateQrCode', editTargetUrl, editTargetUrl, newAmount).then(onSuccess).catch(onFailure); 
                } else { 
                    alert("กรุณาเลือกรูปภาพ"); setIsUploading(false); 
                }
            }
        };

        if (!isOpen) return null;

        return (
            <Modal isOpen={isOpen} onClose={onClose} title={mode === 'list' ? "จัดการ QR Code" : (mode === 'add' ? "เพิ่ม QR Code" : "แก้ไข QR Code")}>
                {mode === 'list' && (
                    <div className="space-y-4 animate-fade-in">
                        <button onClick={goToAdd} className="w-full py-3 bg-blue-50 text-primary border border-blue-200 rounded-xl flex items-center justify-center gap-2 font-bold hover:bg-blue-100 transition"><Icon name="plus-circle" size={20} weight="bold"/> เพิ่ม QR Code ใหม่</button>
                        <div className="border-t border-gray-100 my-2"></div>
                        <div><h4 className="text-sm font-bold text-gray-500 mb-3 flex items-center gap-2"><Icon name="images" className="text-gray-400"/> รายการที่มีอยู่ ({qrUrls.length})</h4>
                            {qrUrls.length === 0 ? (<div className="flex flex-col items-center justify-center text-gray-400 py-10 bg-gray-50 rounded-xl border border-dashed border-gray-200"><Icon name="image-broken" size={48} className="mb-2 opacity-50"/><span className="text-sm">ยังไม่มี QR Code ในระบบ</span></div>) : (
                                <div className="grid grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-1 pb-2">
                                    {qrUrls.map((qr, idx) => (
                                        <div key={idx} className="relative group rounded-xl border border-gray-200 overflow-hidden bg-white flex flex-col shadow-sm hover:shadow-md transition">
                                            <div className="aspect-square flex items-center justify-center p-4 bg-gray-50"><img src={qr.url} alt="QR" className="max-h-full max-w-full object-contain mix-blend-multiply" /></div>
                                            <div className="bg-white p-3 text-center border-t border-gray-100"><span className="text-sm font-bold text-gray-700">฿{Number(qr.amount).toLocaleString()}</span></div>
                                            <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3 backdrop-blur-sm">
                                                <button onClick={() => startEdit(qr)} className="bg-white text-blue-600 p-2.5 rounded-full hover:bg-blue-50 transition transform hover:scale-110 shadow-lg" title="แก้ไข"><Icon name="pencil-simple" weight="bold" size={20} /></button>
                                                <button onClick={() => { if(confirm('ต้องการลบใช่หรือไม่?')) onDelete(qr.url); }} className="bg-white text-red-500 p-2.5 rounded-full hover:bg-red-50 transition transform hover:scale-110 shadow-lg" title="ลบ"><Icon name="trash" weight="bold" size={20} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}
                {(mode === 'add' || mode === 'edit') && (
                    <div className="space-y-6 animate-scale-in">
                        <div className="space-y-2"><label className="text-sm font-bold text-gray-700">รูปภาพ QR Code</label><div className="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:bg-gray-50 transition relative cursor-pointer group bg-white"><input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />{previewUrl ? (<div className="relative"><img src={previewUrl} className="h-40 object-contain mx-auto rounded-lg shadow-sm" /><div className="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition rounded-lg text-white font-medium backdrop-blur-sm"><Icon name="camera" className="mr-2"/> เปลี่ยนรูป</div></div>) : (<div className="py-6"><div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="upload-simple" size={24} weight="bold"/></div><p className="text-sm text-gray-600 font-medium">แตะเพื่อเลือกรูปภาพ</p><p className="text-xs text-gray-400 mt-1">รองรับไฟล์ .jpg, .png</p></div>)}</div></div>
                        <div className="space-y-2"><label className="text-sm font-bold text-gray-700">ระบุยอดเงิน (บาท)</label><div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">฿</span><input type="number" value={newAmount} onChange={(e) => setNewAmount(e.target.value)} className="w-full pl-8 p-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 font-bold text-lg outline-none focus:ring-2 focus:ring-primary focus:bg-white transition" placeholder="0" /></div></div>
                        <div className="flex gap-3 pt-2"><button onClick={initialEditQr ? onClose : goBack} disabled={isUploading} className="flex-1 py-3 border border-gray-200 text-gray-600 font-bold rounded-xl hover:bg-gray-50 transition">ยกเลิก</button><button onClick={handleSave} disabled={loading || isUploading || (!uploadFile && mode === 'add') || !newAmount} className="flex-[2] py-3 bg-primary text-white font-bold rounded-xl hover:bg-blue-700 disabled:opacity-50 transition flex justify-center items-center gap-2 shadow-lg shadow-blue-200">{isUploading ? <><Icon name="spinner" className="animate-spin"/> กำลังบันทึก...</> : "บันทึกข้อมูล"}</button></div>
                    </div>
                )}
            </Modal>
        );
    };

    // --- Notification View (Updated: Show Student ID & Name in Modal) ---
    const NotificationView = ({ students, data, onSendCustom, onSendOverdue, onSendAccount, onSendOverdueBatch, loading }) => {
        // บังคับเริ่มที่ 'overdue'
        const [activeSubTab, setActiveSubTab] = useState('overdue'); 
        
        const [form, setForm] = useState({ studentIds: [], title: '', detail: '', type: 'general' });
        const [accountStudentIds, setAccountStudentIds] = useState([]);
        const [confirmState, setConfirmState] = useState({ isOpen: false, type: '', data: null, title: '', message: '' });
        
        // State สำหรับดูรายละเอียดบิลในหน้านี้
        const [viewingBill, setViewingBill] = useState(null);

        // Helper: คำนวณค่าปรับ (Default 0)
        const getFine = (bill) => {
            if (!bill.dueDate) return 0;
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(bill.dueDate); due.setHours(0,0,0,0);
            
            if (today <= due) return 0;

            const diffTime = Math.abs(today - due);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            const finePerDay = Number(bill.finePerDay || 0);
            const maxFine = Number(bill.maxFine || 0);
            
            const calculatedFine = diffDays * finePerDay;

            if (maxFine > 0) {
                return Math.min(calculatedFine, maxFine);
            }
            return calculatedFine;
        };

        const overdueBills = useMemo(() => {
            const today = new Date(); today.setHours(0,0,0,0);
            return data.bills.filter(b => { 
                if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; 
                if (!b.dueDate) return false; 
                return new Date(b.dueDate) < today; 
            });
        }, [data.bills]);

        const totalOverdueAmount = useMemo(() => overdueBills.reduce((sum, b) => sum + (Number(b.amount) - Number(b.discount || 0)), 0), [overdueBills]);

        const triggerSendCustom = () => { if (form.studentIds.length === 0 || !form.title) return; const typeText = form.type === 'announcement' ? 'ประกาศ' : 'ข้อความ'; setConfirmState({ isOpen: true, type: 'CUSTOM', data: null, title: `ยืนยันการส่ง${typeText}`, message: `คุณต้องการส่ง "${form.title}" ให้กับนักศึกษาจำนวน ${form.studentIds.length} คน ใช่หรือไม่?` }); };
        const triggerSendAccount = () => { if (accountStudentIds.length === 0) return; setConfirmState({ isOpen: true, type: 'ACCOUNT', data: null, title: 'ยืนยันการส่งข้อมูลบัญชี', message: `คุณต้องการส่ง รหัสนักศึกษาและรหัสผ่าน ให้กับนักศึกษาจำนวน ${accountStudentIds.length} คน ใช่หรือไม่?` }); };
        const triggerSendOverdue = (billId, studentName, amount) => { setConfirmState({ isOpen: true, type: 'OVERDUE', data: billId, title: 'ยืนยันการทวงถาม', message: `คุณต้องการส่งข้อความทวงถามยอด ${Number(amount).toLocaleString()} บาท ไปยัง ${studentName} ใช่หรือไม่?` }); };
        const triggerSendOverdueAll = () => { if (overdueBills.length === 0) return; setConfirmState({ isOpen: true, type: 'OVERDUE_ALL', data: overdueBills.map(b => b.billId), title: 'ยืนยันการทวงถามทั้งหมด', message: `คุณต้องการส่งข้อความแจ้งเตือนยอดค้างชำระ ทั้งหมด ${overdueBills.length} รายการ ใช่หรือไม่?` }); };

        const handleConfirmAction = () => {
            if (confirmState.type === 'CUSTOM') { onSendCustom(form); if (!loading) setForm({ studentIds: [], title: '', detail: '', type: 'general' }); } 
            else if (confirmState.type === 'ACCOUNT') { onSendAccount(accountStudentIds); if (!loading) setAccountStudentIds([]); } 
            else if (confirmState.type === 'OVERDUE') { onSendOverdue(confirmState.data); } 
            else if (confirmState.type === 'OVERDUE_ALL') { onSendOverdueBatch(confirmState.data); }
        };

        useEffect(() => {
            if (!loading && confirmState.isOpen) {
                setConfirmState(prev => ({ ...prev, isOpen: false }));
                if (confirmState.type === 'CUSTOM') setForm({ studentIds: [], title: '', detail: '', type: 'general' });
                if (confirmState.type === 'ACCOUNT') setAccountStudentIds([]);
            }
        }, [loading]);

        const tabs = [
            { id: 'overdue', label: 'ติดตามหนี้', icon: 'bell-ringing', badge: overdueBills.length },
            { id: 'account', label: 'ข้อมูลบัญชี', icon: 'identification-card' },
            { id: 'general', label: 'ข้อความ/ประกาศ', icon: 'chat-circle-text' }
        ];

        return (
            <div className="pb-24 space-y-5 relative">
                <ScrollToTopBottom />
                <ConfirmModal isOpen={confirmState.isOpen} onClose={() => setConfirmState({ ...confirmState, isOpen: false })} onConfirm={handleConfirmAction} title={confirmState.title} message={confirmState.message} loading={loading} confirmText="ยืนยันส่ง" isDestructive={false} />
                
                {/* Header & Tabs */}
                <div className="space-y-3 px-2">
                    <h2 className="text-xl font-bold text-gray-800">ศูนย์การแจ้งเตือน</h2>
                    <div className="bg-white p-1.5 rounded-2xl card-shadow border border-gray-100 flex overflow-x-auto no-scrollbar gap-1">
                        {tabs.map(tab => {
                            const isActive = activeSubTab === tab.id;
                            let activeClass = isActive ? 'bg-gray-800 text-white shadow-md' : 'text-gray-500 hover:bg-gray-50';
                            if (isActive && tab.id === 'overdue') activeClass = 'bg-red-500 text-white shadow-md shadow-red-200';
                            if (isActive && tab.id === 'account') activeClass = 'bg-blue-500 text-white shadow-md shadow-blue-200';
                            
                            return (
                                <button key={tab.id} onClick={() => setActiveSubTab(tab.id)} className={`flex-1 py-2.5 px-3 rounded-xl flex items-center justify-center gap-2 transition-all relative ${activeClass}`}>
                                    <Icon name={tab.icon} weight={isActive ? "fill" : "bold"} size={18}/>
                                    <span className="text-xs font-bold whitespace-nowrap">{tab.label}</span>
                                    {tab.badge > 0 && <span className="absolute -top-1 -right-1 bg-white text-red-500 text-[9px] font-bold px-1.5 py-0.5 rounded-full border border-gray-100 shadow-sm">{tab.badge}</span>}
                                </button>
                            );
                        })}
                    </div>
                </div>

                {/* Content Area */}
                <div className="animate-fade-in">
                    
                    {/* TAB 1: OVERDUE (ติดตามหนี้) */}
                    {activeSubTab === 'overdue' && (
                        <div className="space-y-4">
                            {/* Summary Card */}
                            <div className="bg-gradient-to-br from-red-500 to-pink-600 rounded-3xl p-5 text-white shadow-xl shadow-red-200 relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full blur-3xl -translate-y-10 translate-x-10"></div>
                                <div className="relative z-10 flex justify-between items-end">
                                    <div><p className="text-red-100 text-xs font-bold mb-1 uppercase tracking-wider">ยอดหนี้ค้างชำระรวม</p><h2 className="text-3xl font-extrabold tracking-tight">฿{totalOverdueAmount.toLocaleString()}</h2></div>
                                    <div className="text-right"><div className="text-2xl font-bold">{overdueBills.length}</div><span className="text-xs text-red-100">รายการ</span></div>
                                </div>
                                {overdueBills.length > 0 && (
                                    <button onClick={triggerSendOverdueAll} disabled={loading} className="mt-4 w-full py-2.5 bg-white text-red-600 font-bold rounded-xl shadow-md hover:bg-red-50 transition text-sm flex items-center justify-center gap-2">
                                        {loading ? <Icon name="spinner" className="animate-spin"/> : <><Icon name="paper-plane-right" weight="bold"/> ทวงถามทั้งหมด ({overdueBills.length})</>}
                                    </button>
                                )}
                            </div>

                            {/* List */}
                            {overdueBills.length === 0 ? (
                                <div className="flex flex-col items-center justify-center py-10 text-gray-300"><div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3"><Icon name="check-fat" size={32} className="text-green-400" weight="fill"/></div><p className="text-sm font-medium">ไม่มีรายการค้างชำระ</p></div>
                            ) : (
                                <div className="space-y-2">
                                    {overdueBills.map((bill, idx) => {
                                        const student = students.find(s => s.id === bill.studentId);
                                        const studentName = student ? student.name : bill.studentId;
                                        return (
                                            <div 
                                                key={idx} 
                                                onClick={() => setViewingBill(bill)} 
                                                className="bg-white p-4 rounded-2xl card-shadow border border-gray-100 flex justify-between items-center group cursor-pointer hover:border-red-200 hover:shadow-md transition active:scale-[0.98]"
                                            >
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center font-bold text-xs flex-shrink-0">#{idx+1}</div>
                                                    <div>
                                                        <div className="font-bold text-gray-800 text-sm group-hover:text-red-600 transition">{studentName}</div>
                                                        <div className="text-xs text-gray-500 mt-0.5">{bill.item}</div>
                                                        <div className="text-[10px] text-red-500 font-bold mt-1 bg-red-50 px-1.5 py-0.5 rounded inline-block">เกิน: {formatDate(bill.dueDate)}</div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-extrabold text-gray-800 text-sm mb-2">฿{Number(bill.amount).toLocaleString()}</div>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); triggerSendOverdue(bill.billId, studentName, bill.amount); }} 
                                                        disabled={loading} 
                                                        className="bg-red-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-red-600 transition shadow-sm shadow-red-200 z-10 relative"
                                                    >
                                                        {loading ? <Icon name="spinner" className="animate-spin"/> : "ทวง"}
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}

                    {/* TAB 2: ACCOUNT */}
                    {activeSubTab === 'account' && (
                        <div className="bg-white p-5 rounded-3xl card-shadow space-y-5 border border-gray-100">
                             <div className="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex items-start gap-3">
                                <div className="bg-white p-2 rounded-xl text-blue-600 shadow-sm"><Icon name="shield-check" size={24} weight="fill"/></div>
                                <div><h4 className="font-bold text-gray-800 text-sm">ส่งข้อมูลบัญชีส่วนตัว</h4><p className="text-xs text-blue-600/80 mt-1 leading-relaxed">ระบบจะส่ง รหัสนักศึกษา และ รหัสผ่าน ไปยัง LINE ส่วนตัวของนักศึกษาแต่ละคน (ใช้กรณีลืมรหัส)</p></div>
                            </div>
                            <div><label className="block text-xs font-bold text-gray-500 mb-1.5">เลือกนักศึกษาที่ต้องการส่งให้</label><StudentMultiSelect students={students} selectedIds={accountStudentIds} onChange={setAccountStudentIds} /></div>
                            <button onClick={triggerSendAccount} disabled={loading || accountStudentIds.length === 0} className="w-full py-3.5 rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:opacity-50 transition transform active:scale-[0.98] flex items-center justify-center gap-2">
                                {loading ? <Icon name="spinner" className="animate-spin" size={20}/> : <><Icon name="lock-key" weight="bold" size={20}/> ส่งข้อมูลบัญชี</>}
                            </button>
                        </div>
                    )}

                    {/* TAB 3: GENERAL */}
                    {activeSubTab === 'general' && (
                        <div className="bg-white p-5 rounded-3xl card-shadow space-y-5 border border-gray-100">
                            <div className="grid grid-cols-2 gap-3">
                                <label className={`cursor-pointer p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${form.type === 'general' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-100 hover:border-gray-200 text-gray-400'}`}>
                                    <input type="radio" name="msgType" className="hidden" checked={form.type === 'general'} onChange={() => setForm({...form, type: 'general'})} />
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${form.type === 'general' ? 'bg-white shadow-sm' : 'bg-gray-100'}`}><Icon name="chat-circle-text" weight="fill" size={20}/></div>
                                    <span className="text-xs font-bold">ข้อความทั่วไป</span>
                                </label>
                                <label className={`cursor-pointer p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${form.type === 'announcement' ? 'border-purple-500 bg-purple-50 text-purple-700' : 'border-gray-100 hover:border-gray-200 text-gray-400'}`}>
                                    <input type="radio" name="msgType" className="hidden" checked={form.type === 'announcement'} onChange={() => setForm({...form, type: 'announcement'})} />
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${form.type === 'announcement' ? 'bg-white shadow-sm' : 'bg-gray-100'}`}><Icon name="megaphone" weight="fill" size={20}/></div>
                                    <span className="text-xs font-bold">ประกาศสำคัญ</span>
                                </label>
                            </div>

                            <div className="space-y-4">
                                <div><label className="block text-xs font-bold text-gray-500 mb-1.5">ผู้รับข้อความ</label><StudentMultiSelect students={students} selectedIds={form.studentIds} onChange={(ids) => setForm({...form, studentIds: ids})} /></div>
                                <div><label className="block text-xs font-bold text-gray-500 mb-1.5">หัวข้อเรื่อง</label><input type="text" value={form.title} onChange={(e) => setForm({...form, title: e.target.value})} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary/20 transition text-sm font-medium" placeholder={form.type === 'announcement' ? "เช่น ประกาศหยุดเรียน..." : "แจ้งเตือน..."} /></div>
                                <div><label className="block text-xs font-bold text-gray-500 mb-1.5">รายละเอียด (ไม่บังคับ)</label><textarea value={form.detail} onChange={(e) => setForm({...form, detail: e.target.value})} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-primary/20 transition min-h-[100px] text-sm" placeholder="รายละเอียดเพิ่มเติม..."></textarea></div>
                            </div>

                            <button onClick={triggerSendCustom} disabled={loading || form.studentIds.length === 0 || !form.title} className={`w-full py-3.5 rounded-xl text-white font-bold shadow-lg disabled:opacity-50 transition transform active:scale-[0.98] flex items-center justify-center gap-2 ${form.type === 'announcement' ? 'bg-gradient-to-r from-purple-600 to-indigo-600 shadow-purple-200' : 'bg-gradient-to-r from-green-500 to-emerald-600 shadow-green-200'}`}>
                                {loading ? <><Icon name="circle-notch" className="animate-spin" weight="bold" size={20}/> กำลังส่ง...</> : <><Icon name="paper-plane-right" weight="bold" size={20}/> {form.type === 'announcement' ? "ส่งประกาศ" : "ส่งข้อความ"}</>}
                            </button>
                        </div>
                    )}
                </div>

                {/* Modal สำหรับดูรายละเอียดบิล */}
                <Modal isOpen={!!viewingBill} onClose={() => setViewingBill(null)} title="รายละเอียดบิล" zIndex="z-[80]">
                    {viewingBill && (() => {
                        const fine = getFine(viewingBill);
                        const finalAmount = Number(viewingBill.amount) + fine - Number(viewingBill.discount);
                        const student = students.find(s => s.id === viewingBill.studentId);

                        return (
                            <div className="space-y-4 pt-1 animate-fade-in">
                                {/* Header Card */}
                                <div className="bg-gradient-to-br from-gray-50 to-white p-6 rounded-2xl text-center border border-gray-100 shadow-sm relative overflow-hidden">
                                    <div className={`absolute top-0 right-0 px-4 py-1.5 rounded-bl-xl text-[10px] font-bold shadow-sm ${getStatusColor(viewingBill.status)}`}>
                                        {viewingBill.status || 'ค้างชำระ'}
                                    </div>
                                    <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1 mt-2">ยอดชำระสุทธิ</p>
                                    <h2 className="text-4xl font-extrabold text-gray-800 tracking-tight">฿{finalAmount.toLocaleString()}</h2>
                                    <p className="text-sm text-primary font-medium mt-2">{viewingBill.item}</p>
                                </div>
                                
                                {/* Details List */}
                                <div className="space-y-0 mt-4 border border-gray-100 rounded-2xl overflow-hidden">
                                    
                                    {/* ✅ แก้ไขตรงนี้: เพิ่มรหัสนักศึกษาและชื่อนักศึกษา */}
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center">
                                        <span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="user" weight="bold"/> นักศึกษา</span>
                                        <span className="font-medium text-sm text-right">
                                            {viewingBill.studentId} 
                                            {student?.name && <><br/><span className="text-xs text-gray-500">{student.name}</span></>}
                                        </span>
                                    </div>

                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="hash" weight="bold"/> รหัสบิล</span><span className="font-mono text-sm font-bold text-gray-700">#{viewingBill.billId}</span></div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="calendar-check" weight="bold"/> ครบกำหนด</span><span className="font-medium text-sm text-red-500 font-bold">{formatDate(viewingBill.dueDate)}</span></div>
                                    <div className="flex justify-between py-3 px-4 bg-white border-b border-gray-50 items-center"><span className="text-xs text-gray-400 font-bold flex items-center gap-2"><Icon name="currency-btc" weight="bold"/> เงินต้น</span><span className="font-medium text-sm">{Number(viewingBill.amount).toLocaleString()}</span></div>
                                    {fine > 0 && <div className="flex justify-between py-3 px-4 bg-orange-50/50 border-b border-orange-50 items-center"><span className="text-xs text-orange-600 font-bold flex items-center gap-2"><Icon name="warning-circle" weight="bold"/> ค่าปรับล่าช้า</span><span className="font-bold text-sm text-orange-600">+{fine.toLocaleString()}</span></div>}
                                    {Number(viewingBill.discount) > 0 && <div className="flex justify-between py-3 px-4 bg-green-50/50 border-b border-green-50 items-center"><span className="text-xs text-green-600 font-bold flex items-center gap-2"><Icon name="percent" weight="bold"/> ส่วนลด</span><span className="font-bold text-sm text-green-600">-{Number(viewingBill.discount).toLocaleString()}</span></div>}
                                </div>

                                <button onClick={() => setViewingBill(null)} className="w-full py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ปิดหน้าต่าง</button>
                            </div>
                        );
                    })()}
                </Modal>

            </div>
        );
    };
    // --- Dashboard View (Corrected Logic: ON=Maintenance, OFF=Active) ---
    const DashboardView = ({ data, setData, setActiveTab, setEditAnnouncement, setIsAnnounceModalOpen, setIsQrModalOpen, onGoToOverdueBills, onGoToUnpaidBills, onOpenQrManager, onEditQr, onGoToOverdue, processingAction, setProcessingAction }) => {
        const [isDateFilterActive, setIsDateFilterActive] = useState(false);
        const [dateFilter, setDateFilter] = useState(() => {

                        </h3>
                        <p className="text-sm text-gray-500 mt-2">

                    <div><h3 className="font-bold text-gray-800 text-lg">ดำเนินการเรียบร้อย</h3><p className="text-sm text-gray-500 mt-1">สถานะระบบถูกเปลี่ยนแปลงแล้ว</p></div>
                    <button onClick={() => setSuccessModal(false)} className="w-full py-3 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 shadow-lg shadow-green-200 transition">ตกลง</button>

            const today = new Date(); today.setHours(0,0,0,0);
            return {
                all: data.bills.length,
                pending: data.bills.filter(b => b.status === 'รอตรวจสอบ').length,
                paid: data.bills.filter(b => b.status === 'ชำระแล้ว').length,
                unpaid: data.bills.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ').length,

            };

        const tabs = [
            { id: 'all', label: 'ทั้งหมด', color: 'text-gray-600' },
            { id: 'paid', label: 'เรียบร้อย', color: 'text-emerald-600' },
            { id: 'unpaid', label: 'ค้างจ่าย', color: 'text-blue-600' },
            { id: 'overdue', label: 'เกินกำหนด', color: 'text-red-600' },
            { id: 'pending', label: 'รอตรวจ', color: 'text-amber-600' },
        ];

        const filteredBills = useMemo(() => {
          let res = data.bills; const today = new Date(); today.setHours(0,0,0,0);
          if (filter === 'pending') res = res.filter(b => b.status === 'รอตรวจสอบ');
          if (filter === 'paid') res = res.filter(b => b.status === 'ชำระแล้ว');
          if (filter === 'unpaid') res = res.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ'); 
          if (filter === 'overdue') res = res.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; const due = new Date(b.dueDate); due.setHours(0,0,0,0); return due < today; });
          if (searchTerm) { const lower = searchTerm.toLowerCase(); res = res.filter(b => String(b.item).toLowerCase().includes(lower) || String(b.billId).toLowerCase().includes(lower) || String(b.studentId).toLowerCase().includes(lower)); }
          return sortOrder === 'newest' ? [...res].reverse() : res;
        }, [data.bills, filter, searchTerm, sortOrder]);

        // Helper: สำหรับไอคอนสถานะเล็กด้านขวา
        const getStatusDisplay = (status, isOverdue) => {
            if (status === 'ชำระแล้ว') return { icon: 'check-circle', text: 'ชำระแล้ว', color: 'bg-emerald-100 text-emerald-700 border border-emerald-200' };
            if (status === 'รอตรวจสอบ') return { icon: 'clock-clockwise', text: 'รอตรวจสอบ', color: 'bg-amber-100 text-amber-700 border border-amber-200' };
            if (status === 'ยกเลิก') return { icon: 'prohibit', text: 'ยกเลิก', color: 'bg-gray-100 text-gray-500 border border-gray-200' };
            if (isOverdue) return { icon: 'warning-circle', text: 'เกินกำหนด', color: 'bg-red-50 text-red-600 border border-red-100' };
            return { icon: 'hourglass', text: 'ค้างชำระ', color: 'bg-blue-50 text-blue-600 border border-blue-100' };

        // ✅ Helper ใหม่: สำหรับกล่องไอคอนใหญ่ด้านซ้าย
        const getMajorStatusIcon = (bill, isOverdue) => {

            if (isOverdue) return { bg: 'bg-red-100', text: 'text-red-600', icon: 'warning-circle' };

        return (

              {tabs.map(tab => {

                return (<button key={tab.id} onClick={() => onFilterChange(tab.id)} className={`flex-1 min-w-[80px] py-2 px-3 rounded-xl flex flex-col items-center justify-center transition-all duration-300 relative ${isActive ? 'bg-blue-50' : 'hover:bg-gray-50'}`}><span className={`text-lg font-bold ${isActive ? tab.color : 'text-gray-400'}`}>{counts[tab.id]}</span><span className={`text-[10px] font-medium ${isActive ? 'text-gray-700' : 'text-gray-400'}`}>{tab.label}</span>{isActive && <div className="absolute bottom-1 w-1 h-1 rounded-full bg-primary"></div>}</button>);

            </div>

            {/* Search & Tools */}
            <div className="flex gap-3 items-center sticky top-0 z-20 bg-background py-2">
                <div className="flex-1 relative">
                    <div className="bg-white rounded-xl card-shadow border border-gray-100 flex items-center px-4 py-2.5 transition focus-within:ring-2 focus-within:ring-primary/20"><Icon name="magnifying-glass" className="text-gray-400 mr-3" size={18} /><input type="text" placeholder="ค้นหาชื่อ, รหัส, รายการ..." className="w-full bg-transparent text-sm font-medium text-gray-700 outline-none placeholder-gray-400" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>{searchTerm && <button onClick={() => setSearchTerm('')} className="text-gray-400 hover:text-gray-600 ml-2"><Icon name="x-circle" weight="fill" /></button>}</div>
                </div>
                <button onClick={() => setIsSummaryOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white card-shadow border border-gray-100 text-blue-600 hover:bg-blue-50 transition active:scale-95" title="สรุปยอด"><Icon name="chart-pie-slice" weight="duotone" size={24}/></button>
                <button onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white card-shadow border border-gray-100 text-gray-500 hover:bg-gray-50 transition active:scale-95"><Icon name={sortOrder === 'newest' ? "sort-descending" : "sort-ascending"} weight="bold" size={20} /></button>

              {filteredBills.map((bill, idx) => {
                const fine = calculateFine(bill);

                const isOverdue = (bill.dueDate && new Date(bill.dueDate) < new Date() && bill.status !== 'ชำระแล้ว');
                const netTotal = Number(bill.amount) + fine - Number(bill.discount || 0);
                
                const statusInfo = getStatusDisplay(bill.status, isOverdue); 
                const majorIconStyle = getMajorStatusIcon(bill, isOverdue); // ✅ ดึงสไตล์ไอคอนใหญ่

                return (
                    <div key={idx} onClick={() => setSelectedBill(bill)} className="group relative bg-white rounded-2xl p-4 card-shadow border border-gray-100 overflow-hidden cursor-pointer hover:shadow-md transition-all active:scale-[0.98]">
                        
                        <div className="flex items-start gap-4">

                                <Icon name={majorIconStyle.icon} weight="fill" size={24} />

                                        {fine > 0 && (<span className="text-red-500 font-bold flex items-center gap-1 bg-red-50 px-2 py-1 rounded-lg"><Icon name="warning" weight="fill" size={12}/> +{fine.toLocaleString()}</span>)}

                                    </div>

                        <div className="absolute right-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="caret-right" className="text-gray-300" size={24}/></div>
                    </div>
                );

              {filteredBills.length === 0 && (<div className="flex flex-col items-center justify-center py-16 text-gray-300 animate-fade-in"><div className="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-3"><Icon name="receipt" size={32} className="opacity-40"/></div><p className="text-sm font-medium">ไม่พบรายการบิล</p></div>)}
            </div>

            <BillSummaryModal isOpen={isSummaryOpen} onClose={() => setIsSummaryOpen(false)} bills={filteredBills} history={data.history} />

    };

   // --- History View (Final Fix: Robust Date Parsing) ---
    const HistoryView = ({ data, onDeleteHistory, onViewSlip }) => {
        const [searchTerm, setSearchTerm] = useState('');
        const [sortOrder, setSortOrder] = useState('newest');
        const [isDateFilterActive, setIsDateFilterActive] = useState(false);
        const [dateFilter, setDateFilter] = useState(() => {
            const end = new Date();
            const start = new Date(end.getFullYear(), end.getMonth(), 1); 
            const toInput = (d) => d.toISOString().split('T')[0];
            return { start: toInput(start), end: toInput(end) };
        });

        // ✅ แก้ตรงนี้: ฟังก์ชันแปลงวันที่ให้ฉลาดขึ้น (รองรับทั้งแบบ Sheet และแบบมาตรฐาน)
        const formatDateTime = (dateInput) => {
            if (!dateInput) return '-';
            
            let dateObj;

            // กรณี 1: ถ้าข้อมูลมาเป็น "8/1/2026, 9:29:16" (รูปแบบจาก Sheet)
            if (typeof dateInput === 'string' && dateInput.includes('/')) {
                try {
                    const [dPart, tPart] = dateInput.split(', ');
                    const [day, month, year] = dPart.split('/');
                    const [hour, minute] = tPart ? tPart.split(':') : [0, 0];
                    // สร้าง Date Object ใหม่ (ระวังเดือนต้อง -1)
                    dateObj = new Date(year, month - 1, day, hour, minute);
                } catch (e) {
                    dateObj = new Date(dateInput); // ถ้าแกะไม่ออก ให้ลองแปลงปกติ
                }
            } else {
                // กรณี 2: ข้อมูลเป็นมาตรฐาน (ISO String) หรือ Timestamp
                dateObj = new Date(dateInput);
            }

            // ถ้าแปลงไม่ได้จริงๆ ให้คืนค่าเดิม
            if (isNaN(dateObj.getTime())) return dateInput;

            // แสดงผล: วัน เดือน(ย่อ) ปี(พ.ศ. 2หลัก), เวลา
            return dateObj.toLocaleDateString('th-TH', { 
                day: 'numeric', 
                month: 'short', 
                year: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false 
            });
        };

        // Helper สำหรับแปลงวันที่เพื่อใช้เปรียบเทียบ (Sorting/Filtering)
        const parseDateForSort = (dateInput) => {
            if (!dateInput) return 0;
            if (typeof dateInput === 'string' && dateInput.includes('/')) {
                try {
                    const [dPart, tPart] = dateInput.split(', ');
                    const [day, month, year] = dPart.split('/');
                    const [hour, minute, second] = tPart ? tPart.split(':') : [0, 0, 0];
                    return new Date(year, month - 1, day, hour, minute, second).getTime();
                } catch (e) { return new Date(dateInput).getTime(); }
            }
            return new Date(dateInput).getTime();
        };

        const handleDateChange = (type, value) => { setDateFilter(prev => ({ ...prev, [type]: value })); };

        const isDateInRange = (targetDate, start, end) => {
            if (!targetDate) return false;
            const target = parseDateForSort(targetDate);
            const s = new Date(start).setHours(0,0,0,0);
            const e = new Date(end).setHours(23,59,59,999);
            return target >= s && target <= e;
        };

        const filteredHistory = useMemo(() => {
          let res = data.history;
          
          // ใช้ timestamp หรือ payDate ก็ได้ (ฟังก์ชัน parseDateForSort จะจัดการให้)
          const getDate = (item) => item.timestamp || item.payDate;

          if (isDateFilterActive) { 
              res = res.filter(h => isDateInRange(getDate(h), dateFilter.start, dateFilter.end)); 
          }
          
          if (searchTerm) { 
              const term = searchTerm.toLowerCase(); 
              res = res.filter(h => 
                  String(h.studentId).toLowerCase().includes(term) || 
                  String(h.name).toLowerCase().includes(term) || 
                  String(h.billId).toLowerCase().includes(term) ||
                  String(h.item).toLowerCase().includes(term)
              ); 
          }
          
          // เรียงลำดับ (ใช้ฟังก์ชันช่วยแกะวันที่)
          return sortOrder === 'newest' 
            ? [...res].sort((a, b) => parseDateForSort(getDate(b)) - parseDateForSort(getDate(a)))
            : [...res].sort((a, b) => parseDateForSort(getDate(a)) - parseDateForSort(getDate(b)));
        }, [data.history, searchTerm, sortOrder, dateFilter, isDateFilterActive]);

        const totalAmount = useMemo(() => {
            return filteredHistory.reduce((sum, item) => sum + (Number(item.total) || Number(item.amount) || 0), 0);
        }, [filteredHistory]);

        return (
          <div className="space-y-5 pb-24 animate-fade-in">
            <ScrollToTopBottom />
            
            {/* 1. Summary Dashboard */}
            <div className="bg-white rounded-3xl p-5 card-shadow border border-gray-100 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full blur-3xl -translate-y-10 translate-x-10 opacity-60"></div>
                <div className="relative z-10">
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <h2 className="text-gray-500 font-bold text-xs uppercase tracking-wider mb-1">ยอดรวมที่ชำระแล้ว</h2>
                            <div className="text-3xl font-extrabold text-gray-800 tracking-tight">
                                ฿{totalAmount.toLocaleString()}
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm">
                                <Icon name="list-checks" weight="bold"/> {filteredHistory.length} รายการ
                            </div>
                        </div>
                    </div>

                    {/* Search & Filter */}
                    <div className="space-y-3">
                        <div className="relative">
                            <Icon name="magnifying-glass" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
                            <input type="text" placeholder="ค้นหาชื่อ, รหัสนักศึกษา..." className="w-full pl-10 pr-10 py-2.5 bg-gray-50 border-none rounded-xl text-sm font-medium text-gray-700 outline-none focus:ring-2 focus:ring-blue-100 transition" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                            {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><Icon name="x-circle" weight="fill" /></button>}
                        </div>

                        <div className="flex gap-2">
                            <button onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')} className="flex items-center gap-1 px-3 py-2 bg-gray-50 text-gray-500 rounded-xl text-xs font-bold hover:bg-gray-100 transition">
                                <Icon name="arrows-down-up" weight="bold"/> {sortOrder === 'newest' ? 'ใหม่ล่าสุด' : 'เก่าสุด'}
                            </button>
                            <button onClick={() => setIsDateFilterActive(!isDateFilterActive)} className={`flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl text-xs font-bold transition ${isDateFilterActive ? 'bg-primary text-white shadow-lg shadow-blue-200' : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}`}>
                                <Icon name="calendar" weight={isDateFilterActive ? 'fill' : 'bold'}/> {isDateFilterActive ? 'ปิดตัวกรองวันที่' : 'กรองวันที่'}
                            </button>
                        </div>

                        <div className={`overflow-hidden transition-all duration-300 ${isDateFilterActive ? 'max-h-24 opacity-100 pt-1' : 'max-h-0 opacity-0'}`}>
                            <div className="bg-blue-50/50 p-3 rounded-xl border border-blue-100 grid grid-cols-2 gap-3">
                                <div><label className="text-[10px] font-bold text-blue-400 mb-1 block">เริ่ม</label><input type="date" value={dateFilter.start} onChange={e => handleDateChange('start', e.target.value)} className="w-full text-xs p-1.5 rounded-lg border-none bg-white text-gray-600 outline-none"/></div>
                                <div><label className="text-[10px] font-bold text-blue-400 mb-1 block">สิ้นสุด</label><input type="date" value={dateFilter.end} onChange={e => handleDateChange('end', e.target.value)} className="w-full text-xs p-1.5 rounded-lg border-none bg-white text-gray-600 outline-none"/></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            {/* 2. List Items */}
            <div className="space-y-3">
              {filteredHistory.map((item, idx) => (
                <div key={idx} className="bg-white p-4 rounded-2xl card-shadow border border-gray-100 relative group hover:border-blue-200 transition-all">
                    <button onClick={() => onDeleteHistory(item.billId)} className="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 text-gray-300 hover:bg-red-50 hover:text-red-500 transition-colors z-10">
                        <Icon name="trash" size={16} weight="bold" />
                    </button>

                    <div className="flex gap-4">
                        <div className="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center flex-shrink-0">
                            <Icon name="check-circle" size={24} weight="fill"/>
                        </div>

                        <div className="flex-1 min-w-0 pr-8">
                            <div className="flex justify-between items-baseline mb-1">
                                <h4 className="font-bold text-gray-800 text-sm truncate">{item.item}</h4>
                            </div>
                            
                            <div className="flex items-center gap-2 mb-2">
                                <span className="text-xs font-medium text-gray-500 bg-gray-50 px-2 py-0.5 rounded-md truncate max-w-[120px]">{item.name}</span>
                                <span className="text-[10px] text-gray-400 font-mono">#{item.studentId}</span>
                            </div>

                            <div className="flex items-end justify-between border-t border-dashed border-gray-100 pt-2 mt-2">
                                <div className="text-xs text-gray-400 flex items-center gap-1 font-medium">
                                    <Icon name="clock" weight="fill" className="text-gray-300"/> 
                                    {/* ✅ เรียกใช้ฟังก์ชันที่แก้แล้ว (ใช้ timestamp ก่อน ถ้าไม่มีใช้ payDate) */}
                                    {formatDateTime(item.timestamp || item.payDate)}
                                </div>
                                <div className="flex items-center gap-3">
                                    {item.slipUrl && (
                                        <button onClick={() => onViewSlip(item.slipUrl)} className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md hover:bg-blue-100 transition flex items-center gap-1">
                                            <Icon name="image" weight="bold"/> สลิป
                                        </button>
                                    )}
                                    <span className="font-bold text-emerald-600 text-lg">฿{Number(item.total || item.amount).toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
              ))}

              {filteredHistory.length === 0 && (
                  <div className="flex flex-col items-center justify-center py-16 text-gray-300">
                      <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                        <Icon name="clipboard-text" size={40} className="opacity-50" weight="duotone" />
                      </div>
                      <p className="text-sm font-medium">ไม่พบข้อมูลประวัติในช่วงนี้</p>
                  </div>
              )}
            </div>
          </div>
        );
    };

    // --- Student View (Updated: Overdue Indicator) ---
    // --- StudentView (Final Fixed: Clear Status Colors) ---
    const StudentView = ({ data, setIsStudentModalOpen, setSelectedStudent, handleDeleteStudent, onViewBills }) => {
        const [searchTerm, setSearchTerm] = useState('');
        
        const filteredStudents = useMemo(() => {
            if (!searchTerm) return data.students;
            const lower = searchTerm.toLowerCase();
            return data.students.filter(s => String(s.id).toLowerCase().includes(lower) || String(s.name).toLowerCase().includes(lower));
        }, [data.students, searchTerm]);

        const stats = useMemo(() => {
            const total = data.students.length;
            // เช็ค userId แบบละเอียด (ตัดช่องว่าง)
            const linked = data.students.filter(s => s.userId && String(s.userId).trim() !== '').length;
            const overdueUsers = data.students.filter(s => {
                return data.bills.some(b => {
                    if (b.studentId !== s.id) return false;
                    if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false;
                    if (!b.dueDate) return false;
                    const due = new Date(b.dueDate); due.setHours(0,0,0,0);
                    const today = new Date(); today.setHours(0,0,0,0);
                    return due < today;
                });
            }).length;
            return { total, linked, overdueUsers };
        }, [data.students, data.bills]);

        // Helper: สุ่มสี Avatar (ตัดสีเขียวออก เพื่อไม่ให้สับสน)
        const getAvatarColor = (id) => {
            const colors = [
                'bg-blue-100 text-blue-600', 
                'bg-indigo-100 text-indigo-600', 
                'bg-purple-100 text-purple-600', 
                'bg-pink-100 text-pink-600', 
                'bg-orange-100 text-orange-600', // ใช้ส้มแทน
                'bg-slate-100 text-slate-600'    // ใช้เทาแทน
            ];
            const index = String(id).charCodeAt(0) % colors.length;
            return colors[index];
        };

        return (
          <div className="space-y-5 pb-24 relative">
             <ScrollToTopBottom />

             {/* Header & Stats */}
             <div className="px-2">

                 {filteredStudents.map((stu, i) => {
                    // Logic เช็คสถานะแบบละเอียด
                    const isLinked = stu.userId && String(stu.userId).trim() !== ''; // ต้องไม่ว่าง และไม่ใช่ spacebar
                    const hasPassword = stu.password && String(stu.password).trim() !== '';

                                            {!hasPassword && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-orange-50 text-orange-600 text-[9px] font-bold border border-orange-100"><Icon name="key" weight="bold" size={10}/> ขาดรหัส</span>}

    // --- Helper: Image Gallery (ฉบับแก้ไข: แยกรูปฉลาดขึ้น + ปุ่มชัดเจน) ---
    const ProductImageGallery = ({ imageString }) => {
        const images = useMemo(() => {
            if (!imageString) return [];

            return imageString
                // แยกด้วย: คอมม่า(,) หรือ เว้นวรรค(\s) หรือ ขึ้นบรรทัดใหม่(\n) หรือ ขีดตั้ง(|)
                .split(/[, \n|]+/) 
                .map(url => url.trim()) // ตัดช่องว่างหน้าหลัง
                // กรองเอาเฉพาะอันที่เป็นลิงก์จริงๆ (กันค่าว่างหลุดมา)
                .filter(url => url && url.length > 5 && url.startsWith('http')); 
        }, [imageString]);

        const [currentIndex, setCurrentIndex] = useState(0);

        // รีเซ็ตหน้าแรกเสมอเมื่อรายการรูปเปลี่ยน
        useEffect(() => { setCurrentIndex(0); }, [images]);

        if (images.length === 0) {
            return (
                <div className="w-full h-full bg-gray-50 flex items-center justify-center text-gray-300">
                    <Icon name="image" size={32} />
                </div>
            );
        }

        const nextImage = (e) => {
            e.stopPropagation();
            setCurrentIndex((prev) => (prev + 1) % images.length);
        };

        const prevImage = (e) => {
            e.stopPropagation();
            setCurrentIndex((prev) => (prev - 1 + images.length) % images.length);
        };

        return (
            <div className="relative w-full h-full group bg-gray-100">
                <img 
                    src={images[currentIndex]} 
                    className="w-full h-full object-cover" 
                    alt={`รูปที่ ${currentIndex + 1}`}
                    referrerPolicy="no-referrer" // ✅ สำคัญ: กัน Google Block รูป
                    onError={(e) => { e.target.style.display = 'none'; }} // ถ้ารูปเสียให้ซ่อนไปเลย
                />
                
                {/* แสดงจำนวนรูปที่มุมขวาบน (เพื่อเช็คว่าอ่านครบไหม) */}
                <div className="absolute top-2 right-2 bg-black/60 text-white text-[10px] px-2 py-0.5 rounded-full">
                    {currentIndex + 1} / {images.length}
                </div>

                {/* ปุ่มเลื่อน (ถ้ามีมากกว่า 1 รูป) */}
                {images.length > 1 && (
                    <>
                        <button onClick={(e) => {e.stopPropagation(); setCurrentIndex((prev) => (prev - 1 + images.length) % images.length)}} className="absolute left-0 top-0 bottom-0 px-2 hover:bg-black/10 transition"><Icon name="caret-left" weight="bold" className="text-white drop-shadow-md"/></button>
                        <button onClick={(e) => {e.stopPropagation(); setCurrentIndex((prev) => (prev + 1) % images.length)}} className="absolute right-0 top-0 bottom-0 px-2 hover:bg-black/10 transition"><Icon name="caret-right" weight="bold" className="text-white drop-shadow-md"/></button>
                    </>
                )}
            </div>
        );
    };

    // --- 1. Helper Component: Image Manager (Modern Design) ---
    const ImageManager = ({ label, existingUrls = [], newImages = [], onRemoveExisting, onRemoveNew, onAddNew }) => {
        const inputId = `file-input-${Math.random().toString(36).substr(2, 9)}`;

        return (

                <div className="grid grid-cols-4 gap-3">

                    {/* 2. รูปใหม่ (New Base64) */}

                            <img src={`data:image/jpeg;base64,${img}`} className="w-full h-full object-cover" alt="new" />
                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-[2px]">
                                <button type="button" onClick={() => onRemoveNew(idx)} className="w-8 h-8 bg-white text-red-500 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition">
                                    <Icon name="trash" weight="bold" size={16}/>

                    {/* 3. ปุ่มเพิ่ม (+) */}
                    <label 
                        htmlFor={inputId}
                        className="aspect-square rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center cursor-pointer hover:border-primary hover:bg-indigo-50/50 transitionGroup group"
                    >
                        <div className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center mb-1 group-hover:scale-110 transition-transform">
                            <Icon name="plus" weight="bold" className="text-gray-400 group-hover:text-primary"/>
                        </div>
                        <span className="text-[9px] font-bold text-gray-400 group-hover:text-primary">เพิ่มรูป</span>
                        <input id={inputId} type="file" multiple accept="image/*" className="hidden" onChange={onAddNew} />
                    </label>
                </div>
            </div>
        );
    };

    // --- Product Modal (Logic: Safe Save & Modern Design) ---
    const ProductModal = ({ isOpen, onClose, product, onSave, loading, zIndex = "z-[110]" }) => {
        const [form, setForm] = useState({ id: '', name: '', price: '', image: '', options: '', status: 'ON', sizeChart: '', stock: '' });
        
        const [existingMainImages, setExistingMainImages] = useState([]); 
        const [newMainFiles, setNewMainFiles] = useState([]); 
        const [existingSizeImages, setExistingSizeImages] = useState([]); 
        const [newSizeFiles, setNewSizeFiles] = useState([]); 
        const [optionGroups, setOptionGroups] = useState([{ header: '', options: [{ label: '', price: '' }] }]);

        // ✅ 1. โหลดข้อมูลเมื่อเปิด Modal (ทำให้ชัวร์ว่ารูปเก่ามาครบ)
        useEffect(() => {
            if(isOpen) {
                if (product) {
                    setForm(product);

                    const safeSplit = (str) => {
                        if (!str) return [];
                        return str.split(/[, \n|]+/) // แยกด้วยทุกตัวคั่นที่เป็นไปได้
                                  .map(s => s.trim())
                                  .filter(s => s && s.startsWith('http'));
                    };

                    setExistingMainImages(safeSplit(product.image));
                    setExistingSizeImages(safeSplit(product.sizeChart));
                    
                    setNewMainFiles([]);
                    setNewSizeFiles([]);
                    parseOptionString(product.options || '');
                } else {
                    // กรณีเพิ่มใหม่
                    setForm({ id: `P-${Date.now()}`, name: '', price: '', image: '', options: '', status: 'ON', sizeChart: '', stock: '' });
                    setExistingMainImages([]); setNewMainFiles([]);
                    setExistingSizeImages([]); setNewSizeFiles([]);
                    setOptionGroups([{ header: '', options: [{ label: '', price: '' }] }]);
                }
            }
        }, [product, isOpen]);

        const parseOptionString = (str) => { if(!str) { setOptionGroups([{ header: '', options: [{ label: '', price: '' }] }]); return; } const groups = str.split('|').map(groupStr => { let header = ''; let body = groupStr.trim(); if (body.includes(':')) { const parts = body.split(':'); header = parts[0].trim(); body = parts[1].trim(); } let options = []; if(body) { options = body.split(',').map(item => { const parts = item.trim().split(/[=+]/); return { label: parts[0].trim(), price: parts[1] || '' }; }); } if (options.length === 0) options.push({ label: '', price: '' }); return { header, options }; }); setOptionGroups(groups.length > 0 ? groups : [{ header: '', options: [{ label: '', price: '' }] }]); };
        const buildOptionString = () => { const validGroups = optionGroups.map(group => { const validOptions = group.options.filter(o => o.label.trim() !== ''); if(validOptions.length === 0) return null; const body = validOptions.map(o => { const p = o.price && parseInt(o.price) > 0 ? o.price : ''; return p ? `${o.label.trim()}=${p}` : o.label.trim(); }).join(','); return group.header ? `${group.header.trim()}:${body}` : body; }).filter(g => g !== null); return validGroups.join(' | '); };
        
        const handleAddGroup = () => setOptionGroups([...optionGroups, { header: '', options: [{ label: '', price: '' }] }]);
        const handleRemoveGroup = (gIdx) => setOptionGroups(optionGroups.filter((_, i) => i !== gIdx));
        const handleHeaderChange = (gIdx, val) => { const newGroups = [...optionGroups]; newGroups[gIdx].header = val; setOptionGroups(newGroups); };
        const handleAddOption = (gIdx) => { const newGroups = [...optionGroups]; newGroups[gIdx].options.push({ label: '', price: '' }); setOptionGroups(newGroups); };
        const handleRemoveOption = (gIdx, oIdx) => { const newGroups = [...optionGroups]; newGroups[gIdx].options = newGroups[gIdx].options.filter((_, i) => i !== oIdx); setOptionGroups(newGroups); };
        const handleOptionChange = (gIdx, oIdx, field, val) => { const newGroups = [...optionGroups]; newGroups[gIdx].options[oIdx][field] = val; setOptionGroups(newGroups); };

        const processFiles = (files, callback) => {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement("img");
                        img.onload = () => {
                            const canvas = document.createElement("canvas");
                            const ctx = canvas.getContext("2d");
                            const MAX_WIDTH = 1000; const MAX_HEIGHT = 1000;
                            let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                            canvas.width = width; canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL("image/jpeg", 0.8).split(',')[1]); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });
            Promise.all(promises).then(callback);
        };

        const handleAddMain = (e) => processFiles(e.target.files, (b64s) => setNewMainFiles(prev => [...prev, ...b64s]));
        const handleDelMainExist = (idx) => setExistingMainImages(prev => prev.filter((_, i) => i !== idx));
        const handleDelMainNew = (idx) => setNewMainFiles(prev => prev.filter((_, i) => i !== idx));
        const handleAddSize = (e) => processFiles(e.target.files, (b64s) => setNewSizeFiles(prev => [...prev, ...b64s]));
        const handleDelSizeExist = (idx) => setExistingSizeImages(prev => prev.filter((_, i) => i !== idx));
        const handleDelSizeNew = (idx) => setNewSizeFiles(prev => prev.filter((_, i) => i !== idx));

        const handleSubmit = () => {
            onSave({
                ...form,
                options: buildOptionString(),
                
                // ✅ แก้ไข: ส่งกลับไปเป็น String คั่นด้วย " | "
                image: existingMainImages.join(' | '), 
                imageFiles: newMainFiles,            
                
                sizeChart: existingSizeImages.join(' | '), 
                sizeChartFiles: newSizeFiles 
            });
        };

        if(!isOpen) return null;

        return ReactDOM.createPortal(
            <div className={`fixed inset-0 ${zIndex} flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in`}>
                <div className="bg-[#F8FAFC] rounded-[2rem] w-full max-w-md overflow-hidden shadow-2xl flex flex-col max-h-[85vh] animate-scale-in">
                    
                    {/* Header */}
                    <div className="px-6 py-4 bg-white/80 backdrop-blur-sm flex justify-between items-center border-b border-gray-100 z-10 sticky top-0">
                        <div>
                            <h3 className="font-extrabold text-xl text-gray-800 tracking-tight">
                                {product?.id ? 'แก้ไขสินค้า' : 'เพิ่มสินค้าใหม่'}
                            </h3>
                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">{product?.id ? `#${product.id}` : 'CREATE NEW'}</p>
                        </div>
                        <button onClick={onClose} className="w-9 h-9 rounded-full bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-500 flex items-center justify-center transition-all shadow-sm">
                            <Icon name="x" weight="bold" size={18}/>
                        </button>
                    </div>

                    {/* Scrollable Content */}
                    <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                        
                        {/* 1. ข้อมูลพื้นฐาน */}
                        <div className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">ชื่อสินค้า</label>
                                <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="ระบุชื่อสินค้า..." className="w-full px-4 py-3.5 bg-white rounded-2xl text-sm font-bold text-gray-700 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm placeholder-gray-300"/>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">ราคา (บาท)</label>
                                    <div className="relative">
                                        <input type="number" value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="w-full pl-4 pr-4 py-3.5 bg-white rounded-2xl text-lg font-black text-indigo-600 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm" placeholder="0"/>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">สต็อก (ชิ้น)</label>
                                    <input type="number" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} className="w-full px-4 py-3.5 bg-white rounded-2xl text-lg font-black text-gray-700 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm" placeholder="0"/>
                                </div>
                            </div>
                        </div>

                        {/* Divider */}
                        <div className="border-t border-dashed border-gray-200"></div>

// --- QR Scanner Modal (Fixed: Visible Buttons & Z-Index) ---
    const QRScannerModal = ({ isOpen, onClose, onScan }) => {
      useScrollLock(isOpen);
      useEffect(() => {
        if (!isOpen) return;
        let html5QrcodeScanner;
        
        const timeout = setTimeout(() => { 
            try { 
                // สร้าง Scanner
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader", 
                    { 
                        fps: 10, 
                        qrbox: { width: 250, height: 250 },
                        aspectRatio: 1.0,
                        showTorchButtonIfSupported: true 
                    }, 
                    false
                ); 
                
                html5QrcodeScanner.render((decodedText) => { 
                    onScan(decodedText); 
                    // ปิดและเคลียร์ทันทีเมื่อเจอ
                    html5QrcodeScanner.clear().catch(err => console.error(err)); 
                    onClose(); 
                }, (errorMessage) => {
                    // scanning...
                }); 
            } catch (e) {
                console.error("Scanner Error", e);
            } 
        }, 100);

        return () => { 
            clearTimeout(timeout); 
            if (html5QrcodeScanner) { 
                try { html5QrcodeScanner.clear(); } catch(e){} 
            } 
        };
      }, [isOpen]);

      if (!isOpen) return null;

      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm animate-fade-in">
            {/* Inject CSS เฉพาะส่วนนี้ เพื่อกู้คืนปุ่มที่หายไป */}
            <style>{`
                #reader { border: none !important; }
                #reader button { 
                    background-color: #2563EB !important; 
                    color: white !important; 
                    padding: 8px 16px !important; 
                    border-radius: 8px !important; 
                    border: none !important; 
                    margin-top: 10px !important;
                    font-weight: bold !important;
                    cursor: pointer !important;
                }
                #reader button:hover { background-color: #1D4ED8 !important; }
                #reader select {
                    padding: 5px !important;
                    border: 1px solid #ccc !important;
                    border-radius: 5px !important;
                    margin-bottom: 10px !important;
                    color: black !important;
                    background: white !important;
                }
                #reader span, #reader a {
                    color: #4b5563 !important; /* สีเทาเข้ม */
                }
            `}</style>

            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
                <button onClick={onClose} className="absolute -top-4 -right-4 w-10 h-10 flex items-center justify-center rounded-full bg-red-500 text-white shadow-lg hover:bg-red-600 z-10 transition-transform hover:scale-110">
                    <Icon name="x" weight="bold" size={20}/>
                </button>
                
                <h3 className="text-center font-bold text-gray-800 mb-4 text-lg">สแกน QR Code</h3>
                
                {/* พื้นที่แสดงกล้อง (เอา bg-black ออก เพื่อให้เห็นปุ่ม Request Permission) */}

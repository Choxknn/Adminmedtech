<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin System - Firebase Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#2563EB', secondary: '#64748B', background: '#F8FAFC', surface: '#FFFFFF' },
          fontFamily: { sans: ['Inter', 'Sarabun', 'sans-serif'] },
          animation: {
            'scale-in': 'scaleIn 0.2s ease-out forwards',
            'check-bounce': 'checkBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'fade-in': 'fadeIn 0.2s ease-out forwards',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
            'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            checkBounce: { '0%': { transform: 'scale(0)' }, '50%': { transform: 'scale(1.2)' }, '100%': { transform: 'scale(1)' } },
            shake: { '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' }, '20%, 80%': { transform: 'translate3d(2px, 0, 0)' }, '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' }, '40%, 60%': { transform: 'translate3d(4px, 0, 0)' } }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@300;400;500;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ✅ 1. Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCI12dWCOkpRbdr-TFtZjNQhRKvdmj4g6k",
      authDomain: "medtechptu67-payment.firebaseapp.com",
      databaseURL: "https://medtechptu67-payment-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "medtechptu67-payment",
      storageBucket: "medtechptu67-payment.firebasestorage.app",
      messagingSenderId: "452330902364",
      appId: "1:452330902364:web:f92236a62500144531a799",
      measurementId: "G-7WQWLGFSC0"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const storage = firebase.storage();

    // ✅ 2. GAS URL สำหรับส่ง LINE Notify
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwbNYCsHz7sxUx4TmjU2qiATY0oLmRC-XCOaPaLoPkiRlBZ2KHH95LDTx36JODNaeEkxw/exec";

    const notifyGas = async (action, data) => {
        try {
            await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: action, data: [data] })
            });
        } catch (e) { console.error("Notify Error:", e); }
    };

    const uploadToStorage = async (base64Str, folder, fileName) => {
        if (!base64Str) return '';
        const ref = storage.ref().child(`${folder}/${fileName}`);
        await ref.putString(base64Str, 'base64', { contentType: 'image/jpeg' });
        return await ref.getDownloadURL();
    };

    // --- COMMON HELPERS & COMPONENTS ---
    const useScrollLock = (isOpen) => {
      useEffect(() => { document.body.style.overflow = isOpen ? 'hidden' : 'unset'; return () => { document.body.style.overflow = 'unset'; }; }, [isOpen]);
    };

    const getStatusColor = (status) => {
      if (!status) return 'bg-gray-100 text-gray-600';
      switch(status) {
        case 'ชำระแล้ว': return 'bg-green-100 text-green-700';
        case 'รอตรวจสอบ': return 'bg-yellow-100 text-yellow-700';
        case 'ON': return 'bg-green-100 text-green-700';
        case 'OFF': return 'bg-red-100 text-red-700';
        case 'OUT': return 'bg-gray-200 text-gray-500';
        case 'อยู่ระหว่างสั่งซื้อ': return 'bg-blue-100 text-blue-700';
        case 'อยู่ระหว่างผลิต': return 'bg-purple-100 text-purple-700';
        case 'รับแล้ว': return 'bg-green-100 text-green-700';
        default: return 'bg-gray-100 text-gray-600';
      }
    };

    const calculateFine = (bill) => {
      if (bill.status === 'ชำระแล้ว' || !bill.dueDate) return 0;
      const due = new Date(bill.dueDate); due.setHours(0, 0, 0, 0);
      const now = new Date(); now.setHours(0, 0, 0, 0);
      if (now <= due) return 0;
      const diffTime = now - due;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      let fine = diffDays * (bill.finePerDay || 0);
      if (bill.maxFine && fine > bill.maxFine) fine = bill.maxFine;
      return fine;
    };

    const formatDate = (dateString) => {
        if (!dateString) return '';
        const date = new Date(dateString);
        if (date.getFullYear() > 2400) date.setFullYear(date.getFullYear() - 543);
        return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
    };

    const formatDateForInput = (dateStr) => {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return '';
        return d.toISOString().split('T')[0];
    };

    const isDateInRange = (dateStr, startStr, endStr) => {
        if (!dateStr) return false;
        const target = new Date(dateStr); target.setHours(0,0,0,0);
        const start = startStr ? new Date(startStr) : null; if(start) start.setHours(0,0,0,0);
        const end = endStr ? new Date(endStr) : null; if(end) end.setHours(0,0,0,0);
        if (start && target < start) return false;
        if (end && target > end) return false;
        return true;
    };

    const Icon = ({ name, size = 24, className = "", weight="regular" }) => {
        const weightClass = weight === 'regular' ? 'ph' : `ph-${weight}`;
        return <i className={`${weightClass} ph-${name} ${className}`} style={{ fontSize: size }}></i>;
    };

    const Spinner = () => (<div className="flex justify-center items-center py-10"><Icon name="circle-notch" className="animate-spin text-primary" size={32} weight="bold" /></div>);
    const LoadingOverlay = () => (<div className="fixed inset-0 z-[300] bg-black/30 backdrop-blur-sm flex items-center justify-center animate-fade-in"><div className="bg-white p-6 rounded-2xl shadow-2xl flex flex-col items-center gap-4"><div className="relative"><div className="w-12 h-12 border-4 border-blue-100 rounded-full"></div><div className="absolute top-0 left-0 w-12 h-12 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div></div><span className="text-sm font-bold text-gray-600 animate-pulse">กำลังประมวลผล...</span></div></div>);
    const ConfirmModal = ({ isOpen, onClose, onConfirm, title, message, loading, confirmText = "ยืนยัน", isDestructive = true }) => {
        useScrollLock(isOpen);
        if (!isOpen) return null;
        return ReactDOM.createPortal(
            <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in">
                <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl animate-scale-in text-center">
                    <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${isDestructive ? 'bg-red-50 text-red-500' : 'bg-blue-50 text-primary'}`}>
                        {loading ? <Icon name="circle-notch" className="animate-spin" size={32} weight="bold" /> : <Icon name={isDestructive ? "trash" : "paper-plane-right"} size={32} weight="fill" />}
                    </div>
                    <h3 className="text-xl font-bold text-gray-800 mb-2">{title}</h3>
                    <p className="text-sm text-gray-500 mb-6 whitespace-pre-line">{message}</p>
                    <div className="flex gap-3">
                    <button onClick={onClose} disabled={loading} className="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-bold hover:bg-gray-50 transition disabled:opacity-50">ยกเลิก</button>
                    <button onClick={onConfirm} disabled={loading} className={`flex-1 py-3 rounded-xl text-white font-bold shadow-lg transition flex justify-center items-center gap-2 disabled:opacity-70 ${isDestructive ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                        {loading ? <><Icon name="circle-notch" className="animate-spin" weight="bold"/> รอสักครู่</> : confirmText}
                    </button>
                    </div>
                </div>
            </div>, document.body
        );
    };
    const StatCard = ({ title, value, icon, gradient, onClick, alert, variant = 'default' }) => {
      let bgClass = "bg-white";
      if (alert) { if (variant === 'warning') bgClass = "bg-amber-50"; else if (variant === 'danger') bgClass = "bg-red-50"; }
      let blinkingBorder = null;
      if (alert && variant !== 'default') { blinkingBorder = <div className={`absolute inset-0 rounded-2xl border-2 ${variant === 'warning' ? 'border-amber-400' : 'border-red-400'} animate-pulse pointer-events-none`}></div>; }
      return (
        <div onClick={onClick} className={`${bgClass} p-4 rounded-2xl card-shadow flex items-center space-x-4 relative ${onClick ? 'cursor-pointer active:scale-95 transition-transform' : ''}`}>
          {blinkingBorder}
          {alert && (<span className="absolute top-3 right-3 flex h-3 w-3"><span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${variant === 'warning' ? 'bg-amber-400' : 'bg-red-400'}`}></span><span className={`relative inline-flex rounded-full h-3 w-3 border-2 border-white ${variant === 'warning' ? 'bg-amber-500' : 'bg-red-500'}`}></span></span>)}
          <div className={`p-3.5 rounded-2xl bg-gradient-to-br ${gradient} text-white shadow-md relative z-10`}><Icon name={icon} size={26} weight="duotone" /></div>
          <div className="relative z-10"><p className={`text-xs font-medium ${alert && variant !== 'default' ? 'text-gray-700 font-bold' : 'text-gray-400'}`}>{title}</p><h3 className={`text-xl font-bold ${alert && variant === 'danger' ? 'text-red-700' : (alert && variant === 'warning' ? 'text-amber-700' : 'text-gray-800')}`}>{value}</h3></div>
        </div>
      );
    };
    const DateRangeFilter = ({ startDate, endDate, onChange, isActive, onToggle }) => (
      <div className="bg-white p-3 rounded-xl card-shadow mb-4 animate-fade-in border border-gray-100">
         <div className="flex items-center justify-between mb-2 pb-2 border-b border-gray-50">
             <div className="flex items-center gap-2"><Icon name="calendar-blank" size={18} className="text-primary"/><span className="text-xs font-bold text-gray-700">กรองตามช่วงเวลา</span></div>
             <button onClick={onToggle} className={`w-10 h-6 rounded-full p-1 transition-colors duration-200 ease-in-out focus:outline-none flex items-center ${isActive ? 'bg-primary' : 'bg-gray-200'}`}><div className={`bg-white w-4 h-4 rounded-full shadow-sm transform transition-transform duration-200 ease-in-out ${isActive ? 'translate-x-4' : 'translate-x-0'}`}/></button>
         </div>
         <div className={`grid grid-cols-2 gap-2 transition-all duration-300 ${isActive ? 'opacity-100' : 'opacity-40 pointer-events-none grayscale'}`}>
             <div><label className="block text-[10px] text-gray-400 font-bold mb-0.5 ml-1">ตั้งแต่วันที่</label><input type="date" value={startDate} disabled={!isActive} onChange={e => onChange('start', e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-lg py-0 px-2 text-xs outline-none focus:ring-1 focus:ring-primary text-gray-600 font-medium h-8"/></div>
             <div><label className="block text-[10px] text-gray-400 font-bold mb-0.5 ml-1">ถึงวันที่</label><input type="date" value={endDate} disabled={!isActive} onChange={e => onChange('end', e.target.value)} className="w-full bg-gray-50 border border-gray-200 rounded-lg py-0 px-2 text-xs outline-none focus:ring-1 focus:ring-primary text-gray-600 font-medium h-8"/></div>
         </div>
      </div>
    );
    const ScrollToTopBottom = () => {
      const [showBtn, setShowBtn] = useState(false);
      useEffect(() => { const checkScroll = () => setShowBtn(window.scrollY > 300); window.addEventListener('scroll', checkScroll); return () => window.removeEventListener('scroll', checkScroll); }, []);
      if (!showBtn) return null;
      return (<button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="fixed bottom-24 right-4 z-50 w-11 h-11 bg-primary/90 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 transition-all hover:-translate-y-1 animate-fade-in"><Icon name="arrow-up" weight="bold" size={20}/></button>);
    };
    const ImageModal = ({ isOpen, onClose, imageUrl }) => {
      useScrollLock(isOpen);
      if (!isOpen || !imageUrl) return null;
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fade-in" onClick={onClose}>
          <div className="relative max-w-full max-h-full" onClick={e => e.stopPropagation()}>
             <button onClick={onClose} className="absolute -top-12 right-0 md:-right-12 text-white hover:text-gray-300 transition p-2 bg-black/20 rounded-full"><Icon name="x" size={24} weight="bold"/></button>
             <img src={imageUrl} alt="Slip" className="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain bg-white" />
          </div>
        </div>, document.body
      );
    };
    const Modal = ({ isOpen, onClose, title, children, hideClose = false, zIndex = "z-[110]" }) => {
      useScrollLock(isOpen);
      if (!isOpen) return null;
      return ReactDOM.createPortal(
        <div className={`fixed inset-0 ${zIndex} flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in`}>
          <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl transform transition-all scale-100 animate-scale-in max-h-[90vh] flex flex-col">
            {!hideClose && (<div className="flex justify-between items-center p-4 border-b border-gray-100 bg-white flex-shrink-0"><h3 className="font-bold text-lg text-gray-800">{title}</h3><button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:text-red-500 transition-colors"><Icon name="x" size={20} weight="bold" /></button></div>)}
            <div className="p-4 overflow-y-auto flex-1">{children}</div>
          </div>
        </div>, document.body
      );
    };
    const ErrorModal = ({ isOpen, onClose, message }) => {
      useScrollLock(isOpen);
      if (!isOpen) return null;
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[130] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm animate-fade-in"><div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl animate-shake text-center border-t-4 border-red-500"><div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse"><Icon name="warning-circle" size={32} weight="fill" className="text-red-500" /></div><h3 className="text-xl font-bold text-gray-800 mb-2">เกิดข้อผิดพลาด</h3><p className="text-sm text-gray-500 mb-6 font-medium text-red-600">{message}</p><button onClick={onClose} className="w-full py-3 rounded-xl bg-red-500 text-white font-bold shadow-lg shadow-red-200 hover:bg-red-600 transition">ตกลง</button></div></div>, document.body
      );
    };
    const SuccessScreen = () => (<div className="fixed inset-0 z-[120] flex items-center justify-center bg-black/40 backdrop-blur-sm"><div className="bg-white rounded-3xl p-8 flex flex-col items-center justify-center shadow-2xl animate-scale-in min-w-[200px]"><div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4 animate-check-bounce"><Icon name="check" size={48} weight="bold" className="text-green-600" /></div><h3 className="text-xl font-bold text-gray-800">เรียบร้อย</h3><p className="text-sm text-gray-500 mt-1">บันทึกข้อมูลสำเร็จแล้ว</p></div></div>);

    const StudentMultiSelect = ({ students, selectedIds, onChange }) => {
      const [isOpen, setIsOpen] = useState(false);
      const [studentSearch, setStudentSearch] = useState(''); 
      const filteredStudents = useMemo(() => {
        if (!studentSearch) return students;
        const term = studentSearch.toLowerCase();
        return students.filter(s => s.name.toLowerCase().includes(term) || String(s.id).includes(term));
      }, [students, studentSearch]);

      const toggleStudent = (id) => onChange(selectedIds.includes(id) ? selectedIds.filter(sid => sid !== id) : [...selectedIds, id]);
      const toggleSelectAllFiltered = () => {
        const filteredIds = filteredStudents.map(s => s.id);
        const isAllFilteredSelected = filteredIds.every(id => selectedIds.includes(id));
        onChange(isAllFilteredSelected ? selectedIds.filter(id => !filteredIds.includes(id)) : [...new Set([...selectedIds, ...filteredIds])]);
      };

      return (
        <div className="relative">
          <button type="button" onClick={() => setIsOpen(!isOpen)} className="w-full p-3 border border-gray-200 rounded-xl bg-white outline-none text-left flex justify-between items-center transition h-[46px]">
            <span className={`text-sm font-bold truncate ${selectedIds.length > 0 ? 'text-blue-700' : 'text-gray-400'}`}>{selectedIds.length === 0 ? "-- เลือกนักศึกษา --" : `เลือกแล้ว ${selectedIds.length} คน`}</span>
            <Icon name={isOpen ? "caret-up" : "caret-down"} className="text-gray-400" weight="bold"/>
          </button>
          {isOpen && (
            <>
                <div className="fixed inset-0 z-10" onClick={() => setIsOpen(false)}></div>
                <div className="absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-2xl shadow-xl flex flex-col animate-fade-in overflow-hidden">
                    <div className="p-2 border-b border-gray-100 bg-gray-50 flex gap-2">
                        <div className="relative flex-1">
                            <input type="text" placeholder="ค้นหาชื่อ หรือ รหัส..." value={studentSearch} onChange={(e) => setStudentSearch(e.target.value)} className="w-full pl-7 pr-2 py-1.5 text-sm border rounded-lg outline-none" autoFocus />
                            <Icon name="magnifying-glass" className="absolute left-2 top-2.5 text-gray-400" size={14}/>
                        </div>
                        <button type="button" onClick={toggleSelectAllFiltered} className="px-3 py-1.5 bg-blue-100 text-blue-600 rounded-lg text-[10px] font-bold whitespace-nowrap">เลือกที่ค้นหา</button>
                        <button type="button" onClick={()=>onChange([])} className="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-lg text-[10px] font-bold whitespace-nowrap">ล้างค่า</button>
                    </div>
                    <div className="max-h-56 overflow-y-auto custom-scrollbar p-1">
                        {filteredStudents.map(s => {
                            const isSelected = selectedIds.includes(s.id);
                            return (
                                <div key={s.id} className={`p-2.5 flex items-center gap-3 cursor-pointer rounded-xl transition-colors ${isSelected ? 'bg-blue-50' : 'hover:bg-gray-50'}`} onClick={() => toggleStudent(s.id)}>
                                    <div className={`w-5 h-5 rounded-md flex items-center justify-center border flex-shrink-0 ${isSelected ? 'bg-primary border-primary' : 'bg-white border-gray-300'}`}>{isSelected && <Icon name="check" className="text-white" size={12} weight="bold" />}</div>
                                    <div className="flex-1 min-w-0"><div className={`text-sm font-bold truncate ${isSelected ? 'text-blue-700' : 'text-gray-800'}`}>{s.name}</div><div className="text-[10px] text-gray-400 font-mono">{s.id}</div></div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            </>
          )}
        </div>
      );
    };

    // ==========================================
    // 🟢 SUB-COMPONENTS (แก้ไขเอา apiCall ออก)
    // ==========================================
    
    const DashboardView = ({ data, setActiveTab, setAnnounceForm, setIsAnnounceModalOpen, setIsQrModalOpen, onOpenQrManager, onEditQr, onGoToOverdue, onGoToOverdueBills, onGoToUnpaidBills, processingAction, setProcessingAction, onViewImage, onToggleSystemStatus }) => {
        const [isDateFilterActive, setIsDateFilterActive] = useState(false);
        const [dateFilter, setDateFilter] = useState(() => {
            const end = new Date(); const start = new Date(end.getFullYear(), end.getMonth(), 1); 
            return { start: formatDateForInput(start), end: formatDateForInput(end) };
        });

        const [confirmModal, setConfirmModal] = useState({ isOpen: false, targetStatus: '' });
        const [isToggling, setIsToggling] = useState(false); 
        const [successModal, setSuccessModal] = useState(false);

        const handleDateChange = (type, value) => { setDateFilter(prev => ({ ...prev, [type]: value })); };

        const totalBalance = useMemo(() => { 
            if (!isDateFilterActive) return data.finance.reduce((sum, item) => sum + (item.type === 'รายรับ' ? Number(item.amount) : 0), 0) - data.finance.reduce((sum, item) => sum + (item.type === 'รายจ่าย' ? Number(item.amount) : 0), 0);
            return data.finance.filter(h => isDateInRange(h.date, dateFilter.start, dateFilter.end)).reduce((sum, item) => sum + (item.type === 'รายรับ' ? Number(item.amount) : -Number(item.amount)), 0); 
        }, [data.finance, dateFilter, isDateFilterActive]);

        const pendingBillsCount = useMemo(() => data.bills.filter(b => b.status === 'รอตรวจสอบ').length, [data.bills]);
        const allUnpaidCount = useMemo(() => data.bills.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ').length, [data.bills]);
        const allOverdueCount = useMemo(() => { const today = new Date(); today.setHours(0,0,0,0); return data.bills.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; return new Date(b.dueDate) < today; }).length; }, [data.bills]);
        const qrCodes = data.amount.qrCodes || [];
        const isMaintenance = data.systemStatus === 'ON'; 

        const rawAnnounce = String(data.announcement || '').trim();
        const isImageAnnounce = rawAnnounce.startsWith('http://') || rawAnnounce.startsWith('https://');
        const getDirectImageUrl = (url) => { const idMatch = url.match(/id=([a-zA-Z0-9_-]+)/); if (idMatch) return `https://lh3.googleusercontent.com/d/$${idMatch[1]}`; return url; };
        const announceContent = isImageAnnounce ? getDirectImageUrl(rawAnnounce) : rawAnnounce;

        const handleSwitchClick = () => {
            if (isToggling) return; 
            setConfirmModal({ isOpen: true, targetStatus: isMaintenance ? 'OFF' : 'ON' });
        };

        // ✅ แก้ไขตรงนี้ให้เรียก Props ไปหา App ทันที แทนการใช้ apiCall
        const confirmToggle = async () => {
            setIsToggling(true); 
            setConfirmModal({ ...confirmModal, isOpen: false });
            try {
                await onToggleSystemStatus(confirmModal.targetStatus);
                setSuccessModal(true);
            } catch (err) {

          <div className="space-y-6 animate-fade-in pb-24 relative">
            <ScrollToTopBottom />
            <div className="flex justify-between items-center px-2 pt-2">

                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 p-0.5 shadow-md"><div className="w-full h-full bg-white rounded-full flex items-center justify-center"><Icon name="user" weight="bold" className="text-indigo-500"/></div></div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mx-1">
                <div className={`p-4 rounded-2xl card-shadow border border-gray-100 flex justify-between items-center relative overflow-hidden transition-colors duration-500 ${isMaintenance ? 'bg-red-50' : 'bg-white'}`}>
                     <div className={`absolute top-0 right-0 w-32 h-32 rounded-full blur-3xl -translate-y-10 translate-x-10 opacity-30 transition-colors duration-500 ${isMaintenance ? 'bg-red-500' : 'bg-green-400'}`}></div>
                     <div className="relative z-10">
                         <h3 className="font-bold text-gray-800 text-sm md:text-base flex items-center gap-2">โหมดปรับปรุงระบบ: <span className={`px-2 py-0.5 rounded-lg text-[10px] font-bold transition-colors ${isMaintenance ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}`}>{isMaintenance ? '🔴 เปิดใช้งาน (ON)' : '⚪️ ปิด (OFF)'}</span></h3>
                         <p className="text-xs text-gray-500 mt-1">{isMaintenance ? '⛔️ ระบบถูกปิดกั้นการเข้าถึง' : '✅ นักศึกษาเข้าใช้งานได้ปกติ'}</p>
                     </div>
                     <div onClick={handleSwitchClick} className={`relative z-10 w-14 h-8 rounded-full p-1 cursor-pointer transition-colors duration-300 ease-in-out shadow-inner flex items-center ${isToggling ? 'opacity-70 cursor-not-allowed' : ''} ${isMaintenance ? 'bg-red-500' : 'bg-gray-300'}`}>
                         <div className={`w-6 h-6 bg-white rounded-full shadow-md transform transition-transform duration-300 flex items-center justify-center ${isMaintenance ? 'translate-x-6' : 'translate-x-0'}`}>{isToggling ? <Icon name="spinner" className="animate-spin text-gray-400" size={12} weight="bold"/> : <Icon name={isMaintenance ? "prohibit" : "check"} className={isMaintenance ? "text-red-500" : "text-gray-400"} size={12} weight="bold"/>}</div>
                     </div>
                </div>

                <div className="bg-white p-4 rounded-2xl card-shadow border border-blue-100 flex flex-col gap-2 relative overflow-hidden">
                    <div className="flex justify-between items-center mb-1">
                        <div className="flex items-center gap-2"><div className="bg-blue-50 text-blue-600 p-1.5 rounded-lg"><Icon name="megaphone" weight="fill" size={16}/></div><h3 className="font-bold text-gray-800 text-sm">ประกาศจากระบบ</h3></div>
                        <button onClick={() => { setAnnounceForm({ type: isImageAnnounce ? 'image' : 'text', text: isImageAnnounce ? '' : rawAnnounce, fileBase64: '', preview: isImageAnnounce ? announceContent : '' }); setIsAnnounceModalOpen(true); }} className="text-gray-400 hover:text-blue-600 transition bg-gray-50 hover:bg-blue-50 p-1.5 rounded-lg"><Icon name="pencil-simple" weight="bold" size={14}/></button>
                    </div>
                    {isImageAnnounce ? (

                    ) : (
                        <div className="bg-blue-50/50 p-3 rounded-xl border border-blue-50 min-h-[60px] flex items-center"><p className="text-xs text-gray-600 leading-relaxed whitespace-pre-wrap line-clamp-3">{announceContent || "ไม่มีประกาศในขณะนี้..."}</p></div>
                    )}
                </div>
            </div>

            <div className="space-y-3 pt-2">
                <div className="flex justify-between items-center px-2">
                    <h3 className="text-gray-800 font-bold text-lg">ภาพรวมระบบ</h3>
                    <button onClick={() => setIsDateFilterActive(!isDateFilterActive)} className={`text-xs font-bold flex items-center gap-1 transition ${isDateFilterActive ? 'text-primary bg-blue-50 px-2 py-1 rounded-lg' : 'text-gray-400'}`}><Icon name="calendar" weight="bold"/> {isDateFilterActive ? 'ปิดตัวกรอง' : 'กรองวันที่'}</button>
                </div>
                <div className={`overflow-hidden transition-all duration-300 ${isDateFilterActive ? 'max-h-24 opacity-100' : 'max-h-0 opacity-0'}`}><DateRangeFilter startDate={dateFilter.start} endDate={dateFilter.end} onChange={handleDateChange} isActive={isDateFilterActive} onToggle={() => {}} /></div>
                
                <div className="grid grid-cols-2 gap-3">
                    <div className="col-span-2 bg-gradient-to-r from-emerald-500 to-teal-500 p-5 rounded-3xl card-shadow flex items-center justify-between relative overflow-hidden text-white shadow-emerald-200">
                        <div className="absolute right-0 top-0 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl -translate-y-10 translate-x-10"></div>
                        <div className="relative z-10"><p className="text-emerald-100 text-xs font-bold mb-1">{isDateFilterActive ? "รายรับ (ตามช่วงเวลา)" : "รายรับทั้งหมด"}</p><h2 className="text-3xl font-black tracking-tight">฿{Number(totalBalance).toLocaleString()}</h2></div>
                        <div className="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur-sm text-white flex items-center justify-center relative z-10 shadow-inner"><Icon name="wallet" weight="fill" size={24}/></div>
                    </div>
                    <StatCard title="รอตรวจสอบ" value={pendingBillsCount} icon="clock-clockwise" gradient="from-amber-400 to-amber-500" onClick={() => setActiveTab('pending')} alert={pendingBillsCount > 0} variant="warning" />
                    <StatCard title="ค้างชำระ" value={allUnpaidCount} icon="receipt" gradient="from-blue-400 to-blue-500" onClick={onGoToUnpaidBills} />
                    <div className="col-span-2"><StatCard title="เกินกำหนดชำระ" value={`${allOverdueCount} รายการ`} icon="warning-circle" gradient="from-red-400 to-red-500" onClick={onGoToOverdueBills} alert={allOverdueCount > 0} variant="danger" /></div>
                </div>
            </div>

            <div className="pt-2">
                <div className="flex justify-between items-center px-2 mb-3"><h3 className="text-gray-800 font-bold text-lg flex items-center gap-2"><Icon name="qr-code" className="text-primary"/> บัญชีรับเงิน</h3><button onClick={onOpenQrManager} className="text-primary text-xs font-bold bg-blue-50 px-3 py-1.5 rounded-full hover:bg-blue-100 transition">จัดการ QR</button></div>
                {qrCodes.length > 0 ? (
                    <div className="flex gap-4 overflow-x-auto no-scrollbar pb-4 px-2 snap-x">
                        {qrCodes.map((qr, idx) => (
                            <div key={idx} className="snap-center min-w-[260px] h-[160px] bg-gradient-to-br from-gray-800 to-gray-900 rounded-3xl p-4 text-white relative shadow-lg flex flex-col justify-between group">
                                <div className="absolute top-0 right-0 w-24 h-24 bg-white/5 rounded-full blur-2xl -translate-y-4 translate-x-4"></div>
                                <div className="flex justify-between items-start z-10"><div className="bg-white/10 backdrop-blur-md p-1.5 rounded-xl border border-white/10"><Icon name="qr-code" size={20} className="text-white"/></div><div className="text-right"><p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider">AMOUNT</p><p className="text-lg font-bold">฿{Number(qr.amount).toLocaleString()}</p></div></div>
                                <div className="flex gap-4 items-center z-10 mt-2"><div className="w-16 h-16 bg-white p-1 rounded-xl"><img src={qr.url} className="w-full h-full object-contain mix-blend-multiply" alt="QR"/></div><div className="flex-1"><button onClick={() => onEditQr(qr)} className="w-full py-2 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-lg text-xs font-bold transition border border-white/5">แก้ไข / ลบ</button></div></div>
                            </div>
                        ))}
                        <button onClick={onOpenQrManager} className="snap-center min-w-[100px] h-[160px] bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl flex flex-col items-center justify-center text-gray-400 hover:text-primary hover:border-primary/50 hover:bg-blue-50 transition gap-2"><div className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center"><Icon name="plus" weight="bold"/></div><span className="text-xs font-bold">เพิ่มบัญชี</span></button>
                    </div>
                ) : (
                    <div className="bg-gray-50 border-2 border-dashed border-gray-200 rounded-3xl p-8 flex flex-col items-center justify-center text-gray-400 gap-3"><Icon name="wallet" size={48} className="opacity-30" weight="duotone"/><p className="text-sm">ยังไม่มีบัญชีรับเงิน</p><button onClick={onOpenQrManager} className="px-4 py-2 bg-white border border-gray-200 shadow-sm rounded-xl text-xs font-bold hover:bg-gray-100 transition">เพิ่ม QR Code แรก</button></div>
                )}
            </div>

            <Modal isOpen={confirmModal.isOpen} onClose={() => setConfirmModal({ isOpen: false, targetStatus: '' })} title="ยืนยันการเปลี่ยนสถานะ" zIndex="z-[100]">
                <div className="text-center pt-2 space-y-4">
                    <div className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center ${confirmModal.targetStatus === 'ON' ? 'bg-red-100 text-red-500' : 'bg-green-100 text-green-500'}`}><Icon name="power" weight="fill" size={32}/></div>
                    <div><h3 className="font-bold text-gray-800 text-lg">{confirmModal.targetStatus === 'ON' ? 'ต้องการ "ปิดปรับปรุงระบบ" ใช่หรือไม่?' : 'ต้องการ "เปิดใช้งานระบบ" ใช่หรือไม่?'}</h3><p className="text-sm text-gray-500 mt-2">{confirmModal.targetStatus === 'ON' ? 'นักศึกษาจะไม่สามารถเข้าสู่ระบบได้ชั่วคราว' : 'นักศึกษาจะสามารถกลับมาเข้าใช้งานได้ตามปกติ'}</p></div>
                    <div className="flex gap-3 pt-2">
                        <button onClick={() => setConfirmModal({ isOpen: false, targetStatus: '' })} className="flex-1 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">ยกเลิก</button>
                        <button onClick={confirmToggle} className={`flex-1 py-3 text-white font-bold rounded-xl shadow-lg transition ${confirmModal.targetStatus === 'ON' ? 'bg-red-600 hover:bg-red-700 shadow-red-200' : 'bg-green-600 hover:bg-green-700 shadow-green-200'}`}>ยืนยัน</button>
                    </div>
                </div>
            </Modal>

            <Modal isOpen={successModal} onClose={() => setSuccessModal(false)} title="เรียบร้อย" zIndex="z-[110]">
                <div className="text-center pt-2 space-y-4">
                    <div className="w-16 h-16 mx-auto rounded-full flex items-center justify-center bg-green-100 text-green-500"><Icon name="check-circle" weight="fill" size={32}/></div>
                    <div><h3 className="font-bold text-gray-800 text-lg">ดำเนินการเรียบร้อย</h3><p className="text-sm text-gray-500 mt-1">สถานะระบบถูกเปลี่ยนแปลงแล้ว</p></div>
                    <button onClick={() => setSuccessModal(false)} className="w-full py-3 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 shadow-lg shadow-green-200 transition">ตกลง</button>
                </div>
            </Modal>
          </div>
        );
    };

    // ✅ แก้ไขส่วนนี้ เอา apiCall ออก แล้วส่งต่อให้ App แทน
    const QrCodeModal = ({ isOpen, onClose, qrUrls, onSave, onDelete, loading, initialEditQr }) => {
        const [mode, setMode] = useState('list'); 
        const [uploadFile, setUploadFile] = useState(null);
        const [previewUrl, setPreviewUrl] = useState('');
        const [newAmount, setNewAmount] = useState('');
        const [isUploading, setIsUploading] = useState(false);
        const [editTargetUrl, setEditTargetUrl] = useState(null); 

        useEffect(() => {
            if (isOpen) { if (initialEditQr) { startEdit(initialEditQr); } else { resetForm(); setMode('list'); } }
        }, [isOpen, initialEditQr]);

        const resetForm = () => { setUploadFile(null); setPreviewUrl(''); setNewAmount(''); setEditTargetUrl(null); setIsUploading(false); };
        const handleFileChange = (e) => { const file = e.target.files[0]; if (file) { setUploadFile(file); const reader = new FileReader(); reader.onloadend = () => setPreviewUrl(reader.result); reader.readAsDataURL(file); } };
        const startEdit = (qr) => { setMode('edit'); setEditTargetUrl(qr.url); setNewAmount(qr.amount); setPreviewUrl(qr.url); setUploadFile(null); };
        const goToAdd = () => { resetForm(); setMode('add'); };
        const goBack = () => { resetForm(); setMode('list'); };

        const handleSave = () => {
            if (!newAmount) return;
            setIsUploading(true);

            const finalize = (b64) => {
                onSave({ fileBase64: b64, newAmount, oldUrl: editTargetUrl })
                .then(() => { setIsUploading(false); resetForm(); if(initialEditQr) onClose(); else setMode('list'); })
                .catch(err => { setIsUploading(false); alert("Error: " + err.message); });
            };

            if (uploadFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement("img");
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");
                        const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7).split(',')[1];
                        finalize(compressedBase64);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(uploadFile);
            } else {
                if (mode === 'edit' && editTargetUrl) { finalize(null); } 
                else { alert("กรุณาเลือกรูปภาพ"); setIsUploading(false); }
            }
        };

        if (!isOpen) return null;

        return (
            <Modal isOpen={isOpen} onClose={onClose} title={mode === 'list' ? "จัดการ QR Code" : (mode === 'add' ? "เพิ่ม QR Code" : "แก้ไข QR Code")}>
                {mode === 'list' && (
                    <div className="space-y-4 animate-fade-in">
                        <button onClick={goToAdd} className="w-full py-3 bg-blue-50 text-primary border border-blue-200 rounded-xl flex items-center justify-center gap-2 font-bold hover:bg-blue-100 transition"><Icon name="plus-circle" size={20} weight="bold"/> เพิ่ม QR Code ใหม่</button>
                        <div className="border-t border-gray-100 my-2"></div>
                        <div><h4 className="text-sm font-bold text-gray-500 mb-3 flex items-center gap-2"><Icon name="images" className="text-gray-400"/> รายการที่มีอยู่ ({qrUrls.length})</h4>
                            {qrUrls.length === 0 ? (<div className="flex flex-col items-center justify-center text-gray-400 py-10 bg-gray-50 rounded-xl border border-dashed border-gray-200"><Icon name="image-broken" size={48} className="mb-2 opacity-50"/><span className="text-sm">ยังไม่มี QR Code ในระบบ</span></div>) : (
                                <div className="grid grid-cols-2 gap-3 max-h-[400px] overflow-y-auto pr-1 pb-2">
                                    {qrUrls.map((qr, idx) => (
                                        <div key={idx} className="relative group rounded-xl border border-gray-200 overflow-hidden bg-white flex flex-col shadow-sm hover:shadow-md transition">
                                            <div className="aspect-square flex items-center justify-center p-4 bg-gray-50"><img src={qr.url} alt="QR" className="max-h-full max-w-full object-contain mix-blend-multiply" /></div>
                                            <div className="bg-white p-3 text-center border-t border-gray-100"><span className="text-sm font-bold text-gray-700">฿{Number(qr.amount).toLocaleString()}</span></div>
                                            <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3 backdrop-blur-sm">
                                                <button onClick={() => startEdit(qr)} className="bg-white text-blue-600 p-2.5 rounded-full hover:bg-blue-50 transition transform hover:scale-110 shadow-lg" title="แก้ไข"><Icon name="pencil-simple" weight="bold" size={20} /></button>
                                                <button onClick={() => { if(confirm('ต้องการลบใช่หรือไม่?')) onDelete(qr.url); }} className="bg-white text-red-500 p-2.5 rounded-full hover:bg-red-50 transition transform hover:scale-110 shadow-lg" title="ลบ"><Icon name="trash" weight="bold" size={20} /></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                )}
                {(mode === 'add' || mode === 'edit') && (
                    <div className="space-y-6 animate-scale-in">
                        <div className="space-y-2"><label className="text-sm font-bold text-gray-700">รูปภาพ QR Code</label><div className="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:bg-gray-50 transition relative cursor-pointer group bg-white"><input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />{previewUrl ? (<div className="relative"><img src={previewUrl} className="h-40 object-contain mx-auto rounded-lg shadow-sm" /><div className="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition rounded-lg text-white font-medium backdrop-blur-sm"><Icon name="camera" className="mr-2"/> เปลี่ยนรูป</div></div>) : (<div className="py-6"><div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="upload-simple" size={24} weight="bold"/></div><p className="text-sm text-gray-600 font-medium">แตะเพื่อเลือกรูปภาพ</p><p className="text-xs text-gray-400 mt-1">รองรับไฟล์ .jpg, .png</p></div>)}</div></div>
                        <div className="space-y-2"><label className="text-sm font-bold text-gray-700">ระบุยอดเงิน (บาท)</label><div className="relative"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">฿</span><input type="number" value={newAmount} onChange={(e) => setNewAmount(e.target.value)} className="w-full pl-8 p-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-800 font-bold text-lg outline-none focus:ring-2 focus:ring-primary focus:bg-white transition" placeholder="0" /></div></div>
                        <div className="flex gap-3 pt-2"><button onClick={initialEditQr ? onClose : goBack} disabled={isUploading} className="flex-1 py-3 border border-gray-200 text-gray-600 font-bold rounded-xl hover:bg-gray-50 transition">ยกเลิก</button><button onClick={handleSave} disabled={loading || isUploading || (!uploadFile && mode === 'add') || !newAmount} className="flex-[2] py-3 bg-primary text-white font-bold rounded-xl hover:bg-blue-700 disabled:opacity-50 transition flex justify-center items-center gap-2 shadow-lg shadow-blue-200">{isUploading ? <><Icon name="spinner" className="animate-spin"/> กำลังบันทึก...</> : "บันทึกข้อมูล"}</button></div>
                    </div>
                )}
            </Modal>
        );
    };


    // --- Pending View (Redesigned: Task List Style) ---
    const PendingView = ({ data, setSelectedBill }) => {
        const [searchTerm, setSearchTerm] = useState('');
        const [sortOrder, setSortOrder] = useState('newest');

        const pendingBills = useMemo(() => {
          let bills = data.bills.filter(b => b.status === 'รอตรวจสอบ');
          if(searchTerm) { const lower = searchTerm.toLowerCase(); bills = bills.filter(b => String(b.item).toLowerCase().includes(lower) || String(b.billId).toLowerCase().includes(lower) || String(b.studentId).toLowerCase().includes(lower)); }
          return sortOrder === 'newest' ? [...bills].reverse() : bills;
        }, [data.bills, searchTerm, sortOrder]);

        return (
          <div className="space-y-5 pb-24 relative">
             <ScrollToTopBottom />

             {/* 1. Header with Pulse Effect */}
             <div className="bg-amber-500 rounded-2xl p-5 text-white shadow-lg shadow-amber-200 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-24 h-24 bg-white opacity-10 rounded-full blur-2xl -translate-y-6 translate-x-6"></div>
                <div className="relative z-10 flex justify-between items-center">
                    <div>
                        <h2 className="text-xl font-bold flex items-center gap-2">
                            <div className="bg-white/20 p-1.5 rounded-lg animate-pulse">
                                <Icon name="clock-clockwise" weight="fill" />
                            </div>
                            รอตรวจสอบ
                        </h2>
                        <p className="text-amber-100 text-xs mt-1">รายการที่แจ้งโอนแล้ว รอแอดมินยืนยัน</p>
                    </div>
                    <div className="text-right">
                        <span className="text-3xl font-bold">{pendingBills.length}</span>
                        <span className="text-xs block opacity-80">รายการ</span>
                    </div>
                </div>
             </div>

             {/* 2. Search & Sort */}
             <div className="flex gap-3 sticky top-0 z-20 bg-background py-2">
                 <div className="flex-1 bg-white rounded-xl card-shadow border border-gray-100 flex items-center px-4 py-2.5 transition focus-within:ring-2 focus-within:ring-amber-400/30">
                    <Icon name="magnifying-glass" className="text-gray-400 mr-3" size={18} />
                    <input 
                        type="text" 
                        placeholder="ค้นหาชื่อ, รหัส..." 
                        className="w-full bg-transparent text-sm font-medium text-gray-700 outline-none placeholder-gray-400"
                        value={searchTerm} 
                        onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    {searchTerm && <button onClick={() => setSearchTerm('')} className="text-gray-400 hover:text-gray-600 ml-2"><Icon name="x-circle" weight="fill" /></button>}
                 </div>
                 <button 
                    onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')}

    // --- Bill View (Redesigned: With Large Left Status Icon) ---
    const BillView = ({ data, setSelectedBill, setIsCreateModalOpen, searchTerm, setSearchTerm, filter, onFilterChange }) => {
        const [sortOrder, setSortOrder] = useState('newest');
        const [isSummaryOpen, setIsSummaryOpen] = useState(false);

        // คำนวณจำนวนในแต่ละ Tab

            return {

                pending: data.bills.filter(b => b.status === 'รอตรวจสอบ').length,
                paid: data.bills.filter(b => b.status === 'ชำระแล้ว').length,
                unpaid: data.bills.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ').length,
                overdue: data.bills.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; const due = new Date(b.dueDate); due.setHours(0,0,0,0); return due < today; }).length

        }, [data.bills]);

        const tabs = [
            { id: 'all', label: 'ทั้งหมด', color: 'text-gray-600' },
            { id: 'paid', label: 'เรียบร้อย', color: 'text-emerald-600' },

          if (filter === 'unpaid') res = res.filter(b => !b.status || b.status === '' || b.status === 'ค้างชำระ'); 
          if (filter === 'overdue') res = res.filter(b => { if (b.status === 'ชำระแล้ว' || b.status === 'ยกเลิก') return false; if (!b.dueDate) return false; const due = new Date(b.dueDate); due.setHours(0,0,0,0); return due < today; });
          if (searchTerm) { const lower = searchTerm.toLowerCase(); res = res.filter(b => String(b.item).toLowerCase().includes(lower) || String(b.billId).toLowerCase().includes(lower) || String(b.studentId).toLowerCase().includes(lower)); }
          return sortOrder === 'newest' ? [...res].reverse() : res;

        const getMajorStatusIcon = (bill, isOverdue) => {

                </div>
                <button onClick={() => setIsSummaryOpen(true)} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white card-shadow border border-gray-100 text-blue-600 hover:bg-blue-50 transition active:scale-95" title="สรุปยอด"><Icon name="chart-pie-slice" weight="duotone" size={24}/></button>
                <button onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')} className="w-11 h-11 flex items-center justify-center rounded-xl bg-white card-shadow border border-gray-100 text-gray-500 hover:bg-gray-50 transition active:scale-95"><Icon name={sortOrder === 'newest' ? "sort-descending" : "sort-ascending"} weight="bold" size={20} /></button>

                const isOverdue = (bill.dueDate && new Date(bill.dueDate) < new Date() && bill.status !== 'ชำระแล้ว');
                const netTotal = Number(bill.amount) + fine - Number(bill.discount || 0);
                
                const statusInfo = getStatusDisplay(bill.status, isOverdue); 
                const majorIconStyle = getMajorStatusIcon(bill, isOverdue); // ✅ ดึงสไตล์ไอคอนใหญ่

                return (
                    <div key={idx} onClick={() => setSelectedBill(bill)} className="group relative bg-white rounded-2xl p-4 card-shadow border border-gray-100 overflow-hidden cursor-pointer hover:shadow-md transition-all active:scale-[0.98]">
                        
                        <div className="flex items-start gap-4">
                            {/* ✅ กล่องไอคอนใหญ่ด้านซ้าย */}
                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0 ${majorIconStyle.bg} ${majorIconStyle.text}`}>
                                <Icon name={majorIconStyle.icon} weight="fill" size={24} />
                            </div>

                            {/* เนื้อหาหลัก */}
                            <div className="flex-1 min-w-0 flex justify-between">
                                <div className="flex-1 min-w-0 mr-2">
                                    <div className="flex items-center gap-2 mb-1"><span className="bg-gray-100 text-gray-500 text-[10px] font-bold px-1.5 py-0.5 rounded">{bill.studentId}</span><span className="text-sm font-bold text-gray-800 truncate">{studentName}</span></div>
                                    <h4 className="text-gray-600 text-sm font-medium mb-2 line-clamp-1">{bill.item}</h4>
                                    <div className="flex items-center gap-3 text-xs text-gray-400">

                                        {fine > 0 && (<span className="text-red-500 font-bold flex items-center gap-1 bg-red-50 px-2 py-1 rounded-lg"><Icon name="warning" weight="fill" size={12}/> +{fine.toLocaleString()}</span>)}

   // --- History View (Final Fix: Robust Date Parsing) ---
    const HistoryView = ({ data, onDeleteHistory, onViewSlip }) => {
        const [searchTerm, setSearchTerm] = useState('');
        const [sortOrder, setSortOrder] = useState('newest');
        const [isDateFilterActive, setIsDateFilterActive] = useState(false);
        const [dateFilter, setDateFilter] = useState(() => {
            const end = new Date();
            const start = new Date(end.getFullYear(), end.getMonth(), 1); 
            const toInput = (d) => d.toISOString().split('T')[0];
            return { start: toInput(start), end: toInput(end) };
        });

        // ✅ แก้ตรงนี้: ฟังก์ชันแปลงวันที่ให้ฉลาดขึ้น (รองรับทั้งแบบ Sheet และแบบมาตรฐาน)
        const formatDateTime = (dateInput) => {
            if (!dateInput) return '-';
            
            let dateObj;

            // กรณี 1: ถ้าข้อมูลมาเป็น "8/1/2026, 9:29:16" (รูปแบบจาก Sheet)
            if (typeof dateInput === 'string' && dateInput.includes('/')) {
                try {
                    const [dPart, tPart] = dateInput.split(', ');
                    const [day, month, year] = dPart.split('/');
                    const [hour, minute] = tPart ? tPart.split(':') : [0, 0];
                    // สร้าง Date Object ใหม่ (ระวังเดือนต้อง -1)
                    dateObj = new Date(year, month - 1, day, hour, minute);
                } catch (e) {
                    dateObj = new Date(dateInput); // ถ้าแกะไม่ออก ให้ลองแปลงปกติ
                }
            } else {
                // กรณี 2: ข้อมูลเป็นมาตรฐาน (ISO String) หรือ Timestamp
                dateObj = new Date(dateInput);
            }

            // ถ้าแปลงไม่ได้จริงๆ ให้คืนค่าเดิม
            if (isNaN(dateObj.getTime())) return dateInput;

            // แสดงผล: วัน เดือน(ย่อ) ปี(พ.ศ. 2หลัก), เวลา
            return dateObj.toLocaleDateString('th-TH', { 
                day: 'numeric', 
                month: 'short', 
                year: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false 
            });
        };

        // Helper สำหรับแปลงวันที่เพื่อใช้เปรียบเทียบ (Sorting/Filtering)
        const parseDateForSort = (dateInput) => {
            if (!dateInput) return 0;
            if (typeof dateInput === 'string' && dateInput.includes('/')) {
                try {
                    const [dPart, tPart] = dateInput.split(', ');
                    const [day, month, year] = dPart.split('/');
                    const [hour, minute, second] = tPart ? tPart.split(':') : [0, 0, 0];
                    return new Date(year, month - 1, day, hour, minute, second).getTime();
                } catch (e) { return new Date(dateInput).getTime(); }
            }
            return new Date(dateInput).getTime();
        };

        const handleDateChange = (type, value) => { setDateFilter(prev => ({ ...prev, [type]: value })); };

        const isDateInRange = (targetDate, start, end) => {
            if (!targetDate) return false;
            const target = parseDateForSort(targetDate);
            const s = new Date(start).setHours(0,0,0,0);
            const e = new Date(end).setHours(23,59,59,999);
            return target >= s && target <= e;
        };

        const filteredHistory = useMemo(() => {
          let res = data.history;
          
          // ใช้ timestamp หรือ payDate ก็ได้ (ฟังก์ชัน parseDateForSort จะจัดการให้)
          const getDate = (item) => item.timestamp || item.payDate;

          if (isDateFilterActive) { 
              res = res.filter(h => isDateInRange(getDate(h), dateFilter.start, dateFilter.end)); 
          }
          
          if (searchTerm) { 
              const term = searchTerm.toLowerCase(); 
              res = res.filter(h => 
                  String(h.studentId).toLowerCase().includes(term) || 
                  String(h.name).toLowerCase().includes(term) || 
                  String(h.billId).toLowerCase().includes(term) ||
                  String(h.item).toLowerCase().includes(term)
              ); 
          }
          
          // เรียงลำดับ (ใช้ฟังก์ชันช่วยแกะวันที่)
          return sortOrder === 'newest' 
            ? [...res].sort((a, b) => parseDateForSort(getDate(b)) - parseDateForSort(getDate(a)))
            : [...res].sort((a, b) => parseDateForSort(getDate(a)) - parseDateForSort(getDate(b)));
        }, [data.history, searchTerm, sortOrder, dateFilter, isDateFilterActive]);

        const totalAmount = useMemo(() => {
            return filteredHistory.reduce((sum, item) => sum + (Number(item.total) || Number(item.amount) || 0), 0);
        }, [filteredHistory]);

        return (
          <div className="space-y-5 pb-24 animate-fade-in">
            <ScrollToTopBottom />
            
            {/* 1. Summary Dashboard */}
            <div className="bg-white rounded-3xl p-5 card-shadow border border-gray-100 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-full blur-3xl -translate-y-10 translate-x-10 opacity-60"></div>
                <div className="relative z-10">
                    <div className="flex justify-between items-start mb-4">
                        <div>
                            <h2 className="text-gray-500 font-bold text-xs uppercase tracking-wider mb-1">ยอดรวมที่ชำระแล้ว</h2>
                            <div className="text-3xl font-extrabold text-gray-800 tracking-tight">
                                ฿{totalAmount.toLocaleString()}
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm">
                                <Icon name="list-checks" weight="bold"/> {filteredHistory.length} รายการ
                            </div>
                        </div>
                    </div>

                    {/* Search & Filter */}
                    <div className="space-y-3">
                        <div className="relative">
                            <Icon name="magnifying-glass" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
                            <input type="text" placeholder="ค้นหาชื่อ, รหัสนักศึกษา..." className="w-full pl-10 pr-10 py-2.5 bg-gray-50 border-none rounded-xl text-sm font-medium text-gray-700 outline-none focus:ring-2 focus:ring-blue-100 transition" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                            {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><Icon name="x-circle" weight="fill" /></button>}
                        </div>

                        <div className="flex gap-2">
                            <button onClick={() => setSortOrder(p => p === 'newest' ? 'oldest' : 'newest')} className="flex items-center gap-1 px-3 py-2 bg-gray-50 text-gray-500 rounded-xl text-xs font-bold hover:bg-gray-100 transition">
                                <Icon name="arrows-down-up" weight="bold"/> {sortOrder === 'newest' ? 'ใหม่ล่าสุด' : 'เก่าสุด'}
                            </button>
                            <button onClick={() => setIsDateFilterActive(!isDateFilterActive)} className={`flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl text-xs font-bold transition ${isDateFilterActive ? 'bg-primary text-white shadow-lg shadow-blue-200' : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}`}>
                                <Icon name="calendar" weight={isDateFilterActive ? 'fill' : 'bold'}/> {isDateFilterActive ? 'ปิดตัวกรองวันที่' : 'กรองวันที่'}
                            </button>
                        </div>

                        <div className={`overflow-hidden transition-all duration-300 ${isDateFilterActive ? 'max-h-24 opacity-100 pt-1' : 'max-h-0 opacity-0'}`}>
                            <div className="bg-blue-50/50 p-3 rounded-xl border border-blue-100 grid grid-cols-2 gap-3">
                                <div><label className="text-[10px] font-bold text-blue-400 mb-1 block">เริ่ม</label><input type="date" value={dateFilter.start} onChange={e => handleDateChange('start', e.target.value)} className="w-full text-xs p-1.5 rounded-lg border-none bg-white text-gray-600 outline-none"/></div>
                                <div><label className="text-[10px] font-bold text-blue-400 mb-1 block">สิ้นสุด</label><input type="date" value={dateFilter.end} onChange={e => handleDateChange('end', e.target.value)} className="w-full text-xs p-1.5 rounded-lg border-none bg-white text-gray-600 outline-none"/></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            {/* 2. List Items */}
            <div className="space-y-3">

    // --- Helper: Image Gallery (ฉบับแก้ไข: แยกรูปฉลาดขึ้น + ปุ่มชัดเจน) ---
    const ProductImageGallery = ({ imageString }) => {
        const images = useMemo(() => {
            if (!imageString) return [];

            return imageString
                // แยกด้วย: คอมม่า(,) หรือ เว้นวรรค(\s) หรือ ขึ้นบรรทัดใหม่(\n) หรือ ขีดตั้ง(|)
                .split(/[, \n|]+/) 
                .map(url => url.trim()) // ตัดช่องว่างหน้าหลัง
                // กรองเอาเฉพาะอันที่เป็นลิงก์จริงๆ (กันค่าว่างหลุดมา)
                .filter(url => url && url.length > 5 && url.startsWith('http')); 
        }, [imageString]);

        const [currentIndex, setCurrentIndex] = useState(0);

        // รีเซ็ตหน้าแรกเสมอเมื่อรายการรูปเปลี่ยน
        useEffect(() => { setCurrentIndex(0); }, [images]);

        if (images.length === 0) {
            return (
                <div className="w-full h-full bg-gray-50 flex items-center justify-center text-gray-300">
                    <Icon name="image" size={32} />
                </div>
            );
        }

        const nextImage = (e) => {
            e.stopPropagation();
            setCurrentIndex((prev) => (prev + 1) % images.length);
        };

        const prevImage = (e) => {
            e.stopPropagation();
            setCurrentIndex((prev) => (prev - 1 + images.length) % images.length);
        };

        return (
            <div className="relative w-full h-full group bg-gray-100">
                <img 
                    src={images[currentIndex]} 
                    className="w-full h-full object-cover" 
                    alt={`รูปที่ ${currentIndex + 1}`}
                    referrerPolicy="no-referrer" // ✅ สำคัญ: กัน Google Block รูป
                    onError={(e) => { e.target.style.display = 'none'; }} // ถ้ารูปเสียให้ซ่อนไปเลย
                />
                
                {/* แสดงจำนวนรูปที่มุมขวาบน (เพื่อเช็คว่าอ่านครบไหม) */}
                <div className="absolute top-2 right-2 bg-black/60 text-white text-[10px] px-2 py-0.5 rounded-full">
                    {currentIndex + 1} / {images.length}
                </div>

                {/* ปุ่มเลื่อน (ถ้ามีมากกว่า 1 รูป) */}
                {images.length > 1 && (
                    <>
                        <button onClick={(e) => {e.stopPropagation(); setCurrentIndex((prev) => (prev - 1 + images.length) % images.length)}} className="absolute left-0 top-0 bottom-0 px-2 hover:bg-black/10 transition"><Icon name="caret-left" weight="bold" className="text-white drop-shadow-md"/></button>
                        <button onClick={(e) => {e.stopPropagation(); setCurrentIndex((prev) => (prev + 1) % images.length)}} className="absolute right-0 top-0 bottom-0 px-2 hover:bg-black/10 transition"><Icon name="caret-right" weight="bold" className="text-white drop-shadow-md"/></button>
                    </>

    // --- Product Modal (Logic: Safe Save & Modern Design) ---
    const ProductModal = ({ isOpen, onClose, product, onSave, loading, zIndex = "z-[110]" }) => {
        const [form, setForm] = useState({ id: '', name: '', price: '', image: '', options: '', status: 'ON', sizeChart: '', stock: '' });
        
        const [existingMainImages, setExistingMainImages] = useState([]); 
        const [newMainFiles, setNewMainFiles] = useState([]); 
        const [existingSizeImages, setExistingSizeImages] = useState([]); 
        const [newSizeFiles, setNewSizeFiles] = useState([]); 
        const [optionGroups, setOptionGroups] = useState([{ header: '', options: [{ label: '', price: '' }] }]);

        // ✅ 1. โหลดข้อมูลเมื่อเปิด Modal (ทำให้ชัวร์ว่ารูปเก่ามาครบ)
        useEffect(() => {
            if(isOpen) {
                if (product) {
                    setForm(product);

                    const safeSplit = (str) => {
                        if (!str) return [];
                        return str.split(/[, \n|]+/) // แยกด้วยทุกตัวคั่นที่เป็นไปได้
                                  .map(s => s.trim())
                                  .filter(s => s && s.startsWith('http'));
                    };

                    setExistingMainImages(safeSplit(product.image));
                    setExistingSizeImages(safeSplit(product.sizeChart));
                    
                    setNewMainFiles([]);
                    setNewSizeFiles([]);
                    parseOptionString(product.options || '');
                } else {
                    // กรณีเพิ่มใหม่
                    setForm({ id: `P-${Date.now()}`, name: '', price: '', image: '', options: '', status: 'ON', sizeChart: '', stock: '' });
                    setExistingMainImages([]); setNewMainFiles([]);
                    setExistingSizeImages([]); setNewSizeFiles([]);
                    setOptionGroups([{ header: '', options: [{ label: '', price: '' }] }]);
                }
            }
        }, [product, isOpen]);

        const parseOptionString = (str) => { if(!str) { setOptionGroups([{ header: '', options: [{ label: '', price: '' }] }]); return; } const groups = str.split('|').map(groupStr => { let header = ''; let body = groupStr.trim(); if (body.includes(':')) { const parts = body.split(':'); header = parts[0].trim(); body = parts[1].trim(); } let options = []; if(body) { options = body.split(',').map(item => { const parts = item.trim().split(/[=+]/); return { label: parts[0].trim(), price: parts[1] || '' }; }); } if (options.length === 0) options.push({ label: '', price: '' }); return { header, options }; }); setOptionGroups(groups.length > 0 ? groups : [{ header: '', options: [{ label: '', price: '' }] }]); };
        const buildOptionString = () => { const validGroups = optionGroups.map(group => { const validOptions = group.options.filter(o => o.label.trim() !== ''); if(validOptions.length === 0) return null; const body = validOptions.map(o => { const p = o.price && parseInt(o.price) > 0 ? o.price : ''; return p ? `${o.label.trim()}=${p}` : o.label.trim(); }).join(','); return group.header ? `${group.header.trim()}:${body}` : body; }).filter(g => g !== null); return validGroups.join(' | '); };
        
        const handleAddGroup = () => setOptionGroups([...optionGroups, { header: '', options: [{ label: '', price: '' }] }]);
        const handleRemoveGroup = (gIdx) => setOptionGroups(optionGroups.filter((_, i) => i !== gIdx));
        const handleHeaderChange = (gIdx, val) => { const newGroups = [...optionGroups]; newGroups[gIdx].header = val; setOptionGroups(newGroups); };
        const handleAddOption = (gIdx) => { const newGroups = [...optionGroups]; newGroups[gIdx].options.push({ label: '', price: '' }); setOptionGroups(newGroups); };
        const handleRemoveOption = (gIdx, oIdx) => { const newGroups = [...optionGroups]; newGroups[gIdx].options = newGroups[gIdx].options.filter((_, i) => i !== oIdx); setOptionGroups(newGroups); };
        const handleOptionChange = (gIdx, oIdx, field, val) => { const newGroups = [...optionGroups]; newGroups[gIdx].options[oIdx][field] = val; setOptionGroups(newGroups); };

        const processFiles = (files, callback) => {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement("img");
                        img.onload = () => {
                            const canvas = document.createElement("canvas");
                            const ctx = canvas.getContext("2d");
                            const MAX_WIDTH = 1000; const MAX_HEIGHT = 1000;
                            let width = img.width; let height = img.height;
                            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                            canvas.width = width; canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL("image/jpeg", 0.8).split(',')[1]); 
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });
            Promise.all(promises).then(callback);
        };

        const handleAddMain = (e) => processFiles(e.target.files, (b64s) => setNewMainFiles(prev => [...prev, ...b64s]));
        const handleDelMainExist = (idx) => setExistingMainImages(prev => prev.filter((_, i) => i !== idx));
        const handleDelMainNew = (idx) => setNewMainFiles(prev => prev.filter((_, i) => i !== idx));
        const handleAddSize = (e) => processFiles(e.target.files, (b64s) => setNewSizeFiles(prev => [...prev, ...b64s]));
        const handleDelSizeExist = (idx) => setExistingSizeImages(prev => prev.filter((_, i) => i !== idx));
        const handleDelSizeNew = (idx) => setNewSizeFiles(prev => prev.filter((_, i) => i !== idx));

        const handleSubmit = () => {
            onSave({
                ...form,
                options: buildOptionString(),
                
                // ✅ แก้ไข: ส่งกลับไปเป็น String คั่นด้วย " | "
                image: existingMainImages.join(' | '), 
                imageFiles: newMainFiles,            
                
                sizeChart: existingSizeImages.join(' | '), 
                sizeChartFiles: newSizeFiles 
            });
        };

        if(!isOpen) return null;

        return ReactDOM.createPortal(
            <div className={`fixed inset-0 ${zIndex} flex items-center justify-center p-4 bg-black/60 backdrop-blur-md animate-fade-in`}>

                        </button>
                    </div>

                    {/* Scrollable Content */}
                    <div className="p-6 overflow-y-auto custom-scrollbar space-y-6">
                        
                        {/* 1. ข้อมูลพื้นฐาน */}
                        <div className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">ชื่อสินค้า</label>
                                <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="ระบุชื่อสินค้า..." className="w-full px-4 py-3.5 bg-white rounded-2xl text-sm font-bold text-gray-700 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm placeholder-gray-300"/>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">ราคา (บาท)</label>
                                    <div className="relative">
                                        <input type="number" value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="w-full pl-4 pr-4 py-3.5 bg-white rounded-2xl text-lg font-black text-indigo-600 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm" placeholder="0"/>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 block ml-1">สต็อก (ชิ้น)</label>
                                    <input type="number" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} className="w-full px-4 py-3.5 bg-white rounded-2xl text-lg font-black text-gray-700 outline-none border border-transparent focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm" placeholder="0"/>
                                </div>
                            </div>
                        </div>

                        {/* Divider */}
                        <div className="border-t border-dashed border-gray-200"></div>

                        {/* 2. รูปภาพ */}
                        <ImageManager label="รูปภาพสินค้า" existingUrls={existingMainImages} newImages={newMainFiles} onRemoveExisting={handleDelMainExist} onRemoveNew={handleDelMainNew} onAddNew={handleAddMain} />
                        <ImageManager label="ตารางไซส์" existingUrls={existingSizeImages} newImages={newSizeFiles} onRemoveExisting={handleDelSizeExist} onRemoveNew={handleDelSizeNew} onAddNew={handleAddSize} />

                        {/* Divider */}
                        <div className="border-t border-dashed border-gray-200"></div>

                        {/* 3. ตัวเลือก */}
                        <div className="space-y-3">
                            <div className="flex justify-between items-center">
                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1.5"><Icon name="sliders" weight="fill"/> ตัวเลือกสินค้า</label>
                                <button onClick={handleAddGroup} className="text-[10px] bg-white border border-gray-200 px-3 py-1.5 rounded-full font-bold text-gray-500 hover:text-primary hover:border-primary transition shadow-sm">+ เพิ่มหัวข้อ</button>
                            </div>
                            
                            {optionGroups.map((group, gIdx) => (
                                <div key={gIdx} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 relative group transition-all hover:shadow-md">
                                    {optionGroups.length > 1 && (<button onClick={() => handleRemoveGroup(gIdx)} className="absolute -top-2 -right-2 text-white bg-red-400 rounded-full w-6 h-6 flex items-center justify-center shadow-md opacity-0 group-hover:opacity-100 transition-all z-10"><Icon name="x" size={12} weight="bold"/></button>)}
                                    <input type="text" value={group.header} onChange={e => handleHeaderChange(gIdx, e.target.value)} className="w-full mb-3 px-0 py-1 bg-transparent border-b border-gray-100 text-sm font-bold text-primary placeholder-indigo-200 focus:border-primary outline-none" placeholder="ชื่อหัวข้อ (เช่น สี, ไซส์)"/>
                                    <div className="space-y-2">
                                        {group.options.map((opt, oIdx) => (

                                                <div className="w-20 bg-gray-50 rounded-xl px-2 py-2 flex items-center border border-transparent focus-within:border-indigo-200 focus-within:bg-white transition-colors">
                                                    <span className="text-[10px] text-gray-400 mr-1">+</span>
                                                    <input type="number" value={opt.price} onChange={e => handleOptionChange(gIdx, oIdx, 'price', e.target.value)} className="w-full text-xs font-bold bg-transparent outline-none text-gray-600 text-center" placeholder="0"/>
                                                </div>
                                                <button onClick={() => handleRemoveOption(gIdx, oIdx)} className="w-8 h-8 flex items-center justify-center text-gray-300 hover:text-red-400 hover:bg-red-50 rounded-full transition"><Icon name="trash" size={14} weight="bold"/></button>

                                        <button onClick={() => handleAddOption(gIdx)} className="w-full py-2 mt-2 border border-dashed border-indigo-100 text-indigo-400 text-[10px] font-bold rounded-xl hover:bg-indigo-50 hover:border-indigo-200 transition-colors">+ เพิ่มตัวเลือกย่อย</button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 4. สถานะ */}
                        <div className="bg-white p-2 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between">
                            <label className="text-xs font-bold text-gray-500 ml-2">สถานะการขาย</label>
                            <div className="relative w-1/2">
                                <select value={form.status} onChange={e => setForm({...form, status: e.target.value})} className={`w-full py-2 pl-4 pr-8 rounded-xl text-xs font-bold outline-none appearance-none cursor-pointer transition-colors ${form.status === 'ON' ? 'bg-green-100 text-green-700' : (form.status === 'OUT' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-500')}`}>
                                    <option value="ON">🟢 พร้อมส่ง (ON)</option>
                                    <option value="OFF">⚪️ ปิดการขาย (OFF)</option>
                                    <option value="OUT">🟠 สินค้าหมด (OUT)</option>
                                </select>
                                <Icon name="caret-down" weight="bold" size={12} className="absolute right-3 top-1/2 -translate-y-1/2 opacity-50 pointer-events-none"/>
                            </div>
                        </div>
                    </div>

                    {/* Footer Actions */}
                    <div className="p-4 bg-white border-t border-gray-50 z-10 sticky bottom-0">
                        <button onClick={handleSubmit} disabled={loading} className="w-full py-4 rounded-2xl font-bold text-white shadow-lg shadow-indigo-200 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 transform active:scale-95 transition-all flex items-center justify-center gap-2">
                            {loading ? <><Icon name="spinner" className="animate-spin" weight="bold"/> กำลังบันทึกข้อมูล...</> : <><Icon name="check-circle" weight="bold" size={20}/> บันทึกสินค้า</>}
                        </button>
                    </div>
                </div>
            </div>,
            document.body
